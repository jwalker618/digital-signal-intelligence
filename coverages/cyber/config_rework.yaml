          risk:
            weight: 0.18
            score_condition: true
            bands:
              - max: 30
                override: 5
                action: "DECLINE" 
                note: "Dangerous network exposure"
              - max: 45
                override: 4
                action: "REFER"
                note: "Elevated network exposure"
            inclusive_max: false
      
        - id: "software_currency"
          name: "Software Currency"
          description: "Software version freshness (fingerprinting analysis)"
          inference_utility_function: software_currency_basefunction
          risk:
            weight: 0.10
            score_condition: false
          loss:
            weight: 0.25
            correlation_type: both
            correlation_direction: negative
            normalizer: percentile

        - id: "cve_exposure"
          name: "CVE Exposure"
          description: "Known vulnerabilities in detected software"
          inference_utility_function: cve_exposure_basefunction
          risk:
            weight: 0.18
            score_condition: true
            bands:
              - max: 25
                override: 5
                action: "DECLINE"
                note: "Critical unpatched vulnerabilities"
              - max: 40
                override: 4
                action: "REFER"
                note: "Significant vulnerability exposure"
            inclusive_max: false
          loss:
            weight: 0.2
            correlation_type: frequency
            correlation_direction: positive
            normalizer: log_scale 

        - id: "cloud_infrastructure"
          name: "Cloud Infrastructure Quality"
          description: "Cloud provider quality and configuration"
          inference_utility_function: cloud_infrastructure_basefunction
          risk:
            weight: 0.05
            score_condition: false

        - id: "waf_presence"
          name: "WAF Presence"
          description: "Web Application Firewall detection"
          inference_utility_function: waf_presence_basefunction
          risk:
            weight: 0.05
            score_condition: false

        - id: "cdn_usage"
          name: "CDN Usage"
          description: "Content Delivery Network usage (DDoS protection indicator)"
          inference_utility_function: cdn_usage_basefunction
          risk:
            weight: 0.05
            score_condition: false
  
      corporate_footprint:
        - id: "security_page"
          name: "Security Page Presence"
          description: "Dedicated security/trust page presence and quality"
          inference_utility_function: security_page_basefunction
          risk:
            weight: 0.15
            score_condition: false
          loss:
            weight: 0.35
            correlation_type: severity
            correlation_direction: negative
            normalizer: categorical_map            
            
        - id: "privacy_policy"
          name: "Privacy Policy Quality"
          description: "Privacy policy comprehensiveness (NLP analysis)"
          inference_utility_function: privacy_policy_basefunction
          risk:
            weight: 0.10
            score_condition: false
            
        - id: "security_txt"
          name: "Security.txt Presence"
          description: "RFC 9116 security.txt file presence and completeness"
          inference_utility_function: security_txt_basefunction
          risk:
            weight: 0.08
            score_condition: false
          
        - id: "bug_bounty"
          name: "Bug Bounty Program"
          description: "Public bug bounty program presence"
          inference_utility_function: bug_bounty_basefunction
          risk:
            weight: 0.15
            score_condition: false
          
        - id: "security_hiring"
          name: "Security Hiring Activity"
          description: "Security-related job postings (CISO, security engineers)"
          inference_utility_function: security_hiring_basefunction
          risk:
            weight: 0.12
            score_condition: false
          
        - id: "technical_content"
          name: "Technical Blog Quality"
          description: "Security-focused technical content presence"
          inference_utility_function: technical_quality_basefunction
          risk:
            weight: 0.08
            score_condition: false

        - id: "developer_resources"
          name: "Developer Resources"
          description: "API documentation and developer portal presence"
          inference_utility_function: developer_resources_basefunction
          risk:
            weight: 0.07
            score_condition: false

        - id: "security_leadership"
          name: "Security Leadership Visibility"
          description: "CISO/security leadership public presence"
          inference_utility_function: security_leadership_basefunction
          risk:
            weight: 0.15
            score_condition: false
          loss:
            weight: 0.4
            correlation_type: both
            correlation_direction: negative
            normalizer: linear            

        - id: "compliance_badges"
          name: "Compliance Certifications"
          description: "Displayed compliance certifications (SOC 2, ISO 27001, etc.)"
          inference_utility_function: compliance_badges_basefunction
          risk:
            weight: 0.10
            score_condition: false
          loss:
            weight: 0.25
            correlation_type: frequency
            correlation_direction: negative
            normalizer: linear            
  
      public_record:
        - id: "breach_history"
          name: "Breach History"
          description: "Historical data breaches (HHS, state AG, public disclosures)"
          inference_utility_function: breach_history_basefunction
          risk:
            weight: 0.35
            score_condition: true
            bands:
              - max: 35
                override: 5
                action: "DECLINE"
                note: "Severe or recent breach history"
              - max: 50
                override: 4
                action: "REFER"
                note: "Material breach history"
            inclusive_max: false
          loss:
            weight: 0.5
            correlation_type: both
            correlation_direction: positive
            normalizer: categorical_map            
            
        - id: "regulatory_action"
          name: "Regulatory Actions"
          description: "FTC, state AG, GDPR enforcement actions"
          inference_utility_function: regulatory_action_basefunction
          risk:
            weight: 0.20
            score_condition: false
          loss:
            weight: 0.3
            correlation_type: both
            correlation_direction: positive
            normalizer: linear            
          
        - id: "litigation_history"
          name: "Litigation History"
          description: "Data breach and privacy-related lawsuits"
          inference_utility_function: litigation_history_basefunction
          risk:
            weight: 0.15
            score_condition: false
          loss:
            weight: 0.2
            correlation_type: frequency
            correlation_direction: positive
            normalizer: capped  
          
        - id: "credential_exposure"
          name: "Credential Exposure"
          description: "Corporate domain credential exposure (HIBP)"
          inference_utility_function: credential_exposure_basefunction
          risk:
            weight: 0.15
            score_condition: false
          
        - id: "dark_web"
          name: "Dark Web Exposure"
          description: "Leaked data and credentials for sale"
          inference_utility_function: dark_web_basefunction
          risk:
            weight: 0.15
            score_condition: true
            bands:
              - max: 30
                override: 5
                action: "DECLINE"
                note: "Active dark web exposure"
              - max: 45
                override: 4
                action: "REFER"
                note: "Dark web data presence"
            inclusive_max: false
          
      structured_data:
        - id: "security_rating"
          name: "Security Rating"
          description: "Third-party security rating (BitSight, SecurityScorecard)"
          inference_utility_function: security_rating_basefunction
          risk:
            weight: 0.50
            score_condition: false
          loss:
            weight: 0.3
            correlation_type: both
            correlation_direction: negative
            normalizer: percentile
          
        - id: "esg_cyber"
          name: "ESG Cyber Component"
          description: "Cyber/privacy component of ESG ratings"
          inference_utility_function: esg_cyber_basefunction
          risk:
            weight: 0.2
            score_condition: false
          loss:
