    risk_tier_bands:
      bands:
      - {id: 1, label: PREFERRED, description: Excellent downstream risk, interpretation: {bands: {min: 800, max: 1000}, action: APPROVE, application: {method: MULTIPLIER, applied: 0.0010, basis: tiv}}}
      - {id: 2, label: STANDARD_PLUS, description: Good downstream risk, interpretation: {bands: {min: 650, max: 799}, action: APPROVE, application: {method: MULTIPLIER, applied: 0.0015, basis: tiv}}}
      - {id: 3, label: STANDARD, description: Average downstream risk, interpretation: {bands: {min: 500, max: 649}, action: REFER, application: {method: MULTIPLIER, applied: 0.0022, basis: tiv}}}
      - {id: 4, label: SUBSTANDARD, description: Elevated downstream risk, interpretation: {bands: {min: 350, max: 499}, action: REFER, application: {method: MULTIPLIER, applied: 0.0035, basis: tiv}}}
      - {id: 5, label: DECLINE, description: Unacceptable downstream risk, interpretation: {bands: {min: 0, max: 349}, action: DECLINE, application: {method: MULTIPLIER, applied: 0.0055, basis: tiv}}}

    loss_tier_bands:
