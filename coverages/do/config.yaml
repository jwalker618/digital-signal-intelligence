  do_sme:
    metadata:
      name: DSI D&O SME Model
      description: D&O coverage for private companies with revenue under $100M
      version: 2.2.0
      product_types:
      - side_a
      - side_b
      - employment_practices
      - fiduciary
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: side_a, side_b, employment_practices, fiduciary'
        - field: limit
          description: Requested limit in USD
      min_premium: 5000
      default_currency: USD
      model_specificity: 2
      routing_constraints:
      - field: revenue
        operator: <=
        value: 100000000
        required_in_input: true
      - field: limit
        operator: <=
        value: 5000000
        required_in_input: true
    direct_queries:
    - id: pending_claims
      question: Are there any pending claims against directors or officers?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Pending D&O claims
    - id: regulatory_investigation
      question: Is the company or any director/officer under regulatory investigation?
      query_condition:
      - return: true
        action: REFER
        override: 3
        applied: null
        note: Regulatory investigation disclosed
    - id: planned_transaction
      question: Is there a planned M&A, sale, or material transaction in the next 12 months?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Planned transaction - tail coverage needed
    - id: executive_dispute
      question: Are there any disputes with current or former executives?
      query_condition:
      - return: true
        action: REFER
        override: 3
        applied: null
        note: Executive dispute disclosed
