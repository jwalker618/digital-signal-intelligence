    risk_tier_bands:
      bands:
      - id: 1
        label: PREFERRED
        description: Excellent risk - automatic approval, preferred pricing
        interpretation:
          bands:
            min: 800
            max: 1000
          action: APPROVE
          application:
            method: PREMIUM_BASE
            applied: 8000
      - id: 2
        label: STANDARD_PLUS
        description: Good risk - automatic approval, standard pricing
        interpretation:
          bands:
            min: 650
            max: 799
          action: APPROVE
          application:
            method: PREMIUM_BASE
            applied: 12000
      - id: 3
        label: STANDARD
        description: Average risk - may require referral
        interpretation:
          bands:
            min: 500
            max: 649
          action: REFER
          application:
            method: PREMIUM_BASE
            applied: 18000
      - id: 4
        label: SUBSTANDARD
        description: Elevated risk - requires senior review
        interpretation:
          bands:
            min: 350
            max: 499
          action: REFER
          application:
            method: PREMIUM_BASE
            applied: 30000
      - id: 5
        label: DECLINE
        description: Unacceptable risk - decline
        interpretation:
          bands:
            min: 0
            max: 349
          action: DECLINE
          application:
            method: PREMIUM_BASE
            applied: 50000
    loss_tier_bands:
      bands:
      - id: 1
        label: VERY_LOW
        description: Very low risk of loss
        interpretation:
          bands:
            min: 80
            max: 100
          application:
            frequency_modifier: 0.7
            severity_modifier: 0.8
      - id: 2
        label: LOW
        description: Low risk of loss
        interpretation:
          bands:
            min: 60
            max: 79
          application:
            frequency_modifier: 0.85
            severity_modifier: 0.9
      - id: 3
        label: MODERATE
        description: Moderate risk of loss
        interpretation:
          bands:
            min: 40
            max: 59
          application:
            frequency_modifier: 1.0
            severity_modifier: 1.0
      - id: 4
        label: ELEVATED
        description: Elevated risk of loss
        interpretation:
          bands:
            min: 20
            max: 39
