        name: "Network Authority"
        description: "Quality of institutional relationships and counterparties"
        weight: 0.10
        test_scores: {excellent: 88, average: 68, poor: 38}
        critical: false
        score_condition: null
        
      - id: "regulatory_compliance"
        name: "Regulatory Compliance"
        description: "Examination results, enforcement actions, compliance ratings"
        weight: 0.25
        test_scores: {excellent: 95, average: 72, poor: 35}
        critical: true
        score_condition: regulatory_compliance_critical
        
      - id: "financial_condition"
        name: "Financial Condition"
        description: "Capital, asset quality, liquidity, earnings (CAMELS proxies)"
        weight: 0.20
        test_scores: {excellent: 92, average: 70, poor: 38}
        critical: true
        score_condition: financial_condition_critical
        
      - id: "governance"
        name: "Corporate Governance"
        description: "Board composition, executive stability, committee quality"
        weight: 0.15
        test_scores: {excellent: 88, average: 65, poor: 35}
        critical: false
        score_condition: null
        
      - id: "operational_risk"
        name: "Operational Risk"
        description: "Complaints, litigation, breach history, incidents"
        weight: 0.10
        test_scores: {excellent: 90, average: 68, poor: 32}
        critical: false
        score_condition: operational_risk_critical
        
      - id: "cyber_security"
        name: "Cyber Security"
        description: "Observable technical security posture"
        weight: 0.10
        test_scores: {excellent: 88, average: 65, poor: 35}
        critical: false
        score_condition: cyber_security_critical
        
      - id: "corporate_footprint"
        name: "Corporate Footprint"
        description: "Transparency, disclosure, investor relations"
        weight: 0.05
        test_scores: {excellent: 85, average: 62, poor: 35}
        critical: false
        score_condition: null
        
      - id: "structured_data"
        name: "Structured Data"
        description: "Third-party ratings and benchmarks"
        weight: 0.05
        test_scores: {excellent: 85, average: 65, poor: 40}
        critical: false
        score_condition: null

