cyber:
  cyber_general:
    metadata:
      name: DSI Cyber Technical Pricing Model
      description: Cyber liability model based on externally observable technical
        signals
      version: 2.3.0
      product_types:
      - cyber_liability
      - network_security
      - privacy_liability
      - cyber_extortion
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: cyber_liability, network_security, privacy_liability,
            cyber_extortion'
        - field: limit
          description: Requested limit in USD
        - field: revenue
          description: Annual revenue in USD (required for model qualification)
      min_premium: 5000
      default_currency: USD
      model_specificity: 1
      routing_constraints:
      - field: revenue
        operator: '>'
        value: 50000000
        required_in_input: true
    direct_queries:
    - id: mfa_enabled
      question: Is multi-factor authentication enabled for all remote access?
      query_condition:
      - return: false
        action: REFER
        override: 4
        applied: null
        note: MFA not enabled - increased ransomware risk
    - id: security_training
      question: Do all employees complete annual cyber security training?
      query_condition:
      - return: false
        action: REFER
        override: 4
        applied: null
        note: No security training - increased phishing risk
    - id: phi_handler
      question: Do you process Protected Health Information (PHI)?
      query_condition:
      - return: true
        action: MODIFIER
        override: null
        applied: 1.25
        note: PHI handler - HIPAA exposure
    - id: pci_scope
      question: Do you store payment card data (PCI scope)?
      query_condition:
      - return: true
        action: MODIFIER
        override: null
        applied: 1.15
        note: PCI scope - card data exposure
    - id: incident_response_plan
      question: Do you have a documented incident response plan?
      query_condition:
      - return: false
        action: FLAG
        override: null
        applied: null
        note: No IR plan - extended breach impact likely
    - id: edr_deployed
      question: Is endpoint detection and response (EDR) deployed on all endpoints?
      query_condition:
      - return: false
        action: FLAG
        override: null
        applied: null
        note: No EDR - reduced threat detection
    - id: immutable_backups
      question: Are backups maintained offline or immutable?
      query_condition:
      - return: false
        action: FLAG
        override: null
        applied: null
        note: No immutable backups - ransomware recovery risk
    - id: recent_incident
      question: Have you experienced a material cyber incident in the past 3 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Recent incident - requires manual review
