            - {cat: "TAX", label: "Tax Law", applied: 1.15}
            - {cat: "BANKRUPTCY", label: "Bankruptcy", applied: 1.15}
            - {cat: "HEALTHCARE", label: "Healthcare Law", applied: 1.15}
