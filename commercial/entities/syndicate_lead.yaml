# Lloyd's Syndicate — Lead Underwriter
#
# This entity leads on energy, marine, and aerospace programs
# in the London subscription market. As lead, it takes a larger
# line and charges a loading factor for its underwriting role.

entity:
  id: syndicate_lead
  name: "Lead Syndicate 5678"
  market: lloyds
  base_currency: GBP

  coverages:
    - coverage: energy
      configs:
        - energy_general
        - energy_upstream_deepwater
        - energy_upstream_onshore
        - energy_upstream_unconventional
        - energy_midstream
        - energy_downstream
        - energy_offshore_wind
        - energy_onshore_renewable
        - energy_storage
      max_single_limit: 750_000_000
      constraints:
        - field: tiv
          operator: "<="
          value: 150_000_000_000
          reason: "TIV exceeds lead syndicate authority"

    - coverage: marine
      configs:
        - marine_general
      max_single_limit: 500_000_000
      constraints:
        - field: hull_value
          operator: "<="
          value: 10_000_000_000
          reason: "Hull value exceeds lead marine authority"

    - coverage: aerospace
      configs:
        - aerospace_general
      max_single_limit: 2_000_000_000
      constraints:
        - field: hull_value
          operator: "<="
          value: 20_000_000_000
          reason: "Hull value exceeds lead aerospace authority"

  distribution:
    type: SUBSCRIPTION
    subscription:
      minimum_line: 0.10
      maximum_line: 0.40
      default_signed_line: 0.20
      role: LEAD
      lead_loading_factor: 1.10

  commission:
    brokerage_rate: 0.20
    overrider_rate: 0.025
    profit_commission_rate: 0.15
    profit_commission_threshold: 0.70

  taxes_and_levies:
    insurance_premium_tax_rate: 0.12
    regulatory_levy_rate: 0.01

  fronting:
    enabled: false

  pricing_adjustments:
    offered_premium_discretion: 0.15
    minimum_gross_premium: 10000
