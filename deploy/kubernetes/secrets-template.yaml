# DSI Secrets Template
# WARNING: Do NOT commit actual secrets. Use this as a template.
# Apply with: kubectl create secret generic dsi-secrets --from-env-file=.env -n dsi-prod
# Or seal with: kubeseal < secrets.yaml > sealed-secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: dsi-secrets
  namespace: dsi-prod
  labels:
    app.kubernetes.io/name: dsi-api
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql+asyncpg://dsi_user:CHANGE_ME@postgres:5432/dsi_db"
  DATABASE_URL_SYNC: "postgresql://dsi_user:CHANGE_ME@postgres:5432/dsi_db"

  # Redis
  REDIS_URL: "redis://:CHANGE_ME@redis:6379/0"

  # Authentication
  JWT_SECRET_KEY: "CHANGE_ME_GENERATE_WITH_openssl_rand_hex_32"
  API_KEY_SALT: "CHANGE_ME_GENERATE_WITH_openssl_rand_hex_16"

  # External API keys (for production extractors)
  COMPANIES_HOUSE_API_KEY: ""
  OFAC_API_KEY: ""
  SHODAN_API_KEY: ""
