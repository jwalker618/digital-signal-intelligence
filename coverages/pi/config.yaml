  pi_media_tech:
    metadata:
      name: DSI PI Media / Creative-Tech Model
      description: Publishers, broadcasters, content creators, ad-tech firms
      version: 2.3.0
      product_types:
      - professional_indemnity
      - errors_and_omissions
      - media_liability
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name
        - field: product_type
          description: 'One of: professional_indemnity, errors_and_omissions, media_liability'
        - field: limit
          description: Requested limit in USD
        - field: revenue
          description: Annual revenue in USD
      min_premium: 20000
      default_currency: USD
      model_specificity: 3
      routing_constraints:
      - field: industry_sector
        operator: in
        value: [PUBLISHING, BROADCAST, CONTENT_CREATION, ADTECH, MEDIA]
        required_in_input: true
    direct_queries:
    - id: editorial_review_process
      question: Is an editorial review process with documented sign-off in place for every publication?
      query_condition:
      - return: false
        action: FLAG
        override: null
        applied: null
        note: No documented editorial review
    - id: errors_and_omissions_coverage
      question: Is E&O coverage already in place for content-related claims?
      query_condition:
      - return: false
        action: MODIFIER
        override: null
        applied: 1.15
        note: No pre-existing E&O coverage
    signal_registry:
    - id: defamation_exposure
      inference_utility_function: defamation_exposure_basefunction
      proxy_tier: INFERRED_PROXY
      expectation_level: UNIVERSAL
      three_layer_assessment:
        group_id: public_record
        risk: {correlation_direction: positive, weight: 0.25}
        loss:
          severity: {correlation_direction: positive, weight: 0.28}
    - id: content_moderation_posture
      inference_utility_function: content_moderation_posture_basefunction
      proxy_tier: INFERRED_PROXY
      expectation_level: UNIVERSAL
      three_layer_assessment:
        group_id: structured_data
        risk: {correlation_direction: negative, weight: 0.20}
        loss:
          frequency: {correlation_direction: negative, weight: 0.20}
    - id: litigation_history
      inference_utility_function: litigation_history_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      expectation_level: UNIVERSAL
      three_layer_assessment:
        group_id: public_record
        risk: {correlation_direction: positive, weight: 0.15}
        loss:
          frequency: {correlation_direction: positive, weight: 0.15}
    - id: breach_history
      inference_utility_function: breach_history_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      expectation_level: UNIVERSAL
      three_layer_assessment:
        group_id: public_record
        risk: {correlation_direction: positive, weight: 0.10}
        loss:
          severity: {correlation_direction: positive, weight: 0.10}
    groups:
