      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: "UST presence \u2014 leak exposure"
    - id: manufacturing_operations
      question: Does the insured operate manufacturing with chemical processes?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: "Chemical manufacturing \u2014 pollution exposure"
