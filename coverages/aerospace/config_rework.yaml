          description: "Quality of maintenance providers"
          weight: 0.20
          inference_utility_function: mro_quality_basefunction

      safety_record:
        - id: "accident_history"
          name: "Accident History"
          description: "Hull loss and major accidents (10-year lookback)"
          weight: 0.30
          inference_utility_function: accident_history_basefunction
          score_conditions:
            - threshold: 25
              comparison: "<="
              override: 5
              action: "REFER"
              note: "Severe accident history"
            - threshold: 40
              comparison: "<="
              override: 4
              action: "REFER"
              note: "Material accident history"

        - id: "incident_history"
          name: "Incident History"
          description: "Serious incidents, runway excursions, near-misses"
          weight: 0.20
          inference_utility_function: incident_history_basefunction

        - id: "accident_rate"
          name: "Accident Rate vs Industry"
          description: "Accidents per million departures vs industry average"
          weight: 0.20
          inference_utility_function: accident_rate_basefunction

        - id: "fatality_history"
          name: "Fatality History"
          description: "Fatal accident history (10-year lookback)"
          weight: 0.20
          inference_utility_function: fatality_history_basefunction
          score_conditions:
            - threshold: 30
              comparison: "<="
              override: 5
              action: "REFER"
              note: "Recent fatal accidents"
            - threshold: 50
              comparison: "<="
              override: 4
              action: "REFER"
              note: "Fatal accident history"

        - id: "investigation_findings"
          name: "Investigation Findings"
          description: "Operator cited as causal factor in investigations"
          weight: 0.10
          inference_utility_function: investigation_finding_basefunction

      regulatory_compliance:
        - id: "certificate_status"
          name: "Operating Certificate Status"
          description: "AOC/Part 121/135 certificate status"
          weight: 0.25
          inference_utility_function: certificate_status_basefunction
          score_conditions:
            - threshold: 30
              comparison: "<="
              override: 5
              action: "REFER"
              note: "Certificate at risk"
            - threshold: 50
              comparison: "<="
              override: 4
              action: "REFER"
              note: "Certificate concerns"

        - id: "enforcement_actions"
          name: "Enforcement Actions"
          description: "Regulatory fines, penalties (5-year lookback)"
          weight: 0.20
          inference_utility_function: enforcement_action_basefunction
          score_conditions:
            - threshold: 25
              comparison: "<="
              override: 5
              action: "REFER"
              note: "Severe enforcement history"
            - threshold: 45
              comparison: "<="
              override: 4
              action: "REFER"
              note: "Material enforcement actions"

        - id: "iosa_audit_status"
          name: "IOSA Audit Status"
          description: "IOSA registration and audit findings"
          weight: 0.15
          inference_utility_function: iosa_audit_basefunction

        - id: "ramp_inspection"
