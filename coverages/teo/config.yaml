    groups:
      categories:
        - id: industry_classification
          label: Industry Classification
          description: Industry classification derived from public records
          impact: MODIFIER
          default_cat: OTHER
        - id: size_band
          label: Size Band
          description: Company size classification
          impact: MODIFIER
          default_cat: OTHER
        - id: geography
          label: Geography
          description: Primary operational geography
          impact: MODIFIER
          default_cat: OTHER
      three_layer_assessment:
        - id: technical_infrastructure
          risk:
            weight: 0.5
            score_conditions:
              - threshold: 30
                comparison: <=
                action: REFER
                override: 5
                note: Critical deficiencies in technical infrastructure
              - threshold: 45
                comparison: <=
                action: REFER
                override: 4
                note: Significant concerns in technical infrastructure
          loss:
            weight: 0.5
            score_conditions:
              - threshold: 30
                comparison: <=
                action: MODIFIER
                applied: 1.2
                note: Poor technical infrastructure - loss loading
          exposure:
            weight: 0.5
        - id: corporate_footprint
          risk:
            weight: 0.1667
          loss:
            weight: 0.1667
          exposure:
            weight: 0.1667
        - id: structured_data
          risk:
            weight: 0.1667
          loss:
            weight: 0.1667
          exposure:
            weight: 0.1667
        - id: network_authority
          risk:
            weight: 0.1667
          loss:
            weight: 0.1667
          exposure:
            weight: 0.1667
    risk_tier_bands:
      bands:
        - id: 1
          label: PREFERRED
          description: Excellent risk - automatic approval, preferred pricing
          interpretation:
            bands:
              min: 800
              max: 1000
            action: APPROVE
            application:
              method: PREMIUM_BASE
              value: 8000
        - id: 2
          label: STANDARD_PLUS
          description: Good risk - automatic approval, standard pricing
          interpretation:
            bands:
              min: 650
              max: 799
            action: APPROVE
            application:
              method: PREMIUM_BASE
              value: 12000
        - id: 3
          label: STANDARD
          description: Average risk - may require referral
          interpretation:
            bands:
              min: 500
              max: 649
            action: REFER
            application:
              method: PREMIUM_BASE
              value: 18000
        - id: 4
          label: SUBSTANDARD
          description: Elevated risk - requires senior review
          interpretation:
            bands:
              min: 350
              max: 499
            action: REFER
            application:
              method: PREMIUM_BASE
              value: 30000
        - id: 5
          label: DECLINE
          description: Unacceptable risk - decline
          interpretation:
            bands:
              min: 0
              max: 349
            action: DECLINE
            application:
              method: PREMIUM_BASE
              value: 50000
    loss_tier_bands:
      bands:
        - id: 1
          label: VERY_LOW
          description: Very low risk of loss
          interpretation:
            bands:
              min: 80
              max: 100
            application:
              frequency_modifier: 0.7
              severity_modifier: 0.8
        - id: 2
          label: LOW
          description: Low risk of loss
          interpretation:
            bands:
              min: 60
              max: 79
            application:
              frequency_modifier: 0.85
              severity_modifier: 0.9
        - id: 3
          label: MODERATE
          description: Moderate risk of loss
          interpretation:
            bands:
              min: 40
              max: 59
            application:
              frequency_modifier: 1.0
              severity_modifier: 1.0
        - id: 4
