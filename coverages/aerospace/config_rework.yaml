# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# STRUCTURAL PRINCIPLES (per master_config_layout.yaml):
# 1. Signals defined once in signal_registry with group_id reference
# 2. source: score (default) uses 0-100 inference return
# 3. source: metadata.field uses inference metadata with bands/categories
# 4. Categorical groups apply modifiers (applied:), not scores
# 5. score_conditions (plural, banded) apply actions based on score thresholds
#    Actions: FLAG | MODIFIER | REFER
# 6. proxy_tier at signal level (DIRECT_OBSERVABLE | INFERRED_PROXY | COHORT_INFERENCE)
# 7. Normalisation handled by inference functions, not config
#
# AUGMENTED BY:
# - analysis_outputs/cyber_v{date}.yaml - empirically-derived parameters
# - schemas/organisational_graph.yaml - graph structure (coverage-agnostic)
#
# =============================================================================

aerospace:
  aerospace_general:
    metadata:
      name: "DSI Aerospace Insurance Model"
      description: "Aviation hull and liability coverage based on observable safety and operational signals"
      version: "2.1.0"
      product_types:
        - "aviation_hull"
        - "aviation_liability"
        - "aviation_hull_liability_combined"
      applicable_markets: ["us", "uk", "eu", "apac", "latam", "mea"]
      minimum_viable_input: ["client name (domain optional)","Limit in USD"]
      min_premium: 25000
      default_currency: "USD"

    # =========================================================================
    # DIRECT QUERIES
    # Binary questions that cannot be externally observed (max 10)
    # Actions: FLAG | MODIFIER | REFER
    # =========================================================================
    direct_queries:
      - id: "pending_claims"
        question: "Are there any pending aviation liability claims exceeding $1M?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Pending claims >$1M"}
          
      - id: "regulatory_action"
        question: "Is there any pending regulatory enforcement action against the operator?"
        query_condition:
          - {return: true, action: "REFER", override: 5, applied: null, note: "Pending regulatory enforcement"}
            
      - id: "coverage_declined"
        question: "Has aviation coverage been declined or non-renewed in the past 3 years?"
        query_condition:
          - {return: true, action: "REFER", override: 5, applied: null, note: "Prior declination"}
      
      - id: "fleet_change"
        question: "Are there planned fleet changes exceeding 20% in the next 12 months?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Major fleet change planned"}
       
      - id: "route_expansion"
        question: "Is there planned expansion into conflict zones or sanctioned regions?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Conflict zone expansion"}
      
      - id: "ownership_change"
        question: "Has there been a change in majority ownership in the past 12 months?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Recent ownership change"}
      
      - id: "wet_lease_operations"
        question: "Do you operate aircraft under wet lease arrangements?"
        query_condition:
          - {return: true, action: "MODIFIER", override: null, applied: 1.15, note: "Wet lease operations"}

    # -------------------------------------------------------------------------
    # CATEGORICAL GROUPS
    # categorical groups can either
    # a) impact base premium after generation (impact: modifier)
    # b) be the basis of premium (impact: premium)
    # note: only one group be the basis of premium
    # -------------------------------------------------------------------------

    categorical_groups:
      - id: "operator_type"
        name: "Operator Type"
        description: "Type of aviation operator - inferred from regulatory filings and operational data"
        impact: "modifier"
        inference_utility_function: operatortype_basefunction
      - id: "fleet_category"
        name: "Fleet Category"
        description: "Primary aircraft category in fleet"
        impact: "modifier"
        inference_utility_function: fleetcategory_basefunction
      - id: "fleet_size"
        name: "Fleet Size"
        description: "Number of aircraft in operator's fleet"
        impact: "modifier"
        inference_utility_function: fleetsize_basefunction
      - id: "regulatory_framework"
        name: "Regulatory Framework"
        description: "Primary regulatory authority governing operations"
        impact: "modifier"
        inference_utility_function: regulatoryframework_basefunction
      - id: "iosa_status"
        name: "IOSA Status"
        description: "IATA Operational Safety Audit registration status"
        impact: "modifier"
        inference_utility_function: iosa_status_basefunction

    # -------------------------------------------------------------------------
    # CATEGORICAL FEATURES
    # -------------------------------------------------------------------------
    categorical_features:
      operator_type:
        - cat: "MAJOR_AIRLINE"
          label: "Major Airline"
          modifier: 0.85
          description: "Scheduled carrier with >100 aircraft, alliance member"
        - cat: "REGIONAL_AIRLINE"
          label: "Regional Airline"
          modifier: 1.00
          description: "Scheduled regional service, typically code-share"
        - cat: "LOW_COST_CARRIER"
          label: "Low Cost Carrier"
          modifier: 0.95
          description: "Point-to-point budget airline"
        - cat: "CARGO_AIRLINE"
          label: "Cargo Airline"
          modifier: 1.10
          description: "Freight-only operations"
        - cat: "CHARTER_OPERATOR"
          label: "Charter Operator"
          modifier: 1.25
          description: "Non-scheduled passenger service"
        - cat: "CORPORATE_FLIGHT"
          label: "Corporate Flight Department"
          modifier: 1.15
          description: "In-house corporate aviation"
        - cat: "HELICOPTER_OPERATOR"
          label: "Helicopter Operator"
          modifier: 1.40
          description: "Rotorcraft operations (EMS, offshore, utility)"
        - cat: "FLIGHT_SCHOOL"
          label: "Flight Training Organization"
          modifier: 1.50
          description: "Primary and advanced flight training"
        - cat: "PRIVATE_OWNER"
          label: "Private Owner/Operator"
          modifier: 1.35
          description: "Individual aircraft owner"

      fleet_category:
        - cat: "WIDEBODY"
          label: "Widebody"
          modifier: 1.15
          description: "Twin-aisle aircraft (A330, A350, 777, 787)"
        - cat: "NARROWBODY"
          label: "Narrowbody"
          modifier: 1.00
          description: "Single-aisle jets (A320 family, 737)"
        - cat: "REGIONAL_JET"
          label: "Regional Jet"
          modifier: 1.05
          description: "Small jets (E-Jets, CRJ, ARJ)"
        - cat: "TURBOPROP"
          label: "Turboprop"
          modifier: 0.95
          description: "Turboprop aircraft (ATR, Dash 8)"
        - cat: "BUSINESS_JET"
          label: "Business Jet"
          modifier: 1.20
          description: "Corporate jets (Gulfstream, Global, Falcon)"
        - cat: "HELICOPTER"
          label: "Helicopter"
          modifier: 1.35
          description: "Rotorcraft"
        - cat: "PISTON"
          label: "Piston Aircraft"
          modifier: 1.25
          description: "Piston-engine aircraft"

      fleet_size:
        - cat: "SINGLE"
          label: "Single Aircraft"
          modifier: 1.30
          description: ""
        - cat: "MICRO"
          label: "Micro Fleet (2-5)"
          modifier: 1.20
          description: ""
        - cat: "SMALL"
          label: "Small Fleet (6-20)"
          modifier: 1.10
          description: ""
        - cat: "MEDIUM"
          label: "Medium Fleet (21-50)"
          modifier: 1.00
          description: ""
        - cat: "LARGE"
          label: "Large Fleet (51-150)"
          modifier: 0.95
          description: ""
        - cat: "MAJOR"
          label: "Major Fleet (150+)"
          modifier: 0.90
          description: ""

      regulatory_framework:
        - cat: "FAA"
          label: "FAA (United States)"
          modifier: 1.00
          description: ""
        - cat: "EASA"
          label: "EASA (European Union)"
          modifier: 1.00
          description: ""
        - cat: "CAA_UK"
          label: "CAA (United Kingdom)"
          modifier: 1.00
          description: ""
        - cat: "TCCA"
          label: "TCCA (Canada)"
          modifier: 1.00
          description: ""
        - cat: "CASA"
          label: "CASA (Australia)"
          modifier: 1.05
          description: ""
        - cat: "CAAC"
          label: "CAAC (China)"
          modifier: 1.15
          description: ""
        - cat: "DGCA_INDIA"
          label: "DGCA (India)"
          modifier: 1.15
          description: ""
        - cat: "OTHER_ICAO"
          label: "Other ICAO Compliant"
          modifier: 1.20
          description: ""
        - cat: "NON_ICAO"
          label: "Non-ICAO Compliant"
          modifier: 1.50
          description: ""

      iosa_status:
        - cat: "REGISTERED"
          label: "IOSA Registered"
          modifier: 0.90
          description: ""
        - cat: "EXPIRED"
          label: "IOSA Expired"
          modifier: 1.15
          description: ""
        - cat: "NEVER_REGISTERED"
          label: "Never Registered"
          modifier: 1.25
          description: ""
        - cat: "NOT_APPLICABLE"
          label: "Not Applicable"
          modifier: 1.00
          description: ""

    # -------------------------------------------------------------------------
    # SIGNAL GROUPS
    # Each group is the product of its underlying features
    # Each group contributes to the composite score
    # Weights must add to 1
    # -------------------------------------------------------------------------
    signal_groups:
      - id: "network_authority"
        name: "Network Authority"
        description: "Industry relationships and counterparty quality"
        weight: 0.10
        test_scores: {excellent: 90, average: 65, poor: 35}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent network authority - modifier applied"

      - id: "safety_record"
        name: "Safety Record"
        description: "Historical safety performance from public databases"
        weight: 0.30
        test_scores: {excellent: 98, average: 75, poor: 35}
        score_conditions:
          - threshold: 30
            comparison: "<="
            override: 5
            action: "REFER"
            note: "Unacceptable safety record"
          - threshold: 45
            comparison: "<="
            override: 4
            action: "REFER"
            note: "Significant safety concerns"
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.85
            note: "Excellent safety record - modifier applied"

      - id: "regulatory_compliance"
        name: "Regulatory Compliance"
        description: "Certificate status, enforcement actions, audit results"
        weight: 0.20
        test_scores: {excellent: 95, average: 72, poor: 38}
        score_conditions:
          - threshold: 35
            comparison: "<="
            override: 5
            action: "REFER"
            note: "Severe regulatory deficiencies"
          - threshold: 50
            comparison: "<="
            override: 4
            action: "REFER"
            note: "Material regulatory concerns"
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.85
            note: "Excellent regulatory compliance - modifier applied"

      - id: "operational_quality"
        name: "Operational Quality"
        description: "Observable operational metrics"
        weight: 0.15
        test_scores: {excellent: 88, average: 68, poor: 42}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent operational quality - modifier applied"

      - id: "fleet_quality"
        name: "Fleet Quality"
        description: "Aircraft age, composition, maintenance indicators"
        weight: 0.10
        test_scores: {excellent: 88, average: 65, poor: 32}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent fleet quality - modifier applied"

      - id: "financial_stability"
        name: "Financial Stability"
        description: "Public financial indicators"
        weight: 0.05
        test_scores: {excellent: 85, average: 65, poor: 35}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent financial stability - modifier applied"

      - id: "route_risk"
        name: "Route Risk"
        description: "Geographic and operational risk exposure"
        weight: 0.05
        test_scores: {excellent: 92, average: 72, poor: 40}
        score_conditions:
          - threshold: 30
            comparison: "<="
            override: 4
            action: "REFER"
            note: "Elevated route risk"
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.85
            note: "Excellent route risk - modifier applied"

      - id: "corporate_governance"
        name: "Corporate Governance"
        description: "Management quality and safety culture indicators"
        weight: 0.05
        test_scores: {excellent: 88, average: 65, poor: 30}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent corporate governance - modifier applied"

    # -------------------------------------------------------------------------
    # SIGNAL FEATURES
    # Each is a underlying feature for the previously defined groups
    # Each group contributes to the group score
    # Weights must add to 1
    # -------------------------------------------------------------------------
    signal_features:
      network_authority:
        - id: "alliance_membership"
          name: "Airline Alliance Membership"
          description: "Membership in Star Alliance, oneworld, SkyTeam"
          weight: 0.25
          inference_utility_function: alliance_membership_basefunction

        - id: "codeshare_quality"
