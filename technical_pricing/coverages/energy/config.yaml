    # -------------------------------------------------------------------------
    # TIER THRESHOLDS
    # -------------------------------------------------------------------------
    tier_thresholds:
      tiers:
        - id: 1
          label: "PREFERRED"
          min_score: 800
          max_score: 1000
          description: "Excellent operator - auto-approve at preferred pricing"
          auto_approve: true
          auto_decline: false
          premium_generation_method: "tiv"
          base_rate: 0.0008  # 0.08% of TIV
        - id: 2       
          label: "STANDARD"
          min_score: 650
          max_score: 799
          description: "Good operator - auto-approve at standard pricing"
          auto_approve: true
          auto_decline: false
          premium_generation_method: "tiv"
          base_rate: 0.0012  # 0.12% of TIV
        - id: 3       
          label: "ELEVATED"
          min_score: 500
          max_score: 649
          description: "Moderate risk - auto-approve with conditions"
          auto_approve: false
          auto_decline: false
          premium_generation_method: "tiv"
          base_rate: 0.0018  # 0.18% of TIV
        - id: 4       
          label: "HIGH_RISK"
          min_score: 350
