# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# This file defines the complete configuration for a coverage type.
# It is the single source of truth for:
#   - Model structure and parameters
#   - Signal definitions and weights
#   - Pricing factors and thresholds
#   - Test profiles for actuarial validation
#
# Premium calculation follows DSI Foundational Principle 9: Signal -> Score -> Tier -> Price
#
# DSI PRINCIPLES APPLIED:
#   1. All signals must be externally observable (no application questions required)
#   2. Direct queries are OPTIONAL - model must work without them
#   3. Categorical features are inferred from observable data
#   4. Tier determines base premium; modifiers adjust for exposure characteristics
#   5. All sources must be publicly accessible or through standard data providers
#
# Version: 2.0.0
# Last Updated: 2025-12
# =============================================================================

financial_institutions:
  fi_general:
    metadata:
      name: "DSI Financial Institutions Technical Pricing Model"
      description: "FI bond, professional liability, D&O, cyber coverage based on observable regulatory and financial signals"
      version: "2.0.0"
      coverage_types:
        - "financial_institution_bond"
        - "professional_liability"
        - "directors_officers"
        - "cyber_liability"
        - "employment_practices"
        - "fiduciary_liability"
      applicable_markets: ["us"]
      min_premium: 25000
      default_currency: "USD"

    direct_optional_queries:
      - id: "regulatory_action"
        question: "Any pending or recent (3 years) regulatory enforcement actions?"
        direct_condition: regulatory_action_referral
        
      - id: "examination_issues"
        question: "Any MRAs/MRIAs outstanding from most recent examination?"
        direct_condition: examination_issues_referral
        
      - id: "litigation_pending"
        question: "Any material litigation pending (class action, regulatory)?"
        direct_condition: litigation_pending_referral
        
      - id: "cyber_incident"
        question: "Any reportable cyber incidents in past 24 months?"
        direct_condition: cyber_incident_referral
        
      - id: "significant_growth"
        question: "Asset growth >20% in past 12 months?"
        direct_condition: significant_growth_referral
        
      - id: "new_product_line"
        question: "Any significant new product lines launched in past 12 months?"
        direct_condition: new_product_referral

    # -------------------------------------------------------------------------
    # CATEGORICAL FEATURES
    # -------------------------------------------------------------------------
    # These define classification values and their pricing impact
    # inference_method specifies how to automatically determine the value
    
    categorical_features:
      institution_type:
        description: "Type of financial institution from charter/registration"
        inference_utility_function: institution_type_basefunction
        values:
          - id: "MONEY_CENTER_BANK"
            label: "Money Center Bank"
            modifier: 1.50
            description: "G-SIB or major national bank (>$250B assets)"
            
          - id: "REGIONAL_BANK"
            label: "Regional Bank"
            modifier: 1.20
            description: "Regional bank ($10B-$250B assets)"
            
          - id: "COMMUNITY_BANK"
            label: "Community Bank"
            modifier: 1.00
            description: "Community bank (<$10B assets)"
            
          - id: "CREDIT_UNION"
            label: "Credit Union"
            modifier: 0.85
            description: "Federally or state-chartered credit union"
            
          - id: "SAVINGS_INSTITUTION"
            label: "Savings Institution"
            modifier: 0.90
            description: "Thrift or savings bank"
            
          - id: "BROKER_DEALER"
            label: "Broker-Dealer"
            modifier: 1.40
            description: "SEC/FINRA registered broker-dealer"
            
          - id: "INVESTMENT_ADVISER"
            label: "Investment Adviser"
            modifier: 1.25
            description: "SEC or state registered investment adviser"
           
          - id: "INSURANCE_COMPANY"
            label: "Insurance Company"
            modifier: 1.10
            description: "State-licensed insurance company"
            
          - id: "ASSET_MANAGER"
            label: "Asset Manager"
            modifier: 1.30
            description: "Investment company or fund manager"
            
          - id: "FINTECH"
            label: "Fintech"
            modifier: 1.50
            description: "Technology-focused financial services"
           
          - id: "MORTGAGE_COMPANY"
            label: "Mortgage Company"
            modifier: 1.35
            description: "Mortgage lender or servicer"
            
          - id: "PAYMENT_PROCESSOR"
            label: "Payment Processor"
            modifier: 1.40
            description: "Payment processing or money transmission"
            
          - id: "OTHER"
            label: "Other Financial Institution"
            modifier: 1.20
            description: "Other regulated financial entity"

      regulatory_framework:
        description: "Primary regulatory authority"
        inference_utility_function: regulatory_authority_basefunction
        values:
          - id: "OCC"
            label: "OCC (National Banks)"
            modifier: 1.00
            description: "Office of the Comptroller of the Currency"
          - id: "FDIC"
            label: "FDIC (State Non-Member)"
            modifier: 1.00
            description: "State banks not Fed members"
          - id: "FED"
            label: "Federal Reserve"
            modifier: 1.00
            description: "State member banks, BHCs, FHCs"
          - id: "NCUA"
            label: "NCUA (Credit Unions)"
            modifier: 0.95
            description: "National Credit Union Administration"
          - id: "SEC"
            label: "SEC"
            modifier: 1.10
            description: "Securities and Exchange Commission"
          - id: "FINRA"
            label: "FINRA"
            modifier: 1.10
            description: "Financial Industry Regulatory Authority"
          - id: "STATE"
            label: "State Regulated"
            modifier: 1.15
            description: "State banking/insurance department"
          - id: "MULTI"
            label: "Multiple Regulators"
            modifier: 1.05
            description: "Subject to multiple regulatory bodies"

      asset_size_band:
        description: "Total asset size classification"
        inference_utility_function: asset_size_basefunction
        values:
          - id: "MEGA"
            label: "Mega (>$250B)"
            modifier: 2.50
            description: ""       
            
          - id: "LARGE"
            label: "Large ($50B-$250B)"
            modifier: 1.80
            description: ""       
            
          - id: "MID"
            label: "Mid-Size ($10B-$50B)"
            modifier: 1.30
            description: ""       
            
          - id: "SMALL"
            label: "Small ($1B-$10B)"
            modifier: 1.00
            description: ""       
            
          - id: "COMMUNITY"
            label: "Community (<$1B)"
            modifier: 0.80
            description: ""       

      publicly_traded:
        description: "Whether institution is publicly traded"
        inference_utility_function: publically_traded_basefunction
        values:
          - id: "PUBLIC"
            label: "Publicly Traded"
            modifier: 1.10
            description: "SEC reporting company"
          - id: "PRIVATE"
            label: "Private"
            modifier: 1.00
            description: "Non-SEC reporting"

    # ---------------------------------------------------------------------------
    # SIGNAL GROUPINGS (Categories with Weights)
