  fi_bank:
    metadata:
      name: DSI FI Banking Specialist Model
      description: "Regulated banks \u2014 commercial, community, savings; capital adequacy and loan quality focus"
      version: 2.3.0
      product_types: &id001
      - financial_institution_bond
      - professional_liability
      - directors_officers
      - cyber_liability
      - employment_practices
      - fiduciary_liability
      applicable_markets: &id002
      - us
      - uk
      - eu
      - apac
      minimum_viable_input:
        required: &id003
        - field: client_name
          description: Client name
        - field: product_type
          description: 'One of: financial_institution_bond, professional_liability, directors_officers, cyber_liability, employment_practices,
            fiduciary_liability'
        - field: limit
          description: Requested limit in USD
        - field: total_assets
          description: Total assets in USD (MULTIPLIER basis)
      min_premium: 50000
      default_currency: USD
      model_specificity: 4
      routing_constraints:
      - field: fi_segment
        operator: ==
        value: BANK
        required_in_input: true
      - field: total_assets
        operator: '>='
        value: 1000000000
        required_in_input: true
    direct_queries:
    - id: consent_order
      question: Is the bank subject to any active consent order, C&D, or formal enforcement action?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Active enforcement action
    - id: npl_ratio
      question: Is the non-performing loan ratio above 3%?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Elevated NPL ratio
    - id: bsa_enforcement
      question: Has the bank received a BSA/AML enforcement action in the past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: BSA/AML enforcement history
    - id: cre_concentration
      question: Does CRE lending exceed 300% of tier 1 capital?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: CRE concentration above regulatory guidance
    - id: recent_merger
      question: Has the bank completed a merger or acquisition in the past 24 months?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: "Recent M&A \u2014 integration risk"
    signal_registry:
