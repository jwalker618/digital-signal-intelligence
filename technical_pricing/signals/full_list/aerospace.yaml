
aerospace:
  aerospace_general:
    categorical_groups:
      - id: "operator_type"
        description: "Type of aviation operator - inferred from regulatory filings and operational data"
      - id: "fleet_category"
        description: "Primary aircraft category in fleet"
      - id: "fleet_size"
        description: "Number of aircraft in operator's fleet"
      - id: "regulatory_framework"
        description: "Primary regulatory authority governing operations" 
      - id: "iosa_status"
        description: "IATA Operational Safety Audit registration status" 
    signal_features:
      network_authority:
        - id: "alliance_membership"
          description: "Membership in Star Alliance, oneworld, SkyTeam"
        - id: "codeshare_quality"
          description: "Average safety rating of codeshare partners"
        - id: "lessor_quality"
          description: "Quality tier of aircraft lessors"
        - id: "oem_relationship"
          description: "Direct relationships with Boeing, Airbus, Embraer"
        - id: "mro_quality"
          description: "Quality of maintenance providers"
      safety_record:
        - id: "accident_history"
          description: "Hull loss and major accidents (10-year lookback)"
        - id: "incident_history"
          description: "Serious incidents, runway excursions, near-misses"
        - id: "accident_rate"
          description: "Accidents per million departures vs industry average"
        - id: "fatality_history"
          description: "Fatal accident history (10-year lookback)"
        - id: "investigation_findings"
          description: "Operator cited as causal factor in investigations"
      regulatory_compliance:
        - id: "certificate_status"
          description: "AOC/Part 121/135 certificate status"
        - id: "enforcement_actions"
          description: "Regulatory fines, penalties (5-year lookback)"
        - id: "iosa_audit_status"
          description: "IOSA registration and audit findings"
        - id: "ramp_inspection"
          description: "SAFA/SACA ramp inspection findings rate"
        - id: "eu_safety_list"
          description: "Presence on EU banned carrier list"
        - id: "state_safety_rating"
          description: "ICAO USOAP audit results for state"
      operational_quality:
        - id: "otp_score"
          description: "Departure/arrival punctuality vs benchmarks"
        - id: "dispatch_reliability"
          description: "Completion rate and technical dispatch"
        - id: "crew_experience"
          description: "Average experience from public hiring data"
        - id: "training_indicators"
          description: "Training investment signals"
        - id: "operational_complexity"
          description: "Fleet diversity and route network complexity"
        - id: "growth_rate"
          description: "Year-over-year growth (rapid growth = higher risk)"
      fleet_quality:
        - id: "fleet_age"
          description: "Average aircraft age vs benchmarks"
        - id: "fleet_homogeneity"
          description: "Fleet type standardization"
        - id: "aircraft_generation"
          description: "Percentage of current-generation aircraft"
        - id: "order_backlog"
          description: "Order backlog indicating investment"
        - id: "maintenance_indicators"
          description: "Inferred maintenance quality"
      financial_stability:
        - id: "credit_rating"
          description: "Credit rating from major agencies"
        - id: "public_financials"
          description: "Financial metrics from public filings"
        - id: "market_position"
          description: "Market share and competitive position"
        - id: "government_support"
          description: "State ownership or support indicators"
      route_risk:
        - id: "conflict_zone_exposure"
          description: "Operations through/near conflict zones"
        - id: "challenging_airports"
          description: "Operations to special requirement airports"
        - id: "high_risk_destinations"
          description: "Operations to elevated risk countries"
        - id: "weather_exposure"
          description: "Route exposure to severe weather"
        - id: "terrain_exposure"
          description: "Operations in mountainous terrain"
      corporate_governance:
        - id: "management_stability"
          description: "CEO/COO tenure and turnover"
        - id: "safety_leadership"
          description: "Dedicated safety leadership presence"
        - id: "safety_reporting"
          description: "Public safety reporting and disclosure"
        - id: "corporate_structure"
          description: "Transparency of structure and ownership"
        - id: "industry_engagement"
          description: "Participation in FSF, IATA Safety Group"
