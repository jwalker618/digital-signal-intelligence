# =============================================================================
# NEW SIGNAL GROUPS — Added in subsequent parts
# =============================================================================

new_signal_groups:

  # -------------------------------------------------------------------------
  # GROUP 1: CONSTRUCTION QUALITY
  # -------------------------------------------------------------------------
  # Assesses structural and construction characteristics that drive
  # fire and collapse risk. Primary risk and loss driver for property.
  # -------------------------------------------------------------------------
  - id: construction_quality
    label: Construction Quality
    description: "Structural integrity, construction class, age, maintenance, and building code compliance"
    group_type: three_layer_assessment

    signals:
      - id: construction_class
        name: Construction Class
        description: "ISO/COPE construction classification — frame, joisted masonry, non-combustible, masonry non-combustible, modified fire-resistive, fire-resistive"
        group_id: construction_quality
        signal_type: categorical
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        category_source: metadata.construction_class
        categories:
          - {cat: FR, label: Fire Resistive, applied: 0.70}
          - {cat: MFR, label: Modified Fire Resistive, applied: 0.80}
          - {cat: MNC, label: Masonry Non-Combustible, applied: 0.90}
          - {cat: NC, label: Non-Combustible, applied: 0.95}
          - {cat: JM, label: Joisted Masonry, applied: 1.10}
          - {cat: F, label: Frame, applied: 1.40}

      - id: building_age_condition
        name: Building Age & Condition
        description: "Composite score of building age, last major renovation, and overall condition rating"
        group_id: construction_quality
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.25
          risk_direction: positive
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.10
          exposure_size_weight: 0.05

      - id: building_code_compliance
        name: Building Code Compliance
        description: "Current compliance with local building codes; grandfathered non-conformities flagged"
        group_id: construction_quality
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          risk_direction: positive
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.10

      - id: roof_condition
        name: Roof Condition
        description: "Roof age, material, condition, and recent inspection results — primary water damage driver"
        group_id: construction_quality
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_frequency_weight: 0.25
          loss_severity_weight: 0.10

      - id: electrical_system_quality
        name: Electrical System Quality
        description: "Age of electrical systems, panel capacity, wiring type, recent inspection"
        group_id: construction_quality
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.10

      - id: renovation_history
        name: Renovation History
        description: "Track record of capital investment; recent renovations reduce age-related risk"
        group_id: construction_quality
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          risk_direction: positive
          loss_frequency_weight: 0.05
          exposure_complexity_weight: 0.10

  # -------------------------------------------------------------------------
  # GROUP 2: OCCUPANCY RISK
  # -------------------------------------------------------------------------
  # Assesses what the building is used for and how that drives loss
  # frequency and severity. A warehouse of electronics vs a church
  # have fundamentally different risk profiles on the same structure.
  # -------------------------------------------------------------------------
  - id: occupancy_risk
    label: Occupancy Risk
    description: "Tenant type, hazard grade, contents value density, and vacancy exposure"
    group_type: three_layer_assessment

    signals:
      - id: occupancy_hazard_grade
        name: Occupancy Hazard Grade
        description: "ISO occupancy hazard classification — from low (office) to special (chemical storage)"
        group_id: occupancy_risk
        signal_type: categorical
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        category_source: metadata.occupancy_hazard_grade
        categories:
          - {cat: LOW, label: Low Hazard (Office/Residential), applied: 0.75}
          - {cat: MOD, label: Moderate Hazard (Retail/Light Mfg), applied: 1.0}
          - {cat: HIGH, label: High Hazard (Heavy Mfg/Woodworking), applied: 1.35}
          - {cat: SPECIAL, label: Special Hazard (Chemical/Explosive), applied: 1.80}

      - id: tenant_concentration
        name: Tenant Concentration
        description: "Number and diversity of tenants; single-tenant risk vs multi-tenant diversification"
        group_id: occupancy_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: negative
          loss_severity_weight: 0.15
          exposure_size_weight: 0.10

      - id: contents_value_density
        name: Contents Value Density
        description: "Value of contents per square foot — drives severity; high-value stock amplifies loss"
        group_id: occupancy_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_severity_weight: 0.25
          exposure_size_weight: 0.15

      - id: vacancy_rate
        name: Vacancy Rate
        description: "Percentage of space unoccupied — vacant properties have higher arson and vandalism rates"
        group_id: occupancy_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: WEEKLY
        three_layer:
          risk_weight: 0.20
          risk_direction: positive
          loss_frequency_weight: 0.20
          score_conditions:
            - {min: 0, max: 30, action: FLAG, note: "High vacancy — arson/vandalism exposure"}

      - id: housekeeping_quality
        name: Housekeeping & Maintenance Quality
        description: "General upkeep, cleanliness, storage practices — proxy for management attention to risk"
        group_id: occupancy_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_frequency_weight: 0.15

  # -------------------------------------------------------------------------
  # GROUP 3: CATASTROPHE EXPOSURE
  # -------------------------------------------------------------------------
  # Natural catastrophe and geographic risk factors. These signals
  # drive the exposure dimension heavily — a well-built, well-occupied
  # building in a CAT zone still has massive tail risk.
  # -------------------------------------------------------------------------
  - id: cat_exposure
    label: Catastrophe Exposure
    description: "Natural catastrophe zone exposure — wind, earthquake, flood, wildfire, convective storm"
    group_type: three_layer_assessment

    signals:
      - id: wind_zone
        name: Wind Zone Exposure
        description: "Proximity to named-storm-exposed coastline; hurricane/typhoon return periods"
        group_id: cat_exposure
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.25
          exposure_size_weight: 0.20
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "Severe wind zone exposure"}
            - {min: 26, max: 50, action: FLAG, note: "Elevated wind zone"}

      - id: earthquake_zone
        name: Earthquake Zone Exposure
        description: "Seismic zone classification; proximity to known fault lines; soil liquefaction risk"
        group_id: cat_exposure
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_frequency_weight: 0.10
          loss_severity_weight: 0.25
          exposure_size_weight: 0.20
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "Severe earthquake zone"}
            - {min: 26, max: 50, action: FLAG, note: "Elevated seismic zone"}

      - id: flood_zone
        name: Flood Zone Exposure
        description: "FEMA flood zone classification; proximity to waterways; historical flood events"
        group_id: cat_exposure
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.15
          exposure_size_weight: 0.15
          score_conditions:
            - {min: 0, max: 30, action: FLAG, note: "High flood zone exposure"}

      - id: wildfire_zone
        name: Wildfire Zone Exposure
        description: "Wildland-urban interface proximity; vegetation density; historical fire events"
        group_id: cat_exposure
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.15
          exposure_size_weight: 0.10
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "Severe wildfire exposure"}

      - id: convective_storm_exposure
        name: Convective Storm Exposure
        description: "Hail, tornado, and severe thunderstorm frequency for location"
        group_id: cat_exposure
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.05
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.10

      - id: geographic_concentration
        name: Geographic Concentration
        description: "Single-location vs multi-site; distance between sites; aggregation risk"
        group_id: cat_exposure
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.05
          exposure_size_weight: 0.15
          exposure_complexity_weight: 0.15

  # -------------------------------------------------------------------------
  # GROUP 4: FIRE PROTECTION
  # -------------------------------------------------------------------------
  # Fire protection quality directly modifies expected loss. A building
  # with full sprinklers, central station alarm, and nearby fire dept
  # has fundamentally different loss expectations vs unprotected.
  # -------------------------------------------------------------------------
  - id: fire_protection
    label: Fire Protection
    description: "Sprinkler systems, fire alarms, fire department response, fire separation, water supply"
    group_type: three_layer_assessment

    signals:
      - id: sprinkler_coverage
        name: Sprinkler System Coverage
        description: "Extent and type of automatic sprinkler protection — full, partial, or none"
        group_id: fire_protection
        signal_type: categorical
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        category_source: metadata.sprinkler_coverage
        categories:
          - {cat: FULL_WET, label: Full Wet Sprinkler, applied: 0.55}
          - {cat: FULL_DRY, label: Full Dry Sprinkler, applied: 0.65}
          - {cat: PARTIAL, label: Partial Sprinkler, applied: 0.85}
          - {cat: NONE, label: No Sprinklers, applied: 1.30}

      - id: fire_alarm_quality
        name: Fire Alarm & Detection Quality
        description: "Alarm system type — central station, proprietary, local, or none"
        group_id: fire_protection
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.15

      - id: fire_department_response
        name: Fire Department Response
        description: "Distance to nearest fire station; ISO public protection class; response time"
        group_id: fire_protection
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_severity_weight: 0.20
          score_conditions:
            - {min: 0, max: 30, action: FLAG, note: "Poor fire department response capability"}

      - id: fire_separation
        name: Fire Separation & Compartmentation
        description: "Fire walls, fire doors, compartmentation between occupancies or sections"
        group_id: fire_protection
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          risk_direction: positive
          loss_severity_weight: 0.15

      - id: water_supply_adequacy
        name: Water Supply Adequacy
        description: "Hydrant distance, water pressure, supply duration for fire suppression"
        group_id: fire_protection
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          risk_direction: positive
          loss_severity_weight: 0.10

  # -------------------------------------------------------------------------
  # GROUP 5: BUSINESS INTERRUPTION
  # -------------------------------------------------------------------------
  # BI exposure is often the largest component of a property loss.
  # Recovery time, supply chain dependency, and contingent BI drive
  # severity far beyond the physical damage amount.
  # -------------------------------------------------------------------------
  - id: business_interruption
    label: Business Interruption
    description: "Revenue dependency, recovery time, supply chain resilience, contingent BI exposure"
    group_type: three_layer_assessment

    signals:
      - id: revenue_concentration
        name: Revenue Concentration at Location
        description: "Percentage of total enterprise revenue generated at or dependent on insured location"
        group_id: business_interruption
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_severity_weight: 0.25
          exposure_size_weight: 0.20
          score_conditions:
            - {min: 0, max: 30, action: FLAG, note: "High revenue concentration at single location"}

      - id: recovery_time_estimate
        name: Recovery Time Estimate
        description: "Estimated time to restore operations after total loss — months to rebuild, re-equip, re-staff"
        group_id: business_interruption
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_severity_weight: 0.30
          exposure_complexity_weight: 0.15

      - id: supply_chain_dependency
        name: Supply Chain Dependency
        description: "Reliance on single-source suppliers or critical supply chains affected by same peril zone"
        group_id: business_interruption
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.05
          loss_severity_weight: 0.15
          exposure_complexity_weight: 0.20

      - id: contingent_bi_exposure
        name: Contingent BI Exposure
        description: "Exposure from key customers or suppliers suffering property loss — contingent and dependent BI"
        group_id: business_interruption
        signal_type: three_layer
        proxy_tier: COHORT_INFERENCE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.05
          loss_severity_weight: 0.15
          exposure_complexity_weight: 0.15
          score_conditions:
            - {min: 0, max: 25, action: FLAG, note: "Significant contingent BI exposure"}

      - id: business_continuity_planning
        name: Business Continuity Planning
        description: "Quality of BCP/DRP; backup facilities; tested recovery procedures"
        group_id: business_interruption
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          risk_direction: positive
          loss_severity_weight: 0.10
          loss_severity_direction: positive

# =============================================================================
# CONFIGURATIONS — Added in subsequent parts
# =============================================================================

configurations:

  # =========================================================================
  # 1. PROPERTY GENERAL
  # =========================================================================
  # Broad commercial property model. Handles the standard mid-market
  # submission — office buildings, retail, light industrial, multi-tenant.
  # =========================================================================
  - id: property_general
    name: DSI Commercial Property General Model
    description: "General commercial property — offices, retail, light industrial, multi-tenant"
    model_specificity: 2
    min_premium: 25000

    routing_constraints:
      - {field: tiv, operator: ">=", value: 5000000, required_in_input: true}
      - {field: tiv, operator: "<", value: 500000000, required_in_input: false}

    direct_queries:
      - id: pending_claims
        question: Any open or pending property claims in the past 5 years?
        conditions: [{action: FLAG, note: "Open property claims history"}]
      - id: prior_losses_large
        question: Any single property loss exceeding $1M in the past 10 years?
        conditions: [{action: REFER, override: 4, note: "Large prior loss history"}]
      - id: vacancy_significant
        question: Is more than 30% of the insured property currently vacant?
        conditions: [{action: FLAG, note: "Significant vacancy exposure"}]
      - id: renovation_active
        question: Any active renovation or construction at the insured location?
        conditions: [{action: FLAG, note: "Active renovation — hot works exposure"}]
      - id: hazardous_materials
        question: Are hazardous materials stored, used, or processed on premises?
        conditions: [{action: REFER, override: 4, note: "Hazardous materials on site"}]

    category_groups: [construction_class, occupancy_hazard_grade, sprinkler_coverage]

    group_weights:
      - {group_id: construction_quality, risk_weight: 0.25, loss_weight: 0.20, exposure_weight: 0.10}
      - {group_id: occupancy_risk, risk_weight: 0.20, loss_weight: 0.20, exposure_weight: 0.15}
      - {group_id: cat_exposure, risk_weight: 0.15, loss_weight: 0.15, exposure_weight: 0.30}
      - {group_id: fire_protection, risk_weight: 0.25, loss_weight: 0.25, exposure_weight: 0.10}
      - {group_id: business_interruption, risk_weight: 0.05, loss_weight: 0.10, exposure_weight: 0.20}
      - {group_id: corporate_footprint, risk_weight: 0.05, loss_weight: 0.05, exposure_weight: 0.10}
      - {group_id: firm_stability, risk_weight: 0.05, loss_weight: 0.05, exposure_weight: 0.05}

    risk_tier_bands:
      method: MULTIPLIER
      basis: tiv
      preferred_rate: 0.0008
      standard_plus_rate: 0.0015
      standard_rate: 0.0025
      substandard_rate: 0.0040
      decline_rate: 0.0060

    limit_configuration:
      type: DECOUPLED
      valid_limits: [1000000, 2000000, 5000000, 10000000, 25000000, 50000000, 100000000, 250000000, 500000000]
      valid_deductibles: [10000, 25000, 50000, 100000, 250000, 500000, 1000000, 2500000]

    pricing:
