      - {id: structured_data, label: Structured Data, description: Third-party ESG ratings and benchmarks, risk: {weight: 0.05}, loss: {weight: 0.02}, exposure: {weight: 0.02}}

    risk_tier_bands:
      bands:
      - {id: 1, label: PREFERRED, description: Excellent midstream risk, interpretation: {bands: {min: 800, max: 1000}, action: APPROVE, application: {method: MULTIPLIER, applied: 0.0005, basis: tiv}}}
      - {id: 2, label: STANDARD_PLUS, description: Good midstream risk, interpretation: {bands: {min: 650, max: 799}, action: APPROVE, application: {method: MULTIPLIER, applied: 0.0008, basis: tiv}}}
      - {id: 3, label: STANDARD, description: Average midstream risk, interpretation: {bands: {min: 500, max: 649}, action: REFER, application: {method: MULTIPLIER, applied: 0.0012, basis: tiv}}}
      - {id: 4, label: SUBSTANDARD, description: Elevated midstream risk, interpretation: {bands: {min: 350, max: 499}, action: REFER, application: {method: MULTIPLIER, applied: 0.0020, basis: tiv}}}
      - {id: 5, label: DECLINE, description: Unacceptable midstream risk, interpretation: {bands: {min: 0, max: 349}, action: DECLINE, application: {method: MULTIPLIER, applied: 0.0035, basis: tiv}}}

    loss_tier_bands:
      bands:
      - {id: 1, label: VERY_LOW, interpretation: {bands: {min: 80, max: 100}, application: {frequency_modifier: 0.75, severity_modifier: 0.8}}}
      - {id: 2, label: LOW, interpretation: {bands: {min: 60, max: 79}, application: {frequency_modifier: 0.88, severity_modifier: 0.9}}}
