    # -------------------------------------------------------------------------
    # TIER THRESHOLDS
    # -------------------------------------------------------------------------
    tier_thresholds:
      tier_1:
        id: 1
        label: "PREFERRED"
        min_score: 800
        max_score: 1000
        description: "Excellent safety profile - automatic approval"
        auto_approve: true
        auto_decline: false
        base_premium: 1200  # Per $1M hull value
        
      tier_2:
        id: 2
        label: "STANDARD_PLUS"
        min_score: 650
        max_score: 799
        description: "Good safety profile - automatic approval"
        auto_approve: true
        auto_decline: false
        base_premium: 1800
        
      tier_3:
        id: 3
        label: "STANDARD"
        min_score: 500
        max_score: 649
        description: "Average profile - may require referral"
        auto_approve: false
        auto_decline: false
        base_premium: 2800
        
      tier_4:
        id: 4
        label: "SUBSTANDARD"
        min_score: 350
        max_score: 499
        description: "Elevated risk - requires senior review"
        auto_approve: false
        auto_decline: false
        base_premium: 4500
        
      tier_5:
        id: 5
        label: "DECLINE"
        min_score: 0
        max_score: 349
        description: "Unacceptable risk - decline"
        auto_approve: false
        auto_decline: true
        base_premium: 8000

    # -------------------------------------------------------------------------
    # CONDITION DEFINITIONS
    # -------------------------------------------------------------------------
    direct_conditions:
      - id: pending_claims_referral
        bands:
          - {return: true, tier_override: null, action: "REFER", note: "Pending claims >$1M"}
      
      - id: regulatory_action_referral
        bands:
          - {return: true, tier_override: 5, action: "DECLINE", note: "Pending regulatory enforcement"}
      
      - id: coverage_declined_referral
        bands:
          - {return: true, tier_override: 5, action: "DECLINE", note: "Prior declination"}
      
      - id: fleet_change_referral
        bands:
          - {return: true, tier_override: null, action: "REFER", note: "Major fleet change planned"}
      
      - id: route_expansion_referral
        bands:
          - {return: true, tier_override: 4, action: "REFER", note: "Conflict zone expansion"}
      
      - id: ownership_change_referral
        bands:
          - {return: true, tier_override: null, action: "FLAG", note: "Recent ownership change"}
      
      - id: wet_lease_referral
        bands:
          - {return: true, tier_override: null, action: "MODIFIER", modifier: 1.15, note: "Wet lease operations"}
  
    score_conditions:
      - id: safety_record_critical
        bands:
          - {max: 30, tier_override: 5, action: "DECLINE", note: "Unacceptable safety record"}
          - {max: 45, tier_override: 4, action: "REFER", note: "Significant safety concerns"}
        inclusive_max: false
      
      - id: regulatory_compliance_critical
        bands:
          - {max: 35, tier_override: 5, action: "DECLINE", note: "Severe regulatory deficiencies"}
          - {max: 50, tier_override: 4, action: "REFER", note: "Material regulatory concerns"}
        inclusive_max: false
      
      - id: accident_history_critical
        bands:
          - {max: 25, tier_override: 5, action: "DECLINE", note: "Severe accident history"}
          - {max: 40, tier_override: 4, action: "REFER", note: "Material accident history"}
        inclusive_max: false
      
      - id: fatality_history_critical
        bands:
          - {max: 30, tier_override: 5, action: "DECLINE", note: "Recent fatal accidents"}
          - {max: 50, tier_override: 4, action: "REFER", note: "Fatal accident history"}
        inclusive_max: false
      
      - id: certificate_status_critical
        bands:
          - {max: 30, tier_override: 5, action: "DECLINE", note: "Certificate at risk"}
          - {max: 50, tier_override: 4, action: "REFER", note: "Certificate concerns"}
        inclusive_max: false
      
      - id: enforcement_actions_critical
        bands:
          - {max: 25, tier_override: 5, action: "DECLINE", note: "Severe enforcement history"}
          - {max: 45, tier_override: 4, action: "REFER", note: "Material enforcement actions"}
        inclusive_max: false
      
      - id: eu_safety_list_critical
        bands:
          - {max: 30, tier_override: 5, action: "DECLINE", note: "On EU Air Safety List"}
          - {max: 70, tier_override: 4, action: "REFER", note: "EU safety restrictions"}
        inclusive_max: false
      
      - id: conflict_zone_critical
        bands:
          - {max: 20, tier_override: 5, action: "DECLINE", note: "Direct conflict zone ops"}
          - {max: 40, tier_override: 4, action: "REFER", note: "Significant conflict exposure"}
        inclusive_max: false
      
      - id: route_risk_critical
        bands:
          - {max: 30, tier_override: 4, action: "REFER", note: "Elevated route risk"}
