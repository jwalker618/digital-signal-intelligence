          group: geography
          features:
            - {cat: "US", label: "United States", applied: 1.00}
            - {cat: "UK", label: "United Kingdom", applied: 1.05}
            - {cat: "EU", label: "European Union", applied: 1.10}
            - {cat: "APAC", label: "Asia Pacific", applied: 1.15}
            - {cat: "OTHER", label: "Other", applied: 1.25}
    
      - id: security_vendor_presence
        inference_utility_function: security_vendor_basefunction
        normaliser:
          type: categorical_map
          bands:
            - {min: 0, max: 25, applied: 0.80}
            - {min: 26, max: 50, applied: 1.00}
            - {min: 51, max: 75, applied: 1.20}
            - {min: 76, max: 100, applied: 1.40}
        signals:
          group: network_authority
          risk:
            correlation_direction: positive
            weight: 0.25
            score_condition:
              - {min: 0, max: 25, action: "FLAG", note: "No tier-1 security vendors detected"}
          loss:
            severity:
              correlation_direction: negative
