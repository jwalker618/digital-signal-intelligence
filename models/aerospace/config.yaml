# DSI Model Coverage Configuration File
# ===========================================
#
# This file defines the created configurations for the aerospace coverage type.

# Format:
#   coverage_type:
#     identifier: unique name for this configuration
#     direct_queries: the list of yes / no questions that are asked which cannot otherwise be observed
#     standard_features: the normal model feautures with a indicated modifier
#     signal_groupings: the groups of signal features, their model weight, plus their excellent, average, and poor scores for testing
#     signal_features: the underlying features of each signal group and their ttl setting


aerospace:
  identifier: "general"
  direct_queries: [
    "pending_claims",
    "regulatory_action",
    "coverage_declined",
    "fleet_change",
    "route_expansion",
    "ownership_change",
  ]
  standard_features:
    risk_tier: [
      {item: "1", modifier: 0.75},
      {item: "2", modifier: 1},
      {item: "3", modifier: 1.35},
      {item: "4", modifier: 1.85},
      {item: "5", modifier: 2.75},
    ]
    fleet_category: [
      {item: "WIDEBODY", modifier: 1.1},
      {item: "NARROWBODY", modifier: 1},
      {item: "REGIONAL_JET", modifier: 1.05},
      {item: "TURBOPROP", modifier: 0.95},
      {item: "BUSINESS_JET", modifier: 1.15},
      {item: "HELICOPTER", modifier: 1.3},
      {item: "PISTON", modifier: 1.2},
    ]
    regulatory_framework: [
      {item: "FAA", modifier: 1},
      {item: "EASA", modifier: 1},
      {item: "CAA_UK", modifier: 1},
      {item: "OTHER_ICAO", modifier: 1.15},
      {item: "NON_ICAO", modifier: 1.4},
    ]
    fleet_size: [
      {item: "SINGLE", modifier: 1.3},
      {item: "MICRO", modifier: 1.2},
      {item: "SMALL", modifier: 1.1},
      {item: "MEDIUM", modifier: 1},
      {item: "LARGE", modifier: 0.95},
      {item: "MAJOR", modifier: 0.9},
    ]
    iosa_status: [
      {item: "REGISTERED", modifier: 0.9},
      {item: "EXPIRED", modifier: 1.15},
      {item: "NEVER_REGISTERED", modifier: 1.25},
      {item: "NOT_APPLICABLE", modifier: 1},
    ]
  signals_groupings: [
    {item: "network_authority", weight: "0.10", excellent_signal: "90", average_signal: "70", poor_signal: "40"}, 
    {item: "safety_record", weight: "0.25", excellent_signal: "90", average_signal: "70", poor_signal: "40"}, 
    {item: "regulatory_compliance", weight: "0.20", excellent_signal: "90", average_signal: "70", poor_signal: "40"}, 
    {item: "operational_quality", weight: "0.15", excellent_signal: "90", average_signal: "70", poor_signal: "40"}, 
    {item: "fleet_quality", weight: "0.15", excellent_signal: "90", average_signal: "70", poor_signal: "40"}, 
    {item: "financial_stability", weight: "0.05", excellent_signal: "90", average_signal: "70", poor_signal: "40"}, 
    {item: "route_risk", weight: "0.05", excellent_signal: "90", average_signal: "70", poor_signal: "40"}, 
    {item: "corporate_governance", weight: "0.05", excellent_signal: "90", average_signal: "70", poor_signal: "40"}, 
  ]
  signal_features:
    operator_type: [
      "MAJOR_AIRLNE", 
      "REGIONAL_AIRLINE,
      "LOW_COST_AIRLINE",
      "CARGO_AIRLINE",
      "CHARTER_OPERATOR",
      "CORPORATE_FLIGHT",
      "HELICOPTER_OPERATOR",
      "FLIGHT_SCHOOL",
      "PRIVATE_OWNER",
    ]
  signals_feautures:
    network_authority: [
      {item: "alliance_membership_score", ttl: "dynamic"},
      {item: "codeshare_quality_score", ttl: "dynamic"},
      {item: "lessor_quality_score", ttl: "dynamic"},
      {item: "oem_relationship_score", ttl: "dynamic"},
      {item: "mro_quality_score", ttl: "dynamic"},
    ]
    safety_record: [
      {item: "accident_history_score", ttl: "dynamic"},
      {item: "incident_history_score", ttl: "dynamic"},
      {item: "accident_rate_score", ttl: "dynamic"},
      {item: "fatality_history_score", ttl: "dynamic"},
      {item: "investigation_findings_score", ttl: "dynamic"},
    ]
    regulatory_compliance: [
      {item: "certificate_status_score", ttl: "dynamic"},
      {item: "enforcement_actions_score", ttl: "dynamic"},
      {item: "ad_compliance_score", ttl: "dynamic"},
      {item: "iosa_status_score", ttl: "dynamic"},
      {item: "ramp_inspection_score", ttl: "dynamic"},
      {item: "eu_safety_list_score", ttl: "dynamic"},
    ]
    operational_quality: [
      {item: "otp_score", ttl: "dynamic"},
      {item: "dispatch_reliability_score", ttl: "dynamic"},
      {item: "training_program_score", ttl: "dynamic"},
      {item: "sms_maturity_score", ttl: "dynamic"},
      {item: "crew_experience_score", ttl: "dynamic"},
    ]
    fleet_quality: [
      {item: "fleet_age_score", ttl: "dynamic"},
      {item: "fleet_homogeneity_score", ttl: "dynamic"},
      {item: "aircraft_generation_score", ttl: "dynamic"},
      {item: "maintenance_program_score", ttl: "dynamic"},
      {item: "heavy_check_currency_score", ttl: "dynamic"},
    ]
    financial_stability: [
      {item: "credit_rating_score", ttl: "dynamic"},
      {item: "liquidity_score", ttl: "dynamic"},
      {item: "profitability_score", ttl: "dynamic"},
      {item: "load_factor_score", ttl: "dynamic"},
      {item: "fleet_renewal_score", ttl: "dynamic"},
    ]
    route_risk: [
      {item: "high_risk_destination_score", ttl: "dynamic"},
      {item: "challenging_airport_score", ttl: "dynamic"},
      {item: "overwater_exposure_score", ttl: "dynamic"},
      {item: "weather_exposure_score", ttl: "dynamic"},
      {item: "conflict_zone_score", ttl: "dynamic"},
    ]
  
  
