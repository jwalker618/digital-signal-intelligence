    # -------------------------------------------------------------------------
    # CATEGORICAL GROUPS
    # Categorical groups can either
    # a) impact base premium after generation (impact: "MODIFIER")
    # b) be the basis of premium (impact: "PREMIUM")
    # Note: only one categorical group be the basis of premium
    # -------------------------------------------------------------------------
    categorical_groups:
      - id: "industry_classification"
        label: "Industry Classification"
        description: "Industry classification derived from public records"
        impact: "modifier" 
        inference_id: industry_classification_basefunction
      - id: "size_band"
        label: "Size Band"
        description: "Company size classification"
        impact: "modifier"
        inference_id: company_size_basefunction
      - id: "geography"
        label: "geography"
        description: "Primary operational geography"
        impact: "modifier"
        inference_id: operational_base_basefunction
        
    # -------------------------------------------------------------------------
    # CATEGORICAL FEATURES
    # Categorical features are the underlying items returned by the inference function.
    # Each carries a specific modifier or premium value.
    # It's critical to ensure that features match those returned by the selected inference function.
    # Unmapped items will default to "OTHER"
    # -------------------------------------------------------------------------

    categorical_features:
      industry_classification:
        - cat: "TECHNOLOGY"
          label: "Technology"
          description: ""      
          modifier: 
            applied: 1.15    
        - cat: "FINANCIAL_SERVICES" 
          label: "Financial Services" 
          description: ""     
          modifier: 
            applied: 1.40
        - cat: "HEALTHCARE"
          label: "Healthcare"
          description: ""     
          modifier: 
            applied: 1.50
        - cat: "RETAIL"
          label: "Retail"
          description: ""     
          modifier: 
            applied: 1.25
