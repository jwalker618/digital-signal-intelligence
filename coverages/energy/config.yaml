        group_id: safety_performance
        risk: {correlation_direction: positive, weight: 0.1, score_conditions: [{threshold: 20, comparison: <=, action: REFER, override: 5, note: Major incident history}]}
        loss: {frequency: {correlation_direction: positive, weight: 0.1}, severity: {correlation_direction: positive, weight: 0.2}}
    - id: near_miss
