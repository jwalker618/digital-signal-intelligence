  marine_offshore:
    metadata:
      name: DSI Marine Offshore Specialist Model
      description: Offshore marine units — FPSOs, rigs, OSVs, construction vessels, wind installation
      version: 2.3.0
      product_types: *id005
      applicable_markets: *id001
      minimum_viable_input:
        required: *id002
      min_premium: 150000
      default_currency: USD
      model_specificity: 4
      routing_constraints:
      - field: operation_segment
        operator: ==
        value: OFFSHORE
        required_in_input: true
      - field: hull_value
        operator: '>='
        value: 50000000
        required_in_input: true
    direct_queries:
    - id: total_loss_history
      question: Has this unit or a sister unit suffered a total loss or constructive total loss?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Unit or sister total loss history
    - id: mooring_failure
      question: Has the unit experienced a mooring failure or DP incident in the past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Prior mooring/DP failure
    - id: lay_up_status
      question: Is the unit currently in warm or cold lay-up?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Lay-up status — reduced maintenance risk
    - id: deepwater_operations
      question: Does the unit operate in water depths exceeding 1500 metres?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Deepwater operations — higher severity potential
    - id: harsh_environment
      question: Does the unit operate in harsh environment zones (North Sea, Norwegian Sea, sub-Arctic)?
      query_condition:
      - return: true
        action: MODIFIER
        override: null
        applied: 1.15
