  # ===========================================================================
  # ENERGY UPSTREAM UNCONVENTIONAL
  # ===========================================================================
  energy_upstream_unconventional:
    metadata:
      name: DSI Energy Upstream Unconventional Pricing Model
      description: Tight oil, shale gas, and hydraulic fracturing operations
      version: 2.2.0
      product_types:
      - property_damage
      - business_interruption
      - control_of_well
      - operators_extra_expense
      - third_party_liability
      - pollution_liability
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mena
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: property_damage, business_interruption, control_of_well, operators_extra_expense, third_party_liability, pollution_liability'
        - field: limit
          description: Requested limit in USD
        - field: tiv
          description: Total Insured Value in USD
      min_premium: 100000
      default_currency: USD
      model_specificity: 3
      routing_constraints:
      - field: operation_segment
        operator: "="
        value: UPSTREAM_UNCONVENTIONAL
        required_in_input: true

    direct_queries:
    - id: major_incidents
      question: Any major incidents (wellhead blowout, frac incident, major spill) in past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Major incidents disclosed
    - id: fatalities
      question: Any work-related fatalities in past 3 years?
      query_condition:
      - return: true
        action: REFER
        override: 3
        applied: null
        note: Fatalities disclosed
    - id: induced_seismicity
      question: Any operations in state-designated induced seismicity zones or SWD shut-in orders?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Seismicity exposure
    - id: frac_hit_history
      question: Any frac hit / well interference events in past 3 years?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Parent-child interference
    - id: regulatory_enforcement
      question: Any significant regulatory enforcement actions pending?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Pending enforcement
    - id: water_disposal_violations
      question: Any SWD well violations or produced water disposal incidents?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Water management violations

