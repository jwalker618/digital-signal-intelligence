          deductible_factors: [{deductible: 10000, factor: 1.3}, {deductible: 25000, factor: 1.15}, {deductible: 50000, factor: 1.05}, {deductible: 100000, factor: 1.0}, {deductible: 250000, factor: 0.88}, {deductible: 500000, factor: 0.78}, {deductible: 1000000, factor: 0.68}]
        pollution_liability:
          ilf_curve: {base_limit: 10000000, factors: [{limit: 1000000, factor: 0.25}, {limit: 2500000, factor: 0.45}, {limit: 5000000, factor: 0.7}, {limit: 10000000, factor: 1.0}, {limit: 25000000, factor: 1.9}, {limit: 50000000, factor: 3.4}, {limit: 100000000, factor: 6.0}, {limit: 250000000, factor: 12.6}, {limit: 500000000, factor: 22.0}]}
          deductible_factors: [{deductible: 10000, factor: 1.3}, {deductible: 25000, factor: 1.15}, {deductible: 50000, factor: 1.05}, {deductible: 100000, factor: 1.0}, {deductible: 250000, factor: 0.88}, {deductible: 500000, factor: 0.78}, {deductible: 1000000, factor: 0.68}]
