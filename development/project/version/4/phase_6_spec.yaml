# =============================================================================
# DSI Coverage Expansion Spec — Phase 6: Professional Indemnity
# =============================================================================
#
# Machine-consumable spec for the CoverageExpansionGenerator.
# Companion prose: phase_6.md
#
# Usage:
#   python -m infrastructure.builder.cli expand \
#       --spec development/project/version/4/phase_6_spec.yaml \
#       --existing-config coverages/pi/config.yaml \
#       --write
#
# =============================================================================

coverage_line: pi
coverage_key: professional_indemnity
phase: phase_6
description: "Phase 6 Professional Indemnity Coverage Expansion — 11 new configurations"
version: "2.3.0"

default_product_types:
  - professional_liability
  - errors_omissions

default_markets: [us, uk, eu, apac]
default_currency: USD
default_min_premium: 25000

default_minimum_viable_input:
  - field: client_name
    description: Client name
  - field: product_type
    description: "One of: professional_liability, errors_omissions, malpractice"
  - field: limit
    description: Requested limit in USD
  - field: revenue
    description: Annual revenue in USD (MULTIPLIER basis)

routing_field: profession_segment

# =============================================================================
# DEFAULT TIER BANDS (configs override rates per-config)
# =============================================================================

default_loss_tier_bands:
  floor: 0.55
  cap: 1.6

default_exposure_bands:
  size_weight: 0.6
  complexity_weight: 0.4
  size_thresholds:
    - {label: MICRO, max_value: 1000000, applied: 0.5}
    - {label: SMALL, max_value: 10000000, applied: 0.75}
    - {label: MEDIUM, max_value: 50000000, applied: 1.0}
    - {label: LARGE, max_value: 250000000, applied: 1.5}
    - {label: VERY_LARGE, max_value: 1000000000, applied: 2.5}

default_limit_configuration:
  type: DECOUPLED
  valid_limits: [1000000, 2000000, 5000000, 10000000, 25000000, 50000000, 100000000, 250000000]
  valid_deductibles: [10000, 25000, 50000, 100000, 250000, 500000, 1000000]

# Default ILF for general PI product types (configs with custom curves override)
default_pricing:
  base_limit_reference: 1000000
  base_deductible_reference: 50000
  taxes_fees_rate: 0.05
  by_product_type:
    - product_type: professional_liability
      curve_type: standard
      ilf_curve:
        base_limit: 1000000
        factors:
          - {limit: 1000000, factor: 1.0}
          - {limit: 2000000, factor: 1.7}
          - {limit: 5000000, factor: 3.2}
          - {limit: 10000000, factor: 5.5}
          - {limit: 25000000, factor: 10.0}
          - {limit: 50000000, factor: 17.0}
          - {limit: 100000000, factor: 28.0}
      deductible_factors:
        - {deductible: 10000, factor: 1.25}
        - {deductible: 25000, factor: 1.10}
        - {deductible: 50000, factor: 1.0}
        - {deductible: 100000, factor: 0.92}
        - {deductible: 250000, factor: 0.82}
        - {deductible: 500000, factor: 0.72}
        - {deductible: 1000000, factor: 0.65}
    - product_type: errors_omissions
      curve_type: standard
      ilf_curve:
        base_limit: 1000000
        factors:
          - {limit: 1000000, factor: 1.0}
          - {limit: 2000000, factor: 1.6}
          - {limit: 5000000, factor: 2.8}
          - {limit: 10000000, factor: 4.5}
          - {limit: 25000000, factor: 8.5}
          - {limit: 50000000, factor: 14.0}
          - {limit: 100000000, factor: 23.0}
      deductible_factors:
        - {deductible: 10000, factor: 1.25}
        - {deductible: 25000, factor: 1.10}
        - {deductible: 50000, factor: 1.0}
        - {deductible: 100000, factor: 0.92}
        - {deductible: 250000, factor: 0.82}
        - {deductible: 500000, factor: 0.72}
        - {deductible: 1000000, factor: 0.65}

# =============================================================================
# NEW SIGNAL GROUPS
# =============================================================================

new_signal_groups:

  # --- PARTNER PRACTICE MIX (pi_legal_large) ---
  - id: partner_practice_mix
    label: Partner Practice Mix
    description: "Tail-risk drivers specific to large legal practice: partner churn, conflict exposure, matter concentration"
    group_type: three_layer_assessment
    signals:
      - id: lateral_hire_volume
        name: Lateral Hire Volume
        description: Rate of lateral partner additions; higher churn = legacy claims risk from prior acts
        group_id: partner_practice_mix
        proxy_tier: INFERRED_PROXY
        three_layer:
          risk_weight: 0.15
          loss_frequency_weight: 0.15
          exposure_size_weight: 0.15
      - id: prior_acts_coverage
        name: Prior Acts Coverage
        description: Prior acts tail coverage status; gap = uncovered legacy exposure
        group_id: partner_practice_mix
        proxy_tier: DIRECT_OBSERVABLE
        three_layer:
          risk_weight: 0.20
          loss_severity_weight: 0.20
          exposure_size_weight: 0.20
          score_conditions:
            - {threshold: 30, comparison: "<=", action: REFER, override: 5, note: "Prior acts coverage gap"}
      - id: conflict_system_quality
        name: Conflict System Quality
        description: Conflict-of-interest screening system sophistication; failure = dual-representation claims
        group_id: partner_practice_mix
        proxy_tier: INFERRED_PROXY
        three_layer:
          risk_weight: 0.20
          loss_frequency_weight: 0.20
          exposure_complexity_weight: 0.15
      - id: trust_account_compliance
        name: Trust Account Compliance
        description: Client trust/IOLTA account compliance; violations are disciplinary-level signals
        group_id: partner_practice_mix
        proxy_tier: DIRECT_OBSERVABLE
        three_layer:
          risk_weight: 0.15
          loss_frequency_weight: 0.10
          score_conditions:
            - {threshold: 25, comparison: "<=", action: REFER, override: 5, note: "Trust account irregularities"}
      - id: class_action_exposure
        name: Class Action Exposure
        description: Exposure from class action representation/defense; single-matter concentration risk
        group_id: partner_practice_mix
        proxy_tier: INFERRED_PROXY
        three_layer:
          risk_weight: 0.10
          loss_severity_weight: 0.15
          exposure_size_weight: 0.25
      - id: partner_departure_rate
        name: Partner Departure Rate
        description: Partner departure rate; key tail exposure driver and firm stability indicator
        group_id: partner_practice_mix
        proxy_tier: DIRECT_OBSERVABLE
        three_layer:
          risk_weight: 0.10
          loss_frequency_weight: 0.10
          exposure_size_weight: 0.15
          score_conditions:
            - {threshold: 20, comparison: "<=", action: REFER, override: 4, note: "High partner departure rate"}
      - id: matter_concentration
        name: Matter Concentration
        description: "Single-matter revenue concentration; >15% from one matter = concentration risk"
        group_id: partner_practice_mix
        proxy_tier: INFERRED_PROXY
        three_layer:
          risk_weight: 0.10
          loss_severity_weight: 0.10
          exposure_size_weight: 0.25

