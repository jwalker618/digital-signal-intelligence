# =============================================================================
# DSI Model Configuration
# 
# This file holds all the relvant configuration types for a single coverage.
# For example,
# coverage:         the actual coverage cohort, eg aerospace
#   configuration:  the specific configuration file under that coverage, eg aerospace_general
# 
# There can be multiple configurations saved under a coverage.
# 
# A configuration is the single source of truth for:
#   - 1) direct (optional) queries
#   - 2) categorical features
#   - 3) signal groups and underlying features
#   - the source and impact of 1- 3
#   - tier definitions
#   - other pricing parameters
#   - test profiles for validation
# 
# When a technical model is generated:
# - the completed selected configuration is persisted. This allows the model to be generated at any moment based on its original specification (although test profiles are removed as these are extraneous).
# - every item with an id is captured in a seperate file with the associated return and persisted after a complete interaction  - this is a model version
# 
# All DSI principles must be adhered to, specifically:
# 1. All signals must be externally observable (no application questions required)
# 2. Direct queries are OPTIONAL - model must work without them
# 3. Categorical features are inferred from observable data
# 4. Tier determines base premium, either directly or through the application of a percentage to a single value (for example, TIV * %); modifiers adjust for categorical features
# 5. All sources must be publicly accessible or through standard data providers
# =============================================================================

marine:
  marine_general:
    metadata:
      name: "DSI Marine Technical Pricing Model"
      description: "Marine hull and liability coverage based on observable operator behavior, safety records, and fleet patterns"
      version: "2.0.0"
      coverage_types:
        - "hull_machinery"
        - "total_loss"
        - "increased_value"
        - "loss_of_hire"
        - "war_risks"
        - "pi_liability"
        - "cargo"
      applicable_vessel_categories:
        - "container"
        - "tanker"
        - "dry_bulk"
        - "lng_lpg"
        - "offshore"
        - "passenger"
        - "general_cargo"
      applicable_markets: ["global"]
      minimum_viable_input: ["client name (domain optional)","Limit in USD","TIV"]
      min_premium: 50000
      default_currency: "USD"

    # -------------------------------------------------------------------------
    # DIRECT OPTIONAL QUERIES
    # -------------------------------------------------------------------------
    direct_queries:
      - id: "fleet_size"
        question: "Total number of vessels in owned/operated fleet?"
        bands:
          - return: true
            override: null
            action: "INFO"
            note: "Fleet size recorded"
      - id: "psc_detentions"
        question: "Any vessels detained by port state control in past 36 months?"
        bands:
          - return: true
            override: null
            action: "REFER"
            note: "PSC detentions in past 36 months"
      - id: "total_losses"
        question: "Any total losses or major casualties in past 5 years?"
        bands:
          - return: true
            override: 4
            action: "REFER"
            note: "Total losses in past 5 years"
      - id: "third_party_manager"
        question: "Is the fleet managed by a third-party technical manager?"
        bands:
          - return: true
            override: null
            action: "INFO"
            note: "Third-party technical management"
      - id: "sanctioned_trade"
        question: "Any vessels currently trading to sanctioned regions?"
        bands:
          - return: true
            override: 5
            action: "DECLINE"
            note: "Trading to sanctioned regions - coverage not available"

    # -------------------------------------------------------------------------
    # CATEGORICAL GROUPS
    # -------------------------------------------------------------------------
    categorical_groups:
      - id: "operator_type"
        name: "Operator Type"
        description: "Operator classification based on fleet size and segment"
        inference_utility_function: operator_classification_basefunction
      - id: "vessel_category"
        name: "Vessel Category"
        description: "Primary vessel category for fleet"
        inference_utility_function: primaryvessel_category_basefunction
      - id: "trading_pattern"
        name: "Trading Pattern"
        description: "Trading pattern from AIS analysis"
        inference_utility_function: trading_pattern_basefunction
      - id: "flag_state_quality"
        name: "Flag State Quality"
        description: "Flag state quality based on Paris MoU performance"
        inference_utility_function: flagstate_quality_basefunction
      - id: "fleet_age_band"
        name: "Fleet Age Band"
        description: "Average fleet age classification"
        inference_utility_function: fleet_age_basefunction
        
    # -------------------------------------------------------------------------
    # CATEGORICAL FEATURES
    # -------------------------------------------------------------------------
    
    categorical_features:
      operator_type:
        - cat: "MAJOR_LINER"
          label: "Major Liner Operator"
          modifier: 0.80
          description: "Top 20 container lines (Maersk, MSC, CMA CGM, etc.)"
          
        - cat: "MAJOR_TANKER"
          label: "Major Tanker Operator"
          modifier: 0.90
          description: "Major tanker fleet operators"
          
        - cat: "MAJOR_BULK"
          label: "Major Bulk Operator"
          modifier: 0.95
          description: "Major dry bulk fleet operators"
          
        - cat: "REGIONAL_OPERATOR"
          label: "Regional Fleet Operator"
          modifier: 1.00
          description: "Regional fleet operators (10-30 vessels)"
          
        - cat: "INDEPENDENT"
          label: "Independent Operator"
          modifier: 1.25
          description: "Single or few vessel operators (<10 vessels)"
          
        - cat: "STATE_OWNED"
          label: "State-Owned Operator"
          modifier: 1.10
          description: "Government-owned shipping lines"
          
        - cat: "UNKNOWN"
          label: "Unknown Operator"
          modifier: 1.50
          description: "New or unverified operator"
            
      vessel_category:
        - cat: "CONTAINER"
          label: "Container"
          modifier: 0.90
          description: "Container vessels"
          
        - cat: "TANKER"
          label: "Tanker"
          modifier: 1.10
          description: "Crude, product, chemical tankers"
          
        - cat: "DRY_BULK"
          label: "Dry Bulk"
          modifier: 1.00
          description: "Dry bulk carriers"
          
        - cat: "LNG_LPG"
          label: "LNG/LPG Carrier"
          modifier: 0.85
          description: "Gas carriers (typically highest standards)"
          
        - cat: "OFFSHORE"
          label: "Offshore"
          modifier: 1.30
          description: "Offshore supply, construction vessels"
          
        - cat: "PASSENGER"
          label: "Passenger"
          modifier: 1.25
          description: "Cruise, ferry, passenger vessels"
          
        - cat: "GENERAL_CARGO"
          label: "General Cargo"
          modifier: 1.10
          description: "General cargo, MPP vessels"
          
        - cat: "MIXED"
          label: "Mixed Fleet"
          modifier: 1.05
          description: "Diversified vessel types"

      trading_pattern:
        - cat: "LINER_REGULAR"
          label: "Liner/Regular Service"
          modifier: 0.85
          description: "Fixed routes, scheduled services"
          
        - cat: "SPOT_TRAMP"
          label: "Spot/Tramp Trading"
          modifier: 1.15
          description: "Voyage charter, variable routes"
          
        - cat: "INDUSTRIAL"
          label: "Industrial Shipping"
          modifier: 0.90
          description: "Dedicated cargo flows (e.g., iron ore majors)"
          
        - cat: "MIXED"
