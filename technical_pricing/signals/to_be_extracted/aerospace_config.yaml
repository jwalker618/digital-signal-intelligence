# =============================================================================
# DSI Model Configuration - Aerospace Insurance
# =============================================================================
#
# This file defines the complete configuration for the aerospace coverage type.
# It is the single source of truth for:
#   - Model structure and parameters
#   - Signal definitions and weights
#   - Pricing factors and thresholds
#   - Test profiles for actuarial validation
#
# Premium calculation follows DSI Foundational Principle 9: Signal -> Score -> Tier -> Price
#
# DSI PRINCIPLES APPLIED:
#   1. All signals must be externally observable (no application questions required)
#   2. Direct queries are OPTIONAL - model works without them
#   3. Categorical features are inferred from observable data
#   4. Tier determines base premium; modifiers adjust for exposure characteristics
#   5. All sources must be publicly accessible or through standard data providers
#
# Version: 2.0.0
# Last Updated: 2025-12
# =============================================================================

aerospace:
  aerospace_general:
    metadata:
      name: "DSI Aerospace Insurance Model"
      description: "Aviation hull and liability coverage based on observable safety and operational signals"
      version: "2.0.0"
      coverage_types:
        - "aviation_hull"
        - "aviation_liability"
        - "aviation_hull_liability_combined"
      applicable_markets: ["us", "uk", "eu", "apac", "latam", "mea"]
      min_premium: 25000
      default_currency: "USD"

    # -------------------------------------------------------------------------
    # DIRECT OPTIONAL QUERIES
    # -------------------------------------------------------------------------
    direct_optional_queries:
      - id: "pending_claims"
        question: "Are there any pending aviation liability claims exceeding $1M?"
        direct_condition: pending_claims_true
        
      - id: "regulatory_action"
        question: "Is there any pending regulatory enforcement action against the operator?"
        direct_condition: regulatory_action_true
        
      - id: "coverage_declined"
        question: "Has aviation coverage been declined or non-renewed in the past 3 years?"
        direct_condition: coverage_declined_true
        
      - id: "fleet_change"
        question: "Are there planned fleet changes exceeding 20% in the next 12 months?"
        direct_condition: fleet_change_true
        
      - id: "route_expansion"
        question: "Is there planned expansion into conflict zones or sanctioned regions?"
        direct_condition: route_expansion_true
        
      - id: "ownership_change"
        question: "Has there been a change in majority ownership in the past 12 months?"
        direct_condition: ownership_change_true

      - id: "wet_lease_operations"
        question: "Do you operate aircraft under wet lease arrangements?"
        direct_condition: wet_lease_true

    # -------------------------------------------------------------------------
    # CATEGORICAL FEATURES
    # -------------------------------------------------------------------------
    categorical_features:
      operator_type:
        description: "Type of aviation operator - inferred from regulatory filings and operational data"
        inference_method:
          primary: "regulatory_certificate_lookup"
          fallback: "fleet_operations_analysis"
          sources:
            - {type: "api", provider: "faa", endpoint: "certificates/air_carrier"}
            - {type: "api", provider: "easa", endpoint: "operators/aoc"}
            - {type: "api", provider: "ch_aviation", endpoint: "operators/profile"}
            - {type: "api", provider: "cirium", endpoint: "fleets/operator"}
          confidence_threshold: 0.8
          default_on_failure: "CHARTER_OPERATOR"
        values:
          - id: "MAJOR_AIRLINE"
            label: "Major Airline"
            modifier: 0.85
            description: "Scheduled carrier with >100 aircraft, alliance member"
            inference_criteria: {fleet_size_min: 100, scheduled_operations: true, alliance_member: true}
            
          - id: "REGIONAL_AIRLINE"
            label: "Regional Airline"
            modifier: 1.00
            description: "Scheduled regional service, typically code-share"
            inference_criteria: {fleet_size_range: [20, 100], scheduled_operations: true}
            
          - id: "LOW_COST_CARRIER"
            label: "Low Cost Carrier"
            modifier: 0.95
            description: "Point-to-point budget airline"
            inference_criteria: {scheduled_operations: true, business_model: "low_cost"}
            
          - id: "CARGO_AIRLINE"
            label: "Cargo Airline"
            modifier: 1.10
            description: "Freight-only operations"
            inference_criteria: {cargo_only: true}
            
          - id: "CHARTER_OPERATOR"
            label: "Charter Operator"
            modifier: 1.25
            description: "Non-scheduled passenger service"
            inference_criteria: {scheduled_operations: false, passenger_operations: true}
            
          - id: "CORPORATE_FLIGHT"
            label: "Corporate Flight Department"
            modifier: 1.15
            description: "In-house corporate aviation"
            inference_criteria: {part_91: true, corporate_owned: true}
            
          - id: "HELICOPTER_OPERATOR"
            label: "Helicopter Operator"
            modifier: 1.40
            description: "Rotorcraft operations (EMS, offshore, utility)"
            inference_criteria: {rotorcraft_primary: true}
            
          - id: "FLIGHT_SCHOOL"
            label: "Flight Training Organization"
            modifier: 1.50
            description: "Primary and advanced flight training"
            inference_criteria: {training_certificate: true}
            
          - id: "PRIVATE_OWNER"
            label: "Private Owner/Operator"
            modifier: 1.35
            description: "Individual aircraft owner"
            inference_criteria: {single_aircraft: true, private_registration: true}

      fleet_category:
        description: "Primary aircraft category in fleet"
        inference_method:
          primary: "fleet_composition_analysis"
          sources:
            - {type: "api", provider: "cirium", endpoint: "fleets/aircraft"}
            - {type: "api", provider: "ch_aviation", endpoint: "fleets/list"}
            - {type: "api", provider: "planespotters", endpoint: "operators/fleet"}
            - {type: "registry", provider: "faa_registry", endpoint: "aircraft/by_owner"}
          confidence_threshold: 0.9
          default_on_failure: "NARROWBODY"
        values:
          - id: "WIDEBODY"
            label: "Widebody"
            modifier: 1.15
            description: "Twin-aisle aircraft (A330, A350, 777, 787)"
            aircraft_patterns: ["A33", "A35", "77", "78", "A380"]
            
          - id: "NARROWBODY"
            label: "Narrowbody"
            modifier: 1.00
            description: "Single-aisle jets (A320 family, 737)"
            aircraft_patterns: ["A31", "A32", "A21", "73"]
            
          - id: "REGIONAL_JET"
            label: "Regional Jet"
            modifier: 1.05
            description: "Small jets (E-Jets, CRJ, ARJ)"
            aircraft_patterns: ["E1", "E2", "CRJ", "ERJ", "ARJ"]
            
          - id: "TURBOPROP"
            label: "Turboprop"
            modifier: 0.95
            description: "Turboprop aircraft (ATR, Dash 8)"
            aircraft_patterns: ["ATR", "DH8", "SF3"]
            
          - id: "BUSINESS_JET"
            label: "Business Jet"
            modifier: 1.20
            description: "Corporate jets (Gulfstream, Global, Falcon)"
            aircraft_patterns: ["G", "GL", "F9", "CL"]
            
          - id: "HELICOPTER"
            label: "Helicopter"
            modifier: 1.35
            description: "Rotorcraft"
            aircraft_patterns: ["S76", "S92", "AW", "EC", "H1"]
            
          - id: "PISTON"
            label: "Piston Aircraft"
            modifier: 1.25
            description: "Piston-engine aircraft"
            aircraft_patterns: ["C1", "C2", "PA", "BE"]

      fleet_size:
        description: "Number of aircraft in operator's fleet"
        inference_method:
          primary: "fleet_count_lookup"
          sources:
            - {type: "api", provider: "cirium", endpoint: "fleets/count"}
            - {type: "api", provider: "ch_aviation", endpoint: "fleets/summary"}
            - {type: "registry", provider: "faa_registry", endpoint: "aircraft/count_by_owner"}
          confidence_threshold: 0.95
          default_on_failure: "MEDIUM"
        values:
          - {id: "SINGLE", label: "Single Aircraft", modifier: 1.30, count_range: [1, 1]}
          - {id: "MICRO", label: "Micro Fleet (2-5)", modifier: 1.20, count_range: [2, 5]}
          - {id: "SMALL", label: "Small Fleet (6-20)", modifier: 1.10, count_range: [6, 20]}
          - {id: "MEDIUM", label: "Medium Fleet (21-50)", modifier: 1.00, count_range: [21, 50]}
          - {id: "LARGE", label: "Large Fleet (51-150)", modifier: 0.95, count_range: [51, 150]}
          - {id: "MAJOR", label: "Major Fleet (150+)", modifier: 0.90, count_range: [151, 999999]}

      regulatory_framework:
        description: "Primary regulatory authority governing operations"
        inference_method:
          primary: "aoc_jurisdiction_lookup"
          fallback: "registration_country"
          sources:
            - {type: "api", provider: "icao", endpoint: "operators/state"}
            - {type: "api", provider: "ch_aviation", endpoint: "operators/authority"}
            - {type: "registry", provider: "aircraft_registries", endpoint: "registration/country"}
          confidence_threshold: 0.95
          default_on_failure: "OTHER_ICAO"
        values:
          - {id: "FAA", label: "FAA (United States)", modifier: 1.00, country_codes: ["US"], tier: 1}
          - {id: "EASA", label: "EASA (European Union)", modifier: 1.00, country_codes: ["DE", "FR", "IT", "ES", "NL"], tier: 1}
          - {id: "CAA_UK", label: "CAA (United Kingdom)", modifier: 1.00, country_codes: ["GB"], tier: 1}
          - {id: "TCCA", label: "TCCA (Canada)", modifier: 1.00, country_codes: ["CA"], tier: 1}
          - {id: "CASA", label: "CASA (Australia)", modifier: 1.05, country_codes: ["AU"], tier: 1}
          - {id: "CAAC", label: "CAAC (China)", modifier: 1.15, country_codes: ["CN"], tier: 2}
          - {id: "DGCA_INDIA", label: "DGCA (India)", modifier: 1.15, country_codes: ["IN"], tier: 2}
          - {id: "OTHER_ICAO", label: "Other ICAO Compliant", modifier: 1.20, country_codes: [], tier: 2}
          - {id: "NON_ICAO", label: "Non-ICAO Compliant", modifier: 1.50, country_codes: [], tier: 3}

      iosa_status:
        description: "IATA Operational Safety Audit registration status"
        inference_method:
          primary: "iosa_registry_lookup"
          sources:
            - {type: "api", provider: "iata", endpoint: "iosa/registry"}
            - {type: "scrape", target: "iata_iosa_registry", url: "https://www.iata.org/iosa-registry"}
          confidence_threshold: 0.99
          default_on_failure: "NOT_APPLICABLE"
        values:
          - {id: "REGISTERED", label: "IOSA Registered", modifier: 0.90}
          - {id: "EXPIRED", label: "IOSA Expired", modifier: 1.15}
          - {id: "NEVER_REGISTERED", label: "Never Registered", modifier: 1.25}
          - {id: "NOT_APPLICABLE", label: "Not Applicable", modifier: 1.00}

    # -------------------------------------------------------------------------
    # SIGNAL GROUPS
    # -------------------------------------------------------------------------
    signal_groups:
      - id: "network_authority"
        name: "Network Authority"
        description: "Industry relationships and counterparty quality"
        weight: 0.10
        test_scores: {excellent: 90, average: 65, poor: 35}
        critical: false
        score_condition: null
        
      - id: "safety_record"
        name: "Safety Record"
        description: "Historical safety performance from public databases"
        weight: 0.30
        test_scores: {excellent: 98, average: 75, poor: 35}
        critical: true
        score_condition: safety_record_critical
        
      - id: "regulatory_compliance"
        name: "Regulatory Compliance"
        description: "Certificate status, enforcement actions, audit results"
        weight: 0.20
        test_scores: {excellent: 95, average: 72, poor: 38}
        critical: true
        score_condition: regulatory_compliance_critical
        
      - id: "operational_quality"
        name: "Operational Quality"
        description: "Observable operational metrics"
        weight: 0.15
        test_scores: {excellent: 88, average: 68, poor: 42}
        critical: false
        score_condition: null
        
      - id: "fleet_quality"
        name: "Fleet Quality"
        description: "Aircraft age, composition, maintenance indicators"
        weight: 0.10
        test_scores: {excellent: 88, average: 65, poor: 32}
        critical: false
        score_condition: null
        
      - id: "financial_stability"
        name: "Financial Stability"
        description: "Public financial indicators"
        weight: 0.05
        test_scores: {excellent: 85, average: 65, poor: 35}
        critical: false
        score_condition: null
        
      - id: "route_risk"
        name: "Route Risk"
        description: "Geographic and operational risk exposure"
        weight: 0.05
        test_scores: {excellent: 92, average: 72, poor: 40}
        critical: false
        score_condition: route_risk_critical
        
      - id: "corporate_governance"
        name: "Corporate Governance"
        description: "Management quality and safety culture indicators"
        weight: 0.05
        test_scores: {excellent: 88, average: 65, poor: 30}
        critical: false
        score_condition: null

    # -------------------------------------------------------------------------
    # SIGNAL FEATURES
    # -------------------------------------------------------------------------
    signal_features:
      network_authority:
        - id: "alliance_membership"
          name: "Airline Alliance Membership"
          description: "Membership in Star Alliance, oneworld, SkyTeam"
          weight: 0.25
          ttl: "semi_static"
          ttl_seconds: 2592000
          sources:
            - {type: "api", provider: "star_alliance", endpoint: "members"}
            - {type: "api", provider: "oneworld", endpoint: "members"}
            - {type: "api", provider: "skyteam", endpoint: "members"}
          score_range: [0, 100]
          scoring_logic: {full_member: 100, connecting_partner: 70, code_share_only: 50, no_alliance: 30}
          critical: false
          score_condition: null
          
        - id: "codeshare_quality"
          name: "Codeshare Partner Quality"
          description: "Average safety rating of codeshare partners"
          weight: 0.20
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "oag", endpoint: "codeshares/partners"}
            - {type: "api", provider: "cirium", endpoint: "schedules/codeshare"}
          score_range: [0, 100]
          critical: false
          score_condition: null
          
        - id: "lessor_quality"
          name: "Aircraft Lessor Quality"
          description: "Quality tier of aircraft lessors"
          weight: 0.20
          ttl: "semi_static"
          ttl_seconds: 2592000
          sources:
            - {type: "api", provider: "cirium", endpoint: "fleets/lessors"}
            - {type: "api", provider: "ch_aviation", endpoint: "fleets/ownership"}
            - {type: "registry", provider: "cape_town_registry", endpoint: "interests"}
          score_range: [0, 100]
          scoring_logic: {tier_1_lessor: 95, tier_2_lessor: 80, owned_fleet: 75, unknown: 40}
          critical: false
          score_condition: null
          
        - id: "oem_relationship"
          name: "OEM Relationship"
          description: "Direct relationships with Boeing, Airbus, Embraer"
          weight: 0.15
          ttl: "static"
          ttl_seconds: 7776000
          sources:
            - {type: "api", provider: "cirium", endpoint: "orders/by_operator"}
            - {type: "scrape", target: "oem_announcements", sites: ["boeing.com", "airbus.com"]}
          score_range: [0, 100]
          critical: false
          score_condition: null
          
        - id: "mro_quality"
          name: "MRO Provider Quality"
          description: "Quality of maintenance providers"
          weight: 0.20
          ttl: "semi_static"
          ttl_seconds: 2592000
          sources:
            - {type: "registry", provider: "faa", endpoint: "repair_stations/145"}
            - {type: "registry", provider: "easa", endpoint: "part_145_approvals"}
          score_range: [0, 100]
          scoring_logic: {oem_affiliated: 95, major_independent: 85, regional_certified: 70, in_house: 60}
          critical: false
          score_condition: null
  
      safety_record:
        - id: "accident_history"
          name: "Accident History"
          description: "Hull loss and major accidents (10-year lookback)"
          weight: 0.30
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "aviation_safety_network", endpoint: "accidents/by_operator"}
            - {type: "api", provider: "ntsb", endpoint: "accidents/search"}
            - {type: "api", provider: "icao", endpoint: "adrep/accidents"}
          score_range: [0, 100]
          scoring_logic:
            zero_accidents_10yr: 100
            one_minor_10yr: 85
            one_major_10yr: 60
            hull_loss_5yr: 30
            fatal_recent: 0
          critical: true
          score_condition: accident_history_critical
          
        - id: "incident_history"
          name: "Incident History"
          description: "Serious incidents, runway excursions, near-misses"
          weight: 0.20
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "aviation_safety_network", endpoint: "incidents/by_operator"}
            - {type: "api", provider: "faa", endpoint: "incidents/search"}
          score_range: [0, 100]
          critical: false
          score_condition: null
          
        - id: "accident_rate"
          name: "Accident Rate vs Industry"
          description: "Accidents per million departures vs industry average"
          weight: 0.20
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "iata", endpoint: "safety/rates"}
            - {type: "api", provider: "flight_global", endpoint: "safety/benchmarks"}
          score_range: [0, 100]
          scoring_logic: {significantly_below: 100, below_avg: 85, at_avg: 70, above_avg: 45, significantly_above: 20}
          critical: false
          score_condition: null
          
        - id: "fatality_history"
          name: "Fatality History"
          description: "Fatal accident history (10-year lookback)"
          weight: 0.20
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "aviation_safety_network", endpoint: "fatalities/by_operator"}
            - {type: "api", provider: "icao", endpoint: "adrep/fatalities"}
          score_range: [0, 100]
          scoring_logic: {zero_fatalities: 100, over_10yr_ago: 75, within_5_10yr: 50, under_5yr: 25, recent: 0}
          critical: true
          score_condition: fatality_history_critical
          
        - id: "investigation_findings"
          name: "Investigation Findings"
          description: "Operator cited as causal factor in investigations"
          weight: 0.10
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "ntsb", endpoint: "reports/probable_cause"}
            - {type: "api", provider: "aaib", endpoint: "reports"}
            - {type: "api", provider: "bea", endpoint: "reports"}
          score_range: [0, 100]
          critical: false
          score_condition: null
  
      regulatory_compliance:
        - id: "certificate_status"
          name: "Operating Certificate Status"
          description: "AOC/Part 121/135 certificate status"
          weight: 0.25
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "faa", endpoint: "certificates/status"}
            - {type: "api", provider: "easa", endpoint: "operators/aoc_status"}
          score_range: [0, 100]
          scoring_logic:
            current_no_restrictions: 100
            current_with_conditions: 75
            recent_suspension_resolved: 50
            enhanced_surveillance: 35
            restricted: 20
          critical: true
          score_condition: certificate_status_critical
          
        - id: "enforcement_actions"
          name: "Enforcement Actions"
          description: "Regulatory fines, penalties (5-year lookback)"
          weight: 0.20
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "faa", endpoint: "enforcement/actions"}
            - {type: "api", provider: "easa", endpoint: "enforcement/sanctions"}
          score_range: [0, 100]
          scoring_logic: {no_actions: 100, minor_fines: 80, significant_fine: 55, certificate_action: 30}
          critical: true
          score_condition: enforcement_actions_critical
          
        - id: "iosa_audit_status"
          name: "IOSA Audit Status"
          description: "IOSA registration and audit findings"
          weight: 0.15
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "iata", endpoint: "iosa/audit_status"}
          score_range: [0, 100]
          scoring_logic: {registered_clean: 100, minor_findings: 85, significant_findings: 65, expired: 45, never_registered: 30}
          critical: false
          score_condition: null
          
        - id: "ramp_inspection"
          name: "Ramp Inspection Results"
          description: "SAFA/SACA ramp inspection findings rate"
          weight: 0.15
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "easa", endpoint: "safa/findings"}
            - {type: "api", provider: "faa", endpoint: "iasa/inspections"}
          score_range: [0, 100]
          scoring_logic: {below_avg: 100, at_avg: 75, above_avg: 50, significantly_elevated: 30}
          critical: false
          score_condition: null
          
        - id: "eu_safety_list"
          name: "EU Air Safety List Status"
          description: "Presence on EU banned carrier list"
          weight: 0.15
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "eu_commission", endpoint: "air_safety_list"}
          score_range: [0, 100]
          scoring_logic: {not_listed: 100, previously_removed: 70, restrictions: 25, full_ban: 0}
          critical: true
          score_condition: eu_safety_list_critical
          
        - id: "state_safety_rating"
          name: "State of Registry Safety Rating"
          description: "ICAO USOAP audit results for state"
          weight: 0.10
          ttl: "semi_static"
          ttl_seconds: 2592000
          sources:
            - {type: "api", provider: "icao", endpoint: "usoap/state_ratings"}
          score_range: [0, 100]
          scoring_logic: {above_global_avg: 100, at_avg: 75, below_minor: 55, concerns: 35, serious: 15}
          critical: false
          score_condition: null
  
      operational_quality:
        - id: "otp_score"
          name: "On-Time Performance"
          description: "Departure/arrival punctuality vs benchmarks"
          weight: 0.20
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "oag", endpoint: "performance/otp"}
            - {type: "api", provider: "cirium", endpoint: "performance/punctuality"}
          score_range: [0, 100]
          critical: false
          score_condition: null
          
        - id: "dispatch_reliability"
          name: "Dispatch Reliability"
          description: "Completion rate and technical dispatch"
          weight: 0.20
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "oag", endpoint: "performance/completion"}
            - {type: "api", provider: "cirium", endpoint: "performance/dispatch"}
          score_range: [0, 100]
          scoring_logic: {above_99pct: 100, above_98pct: 85, above_96pct: 70, above_94pct: 55, below_94pct: 35}
          critical: false
          score_condition: null
          
        - id: "crew_experience"
          name: "Crew Experience Indicators"
          description: "Average experience from public hiring data"
          weight: 0.15
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "linkedin", endpoint: "people/search", filters: {title: ["Captain", "First Officer"]}}
            - {type: "scrape", target: "airline_pilot_central"}
          score_range: [0, 100]
          critical: false
          score_condition: null
          
        - id: "training_indicators"
          name: "Training Program Indicators"
          description: "Training investment signals"
          weight: 0.15
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "cae", endpoint: "training/customers"}
            - {type: "api", provider: "flightsafety", endpoint: "clients"}
          score_range: [0, 100]
          critical: false
          score_condition: null
          
        - id: "operational_complexity"
          name: "Operational Complexity"
          description: "Fleet diversity and route network complexity"
          weight: 0.15
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "cirium", endpoint: "fleets/types"}
            - {type: "api", provider: "oag", endpoint: "schedules/routes"}
          score_range: [0, 100]
          scoring_logic: {single_type_simple: 100, few_types: 85, multiple_managed: 70, high_complexity: 50}
          critical: false
          score_condition: null
          
        - id: "growth_rate"
          name: "Fleet/Capacity Growth Rate"
          description: "Year-over-year growth (rapid growth = higher risk)"
          weight: 0.15
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "cirium", endpoint: "fleets/historical"}
            - {type: "api", provider: "oag", endpoint: "capacity/trends"}
