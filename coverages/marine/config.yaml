              - {limit: 50000000, factor: 4.40}
              - {limit: 100000000, factor: 7.80}
              - {limit: 250000000, factor: 16.00}
              - {limit: 500000000, factor: 28.00}
              - {limit: 1000000000, factor: 50.00}
          deductible_credits:
            - {min_pct: 0.001, max_pct: 0.005, credit: 0.03}
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.06}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.10}
            - {min_pct: 0.020, max_pct: null, credit: 0.15}

        # -----------------------------------------------------------------------
        # P&I LIABILITY - Protection & indemnity
        # Steep curve; pollution, cargo, crew claims
        # -----------------------------------------------------------------------
        pi_liability:
          ilf_curve:
