name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, claude/* ]
  pull_request:
    branches: [ main, develop ]

env:
  RUN_VERSION: '3.11'
  PYTHON_VERSIONS: '["3.10","3.11","3.12"]'

jobs:
  setup:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ steps.set-matrix.outputs.python-versions }}
      run-version: ${{ steps.set-matrix.outputs.run-version }}
    steps:
      - id: set-matrix
        run: |
          echo 'python-versions=["3.10","3.11","3.12"]' >> $GITHUB_OUTPUT
          echo 'run-version=3.11' >> $GITHUB_OUTPUT

  lint:
    name: Code Linting
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.setup.outputs.run-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Run Black (code formatting check)
        run: black --check technical_pricing/

      - name: Run isort (import sorting check)
        run: isort --check-only technical_pricing/

      - name: Run Flake8 (linting)
        run: |
          set -o pipefail
          flake8 technical_pricing/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503,E501,F541,F841 \
            --format=default \
            > flake8-report.txt || true

      - name: Upload flake8 report
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: flake8-report.txt

      - name: Run MyPy (type checking)
        run: |
          set -o pipefail
          mypy technical_pricing/ \
          --ignore-missing-imports \
          > mypy-report.txt
        continue-on-error: true

      - name: Upload MyPy report
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy-report.txt

  test:
    name: Run Tests
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.setup.outputs.python-versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with pytest
        if: matrix.python-version == needs.setup.outputs.run-version
        run: |
          pytest technical_pricing/tests/ \
          --cov=technical_pricing/ \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          -v \
          --junitxml=pytest-report-${{ matrix.python-version }}.xml

      - name: Upload pytest report
        if: always() && matrix.python-version == needs.setup.outputs.run-version
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: pytest-report-${{ matrix.python-version }}.xml
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: matrix.python-version == needs.setup.outputs.run-version
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        if: matrix.python-version == needs.setup.outputs.run-version
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
          if-no-files-found: ignore

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [setup, lint, test]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "=== Job Results ==="
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"

      - name: Download pytest reports
        if: needs.test.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: pytest-report-${{ needs.setup.outputs.run-version }}
          path: reports

      - name: Summarise failing tests
        if: ${{ needs.test.result == 'failure' }}
        run: |
          echo "=== Detailed Test Failures ==="
          python - << 'EOF'
          import glob
          import os
          import xml.etree.ElementTree as ET

          reports_dir = "reports"
          xml_files = sorted(glob.glob(os.path.join(reports_dir, "pytest-report-*.xml")))

          if not xml_files:
              print("No JUnit XML files found. Skipping summary.")
              raise SystemExit(0)

          failures_out = []
          for xml_path in xml_files:
              py_ver = os.path.basename(xml_path).replace("pytest-report-", "").replace(".xml", "")
              try:
                  tree = ET.parse(xml_path)
                  root = tree.getroot()
              except Exception as e:
                  failures_out.append(f"\n---\n[{py_ver}] Failed to parse {xml_path}: {e}")
                  continue

              for testcase in root.findall('.//testcase'):
                  for failure in testcase.findall('failure'):
                      name = testcase.attrib.get('name')
                      classname = testcase.attrib.get('classname')
                      message = (failure.attrib.get('message') or '').strip()
                      details = (failure.text or '').strip()
                      formatted = (
                          f"\n---\n"
                          f"[Python {py_ver}] Test: {classname}.{name}\n"
                          f"Message: {message}\n"
                          f"Details:\n{details}\n"
                      )
                      failures_out.append(formatted)

          if failures_out:
              print("\n".join(failures_out))
          else:
              print("No test failures")
          EOF

      - name: Report success
        if: ${{ needs.lint.result == 'success' && needs.test.result == 'success'}}
        run: echo "All checks passed!"

      - name: Report failure
        if: ${{ needs.lint.result == 'failure' || needs.test.result == 'failure'  }}
        run: |
          echo "Some checks failed!"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
