              min: 0
              max: 20
            application:
              method: MODIFIER
              applied: 0.85
        - id: 2
          label: MODERATE
          description: Moderate operational complexity
          interpretation:
            bands:
              min: 21
              max: 40
            application:
              method: MODIFIER
              applied: 0.95
        - id: 3
          label: COMPLEX
          description: Complex operational complexity
