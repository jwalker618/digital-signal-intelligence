          risk:
            weight: 0.25
            score_condition: false
          loss:
            weight: 0.5
            correlation_type: both
            correlation_direction: negative
            normalizer: categorical_map
  
    # ---------------------------------------------------------------------------
    # TIER THRESHOLDS
    # ---------------------------------------------------------------------------
    # Score ranges for each tier (scores are 0-1000)

    tier_thresholds:
      tiers:
        - id: 1
          label: "PREFERRED"
          min_score: 800
          max_score: 1000
          description: "Excellent risk - automatic approval, preferred pricing"
          auto_approve: true
          auto_decline: false
          premium_generation_method: "base"
          premium: 8000
        - id: 2        
          label: "STANDARD_PLUS"
          min_score: 650
          max_score: 799
          description: "Good risk - automatic approval, standard pricing"
          auto_approve: true
          auto_decline: false
          premium_generation_method: "base"
          premium: 12000
        - id: 3        
          label: "STANDARD"
          min_score: 500
          max_score: 649
          description: "Average risk - may require referral"
          auto_approve: false
          auto_decline: false
          premium_generation_method: "base"
          premium: 18000
        - id: 4        
          label: "SUBSTANDARD"
          min_score: 350
          max_score: 499
          description: "Elevated risk - requires senior review"
          auto_approve: false
          auto_decline: false
          premium_generation_method: "base"
          premium: 30000
        - id: 5        
          label: "DECLINE"
          min_score: 0
          max_score: 349
          description: "Unacceptable risk - decline"
          auto_approve: false
          auto_decline: true
          premium_generation_method: "base"
          premium: 50000

    # -------------------------------------------------------------------------
    # LIMIT BANDINGS
    # -------------------------------------------------------------------------
    limit_bandings:
      - id: 1
        limit: 1000000
        deductible: 25000
      - id: 2
        limit: 5000000
        deductible: 50000
      - id: 3
        limit: 10000000
        deductible: 100000
      - id: 4
        limit: 25000000
        deductible: 250000
      - id: 5
        limit: 50000000
        deductible: 500000

    # ---------------------------------------------------------------------------
    # LOSS PROPENSITY
    # ---------------------------------------------------------------------------
    propensity_band:
      method: fixed_threshold
      bands:
        - name: very_low
          min_score: 0
          max_score: 20
          expected_frequency_multiplier: 0.60
          expected_severity_multiplier: 0.70
          score_condition: true
          confidence_bands:
            - max: 0.8
              override: 1
              action: "FLAG"
              note: "preferred_risk_credit"
          inclusive_max: false
        - name: low
          min_score: 20
          max_score: 40
          expected_frequency_multiplier: 0.85
          expected_severity_multiplier: 0.90
          score_condition: false
        - name: moderate
          min_score: 40
          max_score: 60
          expected_frequency_multiplier: 1.00
          expected_severity_multiplier: 1.00
          score_condition: false
        - name: elevated
          min_score: 60
          max_score: 80
          expected_frequency_multiplier: 1.25
          expected_severity_multiplier: 1.15
          score_condition: false
        - name: high
          min_score: 80
          max_score: 100
          expected_frequency_multiplier: 1.60
          expected_severity_multiplier: 1.40
          score_condition: true
          confidence_bands:
            - max: 0.8
              override: 4
              action: "REFER"
              note: "High loss propensity with high confidence"
          inclusive_max: false

    # ---------------------------------------------------------------------------
    # EXPOSURE MAPPINGS
    # ---------------------------------------------------------------------------
    exposure_band:
      method: fixed_threshold
      bands:
        - name: micro
          min_score: 0
          max_score: 20
          implied_tiv_low: 0
          implied_tiv_high: 1000000
          exposure_modifier: 0.50
          label: "Micro ($0 - $1M)"
        - name: small
          min_score: 20
          max_score: 40
          implied_tiv_low: 1000000
          implied_tiv_high: 10000000
          exposure_modifier: 0.75
          label: "Small ($1M - $10M)"
        - name: medium
          min_score: 40
          max_score: 60
          implied_tiv_low: 10000000
          implied_tiv_high: 50000000
          exposure_modifier: 1.00
          label: "Medium ($10M - $50M)"
        - name: large
          min_score: 60
          max_score: 80
          implied_tiv_low: 50000000
          implied_tiv_high: 250000000
          exposure_modifier: 1.50
          label: "Large ($50M - $250M)"
        - name: very_large
          min_score: 80
          max_score: 100
          implied_tiv_low: 250000000
          implied_tiv_high: 1000000000
          exposure_modifier: 2.50
          label: "Very Large ($250M+)"

      # Complexity category mapping
    exposure_complexity:
      - name: simple
        min_score: 0
        max_score: 20
        complexity_modifier: 0.85
        label: "Simple"
      - name: moderate
        min_score: 20
        max_score: 40
        complexity_modifier: 0.95
        label: "Moderate"
      - name: complex
        min_score: 40
        max_score: 60
        complexity_modifier: 1.10
        label: "Complex"
      - name: highly_complex
        min_score: 60
        max_score: 80
        complexity_modifier: 1.30
        label: "Highly Complex"
      - name: extremely_complex
        min_score: 80
        max_score: 100
        complexity_modifier: 1.60
        label: "Extremely Complex"

    # ---------------------------------------------------------------------------
    # PRICING PARAMETERS
    # ---------------------------------------------------------------------------
    
    pricing:
      # Loss Integration
      # Calculation: (frequency_multiplier × frequency_weight) + (severity_multiplier × severity_weight)
      # Result constrained by band floor/cap
      # All components stored at atomic level for auditability
      loss_integration:
        method: multiplicative
        frequency_weight: 0.6
        severity_weight: 0.4
        band_constraints:
          very_low:
            floor: 0.55
            cap: 0.75
          low:
            floor: 0.75
            cap: 0.95
          moderate:
            floor: 0.95
            cap: 1.05
          elevated:
            floor: 1.10
            cap: 1.30
          high:
            floor: 1.30
            cap: 1.60

      # Exposure Integration
      # Calculation: (exposure_modifier × exposure_weight) + (complexity_modifier × complexity_weight)
      # Result constrained by band floor/cap
      # All components stored at atomic level for auditability
      exposure_integration:
        method: multiplicative
        exposure_weight: 0.60
        complexity_weight: 0.40
        band_constraints:
          micro:
            floor: 0.40
            cap: 0.60
          small:
            floor: 0.60
            cap: 0.85
          medium:
            floor: 0.90
            cap: 1.10
          large:
            floor: 1.30
            cap: 1.70
          very_large:
            floor: 2.00
            cap: 3.00
    
      # Increased Limit Factors (ILF)
      ilf_curve:
        base_limit: 1000000  # $1M base
        factors:
          - {limit: 1000000, factor: 1.00}
          - {limit: 2000000, factor: 1.70}
          - {limit: 5000000, factor: 3.20}
          - {limit: 10000000, factor: 5.00}
          - {limit: 25000000, factor: 9.00}
          - {limit: 50000000, factor: 14.00}
          - {limit: 100000000, factor: 22.00}
      
      # Deductible credits (as percentage of limit)
      deductible_credits:
        - {min_pct: 0.001, max_pct: 0.005, credit: 0.05}   # 0.1-0.5% of limit
        - {min_pct: 0.005, max_pct: 0.010, credit: 0.10}   # 0.5-1% of limit
        - {min_pct: 0.010, max_pct: 0.020, credit: 0.15}   # 1-2% of limit
        - {min_pct: 0.020, max_pct: null, credit: 0.20}    # >2% of limit
        
      taxes_fees_rate: 0.05

    # -------------------------------------------------------------------------
    # EXPOSURE SHADOW LAYER CONFIGURATION 
    # -------------------------------------------------------------------------
    # Exposure magnitude and complexity scoring from observable signals.
    # Enables TIV estimation without client-provided data.

    exposure_shadow:
      exposure_groups:
        - name: digital_footprint
          weight: 0.30
          confidence_threshold: 0.6
          description: "Observable digital presence indicators"
          features:
            - id: dns_complexity
              weight: 0.25
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Number and structure of DNS records"
            - id: subdomain_count
              weight: 0.20
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Count of active subdomains"
            - id: ip_footprint
              weight: 0.20
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Size of IP address footprint"
            - id: ssl_certificates
              weight: 0.20
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Number of active SSL certificates"
            - id: cloud_infrastructure
              weight: 0.15
              proxy_tier: INFERRED_PROXY
              normalizer: percentile
              description: "Estimated cloud infrastructure scale"

        - name: corporate_indicators
          weight: 0.25
          confidence_threshold: 0.7
          description: "Observable corporate size indicators"
          features:
            - id: employee_estimate
              weight: 0.35
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Estimated employee count from signals"
            - id: location_count
              weight: 0.25
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Number of office/operational locations"
            - id: job_postings
              weight: 0.20
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Active job posting volume"
            - id: funding_signals
              weight: 0.20
              proxy_tier: INFERRED_PROXY
              normalizer: percentile
              description: "Observable funding/investment indicators"

        - name: public_financials
          weight: 0.25
          confidence_threshold: 0.8
          description: "Direct financial observables (when available)"
          features:
            - id: market_cap
              weight: 0.40
              proxy_tier: DIRECT_OBSERVABLE
              normalizer: log_scale
              description: "Public market capitalization"
            - id: revenue_estimate
              weight: 0.35
              proxy_tier: DIRECT_OBSERVABLE
              normalizer: log_scale
              description: "Revenue from filings or estimates"
            - id: asset_value
              weight: 0.25
              proxy_tier: DIRECT_OBSERVABLE
              normalizer: log_scale
              description: "Total assets from financials"

        - name: industry_context
          weight: 0.20
          confidence_threshold: 0.5
          description: "Industry and sector-based priors"
          features:
            - id: industry_avg_tiv
              weight: 0.50
              proxy_tier: COHORT_INFERENCE
              normalizer: percentile
              description: "Industry average TIV benchmark"
            - id: peer_group_tiv
              weight: 0.50
              proxy_tier: COHORT_INFERENCE
              normalizer: percentile
              description: "Similar peer group TIV estimate"

      # Complexity signal groups (operational complexity proxy)
      complexity_groups:
        - name: geographic_dispersion
          weight: 0.30
          confidence_threshold: 0.6
          description: "Geographic spread of operations"
          features:
            - id: country_count
              weight: 0.35
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Number of countries with presence"
            - id: timezone_spread
              weight: 0.25
              proxy_tier: INFERRED_PROXY
              normalizer: linear
              description: "Timezone coverage span"
            - id: geo_ip_diversity
              weight: 0.25
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Geographic IP distribution"
            - id: regional_domains
              weight: 0.15
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Regional domain count (ccTLDs)"

        - name: structural_complexity
          weight: 0.25
          confidence_threshold: 0.7
          description: "Organizational structure complexity"
          features:
            - id: subsidiary_count
              weight: 0.40
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Number of subsidiaries/entities"
            - id: brand_count
              weight: 0.30
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Number of distinct brands"
            - id: acquisition_activity
              weight: 0.30
              proxy_tier: INFERRED_PROXY
              normalizer: linear
              description: "Recent M&A activity level"

        - name: technical_heterogeneity
          weight: 0.25
          confidence_threshold: 0.6
          description: "Technology stack diversity"
          features:
            - id: tech_stack_diversity
              weight: 0.35
              proxy_tier: INFERRED_PROXY
              normalizer: linear
              description: "Variety of detected technologies"
            - id: cloud_multi
              weight: 0.30
              proxy_tier: INFERRED_PROXY
              normalizer: binary
              description: "Multi-cloud indicator"
            - id: legacy_indicators
              weight: 0.35
              proxy_tier: INFERRED_PROXY
              normalizer: linear
              description: "Legacy technology presence"

        - name: regulatory_jurisdictions
          weight: 0.20
          confidence_threshold: 0.7
          description: "Regulatory jurisdiction complexity"
          features:
            - id: regulatory_count
              weight: 0.50
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Number of regulatory jurisdictions"
            - id: compliance_frameworks
              weight: 0.50
              proxy_tier: INFERRED_PROXY
              normalizer: log_scale
              description: "Number of compliance frameworks"

      # Cohort priors for fallback estimation
      cohort_priors:
        - cohort_id: tech_startup
          name: "Technology Startup"
          sector: technology
          size_indicator: startup
          prior_band: small
          prior_score: 30.0
          confidence: 0.4
        - cohort_id: tech_enterprise
          name: "Technology Enterprise"
          sector: technology
          size_indicator: enterprise
          prior_band: large
          prior_score: 70.0
          confidence: 0.5
        - cohort_id: healthcare_mid
          name: "Healthcare Mid-Market"
          sector: healthcare
          size_indicator: midmarket
          prior_band: medium
          prior_score: 50.0
          confidence: 0.45
        - cohort_id: financial_large
          name: "Financial Services Large"
          sector: financial_services
          size_indicator: large
          prior_band: very_large
          prior_score: 85.0
          confidence: 0.55
        - cohort_id: retail_smb
          name: "Retail SMB"
          sector: retail
          size_indicator: smb
          prior_band: small
          prior_score: 25.0
          confidence: 0.4

      # Auto-apply rules for exposure decisions
      auto_apply_rules:
        - condition: "exposure_band == 'very_large' and confidence < 0.5"
          action: refer
          reason: "Very large exposure with low confidence - verify manually"

        - condition: "exposure_band in ['large', 'very_large'] and proxy_tier == 'COHORT_INFERENCE'"
          action: refer
          reason: "Large exposure based on cohort inference - direct data needed"

        - condition: "complexity_category == 'extremely_complex'"
          action: flag
          reason: "Extremely complex structure - consider enhanced underwriting"

        - condition: "exposure_band == 'micro' and confidence >= 0.7"
          action: apply_modifier
          modifier: "micro_exposure_credit"

