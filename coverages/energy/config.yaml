          deductible_factors: [{deductible: 25000, factor: 1.25}, {deductible: 50000, factor: 1.1}, {deductible: 100000, factor: 1.0}, {deductible: 250000, factor: 0.9}, {deductible: 500000, factor: 0.82}, {deductible: 1000000, factor: 0.72}, {deductible: 2500000, factor: 0.62}]
        third_party_liability:
          ilf_curve: {base_limit: 10000000, factors: [{limit: 1000000, factor: 0.25}, {limit: 2500000, factor: 0.45}, {limit: 5000000, factor: 0.7}, {limit: 10000000, factor: 1.0}, {limit: 25000000, factor: 1.8}, {limit: 50000000, factor: 3.2}, {limit: 100000000, factor: 5.5}, {limit: 250000000, factor: 11.5}, {limit: 500000000, factor: 20.0}, {limit: 1000000000, factor: 35.0}]}
          deductible_factors: [{deductible: 25000, factor: 1.25}, {deductible: 50000, factor: 1.1}, {deductible: 100000, factor: 1.0}, {deductible: 250000, factor: 0.9}, {deductible: 500000, factor: 0.82}, {deductible: 1000000, factor: 0.72}, {deductible: 2500000, factor: 0.62}]
        pollution_liability:
          ilf_curve: {base_limit: 10000000, factors: [{limit: 1000000, factor: 0.25}, {limit: 2500000, factor: 0.45}, {limit: 5000000, factor: 0.7}, {limit: 10000000, factor: 1.0}, {limit: 25000000, factor: 2.0}, {limit: 50000000, factor: 3.6}, {limit: 100000000, factor: 6.2}, {limit: 250000000, factor: 13.0}, {limit: 500000000, factor: 22.5}, {limit: 1000000000, factor: 39.0}]}
          deductible_factors: [{deductible: 25000, factor: 1.25}, {deductible: 50000, factor: 1.1}, {deductible: 100000, factor: 1.0}, {deductible: 250000, factor: 0.9}, {deductible: 500000, factor: 0.82}, {deductible: 1000000, factor: 0.72}, {deductible: 2500000, factor: 0.62}]
