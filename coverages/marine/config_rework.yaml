# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# STRUCTURAL PRINCIPLES (per master_config_layout.yaml):
# 1. Signals defined once in signal_registry with group_id reference
# 2. source: score (default) uses 0-100 inference return
# 3. source: metadata.field uses inference metadata with bands/categories
# 4. Categorical groups apply modifiers (applied:), not scores
# 5. score_conditions (plural, banded) apply actions based on score thresholds
#    Actions: FLAG | MODIFIER | REFER
# 6. proxy_tier at signal level (DIRECT_OBSERVABLE | INFERRED_PROXY | COHORT_INFERENCE)
# 7. Normalisation handled by inference functions, not config
#
# AUGMENTED BY:
# - analysis_outputs/cyber_v{date}.yaml - empirically-derived parameters
# - schemas/organisational_graph.yaml - graph structure (coverage-agnostic)
#
# =============================================================================

marine:
  marine_general:
    metadata:
      name: "DSI Marine Technical Pricing Model"
      description: "Marine hull and liability coverage based on observable operator behavior, safety records, and fleet patterns"
      version: "2.1.0"
      product_types:
        - "hull_machinery"
        - "total_loss"
        - "increased_value"
        - "loss_of_hire"
        - "war_risks"
        - "pi_liability"
        - "cargo"
      applicable_markets: ["global"]
      minimum_viable_input: ["client name (domain optional)","Limit in USD","TIV"]
      min_premium: 50000
      default_currency: "USD"

    # =========================================================================
    # DIRECT QUERIES
    # Binary questions that cannot be externally observed (max 10)
    # Actions: FLAG | MODIFIER | REFER
    # =========================================================================
    direct_queries:
      
      - id: "psc_detentions"
        question: "Any vessels detained by port state control in past 36 months?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "PSC detentions in past 36 months"}
      
      - id: "total_losses"
        question: "Any total losses or major casualties in past 5 years?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Total losses in past 5 years"}
      
      - id: "third_party_manager"
        question: "Is the fleet managed by a third-party technical manager?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Third-party technical management"}
      
      - id: "sanctioned_trade"
        question: "Any vessels currently trading to sanctioned regions?"
        query_condition:
          - {return: true, action: "REFER", override: 5, applied: null, note: "Trading to sanctioned regions - coverage not available"}

    # =========================================================================
    # SIGNAL REGISTRY
    # All signals defined once with group_id reference
    # proxy_tier at signal level; normalisation in inference functions
    # =========================================================================
    signal_registry:

      # -----------------------------------------------------------------------
      # CATEGORICAL SIGNALS
      # Return discrete categories that apply as pricing modifiers
      # -----------------------------------------------------------------------
      - id: operator_type
        inference_utility_function: operator_classification_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: operator_type
          features:
            - {cat: "MAJOR_LINER", label: "Major Liner Operator", applied: 0.80}
            - {cat: "MAJOR_TANKER", label: "Major Tanker Operator", applied: 0.90}
            - {cat: "MAJOR_BULK", label: "Major Bulk Operator", applied: 0.95}
            - {cat: "REGIONAL_OPERATOR", label: "Regional Fleet Operator", applied: 1.00}
            - {cat: "INDEPENDENT", label: "Independent Operator", applied: 1.25}
            - {cat: "STATE_OWNED", label: "State-Owned Operator", applied: 1.10}
            - {cat: "UNKNOWN", label: "Unknown Operator", applied: 1.50}

      - id: vessel_category
        inference_utility_function: primaryvessel_category_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: vessel_category
          features:
            - {cat: "CONTAINER", label: "Container", applied: 0.90}
            - {cat: "TANKER", label: "Tanker", applied: 1.10}
            - {cat: "DRY_BULK", label: "Dry Bulk", applied: 1.00}
            - {cat: "LNG_LPG", label: "LNG/LPG Carrier", applied: 0.85}
            - {cat: "OFFSHORE", label: "Offshore", applied: 1.30}
            - {cat: "PASSENGER", label: "Passenger", applied: 1.25}
            - {cat: "GENERAL_CARGO", label: "General Cargo", applied: 1.10}
            - {cat: "MIXED", label: "Mixed Fleet", applied: 1.05}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: trading_pattern
        inference_utility_function: trading_pattern_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: trading_pattern
          features:
            - {cat: "LINER_REGULAR", label: "Liner/Regular Service", applied: 0.85}
            - {cat: "SPOT_TRAMP", label: "Spot/Tramp Trading", applied: 1.15}
            - {cat: "INDUSTRIAL", label: "Industrial Shipping", applied: 0.90}
            - {cat: "MIXED", label: "Mixed Trading", applied: 1.00}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: flag_state_quality
        inference_utility_function: flagstate_quality_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: flag_state_quality
          features:
            - {cat: "WHITE_LIST", label: "Paris MoU White List", applied: 0.95}
            - {cat: "GREY_LIST", label: "Paris MoU Grey List", applied: 1.10}
            - {cat: "BLACK_LIST", label: "Paris MoU Black List", applied: 1.40}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: fleet_age_band
        inference_utility_function: fleet_age_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: fleet_age_band
          features:
            - {cat: "AGE_0_5", label: "0-5 Years", applied: 0.85}
            - {cat: "AGE_5_10", label: "5-10 Years", applied: 0.95}
            - {cat: "AGE_10_15", label: "10-15 Years", applied: 1.05}
            - {cat: "AGE_15_20", label: "15-20 Years", applied: 1.20}
            - {cat: "AGE_20_25", label: "20-25 Years", applied: 1.40}
            - {cat: "AGE_25_PLUS", label: "25+ Years", applied: 1.60}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

    # -------------------------------------------------------------------------
    # SIGNAL FEATURES
    # Each is a underlying feature for the previously defined groups
    # Each group contributes to the group score
    # Weights must add to 1
    # -------------------------------------------------------------------------

    signal_features:
      network_authority:
        - id: "classification_society"
          name: "Classification Society Quality"
          description: "IACS member vs non-IACS classification"
          weight: 0.15
          inference_utility_function: classification_society_basefunction

        - id: "pi_club"
          name: "P&I Club Membership"
          description: "International Group club vs fixed premium"
          weight: 0.15
          inference_utility_function: pi_club_basefunction

        - id: "charterer_quality"
          name: "Charterer Relationships"
          description: "Quality of major charterers (oil majors, commodity traders)"
          weight: 0.15
          inference_utility_function: charterer_quality_basefunction

        - id: "banking_relationship"
          name: "Ship Finance Relationships"
          description: "Quality of ship finance banks"
          weight: 0.10
          inference_utility_function: banking_relationship_basefunction

        - id: "flag_state"
          name: "Flag State Quality"
          description: "Paris MoU white/grey/black list status"
          weight: 0.15
          inference_utility_function: flag_state_basefunction

        - id: "industry_association"
          name: "Industry Association Membership"
          description: "BIMCO, Intertanko, Intercargo membership"
          weight: 0.10
          inference_utility_function: industry_association_basefunction

        - id: "technical_manager"
          name: "Technical Manager Quality"
          description: "Quality of third-party technical manager if applicable"
          weight: 0.10
          inference_utility_function: technical_manager_basefunction

        - id: "port_relationship"
          name: "Port Relationships"
          description: "Relationships with major ports and terminals"
          weight: 0.00
          inference_utility_function: port_relationship_basefunction

        - id: "port_state_control"
          name: "Port State Control Analysis"
          description: "Port state control deficiency tracking and analysis"
          weight: 0.05
          inference_utility_function: port_state_control_basefunction

        - id: "classification_society_quality"
          name: "Classification Society Quality Assessment"
          description: "Classification society quality and standards assessment"
          weight: 0.05
          inference_utility_function: classification_society_quality_basefunction

      operational_telemetry:
        - id: "ais_compliance"
          name: "AIS Transmission Compliance"
          description: "Consistency of AIS transmission across fleet"
          weight: 0.25
          inference_utility_function: ais_compliance_basefunction
          score_conditions:
            - threshold: 40
              comparison: "<="
              action: "REFER"
              override: 4
              note: "AIS compliance concerns"

        - id: "dark_activity"
          name: "Dark Activity Patterns"
          description: "AIS gaps in suspicious locations or patterns"
          weight: 0.25
          inference_utility_function: dark_activity_basefunction
          score_conditions:
            - threshold: 25
              comparison: "<="
              action: "REFER"
              override: 5
              note: "High-risk dark activity"
            - threshold: 45
              comparison: "<="
              action: "REFER"
              override: 4
              note: "Concerning dark activity patterns"

        - id: "route_risk"
          name: "Trading Route Risk Profile"
          description: "Exposure to high-risk areas (piracy, war zones)"
          weight: 0.20
          inference_utility_function: route_risk_basefunction

        - id: "psc_region_exposure"
          name: "PSC Region Exposure"
          description: "Trading pattern by PSC regime quality"
          weight: 0.10
          inference_utility_function: psc_regions_basefunction

        - id: "operational_efficiency"
          name: "Operational Efficiency"
          description: "Speed/fuel efficiency patterns indicating discipline"
          weight: 0.10
          inference_utility_function: operational_efficiency_basefunction

        - id: "weather_routing"
          name: "Weather Routing Behavior"
          description: "Evidence of weather routing and risk management"
          weight: 0.10
          inference_utility_function: weather_routing_basefunction

      safety_compliance:
        - id: "psc_detention"
          name: "PSC Detention Rate"
          description: "Port state control detention history"
          weight: 0.25
          inference_utility_function: psc_detention_basefunction
          score_conditions:
            - threshold: 30
              comparison: "<="
              action: "REFER"
              override: 4
              note: "Elevated PSC detention rate"

        - id: "psc_deficiency"
          name: "PSC Deficiency Rate"
          description: "Average deficiencies per inspection vs benchmark"
          weight: 0.20
          inference_utility_function: psc_deficiency_basefunction

        - id: "class_status"
          name: "Classification Status"
          description: "Class status, conditions, recommendations outstanding"
          weight: 0.20
          inference_utility_function: class_status_basefunction
          score_conditions:
            - threshold: 25
              comparison: "<="
              action: "REFER"
              override: 5
              note: "Class suspended/withdrawn"
            - threshold: 50
              comparison: "<="
              action: "REFER"
              override: 4
              note: "Class status concerns"

        - id: "ism_compliance"
          name: "ISM/ISPS Compliance"
          description: "Document of Compliance and safety management status"
          weight: 0.15
          inference_utility_function: ism_compliance_basefunction
          score_conditions:
            - threshold: 30
              comparison: "<="
              action: "REFER"
              override: 5
              note: "ISM compliance failure"
            - threshold: 50
              comparison: "<="
              action: "REFER"
              override: 4
              note: "ISM concerns"

        - id: "casualty_history"
          name: "Casualty/Incident History"
          description: "Fleet casualty and incident history"
          weight: 0.10
          inference_utility_function: casualty_history_basefunction
          score_conditions:
            - threshold: 30
              comparison: "<="
              action: "REFER"
              override: 4
              note: "Serious casualty history"

        - id: "total_loss"
          name: "Total Loss History"
          description: "Total loss history (CTL or ATL)"
          weight: 0.10
          inference_utility_function: totalloss_history_basefunction
          score_conditions:
            - threshold: 40
              comparison: "<="
              action: "REFER"
              override: 4
              note: "Total loss history"

      fleet_profile:
        - id: "fleet_age"
          name: "Fleet Age Profile"
          description: "Weighted average fleet age"
          weight: 0.30
          inference_utility_function: fleet_age_basefunction

        - id: "fleet_stability"
          name: "Fleet Size and Stability"
          description: "Fleet size changes and stability indicators"
          weight: 0.20
          inference_utility_function: fleet_stability_basefunction

        - id: "vessel_quality"
          name: "Vessel Quality Indicators"
          description: "Class notations, equipment quality"
          weight: 0.20
          inference_utility_function: vessel_quality_basefunction

        - id: "crew_certification"
          name: "Crew Certification Quality"
          description: "Crew nationality and certification patterns"
          weight: 0.15
          inference_utility_function: crew_certification_basefunction

        - id: "management_consistency"
          name: "Management Consistency"
          description: "Stability of technical management"
          weight: 0.15
          inference_utility_function: management_consistency_basefunction

      sanctions_compliance:
        - id: "sanctions_status"
          name: "Direct Sanctions Status"
          description: "OFAC, EU, UN sanctions list status"
          weight: 0.30
          inference_utility_function: sanctions_status_basefunction
          score_conditions:
            - threshold: 20
              comparison: "<="
              action: "REFER"
              override: 5
              note: "Sanctions listed - coverage not available"

        - id: "ownership_transparency"
          name: "Beneficial Ownership Transparency"
          description: "Clarity of beneficial ownership structure"
          weight: 0.20
          inference_utility_function: ownership_transparency_basefunction
          score_conditions:
            - threshold: 30
              comparison: "<="
              action: "REFER"
              override: 4
              note: "Ownership transparency concerns"

        - id: "jurisdiction_risk"
          name: "High-Risk Jurisdiction Exposure"
          description: "Exposure to sanctioned or high-risk jurisdictions"
          weight: 0.20
          inference_utility_function: jurisdiction_risk_basefunction
          score_conditions:
            - threshold: 25
              comparison: "<="
              action: "REFER"
              override: 5
              note: "Sanctioned jurisdiction exposure"
            - threshold: 45
              comparison: "<="
              action: "REFER"
              override: 4
              note: "High-risk jurisdiction exposure"

        - id: "sts_pattern"
          name: "STS Transfer Patterns"
          description: "Ship-to-ship transfer activity analysis"
          weight: 0.15
          inference_utility_function: sts_pattern_basefunction
          score_conditions:
            - threshold: 25
              comparison: "<="
              action: "REFER"
              override: 5
              note: "High-risk STS activity"
            - threshold: 45
              comparison: "<="
              action: "REFER"
              override: 4
              note: "Suspicious STS patterns"

        - id: "historical_sanctions"
          name: "Historical Sanctions Connections"
          description: "Historical connections to sanctioned entities"
          weight: 0.15
          inference_utility_function: historical_sanctions_basefunction

      environmental:
        - id: "imo2020_compliance"
          name: "IMO 2020 Sulphur Compliance"
          description: "Compliance with 0.5% sulphur cap"
          weight: 0.30
          inference_utility_function: imo_compliance_basefunction

        - id: "bwm_compliance"
          name: "Ballast Water Management Compliance"
          description: "BWM convention compliance status"
          weight: 0.25
          inference_utility_function: bwm_compliance_basefunction

        - id: "cii_rating"
          name: "CII Rating"
          description: "Carbon Intensity Indicator rating"
          weight: 0.25
          inference_utility_function: cii_rating_basefunction

        - id: "environmental_incident"
          name: "Environmental Incidents"
          description: "Pollution incidents and environmental fines"
          weight: 0.20
          inference_utility_function: environmental_incident_basefunction

      corporate_footprint:
        - id: "website_quality"
          name: "Website Quality and Transparency"
          description: "Quality of corporate website and disclosures"
          weight: 0.15
          inference_utility_function: website_quality_basefunction

        - id: "fleet_disclosure"
          name: "Fleet List Disclosure"
          description: "Public fleet list availability"
          weight: 0.20
          inference_utility_function: fleet_list_basefunction

        - id: "sustainability_reporting"
          name: "Sustainability/ESG Reporting"
          description: "Quality of sustainability reporting"
          weight: 0.20
          inference_utility_function: sustainability_reporting_basefunction

        - id: "safety_communication"
          name: "Safety Culture Communication"
          description: "Evidence of safety culture in communications"
          weight: 0.20
          inference_utility_function: safety_culture_basefunction

        - id: "crew_welfare"
          name: "Crew Welfare Visibility"
          description: "Visible commitment to crew welfare"
          weight: 0.10
          inference_utility_function: crew_welfare_basefunction

        - id: "industry_presence"
          name: "Industry Presence"
          description: "Conference attendance, publications, industry engagement"
          weight: 0.15
          inference_utility_function: industry_presence_basefunction

      structured_data:
        - id: "vetting"
          name: "RightShip/Vetting Score"
          description: "Third-party vetting scores"
          weight: 0.50
          inference_utility_function: vetting_basefunction

        - id: "esg_rating"
          name: "ESG Maritime Rating"
          description: "Maritime-specific ESG ratings"
          weight: 0.30
          inference_utility_function: esg_rating_basefunction

        - id: "credit_rating"
          name: "Credit Rating"
          description: "Corporate credit rating if available"
          weight: 0.20
          inference_utility_function: credit_rating_basefunction

    # =========================================================================
    # GROUPS
    # Categorical modifiers and three-layer assessment groupings
    # =========================================================================
    groups:

      # -----------------------------------------------------------------------
      # CATEGORICAL GROUPS
      # Apply pricing modifiers (applied:), not scores
      # -----------------------------------------------------------------------
      categories:
        - id: "operator_type"
          label: "Operator Type"
          description: ""
          impact: "MODIFIER"
          default_cat: "UNKNOWN"

        - id: "vessel_category"
          label: "Vessel Category"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: " trading_pattern"
          label: "Trading Pattern"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "flag_state_quality"
          label: "Flag State Quality"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "fleet_age_band"
          label: "Fleet Age Band"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

      # -----------------------------------------------------------------------
      # THREE-LAYER ASSESSMENT GROUPS
      # Aggregate signals into scoring dimensions
      # Weights within each dimension must sum to 1.0
      # -----------------------------------------------------------------------
      three_layer_assessment:
        - id: "network_authority"
          label: "Network Authority"
          description: "Classification society, P&I Club, charterer relationships"
          risk:
            weight: 0.15
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent network authority - modifier applied"}
  
        - id: "operational_telemetry"
          label: "Operational Telemetry"
          description: "AIS behavior patterns, dark activity, route risk"
          risk:
            weight: 0.20
            score_conditions:
              - {threshold: 30, comparison: "<=", action: "REFER", override: 5, note: "Critical AIS/operational concerns"}
              - {threshold: 45, comparison: "<=", action: "REFER", override: 4, note: "Significant operational concerns"}
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.85, note: "Excellent operational telemetry - modifier applied"}
  
        - id: "safety_compliance"
          label: "Safety Compliance"
          description: "PSC performance, class status, incident history"
          risk:
            weight: 0.25
            score_conditions:
              - {threshold: 30, comparison: "<=", action: "REFER", override: 5, note: "Critical safety compliance issues"}
              - {threshold: 45, comparison: "<=", action: "REFER", override: 4, note: "Significant safety concerns"}
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.85, note: "Excellent safety compliance - modifier applied"}
  
        - id: "fleet_profile"
          label: "Fleet Profile"
          description: "Fleet age, stability, vessel quality, crew certification"
          risk:
            weight: 0.10
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent fleet profile - modifier applied"}
  
        - id: "sanctions_compliance"
          label: "Sanctions Compliance"
          description: "Sanctions status, ownership transparency, STS patterns"
          risk:
            weight: 0.15
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "REFER", override: 5, note: "Sanctions exposure - coverage not available"}
              - {threshold: 40, comparison: "<=", action: "REFER", override: 4, note: "Sanctions concerns require review"}
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.85, note: "Excellent sanctions compliance - modifier applied"}
  
        - id: "environmental"
          label: "Environmental Compliance"
          description: "IMO 2020, ballast water, CII rating, incidents"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90,  note: "Excellent environmental compliance - modifier applied"}
  
        - id: "corporate_footprint"
          label: "Corporate Footprint"
          description: "Transparency, sustainability reporting, safety culture"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent corporate footprint - modifier applied"}
  
        - id: "structured_data"
          label: "Structured Data"
          description: "RightShip vetting, ESG ratings, credit ratings"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 20,  comparison: "<=",  action: "MODIFIER", applied: 0.90,  note: "Excellent structured data - modifier applied"}

     # =========================================================================
    # RISK TIER BANDS
    # Maps composite risk score (0-1000) to pricing tiers
    # =========================================================================
    risk_tier_bands:
      bands:
        - id: 1
          label: "PREFERRED"
          description: "Excellent risk - automatic approval, preferred pricing"
          interpretation:
            bands: {min: 800, max: 1000}
            action: "APPROVE"
            application: {method: "MULTIPLIER", applied: 0.0015, basis: "tiv"}

        - id: 2
          label: "STANDARD_PLUS"
          description: "Good risk - automatic approval, standard pricing"
          interpretation:
            bands: {min: 650, max: 799}
            action: "APPROVE"
            application: {method: "MULTIPLIER", applied: 0.0022, basis: "tiv"}

        - id: 3
          label: "STANDARD"
          description: "Average risk - may require referral"
          interpretation:
            bands: {min: 500, max: 649}
            action: "REFER"
            application: {method: "MULTIPLIER", applied: 0.0032, basis: "tiv"}

        - id: 4
          label: "SUBSTANDARD"
          description: "Elevated risk - requires senior review"
          interpretation:
            bands: {min: 350, max: 499}
            action: "REFER"
            application: {method: "MULTIPLIER", applied: 0.0050, basis: "tiv"}

        - id: 5
          label: "DECLINE"
          description: "Unacceptable risk - decline"
          interpretation:
            bands: {min: 0, max: 349}
            action: "DECLINE"
            application: {method: "MULTIPLIER", applied: 0.0080, basis: "tiv"}

    # =========================================================================
    # LOSS TIER BANDS
    # Maps composite loss score (0-100) to pricing modifiers
    # Calculation: (frequency_score × frequency_weight) + (severity_score × severity_weight)
    # Result maps to band, constrained by floor/cap
    # =========================================================================
    loss_tier_bands:
      bands:
        - id: 1
          label: "VERY_LOW"
          description: "Very low risk of loss"
          interpretation:
            bands: {min: 80, max: 100}
            application:
              frequency_modifier: 0.70
              severity_modifier: 0.80

        - id: 2
          label: "LOW"
          description: "Low risk of loss"
          interpretation:
            bands: {min: 60, max: 79}
            application:
              frequency_modifier: 0.85
              severity_modifier: 0.90

        - id: 3
          label: "MODERATE"
          description: "Moderate risk of loss"
          interpretation:
            bands: {min: 40, max: 59}
            application:
              frequency_modifier: 1.00
              severity_modifier: 1.00

        - id: 4
          label: "ELEVATED"
          description: "Elevated risk of loss"
          interpretation:
            bands: {min: 20, max: 39}
            application:
              frequency_modifier: 1.15
              severity_modifier: 1.15

        - id: 5
          label: "HIGH"
          description: "High risk of loss"
          interpretation:
            bands: {min: 0, max: 19}
            application:
              frequency_modifier: 1.35
              severity_modifier: 1.40
      constraints:
        floor: 0.55
        cap: 1.60

    # =========================================================================
    # EXPOSURE TIER BANDS
    # Maps exposure scores to size and complexity modifiers
    # Calculation: (size_modifier × size_weight) + (complexity_modifier × complexity_weight)
    # =========================================================================
    exposure:
      size:
        weight: 0.60
        bands:
          - id: 1
            label: "MICRO"
            description: "Micro exposure value ($0 - $1M)"
            interpretation:
              bands: {min: 0, max: 20}
              application: {method: "MODIFIER", applied: 0.50, implied_thresholds: {min: 0, max: 1000000}}

          - id: 2
            label: "SMALL"
            description: "Small exposure value ($1M - $10M)"
            interpretation:
              bands: {min: 21, max: 40}
              application: {method: "MODIFIER", applied: 0.75, implied_thresholds: {min: 1000000, max: 10000000}}

          - id: 3
            label: "MEDIUM"
            description: "Medium exposure value ($10M - $50M)"
            interpretation:
              bands: {min: 41, max: 60}
              application: {method: "MODIFIER", applied: 1.00, implied_thresholds: {min: 10000000, max: 50000000}}

          - id: 4
            label: "LARGE"
            description: "Large exposure value ($50M - $250M)"
            interpretation:
              bands: {min: 61, max: 80}
              application: {method: "MODIFIER", applied: 1.50, implied_thresholds: {min: 50000000, max: 250000000}}

          - id: 5
            label: "VERY_LARGE"
            description: "Very large exposure value ($250M+)"
            interpretation:
              bands: {min: 81, max: 100}
              application: {method: "MODIFIER", applied: 2.50, implied_thresholds: {min: 250000000, max: 1000000000}}

      complexity:
        weight: 0.40
        bands:
          - id: 1
            label: "SIMPLE"
            description: "Simple operational complexity"
            interpretation:
              bands: {min: 0, max: 20}
              application: {method: "MODIFIER", applied: 0.85}

          - id: 2
            label: "MODERATE"
            description: "Moderate operational complexity"
            interpretation:
              bands: {min: 21, max: 40}
              application: {method: "MODIFIER", applied: 0.95}

          - id: 3
            label: "COMPLEX"
            description: "Complex operations"
            interpretation:
              bands: {min: 41, max: 60}
              application: {method: "MODIFIER", applied: 1.10}

          - id: 4
            label: "HIGHLY_COMPLEX"
            description: "Highly complex operations"
            interpretation:
              bands: {min: 61, max: 80}
              application: {method: "MODIFIER", applied: 1.30}

          - id: 5
            label: "EXTREMELY_COMPLEX"
            description: "Extremely complex operations"
            interpretation:
              bands: {min: 81, max: 100}
              application: {method: "MODIFIER", applied: 1.60}

    # =========================================================================
    # LIMIT BANDINGS
    # Standard limit/deductible combinations
    # =========================================================================
    limit_bandings:
      - id: 1
        limit: 5000000
        deductible: 250000

      - id: 2
        limit: 10000000
        deductible: 500000

      - id: 3
        limit: 25000000
        deductible: 1000000

      - id: 4
        limit: 50000000
        deductible: 2000000

      - id: 5
        limit: 100000000
        deductible: 5000000

    # =========================================================================
    # PRICING PARAMETERS
    # ILF curves, deductible credits, taxes/fees
    # =========================================================================
    pricing:

      ilf_curve:
        base_limit: 1000000
        factors:
          - {limit: 1000000, factor: 1.00}
          - {limit: 2000000, factor: 1.70}
          - {limit: 5000000, factor: 3.20}
          - {limit: 10000000, factor: 5.00}
          - {limit: 25000000, factor: 9.00}
          - {limit: 50000000, factor: 14.00}
          - {limit: 100000000, factor: 22.00}

      deductible_credits:
        - {min_pct: 0.001, max_pct: 0.005, credit: 0.05}
        - {min_pct: 0.005, max_pct: 0.010, credit: 0.10}
        - {min_pct: 0.010, max_pct: 0.020, credit: 0.15}
        - {min_pct: 0.020, max_pct: null, credit: 0.20}

      taxes_fees_rate: 0.03
