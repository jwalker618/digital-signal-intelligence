  # 2. CASUALTY WORKERS COMPENSATION
  # =========================================================================
  # Workers comp model. Payroll-based pricing. Experience modification
  # factor is the dominant signal. NCCI class code drives base rate.
  # State-specific rating bureau rules apply.
