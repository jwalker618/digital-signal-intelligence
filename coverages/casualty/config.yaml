            bands:
              min: 41
              max: 60
            application:
              method: MODIFIER
              applied: 1.1
        - id: 4
          label: HIGHLY_COMPLEX
          description: Highly complex operational complexity
          interpretation:
            bands:
              min: 61
              max: 80
            application:
              method: MODIFIER
              applied: 1.3
        - id: 5
          label: EXTREMELY_COMPLEX
          description: Extremely complex operational complexity
          interpretation:
            bands:
              min: 81
              max: 100
            application:
              method: MODIFIER
              applied: 1.6
    limit_configuration:
      type: DECOUPLED
      valid_limits:
      - 1000000
      - 2000000
      - 5000000
      - 10000000
      - 25000000
      - 50000000
      - 100000000
      valid_deductibles:
      - 5000
      - 10000
      - 25000
      - 50000
      - 100000
      - 250000
      - 500000
      - 1000000
    pricing:
      base_limit_reference: 1000000
      base_deductible_reference: 10000
      by_product_type:
        general_liability:
          ilf_curve:
            anchor_limit: 1000000
            curve: bounded_exponential
            params:
              max_ilf: 5.0
              k: 0.02
          deductible_factors:
          - deductible: 5000
            factor: 1.15
          - deductible: 10000
            factor: 1.0
          - deductible: 25000
            factor: 0.88
          - deductible: 50000
            factor: 0.78
          - deductible: 100000
            factor: 0.68
          - deductible: 250000
            factor: 0.58
          - deductible: 500000
            factor: 0.5
          - deductible: 1000000
            factor: 0.42
        products_liability:
