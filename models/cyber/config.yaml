# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# This file defines the complete configuration for a coverage type.
# It is the single source of truth for:
#   - Model structure and parameters
#   - Signal definitions and weights
#   - Pricing factors and thresholds
#   - Test profiles for actuarial validation
#
# Version: 2.0.0
# Last Updated: 2025-12
# =============================================================================

cyber:
  identifier: "cyber_general"
    metadata:
      name: "DSI Cyber Technical Pricing Model"
      description: "Cyber model"
      version: "2.0.0"
      coverage_types:
        - "aviation_hull_liability"
        - "aviation_products_liability"
        - "airport_liability"
      applicable_markets: ["us", "uk", "eu", "apac"]
      min_premium: 5000
      default_currency: "USD"

    direct_queries:      # Yes/No questions that cannot be externally observed
      - id: "mfa_enabled"
        question: "Is multi-factor authentication enabled for all remote access??"
        impact: "referral"
        weight: 0.0  
        
      - id: "security_training"
        question: "Do all employees complete annual cyber security training?"
        impact: "referral"
        weight: 0.0
        
      - id: "phi_handler"
        question: "Do you process Protected Health Information (PHI)"
        impact: "referral"
        weight: 0.0
        
      - id: "pci_scope"
        question: "Do you store payment card data (PCI scope)"
        impact: "referral"
        weight: 0.0
        
      - id: "incident_response_plan"
        question: "Do you have a documented incident response plan?"
        impact: "referral"
        weight: 0.0
        
      - id: "edr_deployed"
        question: "Is endpoint detection and response (EDR) deployed on all endpoints?"
        impact: "referral"
        weight: 0.0

      - id: "immutable_backups"
        question: "Are backups maintained offline or immutable?"
        impact: "referral"
        weight: 0.0

       - id: "recent_incident"
        question: "Have you experienced a material cyber incident in the past 3 years?"
        impact: "referral"
        weight: 0.0       
  
    categorical_features: # These define the enum values and their pricing impact
      industry_classification:
        description: "Industry classification derived from public records (SIC / NAICS)"
        values:
          - {id: "TECHNOLOGY", label: "technology", modifier: 1.15, description: ""}
          - {id: "FINANCIAL_SERVICES", label: "financial_services", modifier: 1.40, description: ""}
          - {id: "HEALTHCARE", label: "healthcare", modifier: 1.5, description: ""}
          - {id: "RETAIL", label: "retail", modifier: 1.25, description: ""}
          - {id: "MANUFACTURING", label: "manufacturing", modifier: 0.95, description: ""}
          - {id: "PROFESSIONAL_SERVICES", label: "professional_services", modifier: 1.1, description: ""}
          - {id: "EDUCATION", label: "education", modifier: 1.05, description: ""}
          - {id: "GOVERNMENT", label: "government", modifier: 0.90, description: ""}
          - {id: "ENERGY", label: "energy", modifier: 1.2, description: ""}
          - {id: "OTHER", label: "other", modifier: 1, description: ""}
  
      size_band:
        description: "Size classification inferred from observable signals (Linkedin Employee count, Job posting volume, office locations, public filings, website)"
        values:
          - {id: "SMALL", label: "small", modifier: 0.60, count_range: [0, 500]}
          - {id: "MEDIUM", label: "medium", modifier: 1.00, count_range: [501, 5000]}
          - {id: "LARGE", label: "large", modifier: 2.5, count_range: [5001, 25000]}
          - {id: "ENTERPRISE", label: "enterprise", modifier: 5, count_range: [25001, null]}

  
    # ---------------------------------------------------------------------------
    # SIGNAL GROUPINGS (Categories with Weights)
    # ---------------------------------------------------------------------------
    # Each group contributes to the composite score
    # Weights must sum to 1.0
    
    signal_groups:
      - id: "network_authority"
        name: "Network Authority"
        description: "Industry relationships, alliances, and counterparty quality"
        weight: 0.15
        test_scores:
          excellent: 90
          average: 70
          poor: 40
        critical: false
        
      - id: "technical_infrastructure"
        name: "Technical Infrastructure"
        description: "Observable technical implementation signals"
        weight: 0.35
        test_scores:
          excellent: 95
          average: 70
          poor: 35
        critical: true
        
      - id: "corporate_footprint"
        name: "Corporate Footprint"
        description: "Signals derived from the company's own digital presence"
        weight: 0.15
        test_scores:
          excellent: 95
          average: 72
          poor: 38
        critical: false
        
      - id: "public_record"
        name: "Public Record"
        description: "Signals from regulatory filings and public databases."
        weight: 0.25
        test_scores:
          excellent: 88
          average: 68
          poor: 42
        critical: true
        
      - id: "structured_data"
        name: "Structured Data"
        description: "Third-party ratings and scores used as authority signals."
        weight: 0.10
        test_scores:
          excellent: 88
          average: 65
          poor: 32
        critical: false
  
    # ---------------------------------------------------------------------------
