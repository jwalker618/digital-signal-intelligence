      max_premium_to_limit_ratio: 0.35
      max_premium_to_revenue_ratio: 0.005

  # ===========================================================================
  # ENERGY DOWNSTREAM
  # ===========================================================================
  energy_downstream:
    metadata:
      name: DSI Energy Downstream Pricing Model
      description: Refining and petrochemical operations
      version: 2.2.0
      product_types:
      - property_damage
      - business_interruption
      - third_party_liability
      - pollution_liability
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mena
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: property_damage, business_interruption, third_party_liability, pollution_liability'
        - field: limit
          description: Requested limit in USD
        - field: tiv
          description: Total Insured Value in USD
      min_premium: 100000
      default_currency: USD
      model_specificity: 2
      routing_constraints:
      - field: operation_segment
        operator: in
        value: [DOWNSTREAM_REFINING, DOWNSTREAM_PETROCHEMICAL]
        required_in_input: true

    direct_queries:
    - id: major_incidents
      question: Any major incidents (explosion, fire, major release) in past 5 years?
      query_condition:
      - {return: true, action: REFER, override: 4, applied: null, note: Major incidents disclosed}
    - id: fatalities
      question: Any work-related fatalities in past 3 years?
      query_condition:
      - {return: true, action: REFER, override: 3, applied: null, note: Fatalities disclosed}
    - id: turnaround_deferred
      question: Has any scheduled turnaround/shutdown been deferred >12 months?
      query_condition:
      - {return: true, action: REFER, override: 4, applied: null, note: 'Turnaround deferral - top downstream risk signal'}
    - id: psm_citations
      question: Any OSHA PSM citations (willful or repeat) in past 5 years?
      query_condition:
      - {return: true, action: REFER, override: 5, applied: null, note: PSM citations are severe}
    - id: regulatory_enforcement
      question: Any significant regulatory enforcement actions pending?
      query_condition:
      - {return: true, action: REFER, override: 4, applied: null, note: Pending enforcement}
    - id: single_unit_dependency
      question: Is >60% of throughput dependent on a single process unit?
      query_condition:
      - {return: true, action: FLAG, override: null, applied: null, note: Single point of failure}
    - id: hf_alkylation
      question: Does the refinery operate an HF (hydrofluoric acid) alkylation unit?
      query_condition:
      - {return: true, action: FLAG, override: null, applied: null, note: HF unit exposure flag}

    signal_registry:
    - id: operator_type
      inference_utility_function: operator_type_basefunction
      proxy_tier: INFERRED_PROXY
      categories:
        group_id: operator_type
        source: metadata.operator_type
        features:
        - {cat: SUPERMAJOR, label: Supermajor, applied: 0.80}
        - {cat: MAJOR_INTEGRATED, label: Major Integrated, applied: 0.85}
        - {cat: LARGE_INDEPENDENT, label: Large Independent Refiner, applied: 0.95}
        - {cat: MID_INDEPENDENT, label: Mid-Size Refiner, applied: 1.10}
        - {cat: PETROCHEMICAL, label: Petrochemical Specialist, applied: 1.05}
        - {cat: NATIONAL_OIL, label: National Oil Company, applied: 0.90}
        - {cat: OTHER, label: Unknown, applied: 1.0}
    - id: operation_segment
      inference_utility_function: operation_segment_basefunction
      proxy_tier: INFERRED_PROXY
      categories:
        group_id: operation_segment
        source: metadata.operation_segment
        features:
        - {cat: DOWNSTREAM_REFINING, label: Refining, applied: 1.0}
        - {cat: DOWNSTREAM_PETROCHEMICAL, label: Petrochemical, applied: 1.15}
        - {cat: OTHER, label: Other, applied: 1.1}
    - id: geographic_focus
      inference_utility_function: geographic_focus_basefunction
      proxy_tier: INFERRED_PROXY
      categories:
        group_id: geographic_focus
        source: metadata.geographic_focus
        features:
        - {cat: US_GULF_COAST, label: US Gulf Coast, applied: 1.0}
        - {cat: US_OTHER, label: US Other, applied: 1.05}
        - {cat: EUROPE, label: Europe, applied: 0.95}
        - {cat: ASIA_PACIFIC, label: Asia Pacific, applied: 1.10}
        - {cat: MIDDLE_EAST, label: Middle East, applied: 1.05}
        - {cat: OTHER, label: Other, applied: 1.1}
    # --- Network Authority ---
