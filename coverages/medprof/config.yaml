        label: PREFERRED
        description: Excellent risk - automatic approval, preferred pricing
        interpretation:
          bands:
            min: 800
            max: 1000
          action: APPROVE
          application:
            method: PREMIUM_BASE
            applied: 8000
      - id: 2
        label: STANDARD_PLUS
        description: Good risk - automatic approval, standard pricing
        interpretation:
          bands:
            min: 650
            max: 799
          action: APPROVE
          application:
