    risk_tier_bands:
      bands:
      - id: 1
        label: PREFERRED
        description: Excellent risk - automatic approval, preferred pricing
        interpretation:
          bands:
            min: 800
            max: 1000
          action: APPROVE
          application:
            method: MULTIPLIER
            applied: 0.0012
            basis: revenue
      - id: 2
