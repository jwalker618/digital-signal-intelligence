          loss:
            frequency:
              correlation_direction: positive
              weight: 0.20

      - id: "state_safety_rating"
        inference_utility_function: state_safety_basefunction
        proxy_tier: DIRECT_OBSERVABLE
        three_layer_assessment:
          group_id: regulatory_compliance
          risk:
            correlation_direction: positive
            weight: 0.15

      - id: "crew_experience"
        inference_utility_function: crew_experience_basefunction
        proxy_tier: INFERRED_PROXY
        three_layer_assessment:
          group_id: operational_quality
          risk:
            correlation_direction: positive
            weight: 0.35
          loss:
            frequency:
              correlation_direction: positive
              weight: 0.30
            severity:
              correlation_direction: positive
              weight: 0.20

      - id: "training_indicators"
        inference_utility_function: training_indicators_basefunction
        proxy_tier: INFERRED_PROXY
        three_layer_assessment:
          group_id: operational_quality
          risk:
            correlation_direction: positive
            weight: 0.30
          loss:
            frequency:
              correlation_direction: positive
              weight: 0.25

      - id: "operational_complexity"
        inference_utility_function: operational_complexity_basefunction
        proxy_tier: INFERRED_PROXY
        three_layer_assessment:
          group_id: operational_quality
          risk:
            correlation_direction: negative
            weight: 0.20
          loss:
            frequency:
              correlation_direction: negative
              weight: 0.20

      - id: "growth_rate"
        inference_utility_function: growth_rate_basefunction
        proxy_tier: DIRECT_OBSERVABLE
        three_layer_assessment:
          group_id: operational_quality
          risk:
