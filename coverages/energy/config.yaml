      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: safety_performance
        risk: {correlation_direction: positive, weight: 0.1}
        loss: {frequency: {correlation_direction: positive, weight: 0.1}}
    # --- Environmental Compliance ---
    - id: epa_violation
      inference_utility_function: epa_violation_basefunction
