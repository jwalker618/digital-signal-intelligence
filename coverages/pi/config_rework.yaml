# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# STRUCTURAL PRINCIPLES (per master_config_layout.yaml):
# 1. Signals defined once in signal_registry with group_id reference
# 2. source: score (default) uses 0-100 inference return
# 3. source: metadata.field uses inference metadata with bands/categories
# 4. Categorical groups apply modifiers (applied:), not scores
# 5. score_conditions (plural, banded) apply actions based on score thresholds
#    Actions: FLAG | MODIFIER | REFER
# 6. proxy_tier at signal level (DIRECT_OBSERVABLE | INFERRED_PROXY | COHORT_INFERENCE)
# 7. Normalisation handled by inference functions, not config
#
# AUGMENTED BY:
# - analysis_outputs/cyber_v{date}.yaml - empirically-derived parameters
# - schemas/organisational_graph.yaml - graph structure (coverage-agnostic)
#
# =============================================================================

professional_indemnity:
  pi_general:
    metadata:
      name: "DSI Professional Indemnity Technical Pricing Model"
      description: "PI/E&O coverage based on observable regulatory, practice quality, and stability signals"
      version: "2.1.0"
      product_types:
        - "professional_liability"
        - "errors_omissions"
        - "malpractice"
      applicable_markets: ["us", "uk", "eu", "apac"]
      minimum_viable_input: ["client name (domain optional)","Limit in USD"]
      min_premium: 2500
      default_currency: "USD"

    # =========================================================================
    # DIRECT QUERIES
    # Binary questions that cannot be externally observed (max 10)
    # Actions: FLAG | MODIFIER | REFER
    # =========================================================================
    direct_queries:
      - id: "pending_claims"
        question: "Any pending or threatened malpractice claims?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Pending malpractice claims disclosed"}
      
      - id: "disciplinary_pending"
        question: "Any pending disciplinary proceedings against any professional?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Pending disciplinary proceedings"}
      
      - id: "coverage_declined"
        question: "Has any PI coverage been declined or non-renewed in past 3 years?"
        query_condition:
          - {return: true, action: "REFER", override: 5, applied: null, note: "Prior PI coverage declined/non-renewed"}
      
      - id: "practice_area_change"
        question: "Any significant change in practice areas in past 2 years?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Significant practice area change"}
      
      - id: "merger_activity"
        question: "Any merger, acquisition, or spin-off in past 2 years?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Recent merger/acquisition activity"}

      - id: "major_client_loss"
        question: "Loss of client representing >25% of revenue in past year?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Major client loss (>25% revenue)"}

    # =========================================================================
    # SIGNAL REGISTRY
    # All signals defined once with group_id reference
    # proxy_tier at signal level; normalisation in inference functions
    # =========================================================================
    signal_registry:

      # -----------------------------------------------------------------------
      # CATEGORICAL SIGNALS
      # Return discrete categories that apply as pricing modifiers
      # -----------------------------------------------------------------------
      - id: profession_type
        inference_utility_function: primaryprofessional_classification_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: profession_type
          features:
            - {cat: "LAW_FIRM", label: "Law Firm", value: 8500}
            - {cat: "ACCOUNTING_FIRM", label: "Accounting Firm", value: 9000}
            - {cat: "ARCHITECTURE", label: "Architecture", value: 7500}
            - {cat: "ENGINEERING", label: "Engineering", value: 8000}
            - {cat: "MANAGEMENT_CONSULTING", label: "Management Consulting", value: 6000}
            - {cat: "IT_CONSULTING", label: "IT Consulting", value: 7000}
            - {cat: "HR_CONSULTING", label: "HR Consulting", value: 5500}
            - {cat: "REAL_ESTATE", label: "Real Estate", value: 5500}
            - {cat: "INSURANCE_BROKER", label: "Insurance Broker", value: 6500}
            - {cat: "FINANCIAL_PLANNING", label: "Financial Planning", value: 7500}
            - {cat: "HEALTHCARE_ADMIN", label: "Healthcare Administration", value: 6000}
            - {cat: "APPRAISAL_VALUATION", label: "Appraisal/Valuation", value: 6500}
            - {cat: "ENVIRONMENTAL_CONSULTING", label: "Environmental Consulting", value: 7000}
            - {cat: "OTHER", label: "Other Professional", value: 6000}

      - id: sub_profession_type
        inference_utility_function: notdefined
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: sub_profession_type
          features:
            - {cat: "SECURITIES", label: "Securities Law", applied: 1.40}
            - {cat: "CORPORATE_MA", label: "Corporate M&A", applied: 1.25}
            - {cat: "TRUSTS_ESTATES", label: "Trusts & Estates", applied: 1.20}
            - {cat: "ENVIRONMENTAL", label: "Environmental Law",  applied: 1.20}
            - {cat: "TAX", label: "Tax Law", applied: 1.15}
            - {cat: "BANKRUPTCY", label: "Bankruptcy", applied: 1.15}
            - {cat: "HEALTHCARE", label: "Healthcare Law", applied: 1.15}
            - {cat: "INTELLECTUAL_PROPERTY", label: "Intellectual Property", applied: 1.15}
            - {cat: "LITIGATION_PLAINTIFF", label: "Plaintiff Litigation", applied: 1.15}
            - {cat: "PERSONAL_INJURY_PLAINTIFF", label: "PI Plaintiff", applied: 1.30}
            - {cat: "REAL_ESTATE", label: "Real Estate Law", applied: 1.10}
            - {cat: "EMPLOYMENT", label: "Employment Law", applied: 1.10}
            - {cat: "INSURANCE_COVERAGE", label: "Insurance Coverage", applied: 1.05}
            - {cat: "GENERAL_PRACTICE", label: "General Practice", applied: 1.05}
            - {cat: "LITIGATION_GENERAL", label: "General Litigation", applied: 1.00}
            - {cat: "PERSONAL_INJURY_DEFENSE", label: "PI Defense", applied: 0.95}
            - {cat: "FAMILY", label: "Family Law", applied: 0.90}
            - {cat: "CRIMINAL", label: "Criminal Defense", applied: 0.85}
            - {cat: "AUDIT_PUBLIC", label: "Public Company Audit", applied: 1.50}
            - {cat: "ADVISORY_VALUATION", label: "Valuation Advisory", applied: 1.35}
            - {cat: "ADVISORY_MA", label: "M&A Advisory", applied: 1.30}
            - {cat: "FORENSIC", label: "Forensic Accounting", applied: 1.2}
            - {cat: "AUDIT_PRIVATE", label: "Private Company Audit", applied: 1.25}
            - {cat: "TAX_ESTATE", label: "Estate Tax", applied: 1.20}
            - {cat: "TAX_CORPORATE", label: "Corporate Tax", applied: 1.10}
            - {cat: "GENERAL_PRACTICE", label: "General Practice",  applied: 1.00}
            - {cat: "TAX_INDIVIDUAL", label: "Individual Tax", applied: 0.90}
            - {cat: "BOOKKEEPING", label: "Bookkeeping", applied: 0.80}
            - {cat: "STRUCTURAL", label: "Structural Design", applied: 1.35}
            - {cat: "HEALTHCARE_FACILITIES", label: "Healthcare Facilities", applied: 1.25}
            - {cat: "HIGH_RISE", label: "High-Rise Construction", applied: 1.20}
            - {cat: "COMMERCIAL", label: "Commercial", applied: 1.10}
            - {cat: "INSTITUTIONAL", label: "Institutional", applied: 1.05}
            - {cat: "RESIDENTIAL_MULTI", label: "Multi-Family Residential", applied: 1.00}
            - {cat: "RESIDENTIAL_SINGLE", label: "Single-Family Residential", applied: 0.90}
            - {cat: "INTERIOR_DESIGN", label: "Interior Design", applied: 0.85}
            - {cat: "STRUCTURAL", label: "Structural Engineering", applied: 1.40}
            - {cat: "GEOTECHNICAL", label: "Geotechnical Engineering", applied: 1.35}
            - {cat: "ENVIRONMENTAL", label: "Environmental Engineering", applied: 1.25}
            - {cat: "CIVIL", label: "Civil Engineering", applied: 1.15}
            - {cat: "MECHANICAL", label: "Mechanical Engineering", applied: 1.10}
            - {cat: "ELECTRICAL", label: "Electrical Engineering", applied: 1.05}
            - {cat: "SURVEYING", label: "Surveying", applied: 1.00}
            - {cat: "CONSULTING", label: "Consulting Only", applied: 0.90}

      - id: firm_size
        inference_utility_function: firm_size_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: firm_size
          features:
            - {cat: "SOLO", label: "Solo Practitioner", applied: 1.20}
            - {cat: "MICRO", label: "Micro Firm (2 - 5)", applied: 1.10}
            - {cat: "SMALL", label: "Small Firm (6 - 20)", applied: 1.00}
            - {cat: "MEDIUM", label: "Medium Firm (21 - 100)", applied: 0.95}
            - {cat: "LARGE", label: "Large Firm (101 - 500)", applied: 0.90}
            - {cat: "MAJOR", label: "Major Firm (500+)", applied: 0.85}

      - id: revenue_size
        inference_utility_function: annualrevenue_classification_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: revenue_size
          features:
            - {cat: "UNDER_500K", label: "Under $500K", applied: 0.85}
            - {cat: "R_500K_1M", label: "$500K - $1M", applied: 0.90}
            - {cat: "R_1M_5M", label: "$1M - $5M", applied: 1.00}
            - {cat: "R_5M_25M", label: "$5M - $25M", applied: 1.10}
            - {cat: "R_25M_100M", label: "$25M - $100M", applied: 1.25}
            - {cat: "R_100M_500M", label: "$100M - $500M", applied: 1.40}
            - {cat: "OVER_500M", label: "Over $500M", applied: 1.60}
            
    # -------------------------------------------------------------------------
    # SIGNAL GROUPS
    # Each group is the product of its underlying features
    # Each group contributes to the composite score
    # Weights must add to 1
    # -------------------------------------------------------------------------

    signal_groups:
      - id: "network_authority"
        name: "Network Authority"
        description: "Peer recognition, client quality, professional relationships"
        weight: 0.15  # Default, overridden by profession_weights
        test_scores: {excellent: 85, average: 65, poor: 35}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent network authority - modifier applied"

      - id: "regulatory_standing"
        name: "Regulatory Standing"
        description: "License status, disciplinary history, certifications"
        weight: 0.25
        test_scores: {excellent: 95, average: 75, poor: 35}
        score_conditions:
          - threshold: 30
            comparison: "<="
            override: 5
            action: "REFER"
            note: "Critical regulatory issues"
          - threshold: 45
            comparison: "<="
            override: 4
            action: "REFER"
            note: "Significant regulatory concerns"
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.85
            note: "Excellent regulatory standing - modifier applied"

      - id: "firm_stability"
        name: "Firm Stability"
        description: "Tenure, partner retention, financial health"
        weight: 0.15
        test_scores: {excellent: 88, average: 68, poor: 38}
        score_conditions:
          - threshold: 35
            comparison: "<="
            override: 4
            action: "REFER"
            note: "Firm stability concerns"
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.85
            note: "Excellent firm stability - modifier applied"

      - id: "practice_quality"
        name: "Practice Quality"
        description: "Client reviews, outcomes, complaint history"
        weight: 0.15
        test_scores: {excellent: 90, average: 70, poor: 35}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent practice quality - modifier applied"

      - id: "technical_infrastructure"
        name: "Technical Infrastructure"
        description: "Digital security posture for client confidentiality"
        weight: 0.10
        test_scores: {excellent: 88, average: 65, poor: 40}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent technical infrastructure - modifier applied"

      - id: "corporate_footprint"
        name: "Corporate Footprint"
        description: "Website quality, thought leadership, transparency"
        weight: 0.10
        test_scores: {excellent: 82, average: 60, poor: 35}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent corporate footprint - modifier applied"

      - id: "litigation_history"
        name: "Litigation History"
        description: "Malpractice suits, fee disputes, regulatory enforcement"
        weight: 0.10
        test_scores: {excellent: 95, average: 78, poor: 35}
        score_conditions:
          - threshold: 25
            comparison: "<="
            override: 5
            action: "REFER"
            note: "Severe litigation history"
          - threshold: 40
            comparison: "<="
            override: 4
            action: "REFER"
            note: "Significant litigation concerns"
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.85
            note: "Excellent litigation history - modifier applied"

    # -------------------------------------------------------------------------
