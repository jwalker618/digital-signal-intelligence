          - threshold: 30
            comparison: <=
            action: REFER
            override: 5
            note: Critical deficiencies in regulatory compliance
          - threshold: 45
            comparison: <=
            action: REFER
            override: 4
            note: Significant concerns in regulatory compliance
        loss:
          weight: 0.25
          score_conditions:
          - threshold: 30
            comparison: <=
            action: MODIFIER
            applied: 1.2
            note: Poor regulatory compliance - loss loading
        exposure:
          weight: 0.25
      - id: technical_infrastructure
