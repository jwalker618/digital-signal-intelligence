    # -------------------------------------------------------------------------
    # SIGNAL GROUPS
    # Each group is the product of its underlying features
    # Each group contributes to the composite score
    # Weights must add to 1
    # -------------------------------------------------------------------------
    
    signal_groups:
      - id: "network_authority"
        label: "Network Authority"
        description: "Industry relationships, partnerships, and counterparty quality"
        risk:
          weight: 0.15
          score_condition: false
        loss:
          weight: 0.15
          confidence_threshold: 0.5
        
      - id: "technical_infrastructure"
        label: "Technical Infrastructure"
        description: "Observable technical security implementation"
        risk:
          weight: 0.35
          score_condition: true
          bands:
            - max: 30
              override: 5
              action: "DECLINE"
              note: "Critical technical deficiencies"
            - max: 45
              override: 4
              action: "REFER"
              note: "Significant technical concerns"
          inclusive_max: false
        loss:
          weight: 0.35
          confidence_threshold: 0.7      
        
      - id: "corporate_footprint"
        label: "Corporate Footprint"
        description: "Signals from company's digital presence and security posture"
        risk:
          weight: 0.15
          score_condition: false
        loss:
          weight: 0.25
          confidence_threshold: 0.6
        
      - id: "public_record"
        label: "Public Record"
        description: "Breach history, regulatory actions, and public disclosures"
        risk:
          weight: 0.25
          score_condition: true
          bands:
            - max: 30
              override: 5
              action: "DECLINE"
              note: "Severe breach/regulatory history"
            - max: 45
              override: 4
              action: "REFER"
              note: "Material breach history"
          inclusive_max: false
        loss:
          weight: 0.2
          confidence_threshold: 0.8
     
      - id: "structured_data"
        label: "Structured Data"
        description: "Third-party security ratings and scores"
        risk:
          weight: 0.10
          score_condition: false
        loss:
          weight: 0.2
          confidence_threshold: 0.9

      # Exposure-specific signal groups (no risk/loss contribution)
      - id: "exposure_magnitude"
        label: "Exposure Magnitude"
        description: "Observable signals indicating organizational size and TIV proxy"
        exposure:
          contributes_to: magnitude

      - id: "exposure_complexity"
        label: "Exposure Complexity"
        description: "Observable signals indicating operational and structural complexity"
        exposure:
          contributes_to: complexity

    # -------------------------------------------------------------------------
    # SIGNAL FEATURES
    # Each is a underlying feature for the previously defined groups
    # Each group contributes to the group score
    # Weights must add to 1
    #
    #
    # loss:
    #  weight: 0.00
    ##    How important is this signal?
    #  correlation_type: frequency / severity / both 
    ##    What does the signal predict?
    #  correlation_direction: positive / negative. 
    ##    Positive: higher signal = lower loss propensity 
    ##    Negative: higher signal = higher loss propensity
    #  normalizer: linear / log_scale / percentile / categorical_map
    ##    How do I transform this signal?
    #
    #
    # -------------------------------------------------------------------------
  
