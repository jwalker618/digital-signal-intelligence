# =============================================================================
# NEW SIGNAL GROUPS
# =============================================================================

new_signal_groups:

  # -------------------------------------------------------------------------
  # GROUP 1: TRADE CREDIT RISK
  # -------------------------------------------------------------------------
  - id: trade_credit_risk
    label: Trade Credit Risk
    description: "Buyer creditworthiness, payment behaviour, country risk, concentration, trade terms"
    group_type: three_layer_assessment

    signals:
      - id: buyer_creditworthiness
        name: Buyer Creditworthiness
        description: "Buyer credit rating, financial stability, payment history, industry sector health"
        group_id: trade_credit_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: WEEKLY
        three_layer:
          risk_weight: 0.30
          risk_direction: positive
          loss_frequency_weight: 0.25
          loss_severity_weight: 0.20
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "Buyer credit deterioration"}

      - id: payment_terms_exposure
        name: Payment Terms Exposure
        description: "Average payment terms (days); extended terms increase exposure duration and default probability"
        group_id: trade_credit_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.15
          exposure_size_weight: 0.15

      - id: buyer_concentration
        name: Buyer Concentration
        description: "Top 10 buyer share of insured turnover; single-buyer maximum exposure"
        group_id: trade_credit_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          loss_severity_weight: 0.20
          exposure_size_weight: 0.20
          score_conditions:
            - {min: 0, max: 30, action: FLAG, note: "High buyer concentration"}

      - id: country_risk_exposure
        name: Country Risk Exposure
        description: "Buyer domicile country risk; currency transfer risk; sovereign default proximity"
        group_id: trade_credit_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: WEEKLY
        three_layer:
          risk_weight: 0.20
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.20
          exposure_complexity_weight: 0.15

      - id: trade_dispute_frequency
        name: Trade Dispute Frequency
        description: "Historical frequency of trade disputes, set-offs, quality claims by buyers"
        group_id: trade_credit_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.10

      - id: sector_cyclicality
        name: Sector Cyclicality
        description: "Insured's industry sector vulnerability to economic downturns; commodity price sensitivity"
        group_id: trade_credit_risk
        signal_type: three_layer
        proxy_tier: COHORT_INFERENCE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_frequency_weight: 0.10
          exposure_complexity_weight: 0.10

  # -------------------------------------------------------------------------
  # GROUP 2: POLITICAL RISK
  # -------------------------------------------------------------------------
  - id: political_risk
    label: Political Risk
    description: "Sovereign risk, expropriation, currency inconvertibility, contract frustration, political violence"
    group_type: three_layer_assessment

    signals:
      - id: sovereign_risk_rating
        name: Sovereign Risk Rating
        description: "Country sovereign risk classification; political stability index; governance indicators"
        group_id: political_risk
        signal_type: categorical
        proxy_tier: DIRECT_OBSERVABLE
        ttl: WEEKLY
        category_source: metadata.sovereign_risk_rating
        categories:
          - {cat: LOW, label: Low Risk (OECD Core), applied: 0.60}
          - {cat: MODERATE, label: Moderate (Emerging Market Stable), applied: 1.0}
          - {cat: HIGH, label: High (Frontier/Volatile), applied: 1.50}
          - {cat: SEVERE, label: Severe (Conflict/Failed State), applied: 2.20}

      - id: expropriation_risk
        name: Expropriation & Nationalisation Risk
        description: "History of expropriation; nationalisation trends; creeping expropriation indicators"
        group_id: political_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.25
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.30
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "High expropriation risk jurisdiction"}

      - id: currency_inconvertibility
        name: Currency Inconvertibility & Transfer Risk
        description: "FX controls; capital account restrictions; central bank reserve adequacy"
        group_id: political_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: WEEKLY
        three_layer:
          risk_weight: 0.20
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.15

      - id: contract_frustration
        name: Contract Frustration Risk
        description: "Government contract cancellation; licence revocation; regulatory change risk"
        group_id: political_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.15
          exposure_complexity_weight: 0.10

      - id: political_violence_exposure
        name: Political Violence Exposure
        description: "Civil unrest frequency; terrorism threat level; armed conflict proximity; coup risk"
        group_id: political_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: WEEKLY
        three_layer:
          risk_weight: 0.15
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.20
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "Active political violence zone"}

  # -------------------------------------------------------------------------
  # GROUP 3: SURETY & BOND RISK
  # -------------------------------------------------------------------------
  - id: surety_risk
    label: Surety & Bond Risk
    description: "Principal financial strength, project execution capability, bonding capacity, default history"
    group_type: three_layer_assessment

    signals:
      - id: principal_financial_strength
        name: Principal Financial Strength
        description: "Contractor/principal financial ratios; working capital; debt-to-equity; liquidity"
        group_id: surety_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.30
          risk_direction: positive
          loss_frequency_weight: 0.25
          loss_severity_weight: 0.15

      - id: project_execution_track_record
        name: Project Execution Track Record
        description: "On-time/on-budget delivery history; completed project count; scope creep frequency"
        group_id: surety_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.25
          risk_direction: positive
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.10

      - id: backlog_to_capacity
        name: Backlog-to-Capacity Ratio
        description: "Work-in-progress relative to bonding capacity; over-extension risk"
        group_id: surety_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.15
          exposure_size_weight: 0.15
          score_conditions:
            - {min: 0, max: 30, action: FLAG, note: "Backlog approaching capacity limits"}

      - id: bond_default_history
        name: Bond Default & Claim History
        description: "Prior surety claims; performance bond calls; completion guarantor involvement"
        group_id: surety_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          loss_frequency_weight: 0.25
          loss_severity_weight: 0.20
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "Prior surety bond claim"}

      - id: obligee_complexity
        name: Obligee & Contract Complexity
        description: "Government vs private obligee; contract terms; liquidated damages provisions"
        group_id: surety_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_severity_weight: 0.10
          exposure_complexity_weight: 0.20

  # -------------------------------------------------------------------------
  # GROUP 4: KIDNAP & RANSOM RISK
  # -------------------------------------------------------------------------
  - id: kidnap_ransom_risk
    label: Kidnap & Ransom Risk
    description: "Travel exposure, country threat, executive protection, crisis response capability"
    group_type: three_layer_assessment

    signals:
      - id: travel_exposure_profile
        name: Travel Exposure Profile
        description: "Volume and frequency of employee travel to high-risk jurisdictions"
        group_id: kidnap_ransom_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.25
          loss_frequency_weight: 0.25
          exposure_size_weight: 0.20

      - id: country_threat_level
        name: Country Threat Level
        description: "Destination-specific kidnap/extortion threat; crime index; express kidnap frequency"
        group_id: kidnap_ransom_risk
        signal_type: categorical
        proxy_tier: INFERRED_PROXY
        ttl: WEEKLY
        category_source: metadata.kr_threat_level
        categories:
          - {cat: LOW, label: Low Threat, applied: 0.60}
          - {cat: MODERATE, label: Moderate Threat, applied: 1.0}
          - {cat: HIGH, label: High Threat, applied: 1.50}
          - {cat: EXTREME, label: Extreme Threat, applied: 2.20}

      - id: executive_protection
        name: Executive Protection Measures
        description: "Close protection; secure transportation; safe houses; journey management plans"
        group_id: kidnap_ransom_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.25
          risk_direction: positive
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.15

      - id: crisis_response_capability
        name: Crisis Response Capability
        description: "Retained crisis response consultant; crisis management plan; communication protocols"
        group_id: kidnap_ransom_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          risk_direction: positive
          loss_severity_weight: 0.25

      - id: expatriate_population
        name: Expatriate Population
        description: "Number of expatriate employees; dependency ratio; family members in high-risk locations"
        group_id: kidnap_ransom_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_frequency_weight: 0.15
          exposure_size_weight: 0.15

# =============================================================================
# CONFIGURATIONS
# =============================================================================

configurations:

  # =========================================================================
  # 1. FPR TRADE CREDIT
  # =========================================================================
  - id: fpr_trade_credit
    name: DSI Trade Credit Insurance Model
    description: "Trade credit — buyer default, insolvency, protracted default, political risk on receivables"
    model_specificity: 3
    min_premium: 25000

    product_types:
      - trade_credit

    minimum_viable_input:
      - field: client_name
        description: Client name
      - field: product_type
        description: trade_credit
      - field: limit
        description: Requested limit in USD
      - field: turnover
        description: Annual insured turnover in USD (MULTIPLIER basis)

    routing_constraints:
      - {field: product_type, operator: "==", value: trade_credit, required_in_input: true}
      - {field: turnover, operator: ">=", value: 5000000, required_in_input: true}

    direct_queries:
      - id: prior_bad_debts
        question: Have bad debt write-offs exceeded 2% of turnover in any of the past 3 years?
        conditions: [{action: REFER, override: 4, note: "Elevated bad debt history"}]
      - id: single_buyer_exposure
        question: Does any single buyer represent more than 20% of insured turnover?
        conditions: [{action: FLAG, note: "Single buyer concentration >20%"}]
      - id: emerging_market_exposure
        question: Is more than 40% of insured turnover to buyers in emerging/frontier markets?
        conditions: [{action: FLAG, note: "High emerging market buyer exposure"}]
      - id: extended_terms
        question: Are payment terms exceeding 180 days offered to any buyers?
        conditions: [{action: FLAG, note: "Extended payment terms exposure"}]
      - id: whole_turnover
        question: Is this a whole-turnover policy (all buyers covered) or named-buyer only?
        conditions: [{action: FLAG, note: "Policy structure classification"}]

    category_groups: [sovereign_risk_rating]

    group_weights:
      - {group_id: trade_credit_risk, risk_weight: 0.40, loss_weight: 0.40, exposure_weight: 0.35}
      - {group_id: political_risk, risk_weight: 0.10, loss_weight: 0.10, exposure_weight: 0.15}
      - {group_id: corporate_footprint, risk_weight: 0.20, loss_weight: 0.15, exposure_weight: 0.20}
      - {group_id: firm_stability, risk_weight: 0.15, loss_weight: 0.20, exposure_weight: 0.15}
      - {group_id: regulatory_standing, risk_weight: 0.15, loss_weight: 0.15, exposure_weight: 0.15}

    risk_tier_bands:
      method: MULTIPLIER
      basis: turnover
      preferred_rate: 0.002
      standard_plus_rate: 0.004
      standard_rate: 0.007
      substandard_rate: 0.012
      decline_rate: 0.020

    limit_configuration:
      type: DECOUPLED
      valid_limits: [1000000, 2000000, 5000000, 10000000, 25000000, 50000000, 100000000, 250000000]
      valid_deductibles: [25000, 50000, 100000, 250000, 500000, 1000000, 2500000]

    pricing:
      base_limit_reference: 5000000
      base_deductible_reference: 100000
      taxes_fees_rate: 0.04
      by_product_type:
        - product_type: trade_credit
          ilf_curve:
            base_limit: 5000000
            factors:
              - {limit: 1000000, factor: 0.40}
              - {limit: 2000000, factor: 0.65}
              - {limit: 5000000, factor: 1.0}
              - {limit: 10000000, factor: 1.6}
              - {limit: 25000000, factor: 2.8}
              - {limit: 50000000, factor: 4.5}
              - {limit: 100000000, factor: 7.0}
              - {limit: 250000000, factor: 13.0}
          deductible_factors:
            - {deductible: 25000, factor: 1.15}
            - {deductible: 50000, factor: 1.05}
            - {deductible: 100000, factor: 1.0}
            - {deductible: 250000, factor: 0.88}
            - {deductible: 500000, factor: 0.78}
            - {deductible: 1000000, factor: 0.68}
            - {deductible: 2500000, factor: 0.58}

  # =========================================================================
  # 2. FPR POLITICAL RISK
  # =========================================================================
  - id: fpr_political_risk
    name: DSI Political Risk & Violence Model
    description: "Political risk — expropriation, currency inconvertibility, political violence, contract frustration"
    model_specificity: 3
    min_premium: 25000

    product_types:
      - political_risk
      - political_violence

    routing_constraints:
      - {field: product_type, operator: "IN", value: [political_risk, political_violence], required_in_input: true}

    direct_queries:
      - id: active_conflict
        question: Is the insured asset/investment located in a country with active armed conflict?
        conditions: [{action: REFER, override: 5, note: "Active armed conflict zone"}]
      - id: prior_expropriation
        question: Has the host government expropriated assets in the same sector in the past 10 years?
        conditions: [{action: REFER, override: 4, note: "Sector-specific expropriation history"}]
      - id: bilateral_treaty
        question: Is the investment protected by a bilateral investment treaty (BIT)?
        conditions: [{action: MODIFIER, applied: 0.88, note: "BIT protection credit"}]
      - id: local_partner
        question: Is there a local joint venture partner with government connections?
        conditions: [{action: FLAG, note: "Local partner — may mitigate or amplify risk"}]
      - id: resource_extraction
        question: Is this a natural resource extraction investment (oil, gas, mining)?
        conditions: [{action: FLAG, note: "Resource extraction — elevated nationalisation risk"}]

    category_groups: [sovereign_risk_rating]

    group_weights:
      - {group_id: political_risk, risk_weight: 0.45, loss_weight: 0.45, exposure_weight: 0.40}
      - {group_id: corporate_footprint, risk_weight: 0.20, loss_weight: 0.15, exposure_weight: 0.25}
      - {group_id: firm_stability, risk_weight: 0.15, loss_weight: 0.15, exposure_weight: 0.15}
      - {group_id: regulatory_standing, risk_weight: 0.10, loss_weight: 0.15, exposure_weight: 0.10}
      - {group_id: litigation_history, risk_weight: 0.10, loss_weight: 0.10, exposure_weight: 0.10}

    risk_tier_bands:
      method: MULTIPLIER
      basis: limit
      preferred_rate: 0.005
      standard_plus_rate: 0.012
      standard_rate: 0.022
      substandard_rate: 0.038
      decline_rate: 0.060

    limit_configuration:
      type: DECOUPLED
      valid_limits: [1000000, 2000000, 5000000, 10000000, 25000000, 50000000, 100000000, 250000000]
      valid_deductibles: [50000, 100000, 250000, 500000, 1000000, 2500000]

    pricing:
      base_limit_reference: 5000000
      base_deductible_reference: 100000
      taxes_fees_rate: 0.04
      by_product_type:
        - product_type: political_risk
          ilf_curve:
            base_limit: 5000000
            factors:
              - {limit: 1000000, factor: 0.35}
              - {limit: 2000000, factor: 0.60}
              - {limit: 5000000, factor: 1.0}
              - {limit: 10000000, factor: 1.7}
              - {limit: 25000000, factor: 3.2}
              - {limit: 50000000, factor: 5.5}
