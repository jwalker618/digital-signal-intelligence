          bands:
            min: 0
            max: 19
          application:
            frequency_modifier: 1.35
            severity_modifier: 1.4
      constraints:
        floor: 0.5
        cap: 1.8
    exposure:
      size:
        weight: 0.6
        bands:
        - id: 1
          label: MICRO
          description: Micro exposure value
          interpretation:
            bands:
              min: 0
              max: 20
            application:
              method: MODIFIER
              applied: 0.5
              implied_thresholds:
                min: 0
                max: 2000000
        - id: 2
          label: SMALL
          description: Small exposure value
          interpretation:
            bands:
              min: 21
              max: 40
            application:
              method: MODIFIER
              applied: 0.75
