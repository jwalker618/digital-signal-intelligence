# Aerospace Underwriting Appetite
# Owned by: Underwriting
# Scope: All aerospace configurations (aerospace_general)

appetite:
  max_single_limit: 2_500_000_000   # $2.5B max any one policy

  constraints:
    - field: hull_value
      operator: "<="
      value: 75_000_000_000         # $75B fleet value
      reason: "Fleet value exceeds aerospace underwriting authority"
