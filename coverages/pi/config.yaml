# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# STRUCTURAL PRINCIPLES (per master_config_layout.yaml):
# 1. Signals defined once in signal_registry with group_id reference
# 2. source: score (default) uses 0-100 inference return
# 3. source: metadata.field uses inference metadata with bands/categories
# 4. Categorical groups apply modifiers (applied:), not scores
# 5. score_conditions (plural, banded) apply actions based on score thresholds
#    Actions: FLAG | MODIFIER | REFER
# 6. proxy_tier at signal level (DIRECT_OBSERVABLE | INFERRED_PROXY | COHORT_INFERENCE)
# 7. Normalisation handled by inference functions, not config
#
# AUGMENTED BY:
# - analysis_outputs/cyber_v{date}.yaml - empirically-derived parameters
# - schemas/organisational_graph.yaml - graph structure (coverage-agnostic)
#
# =============================================================================

professional_indemnity:
  pi_general:
    metadata:
      name: "DSI Professional Indemnity Technical Pricing Model"
      description: "PI/E&O coverage based on observable regulatory, practice quality, and stability signals"
      version: "2.1.0"
      product_types:
        - "professional_liability"
        - "errors_omissions"
        - "malpractice"
      applicable_markets: ["us", "uk", "eu", "apac"]
      minimum_viable_input: ["client name (domain optional)","Limit in USD"]
      min_premium: 2500
      default_currency: "USD"

    # =========================================================================
    # DIRECT QUERIES
    # Binary questions that cannot be externally observed (max 10)
    # Actions: FLAG | MODIFIER | REFER
    # =========================================================================
    direct_queries:
      - id: "pending_claims"
        question: "Any pending or threatened malpractice claims?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Pending malpractice claims disclosed"}
      
      - id: "disciplinary_pending"
        question: "Any pending disciplinary proceedings against any professional?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Pending disciplinary proceedings"}
      
      - id: "coverage_declined"
        question: "Has any PI coverage been declined or non-renewed in past 3 years?"
        query_condition:
          - {return: true, action: "REFER", override: 5, applied: null, note: "Prior PI coverage declined/non-renewed"}
      
      - id: "practice_area_change"
        question: "Any significant change in practice areas in past 2 years?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Significant practice area change"}
      
      - id: "merger_activity"
        question: "Any merger, acquisition, or spin-off in past 2 years?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Recent merger/acquisition activity"}

      - id: "major_client_loss"
        question: "Loss of client representing >25% of revenue in past year?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Major client loss (>25% revenue)"}

    # =========================================================================
    # SIGNAL REGISTRY
    # All signals defined once with group_id reference
    # proxy_tier at signal level; normalisation in inference functions
    # =========================================================================
