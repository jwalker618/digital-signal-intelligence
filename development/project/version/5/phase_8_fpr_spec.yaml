# =============================================================================
# DSI Coverage Expansion Spec — Phase 8: Financial & Political Risk
# =============================================================================
#
# Machine-consumable spec for the CoverageExpansionGenerator.
# NEW coverage line — no existing config.
#
# Usage:
#   python -m infrastructure.builder.cli expand \
#       --spec development/project/version/5/phase_8_fpr_spec.yaml \
#       --write
#
# Financial & Political Risk covers trade credit, political risk/violence,
# surety/contract bonds, and kidnap & ransom. These are specialty lines
# with unique pricing bases:
#   - Trade Credit       → contract_value / turnover
#   - Political Risk     → limit (investment/asset value at risk)
#   - Surety             → bond_amount (penal sum)
#   - Kidnap & Ransom    → limit (aggregate)
#
# =============================================================================

coverage_line: fpr
coverage_key: financial_political_risk
phase: phase_8
description: "Phase 8 Financial & Political Risk Coverage — 5 configurations"
version: "2.3.0"

# =============================================================================
# DEFAULTS
# =============================================================================

default_product_types:
  - trade_credit
  - political_risk
  - political_violence
  - surety_bond
  - contract_bond
  - kidnap_ransom

default_markets: [us, uk, eu, apac, latam, mea, africa]
default_currency: USD
default_min_premium: 15000

default_minimum_viable_input:
  - field: client_name
    description: Client name
  - field: product_type
    description: "One of: trade_credit, political_risk, political_violence, surety_bond, contract_bond, kidnap_ransom"
  - field: limit
    description: Requested limit in USD
  - field: contract_value
    description: Contract or turnover value in USD (basis for trade credit)

routing_field: fpr_segment

# =============================================================================
# DEFAULT TIER BANDS
# =============================================================================

default_risk_tier_bands:
  method: MULTIPLIER
  basis: limit
  preferred_min: 800
  standard_plus_min: 650
  standard_min: 450
  substandard_min: 250
  preferred_rate: 0.005
  standard_plus_rate: 0.010
  standard_rate: 0.018
  substandard_rate: 0.030
  decline_rate: 0.050

default_loss_tier_bands:
  floor: 0.45
  cap: 2.0

default_exposure_bands:
  size_weight: 0.6
  complexity_weight: 0.4
  size_thresholds:
    - {label: MICRO, max_value: 5000000, applied: 0.5}
    - {label: SMALL, max_value: 25000000, applied: 0.75}
    - {label: MEDIUM, max_value: 100000000, applied: 1.0}
    - {label: LARGE, max_value: 500000000, applied: 1.5}
    - {label: VERY_LARGE, max_value: 5000000000, applied: 2.5}

default_limit_configuration:
  type: DECOUPLED
  valid_limits: [1000000, 2000000, 5000000, 10000000, 25000000, 50000000, 100000000, 250000000]
  valid_deductibles: [25000, 50000, 100000, 250000, 500000, 1000000, 2500000]

# =============================================================================
# DEFAULT PRICING
# =============================================================================

default_pricing:
  base_limit_reference: 5000000
  base_deductible_reference: 100000
  taxes_fees_rate: 0.04
  by_product_type:
    - product_type: trade_credit
      curve_type: standard
      ilf_curve:
        base_limit: 5000000
        factors:
          - {limit: 1000000, factor: 0.40}
          - {limit: 2000000, factor: 0.65}
