# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# STRUCTURAL PRINCIPLES (per master_config_layout.yaml):
# 1. Signals defined once in signal_registry with group_id reference
# 2. source: score (default) uses 0-100 inference return
# 3. source: metadata.field uses inference metadata with bands/categories
# 4. Categorical groups apply modifiers (applied:), not scores
# 5. score_conditions (plural, banded) apply actions based on score thresholds
#    Actions: FLAG | MODIFIER | REFER
# 6. proxy_tier at signal level (DIRECT_OBSERVABLE | INFERRED_PROXY | COHORT_INFERENCE)
# 7. Normalisation handled by inference functions, not config
#
# AUGMENTED BY:
# - analysis_outputs/cyber_v{date}.yaml - empirically-derived parameters
# - schemas/organisational_graph.yaml - graph structure (coverage-agnostic)
#
# =============================================================================

financial_institutions:
  fi_general:
    metadata:
      name: "DSI Financial Institutions Technical Pricing Model"
      description: "FI bond, professional liability, D&O, cyber coverage based on observable regulatory and financial signals"
      version: "2.1.0"
      product_types:
        - "financial_institution_bond"
        - "professional_liability"
        - "directors_officers"
        - "cyber_liability"
        - "employment_practices"
        - "fiduciary_liability"
      applicable_markets: ["us"]
      minimum_viable_input: ["client name (domain optional)","Limit in USD"]
      min_premium: 25000
      default_currency: "USD"

    # =========================================================================
    # DIRECT QUERIES
    # Binary questions that cannot be externally observed (max 10)
    # Actions: FLAG | MODIFIER | REFER
    # =========================================================================
    direct_queries:
      - id: "regulatory_action"
        question: "Any pending or recent (3 years) regulatory enforcement actions?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Regulatory enforcement disclosed"}
      
      - id: "examination_issues"
        question: "Any MRAs/MRIAs outstanding from most recent examination?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Outstanding MRAs/MRIAs"}
       
      - id: "litigation_pending"
        question: "Any material litigation pending (class action, regulatory)?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Material litigation pending"}
      
      - id: "cyber_incident"
        question: "Any reportable cyber incidents in past 24 months?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Recent cyber incident"}
      
      - id: "significant_growth"
        question: "Asset growth >20% in past 12 months?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Rapid growth >20%"}
      
      - id: "new_product_line"
        question: "Any significant new product lines launched in past 12 months?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "New product line risk"}    

    # =========================================================================
    # SIGNAL REGISTRY
    # All signals defined once with group_id reference
    # proxy_tier at signal level; normalisation in inference functions
    # =========================================================================
    signal_registry:

      # -----------------------------------------------------------------------
      # CATEGORICAL SIGNALS
      # Return discrete categories that apply as pricing modifiers
      # -----------------------------------------------------------------------
      - id: institution_type
        inference_utility_function: institution_type_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: institution_type
          features:
            - {cat: "MONEY_CENTER_BANK", label: "Money Center Bank", applied: 1.50}
            - {cat: "REGIONAL_BANK", label: "Regional Bank", applied: 1.20}
            - {cat: "COMMUNITY_BANK", label: "Community Bank", applied: 1.00}
            - {cat: "CREDIT_UNION", label: "Credit Union", applied: 0.85}
            - {cat: "SAVINGS_INSTITUTION", label: "Savings Institution", applied: 0.90}     
            - {cat: "BROKER_DEALER", label: "Broker-Dealer", applied: 1.40}
            - {cat: "INVESTMENT_ADVISER", label: "Investment Adviser", applied: 1.25}
            - {cat: "INSURANCE_COMPANY", label: "Insurance Company", applied: 1.10}
            - {cat: "ASSET_MANAGER", label: "Asset Manager", applied: 1.30}
            - {cat: "FINTECH", label: "Fintech", applied: 1.50}
            - {cat: "MORTGAGE_COMPANY", label: "Mortgage Company", applied: 1.35}
            - {cat: "PAYMENT_PROCESSOR", label: "Payment Processor", applied: 1.40}
            - {cat: "OTHER", label: "Other Financial Institution", applied: 1.20}

      - id: regulatory_framework
        inference_utility_function: regulatory_authority_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: regulatory_framework
          features:
            - {cat: "OCC", label: "OCC (National Banks)", applied: 1.00}
            - {cat: "FDIC", label: "FDIC (State Non-Member)", applied: 1.00}
            - {cat: "FED", label: "Federal Reserve", applied: 1.00}
            - {cat: "NCUA", label: "NCUA (Credit Unions)", applied: 0.95}
            - {cat: "SEC", label: "SEC", applied: 1.10}
            - {cat: "FINRA", label: "FINRA", applied: 1.10}
            - {cat: "STATE", label: "State Regulated", applied: 1.15}
            - {cat: "MULTI", label: "Multiple Regulators", applied: 1.05}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: asset_size_band
        inference_utility_function: asset_size_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: asset_size_band
          features:
            - {cat: "MEGA", label: "Mega (>$250B)", applied: 2.50}
            - {cat: "LARGE", label: "Large ($50B-$250B)", applied: 1.80}
            - {cat: "MID", label: "Mid-Size ($10B-$50B)", applied: 1.30}
            - {cat: "SMALL", label: "Small ($1B-$10B)", applied: 1.00}
            - {cat: "COMMUNITY", label: "Community (<$1B)", applied: 0.80}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: publicly_traded
        inference_utility_function: publically_traded_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: publicly_traded
          features:
            - {cat: "PUBLIC", label: "Publicly Traded", applied: 1.10} 
            - {cat: "PRIVATE", label: "Private", applied: 1.00}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}
  
    # -------------------------------------------------------------------------
    # SIGNAL FEATURES
    # Each is a underlying feature for the previously defined groups
    # Each group contributes to the group score
    # Weights must add to 1
    # -------------------------------------------------------------------------     

    signal_features:
      network_authority:
        - id: "correspondent_quality"
          name: "Correspondent Banking Quality"
          description: "Quality of correspondent banking relationships"
          weight: 0.20
          inference_utility_function: correspondent_quality_basefunction

          
        - id: "fhlb_membership"
          name: "FHLB Membership"
          description: "Federal Home Loan Bank membership and standing"
          weight: 0.10
          inference_utility_function: fhlb_membership_basefunction

          
        - id: "clearing_relationship"
          name: "Clearing Relationships"
          description: "Quality of clearing and settlement relationships"
          weight: 0.15
          inference_utility_function: clearing_relationship_basefunction

          
        - id: "auditor_quality"
          name: "External Auditor Quality"
          description: "Quality tier of external auditor"
          weight: 0.20
          inference_utility_function: auditor_quality_basefunction

          
        - id: "legal_counsel"
          name: "Legal Counsel Quality"
          description: "Quality of primary legal counsel"
          weight: 0.10
          inference_utility_function: legal_counsel_basefunction

          
        - id: "industry_association"
          name: "Industry Association Membership"
          description: "Active membership in industry associations"
          weight: 0.10
          inference_utility_function: industry_association_basefunction

          
        - id: "credit_rating"
          name: "Credit Rating"
          description: "Credit rating from major agencies"
          weight: 0.15
          inference_utility_function: credit_rating_basefunction


      regulatory_compliance:
        - id: "examination_rating"
          name: "Examination Rating Proxy"
          description: "Inferred examination quality from observable indicators"
          weight: 0.20
          inference_utility_function: examination_rating_basefunction
          score_conditions:
            - threshold: 25
              comparison: "<="
              override: 5
              action: "REFER"
              note: "Critically weak examination indicators"
            - threshold: 40
              comparison: "<="
              override: 4
              action: "REFER"
              note: "Weak examination indicators"
          
        - id: "enforcement_action"
          name: "Enforcement Actions"
          description: "Formal enforcement actions (C&D, CMPs, consent orders)"
          weight: 0.25
          inference_utility_function: enforcement_action_basefunction
          score_conditions:
            - threshold: 20
              comparison: "<="
              override: 5
              action: "REFER"
              note: "Active enforcement actions"
            - threshold: 40
              comparison: "<="
              override: 4
              action: "REFER"
              note: "Recent enforcement history"
          
        - id: "informal_action"
          name: "Informal Actions"
          description: "MOUs, board resolutions, informal agreements"
          weight: 0.10
          inference_utility_function: informal_action_basefunction

          
        - id: "cra_rating"
          name: "CRA Rating"
          description: "Community Reinvestment Act examination rating"
          weight: 0.10
          inference_utility_function: cra_rating_basefunction

          
        - id: "bsa_aml"
          name: "BSA/AML Compliance"
          description: "Bank Secrecy Act / Anti-Money Laundering compliance"
          weight: 0.15
          inference_utility_function: bsa_aml_basefunction
          score_conditions:
            - threshold: 25
              comparison: "<="
              override: 5
              action: "REFER"
              note: "Critical BSA/AML issues"
            - threshold: 45
              comparison: "<="
              override: 4
              action: "REFER"
              note: "BSA/AML compliance concerns"
          
        - id: "fair_lending"
          name: "Fair Lending Compliance"
          description: "Fair lending and ECOA compliance history"
          weight: 0.10
          inference_utility_function: fair_lending_basefunction

          
        - id: "consumer_compliance"
          name: "Consumer Compliance"
          description: "UDAP/UDAAP and consumer protection compliance"
          weight: 0.10
          inference_utility_function: consumer_compliance_basefunction


      financial_condition:
        - id: "capital_ratio"
          name: "Capital Adequacy"
          description: "CET1, Tier 1, Total capital ratios vs requirements"
          weight: 0.20
          inference_utility_function: capital_ratio_basefunction
          score_conditions:
            - threshold: 30
              comparison: "<="
              override: 5
              action: "REFER"
              note: "Capital adequacy crisis"
            - threshold: 50
              comparison: "<="
              override: 4
              action: "REFER"
              note: "Capital adequacy concerns"
          
        - id: "asset_quality"
          name: "Asset Quality"
          description: "NPL ratio, charge-off rates, classified assets"
          weight: 0.20
          inference_utility_function: asset_quality_basefunction
          score_conditions:
            - threshold: 30
              comparison: "<="
              override: 4
              action: "REFER"
              note: "Asset quality concerns"
          
        - id: "liquidity"
          name: "Liquidity Position"
          description: "Liquidity coverage, funding stability"
          weight: 0.15
          inference_utility_function: liquidity_basefunction

          
        - id: "earnings"
          name: "Earnings Quality"
          description: "ROA, ROE, net interest margin stability"
          weight: 0.15
          inference_utility_function: earnings_basefunction

          
        - id: "concentration"
          name: "Loan Concentration"
          description: "Portfolio concentration risk (CRE, single borrower)"
          weight: 0.10
          inference_utility_function: concentration_basefunction

          
        - id: "interest_rate_risk"
          name: "Interest Rate Risk"
          description: "Sensitivity to interest rate changes"
          weight: 0.10
          inference_utility_function: interest_rate_basefunction

          
        - id: "growth_rate"
          name: "Growth Rate"
          description: "Asset and loan growth rate (rapid growth = risk)"
          weight: 0.10
          inference_utility_function: growth_rate_basefunction


      governance:
        - id: "board_independence"
          name: "Board Independence"
          description: "Independent director ratio and quality"
          weight: 0.20
          inference_utility_function: board_independence_basefunction

          
        - id: "board_expertise"
          name: "Board Expertise"
          description: "Banking, risk, audit, and regulatory expertise on board"
          weight: 0.20
          inference_utility_function: board_expertise_basefunction

          
        - id: "executive_stability"
          name: "Executive Stability"
          description: "CEO and executive team tenure and turnover"
          weight: 0.15
          inference_utility_function: executive_stability_basefunction

          
        - id: "risk_committee"
          name: "Risk Committee Quality"
          description: "Board risk committee presence and composition"
          weight: 0.20
          inference_utility_function: risk_committee_basefunction

          
        - id: "audit_committee"
          name: "Audit Committee Quality"
          description: "Audit committee independence and expertise"
          weight: 0.15
          inference_utility_function: audit_committee_basefunction

          
        - id: "related_party"
          name: "Related Party Transactions"
          description: "Quality of related party transaction oversight"
          weight: 0.10
          inference_utility_function: related_party_basefunction


      operational_risk:
        - id: "cfpb_complaint"
          name: "CFPB Complaint Volume"
          description: "Consumer complaints vs peer benchmark"
          weight: 0.25
          inference_utility_function: cfpb_compliant_basefunction

          
        - id: "bbb_complaint"
          name: "BBB Complaint Patterns"
          description: "Better Business Bureau complaint history"
          weight: 0.10
          inference_utility_function: bbb_compliant_basefunction

          
        - id: "litigation"
          name: "Litigation History"
          description: "Class actions, regulatory suits, significant litigation"
          weight: 0.25
          inference_utility_function: litigation_basefunction
          score_conditions:
            - threshold: 25
              comparison: "<="
              override: 4
              action: "REFER"
              note: "Significant litigation exposure"
          
        - id: "breach_history"
          name: "Data Breach History"
          description: "Historical data breaches and security incidents"
          weight: 0.25
          inference_utility_function: breach_history_basefunction
          score_conditions:
            - threshold: 35
              comparison: "<="
              override: 4
              action: "REFER"
              note: "Data breach history concerns"
          
        - id: "operational_incident"
          name: "Operational Incidents"
          description: "Disclosed operational failures and outages"
          weight: 0.15
          inference_utility_function: operational_incidents_basefunction


      cyber_security:
        - id: "tls_score"
          name: "TLS/SSL Configuration"
          description: "TLS configuration quality (SSL Labs methodology)"
          weight: 0.20
          inference_utility_function: tls_configuration_basefunction

          
        - id: "email_auth"
          name: "Email Authentication"
          description: "SPF, DMARC, DKIM configuration"
          weight: 0.20
          inference_utility_function: email_authentication_basefunction

          
        - id: "security_headers"
          name: "Security Headers"
          description: "HTTP security headers implementation"
          weight: 0.15
          inference_utility_function: security_headers_basefunction

          
        - id: "network_exposure"
          name: "Network Exposure"
          description: "Exposed services and ports"
          weight: 0.20
          inference_utility_function: network_exposure_basefunction

          
        - id: "vulnerability"
          name: "Known Vulnerabilities"
          description: "CVE exposure in detected software"
          weight: 0.15
          inference_utility_function: cve_exposure_basefunction
          score_conditions:
            - threshold: 25
              comparison: "<="
              override: 4
              action: "REFER"
              note: "Critical vulnerabilities detected"
          
        - id: "security_rating"
          name: "Third-Party Security Rating"
          description: "BitSight, SecurityScorecard, or similar"
          weight: 0.10
          inference_utility_function: security_rating_basefunction


      corporate_footprint:
        - id: "investor_relations"
          name: "Investor Relations Quality"
          description: "Quality of investor communications and transparency"
          weight: 0.20
          inference_utility_function: investor_relations_basefunction

          
        - id: "disclosure_quality"
          name: "Disclosure Quality"
          description: "Quality and timeliness of regulatory disclosures"
          weight: 0.20
          inference_utility_function: disclosure_quality_basefunction

          
        - id: "security_page"
          name: "Security Page Presence"
          description: "Dedicated security/trust page"
          weight: 0.15
          inference_utility_function: security_page_basefunction

          
        - id: "hiring_signals"
          name: "Risk/Compliance Hiring"
          description: "Risk, compliance, and security hiring activity"
          weight: 0.15
          inference_utility_function: hiring_signals_basefunction

          
        - id: "esg_reporting"
          name: "ESG Reporting"
          description: "Environmental, social, governance reporting"
          weight: 0.15
          inference_utility_function: esg_reporting_basefunction

          
        - id: "community_presence"
          name: "Community Presence"
          description: "Community involvement and local presence"
          weight: 0.15
          inference_utility_function: community_presence_basefunction


      structured_data:
        - id: "credit_rating_structured"
          name: "Credit Rating (Structured)"
          description: "Credit rating from rating agencies"
          weight: 0.40
          inference_utility_function: credit_rating_basefunction

          
        - id: "esg_rating"
          name: "ESG Rating"
          description: "ESG rating from major providers"
          weight: 0.30
          inference_utility_function: esg_rating_basefunction

          
        - id: "peer_benchmark"
          name: "Peer Benchmarking"
          description: "Performance vs peer group benchmarks"
          weight: 0.30
          inference_utility_function: peer_benchmark_basefunction

    # =========================================================================
    # GROUPS
    # Categorical modifiers and three-layer assessment groupings
    # =========================================================================
    groups:

      # -----------------------------------------------------------------------
      # CATEGORICAL GROUPS
      # Apply pricing modifiers (applied:), not scores
      # -----------------------------------------------------------------------
      categories:
        - id: "institution_type"
          label: "Institution Type"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "regulatory_framework"
          label: "Regulatory Framework"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "asset_size_band"
          label: "Asset Size Band"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "publicly_traded"
          label: "Publically Traded"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

      # -----------------------------------------------------------------------
      # THREE-LAYER ASSESSMENT GROUPS
      # Aggregate signals into scoring dimensions
      # Weights within each dimension must sum to 1.0
      # -----------------------------------------------------------------------
      three_layer_assessment:
        - id: "network_authority"
          label: "Network Authority"
          description: "Quality of institutional relationships and counterparties"
          risk:
            weight: 0.10
            score_conditions:
              - {threshold: 85, comparison: ">=", action: "MODIFIER", applied: 0.95,  note: "Strong network authority credit"}
              - {threshold: 40, comparison: "<=", action: "MODIFIER", applied: 1.10,  note: "Weak network authority loading"}
          
        - id: "regulatory_compliance"
          label: "Regulatory Compliance"
          description: "Examination results, enforcement actions, compliance ratings"
          risk:
            weight: 0.25
            score_conditions:
              - {threshold: 30, comparison: "<=", action: "REFER", override: 5, note: "Critical regulatory deficiencies"}
              - {threshold: 45, comparison: "<=", action: "REFER", override: 4, note: "Significant regulatory concerns"}
  
        - id: "financial_condition"
          label: "Financial Condition"
          description: "Capital, asset quality, liquidity, earnings (CAMELS proxies)"
          risk:
            weight: 0.20
            score_conditions:
              - {threshold: 35, comparison: "<=", action: "REFER", override: 5, note: "Critical financial condition"}
              - {threshold: 50, comparison: "<=", action: "REFER", override: 4, note: "Material financial concerns"}
  
        - id: "governance"
          label: "Corporate Governance"
          description: "Board composition, executive stability, committee quality"
          risk:
            weight: 0.15
            score_conditions:
              - {threshold: 85, comparison: ">=", action: "MODIFIER", applied: 0.90, note: "Strong governance credit"}
              - {threshold: 40, comparison: "<=", action: "MODIFIER", applied: 1.15, note: "Weak governance loading"}
          
        - id: "operational_risk"
          label: "Operational Risk"
          description: "Complaints, litigation, breach history, incidents"
          risk:
            weight: 0.10
            score_conditions:
              - {threshold: 35, comparison: "<=", action: "REFER", override: 4, note: "Elevated operational risk"}
  
        - id: "cyber_security"
          label: "Cyber Security"
          description: "Observable technical security posture"
          risk:
            weight: 0.10
            score_conditions:
              - {threshold: 35, comparison: "<=", action: "REFER", override: 4, note: "Cyber security deficiencies"}
  
        - id: "corporate_footprint"
          label: "Corporate Footprint"
          description: "Transparency, disclosure, investor relations"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 80, comparison: ">=", action: "MODIFIER", applied: 0.95, note: "Strong transparency credit"}
              - {threshold: 35, comparison: "<=", action: "MODIFIER", applied: 1.10, note: "Poor transparency loading"}
          
        - id: "structured_data"
          label: "Structured Data"
          description: "Third-party ratings and benchmarks"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 82, comparison: ">=", action: "MODIFIER", applied: 0.95, note: "Strong third-party ratings credit"}
              - {threshold: 38, comparison: "<=", action: "MODIFIER", applied: 1.10, note: "Weak third-party ratings loading"}

    # =========================================================================
    # RISK TIER BANDS
    # Maps composite risk score (0-1000) to pricing tiers
    # =========================================================================
    risk_tier_bands:
      bands:
        - id: 1
          label: "PREFERRED"
          description: "Excellent risk - automatic approval, preferred pricing"
          interpretation:
            bands: {min: 800, max: 1000}
            action: "APPROVE"
            application: {method: "PREMIUM_BASE", value: 1500}

        - id: 2
          label: "STANDARD_PLUS"
          description: "Good risk - automatic approval, standard pricing"
          interpretation:
            bands: {min: 650, max: 799}
            action: "APPROVE"
            application: {method: "PREMIUM_BASE", value: 2200}

        - id: 3
          label: "STANDARD"
          description: "Average risk - may require referral"
          interpretation:
            bands: {min: 500, max: 649}
            action: "REFER"
            application: {method: "PREMIUM_BASE", value: 3200}

        - id: 4
          label: "SUBSTANDARD"
          description: "Elevated risk - requires senior review"
          interpretation:
            bands: {min: 350, max: 499}
            action: "REFER"
            application: {method: "PREMIUM_BASE", value: 5000}

        - id: 5
          label: "DECLINE"
          description: "Unacceptable risk - decline"
          interpretation:
            bands: {min: 0, max: 349}
            action: "DECLINE"
            application: {method: "PREMIUM_BASE", value: 8000}

    # =========================================================================
    # LOSS TIER BANDS
    # Maps composite loss score (0-100) to pricing modifiers
    # Calculation: (frequency_score × frequency_weight) + (severity_score × severity_weight)
    # Result maps to band, constrained by floor/cap
    # =========================================================================
    loss_tier_bands:
      bands:
        - id: 1
          label: "VERY_LOW"
          description: "Very low risk of loss"
          interpretation:
            bands: {min: 80, max: 100}
            application:
              frequency_modifier: 0.70
              severity_modifier: 0.80

        - id: 2
          label: "LOW"
          description: "Low risk of loss"
          interpretation:
            bands: {min: 60, max: 79}
            application:
              frequency_modifier: 0.85
              severity_modifier: 0.90

        - id: 3
          label: "MODERATE"
          description: "Moderate risk of loss"
          interpretation:
            bands: {min: 40, max: 59}
            application:
              frequency_modifier: 1.00
              severity_modifier: 1.00

        - id: 4
          label: "ELEVATED"
          description: "Elevated risk of loss"
          interpretation:
            bands: {min: 20, max: 39}
            application:
              frequency_modifier: 1.15
              severity_modifier: 1.15

        - id: 5
          label: "HIGH"
          description: "High risk of loss"
          interpretation:
            bands: {min: 0, max: 19}
            application:
              frequency_modifier: 1.35
              severity_modifier: 1.40
      constraints:
        floor: 0.55
        cap: 1.60

    # =========================================================================
    # EXPOSURE TIER BANDS
    # Maps exposure scores to size and complexity modifiers
    # Calculation: (size_modifier × size_weight) + (complexity_modifier × complexity_weight)
    # =========================================================================
    exposure:
      size:
        weight: 0.60
        bands:
          - id: 1
            label: "MICRO"
            description: "Micro exposure value ($0 - $1M)"
            interpretation:
              bands: {min: 0, max: 20}
              application: {method: "MODIFIER", applied: 0.50, implied_thresholds: {min: 0, max: 1000000}}

          - id: 2
