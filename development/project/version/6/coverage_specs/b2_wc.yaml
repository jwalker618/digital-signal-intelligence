# =============================================================================
# DSI Coverage Expansion Spec — V6 Phase B2: Workers' Compensation (standalone)
# =============================================================================
#
# Skeleton — see SPEC.md at coverages/wc/SPEC.md for the full plan.
# =============================================================================

coverage_line: wc
coverage_key: wc
phase: v6_b2
description: "V6/B2 — Workers' Compensation (standalone)"
version: "1.0.0"

default_product_types:
  - workers_comp

default_markets: [us]
default_currency: USD
default_min_premium: 10000

default_minimum_viable_input:
  - field: entity_name
  - field: naics_2digit
  - field: employee_count
  - field: state

routing_field: naics_2digit

configurations:
  - name: wc_construction
    model_specificity: 1
    description: "NAICS 23 — construction."
    routing_constraints: [{ field: naics_2digit, operator: "==", value: "23" }]
  - name: wc_healthcare
    model_specificity: 1
    description: "NAICS 62 — health care and social assistance."
    routing_constraints: [{ field: naics_2digit, operator: "==", value: "62" }]
  - name: wc_manufacturing
    model_specificity: 1
    description: "NAICS 31-33 — manufacturing."
    routing_constraints: [{ field: naics_2digit, operator: "IN", value: ["31", "32", "33"] }]
  - name: wc_office
    model_specificity: 2
    description: "Office-based NAICS (54 / 52 / 51 / 55)."
    routing_constraints: [{ field: naics_2digit, operator: "IN", value: ["54", "52", "51", "55"] }]
  - name: wc_transport
    model_specificity: 1
    description: "NAICS 48-49 — transportation + warehousing."
    routing_constraints: [{ field: naics_2digit, operator: "IN", value: ["48", "49"] }]
  - name: wc_sme
    model_specificity: 3
    description: "Small employers regardless of NAICS."
    routing_constraints: [{ field: employee_count, operator: "<", value: 100 }]

signal_registry: []
default_risk_tier_bands: {}
default_loss_tier_bands: {}
default_exposure_bands: {}
default_pricing: {}
default_guardrails: {}
