<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSI Workflow Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .control-btn {
            padding: 12px 30px;
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: #00d4ff;
            color: #000;
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .workflow-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .step {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: all 0.5s ease;
            position: relative;
            min-height: 140px;
        }

        .step::after {
            content: '';
            position: absolute;
            right: -17px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 10px solid rgba(255,255,255,0.1);
        }

        .step:nth-child(5n)::after,
        .step:last-child::after {
            display: none;
        }

        .step.pending {
            opacity: 0.4;
        }

        .step.active {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            transform: scale(1.05);
        }

        .step.completed {
            border-color: #27ae60;
            background: rgba(39, 174, 96, 0.1);
        }

        .step.completed::before {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 10px;
            color: #27ae60;
            font-size: 1.2rem;
        }

        .step-number {
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .step.active .step-number {
            background: #00d4ff;
            color: #000;
        }

        .step.completed .step-number {
            background: #27ae60;
            color: #fff;
        }

        .step-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #fff;
        }

        .step-desc {
            font-size: 0.75rem;
            color: #888;
            line-height: 1.4;
        }

        .detail-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 300px;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .detail-step-number {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }

        .detail-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .detail-subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
        }

        .detail-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .detail-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
        }

        .section-title {
            font-size: 0.9rem;
            color: #00d4ff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-content {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #aaa;
        }

        .section-content ul {
            list-style: none;
            padding: 0;
        }

        .section-content li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-content li::before {
            content: '→';
            color: #00d4ff;
        }

        .data-flow {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
        }

        .data-box {
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .data-arrow {
            color: #00d4ff;
            font-size: 1.2rem;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        @media (max-width: 1200px) {
            .workflow-container {
                grid-template-columns: repeat(3, 1fr);
            }
            .step:nth-child(3n)::after {
                display: none;
            }
            .step:nth-child(5n)::after {
                display: block;
            }
        }

        @media (max-width: 768px) {
            .workflow-container {
                grid-template-columns: repeat(2, 1fr);
            }
            .detail-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>14-Step Workflow</h1>
            <p class="subtitle">Watch how DSI processes a submission from input to decision</p>
        </header>

        <div class="controls">
            <button class="control-btn" id="startBtn" onclick="startAnimation()">▶ Start</button>
            <button class="control-btn" id="pauseBtn" onclick="pauseAnimation()" disabled>⏸ Pause</button>
            <button class="control-btn" id="resetBtn" onclick="resetAnimation()">↺ Reset</button>
            <button class="control-btn" onclick="stepForward()">Step →</button>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>

        <div class="workflow-container" id="workflowContainer">
            <!-- Generated by JavaScript -->
        </div>

        <div class="detail-panel" id="detailPanel">
            <!-- Generated by JavaScript -->
        </div>
    </div>

    <script>
        const steps = [
            {
                number: 0,
                title: 'Website Discovery',
                desc: 'Find company domain',
                input: 'Company Name',
                output: 'Domain, Website',
                details: {
                    description: 'The workflow begins by discovering the company\'s web presence. Using the company name, DSI identifies the primary domain and verifies website ownership.',
                    actions: [
                        'Search for company domain',
                        'Verify domain ownership via WHOIS',
                        'Identify related subdomains',
                        'Confirm corporate identity'
                    ]
                }
            },
            {
                number: 1,
                title: 'Load Configuration',
                desc: 'Get coverage config',
                input: 'Coverage Type',
                output: 'Signal Weights',
                details: {
                    description: 'Load the appropriate configuration for the selected coverage type. Each coverage (Cyber, D&O, etc.) has its own signal definitions, weights, and tier thresholds.',
                    actions: [
                        'Retrieve coverage configuration',
                        'Load signal group definitions',
                        'Load tier thresholds',
                        'Validate configuration hash'
                    ]
                }
            },
            {
                number: 2,
                title: 'Create Model File',
                desc: 'Initialize audit trail',
                input: 'Entity ID',
                output: 'Model ID',
                details: {
                    description: 'Create a new model data file to track this assessment. The model file serves as a complete audit trail of all signals, decisions, and pricing calculations.',
                    actions: [
                        'Generate unique model ID',
                        'Initialize version tracking',
                        'Link to configuration hash',
                        'Record submission metadata'
                    ]
                }
            },
            {
                number: 3,
                title: 'Verify Inputs',
                desc: 'Check required fields',
                input: 'Submission Data',
                output: 'Validation Status',
                details: {
                    description: 'Verify that minimum viable inputs are present. DSI is designed to work with minimal information - typically just company name and limit.',
                    actions: [
                        'Check required fields present',
                        'Validate field formats',
                        'Log missing optional fields',
                        'Proceed or flag for review'
                    ]
                }
            },
            {
                number: 4,
                title: 'Extract Signals',
                desc: 'Gather external data',
                input: 'Domain, Entity',
                output: 'Raw Signals',
                details: {
                    description: 'The core data gathering step. DSI extracts dozens of signals from public sources including technical infrastructure, corporate presence, and third-party ratings.',
                    actions: [
                        'Query DNS and SSL configurations',
                        'Analyze website security headers',
                        'Check breach databases',
                        'Retrieve third-party ratings'
                    ]
                }
            },
            {
                number: 5,
                title: 'Calculate Scores',
                desc: 'Compute weighted scores',
                input: 'Raw Signals',
                output: 'Composite Score',
                details: {
                    description: 'Transform raw signals into weighted group scores, then aggregate into a single composite score (0-1000). Higher scores indicate lower risk.',
                    actions: [
                        'Normalize signal values (0-100)',
                        'Apply signal weights within groups',
                        'Calculate group scores',
                        'Compute weighted composite'
                    ]
                }
            },
            {
                number: 6,
                title: 'Check Signal Conditions',
                desc: 'Evaluate thresholds',
                input: 'Signal Scores',
                output: 'Triggered Conditions',
                details: {
                    description: 'Check if any individual signals trigger special conditions (flags, referrals, or declines). Critical vulnerabilities can override the composite score.',
                    actions: [
                        'Evaluate signal thresholds',
                        'Check for critical failures',
                        'Identify referral triggers',
                        'Record condition reasons'
                    ]
                }
            },
            {
                number: 7,
                title: 'Evaluate Queries',
                desc: 'Process direct answers',
                input: 'Query Responses',
                output: 'Query Conditions',
                details: {
                    description: 'If direct query responses were provided (optional), evaluate them for additional conditions. These can trigger modifiers or referrals.',
                    actions: [
                        'Check MFA status response',
                        'Evaluate incident history',
                        'Apply compliance modifiers',
                        'Flag missing controls'
                    ]
                }
            },
            {
                number: 8,
                title: 'Determine Base Tier',
                desc: 'Map score to tier',
                input: 'Composite Score',
                output: 'Score-Based Tier',
                details: {
                    description: 'Map the composite score to a risk tier (1-5). Each tier has defined thresholds and determines the base premium level.',
                    actions: [
                        'Look up tier thresholds',
                        'Assign initial tier',
                        'Record tier label',
                        'Note auto-approve eligibility'
                    ]
                }
            },
            {
                number: 9,
                title: 'Apply Overrides',
                desc: 'Check tier overrides',
                input: 'All Conditions',
                output: 'Final Tier',
                details: {
                    description: 'Apply any tier overrides from signal or query conditions. A critical condition can force a higher tier regardless of the composite score.',
                    actions: [
                        'Collect all tier overrides',
                        'Select highest override',
                        'Compare with score-based tier',
                        'Set final tier'
                    ]
                }
            },
            {
                number: 10,
                title: 'Set Base Premium',
                desc: 'Get tier premium',
                input: 'Final Tier',
                output: 'Base Premium',
                details: {
                    description: 'Retrieve the base premium for the assigned tier. This is the starting point before modifiers and limit adjustments.',
                    actions: [
                        'Look up tier base premium',
                        'Record pricing method',
                        'Initialize modifier chain',
                        'Set currency'
                    ]
                }
            },
            {
                number: 11,
                title: 'Apply Modifiers',
                desc: 'Adjust for factors',
                input: 'Categories, Queries',
                output: 'Modified Premium',
                details: {
                    description: 'Apply premium modifiers based on categorical factors (industry, size, geography) and any query-based adjustments.',
                    actions: [
                        'Apply industry modifier',
                        'Apply size band modifier',
                        'Apply geography modifier',
                        'Apply experience modifier'
                    ]
                }
            },
            {
                number: 12,
                title: 'Calculate Limits',
                desc: 'Apply ILF curve',
                input: 'Modified Premium',
                output: 'Limit Options',
                details: {
                    description: 'Apply Increased Limit Factors (ILF) to generate premium options for each available policy limit.',
                    actions: [
                        'Load ILF curve',
                        'Calculate premium per limit',
                        'Apply deductible credits',
                        'Generate premium table'
                    ]
                }
            },
            {
                number: 13,
                title: 'Final Decision',
                desc: 'Approve, Refer, Decline',
                input: 'All Results',
                output: 'Workflow Result',
                details: {
                    description: 'Make the final underwriting decision based on tier, conditions, and auto-approval eligibility. Generate the complete workflow result.',
                    actions: [
                        'Evaluate auto-approve rules',
                        'Compile referral reasons',
                        'Set final decision',
                        'Package complete result'
                    ]
                }
            }
        ];

        let currentStep = -1;
        let animationInterval = null;
        let isPlaying = false;

        function renderSteps() {
            const container = document.getElementById('workflowContainer');
            container.innerHTML = steps.map(step => `
                <div class="step pending" id="step_${step.number}">
                    <div class="step-number">${step.number}</div>
                    <div class="step-title">${step.title}</div>
                    <div class="step-desc">${step.desc}</div>
                </div>
            `).join('');
        }

        function renderDetail(stepIndex) {
            const step = steps[stepIndex] || steps[0];
            const panel = document.getElementById('detailPanel');

            panel.innerHTML = `
                <div class="detail-header">
                    <div class="detail-step-number">${step.number}</div>
                    <div>
                        <div class="detail-title">${step.title}</div>
                        <div class="detail-subtitle">Step ${step.number} of 13</div>
                    </div>
                </div>
                <div class="detail-content">
                    <div class="detail-section">
                        <div class="section-title">Description</div>
                        <div class="section-content">
                            ${step.details.description}
                        </div>
                        <div class="data-flow">
                            <div class="data-box">${step.input}</div>
                            <span class="data-arrow">→</span>
                            <div class="data-box">${step.output}</div>
                        </div>
                    </div>
                    <div class="detail-section">
                        <div class="section-title">Actions</div>
                        <div class="section-content">
                            <ul>
                                ${step.details.actions.map(a => `<li>${a}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateProgress() {
            const progress = ((currentStep + 1) / steps.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }

        function setStepState(stepIndex, state) {
            const stepEl = document.getElementById(`step_${stepIndex}`);
            if (stepEl) {
                stepEl.className = `step ${state}`;
            }
        }

        function goToStep(stepIndex) {
            // Update all steps
            steps.forEach((step, i) => {
                if (i < stepIndex) {
                    setStepState(i, 'completed');
                } else if (i === stepIndex) {
                    setStepState(i, 'active');
                } else {
                    setStepState(i, 'pending');
                }
            });

            currentStep = stepIndex;
            renderDetail(stepIndex);
            updateProgress();
        }

        function stepForward() {
            if (currentStep < steps.length - 1) {
                goToStep(currentStep + 1);
            } else {
                // All done
                pauseAnimation();
            }
        }

        function startAnimation() {
            if (currentStep === steps.length - 1) {
                resetAnimation();
            }

            isPlaying = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;

            animationInterval = setInterval(() => {
                stepForward();
                if (currentStep >= steps.length - 1) {
                    pauseAnimation();
                }
            }, 1500);
        }

        function pauseAnimation() {
            isPlaying = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;

            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
            }
        }

        function resetAnimation() {
            pauseAnimation();
            currentStep = -1;
            steps.forEach((step, i) => setStepState(i, 'pending'));
            updateProgress();
            renderDetail(0);
        }

        // Initialize
        renderSteps();
        renderDetail(0);
    </script>
</body>
</html>
