      - id: 3
        label: STANDARD
        description: Average offshore wind risk - may require referral
        interpretation:
          bands: {min: 500, max: 649}
          action: REFER
          application: {method: MULTIPLIER, applied: 0.0020, basis: tiv}
      - id: 4
        label: SUBSTANDARD
        description: Elevated offshore wind risk - requires senior review
        interpretation:
          bands: {min: 350, max: 499}
          action: REFER
          application: {method: MULTIPLIER, applied: 0.0032, basis: tiv}
