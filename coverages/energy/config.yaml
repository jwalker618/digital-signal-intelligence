      bands:
      - id: 1
        label: PREFERRED
        description: Excellent storage risk — preferred pricing, proven technology
        interpretation:
          bands: {min: 800, max: 1000}
          action: APPROVE
          application: {method: MULTIPLIER, applied: 0.0012, basis: tiv}
      - id: 2
        label: STANDARD_PLUS
        description: Good storage risk — standard pricing
        interpretation:
          bands: {min: 650, max: 799}
          action: APPROVE
          application: {method: MULTIPLIER, applied: 0.0020, basis: tiv}
      - id: 3
        label: STANDARD
        description: Average storage risk — referral for emerging technology concerns
        interpretation:
          bands: {min: 500, max: 649}
          action: REFER
          application: {method: MULTIPLIER, applied: 0.0028, basis: tiv}
      - id: 4
        label: SUBSTANDARD
        description: Elevated storage risk — requires senior review
        interpretation:
