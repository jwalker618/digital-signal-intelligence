# =============================================================================
# DSI MODEL CONFIGURATION - MASTER LAYOUT
# =============================================================================
#
# This file defines the complete structure for a coverage configuration.
# All field names, types, and relationships are annotated.
#
# VERSION: 2.1 - Added multiplexer support (model_specificity, routing_constraints) (Phase V4)
# VERSION: 2.2 - Added Pricing Anchors & Decoupled Limits (Phase V5)
# VERSION: 2.3 - Added expectation_level for adaptive signal absence (Phase 10)
#
# STRUCTURAL PRINCIPLES:
# 1. Signals are defined once in signal_registry
# 2. Each signal specifies which group it contributes to via group_id
# 3. Three dimensions: risk (tier), loss (frequency/severity), exposure (size/complexity)
# 4. source: score (default) uses the 0-100 inference return
# 5. source: metadata.field uses inference metadata with bands/categories mapping
# 6. Categorical groups apply modifiers (applied:), not scores
# 7. score_conditions (plural, banded) apply actions based on score thresholds
#    - Applies to: signal_registry signals and groups ONLY
#    - Does NOT apply to: tier bands (risk, loss, exposure)
# 8. MULTIPLIER method allows rate × basis calculation as alternative to PREMIUM_BASE
#
# AUGMENTED BY:
# - analysis_outputs/{coverage}_v{date}.yaml - empirically-derived parameters
# - schemas/organisational_graph.yaml - graph structure (coverage-agnostic)
#
# =============================================================================

{coverage}:                                # e.g., cyber, professional_liability
  {configuration}:                         # e.g., cyber_general, cyber_tech

    # =========================================================================
    # METADATA
    # Configuration identification and constraints
    # =========================================================================
    metadata:
      name: "{string}"                     # Human-readable configuration name
      description: "{string}"              # Purpose description
      version: "{semver}"                  # Semantic version (major.minor.patch)
      product_types:                       # Applicable product lines
        - "{product_type}"
      applicable_markets:                  # Geographic markets
        - "{market_code}"                  # e.g., us, uk, eu, apac
      minimum_viable_input:                # Required inputs for pricing (explicit format)
        required:
          - field: "client_name"
            description: "Client name (domain optional for discovery)"
          - field: "product_type"
            description: "Product type from product_types list above"
          - field: "limit"
            description: "Requested limit in default_currency"
          # Additional fields as needed:
          # - field: "tiv"
          #   description: "Total Insured Value (required if MULTIPLIER method uses tiv basis)"
          # - field: "revenue"
          #   description: "Annual revenue (required if MULTIPLIER method uses revenue basis)"
      min_premium: {integer}               # Minimum premium floor
      default_currency: "{currency}"       # ISO 4217 currency code

      # -----------------------------------------------------------------------
      # MULTIPLEXER SUPPORT (Phase V4)
      # Enables multi-configuration racing and optimal selection
      # -----------------------------------------------------------------------
      model_specificity: {integer}         # 1-5 scale for arbiter ranking
                                           # 1 = General/Base (broad applicability)
                                           # 2 = Segment-Specific (e.g., Tech, Healthcare)
                                           # 3 = Niche/Bespoke (specialized product)
                                           # 4 = Highly Specialized
                                           # 5 = Custom/Bespoke
                                           # Higher specificity wins when confidence is equal

      routing_constraints:                 # OPTIONAL - Hard filters before signal execution
        - field: "{input_field}"           # Field from submission input (e.g., "revenue", "employee_count")
          operator: "{op}"                 # Comparison: <, >, <=, >=, ==, !=
          value: {number|string}           # Threshold value
          required_in_input: {boolean}     # If true, constraint fails when field is missing
                                           # If false (default), missing field passes constraint
        # Examples:
        # - field: "revenue"
        #   operator: "<"
        #   value: 50000000
        #   required_in_input: false       # SME config - revenue under $50M
        # - field: "employee_count"
        #   operator: ">="
        #   value: 1000
        #   required_in_input: true        # Enterprise config - 1000+ employees required

    # =========================================================================
    # DIRECT QUERIES
    # Binary questions that cannot be externally observed
    # Maximum 10 queries per configuration
    # =========================================================================
    direct_queries:
      - id: "{query_id}"                   # Unique identifier
        question: "{question_text}"        # Question presented to user
        query_condition:
          - return: {boolean}              # Trigger condition (true or false)
            action: "{action}"             # FLAG | MODIFIER | REFER
            override: {tier|null}          # Force tier (1-#, typically 5) or null (REFER only)
            applied: {float|null}          # Modifier multiplier (MODIFIER only) or null
            note: "{explanation}"          # Explanation text (required for FLAG)

    # =========================================================================
    # SIGNAL REGISTRY
    # Complete definition of all signals used in this configuration
    # Signals are defined once and reference groups for aggregation
    # =========================================================================
    signal_registry:

      # -----------------------------------------------------------------------
      # CATEGORICAL SIGNAL PATTERN
      # Returns discrete categories that apply as pricing modifiers
      # These do NOT contribute to three_layer_assessment scores
      # -----------------------------------------------------------------------
      - id: "{signal_id}"                  # Unique signal identifier
        inference_utility_function: "{function_name}"  # Function that returns data
        proxy_tier: "{tier}"               # DIRECT_OBSERVABLE | INFERRED_PROXY | COHORT_INFERENCE
        categories:
          group_id: "{category_group}"     # Links to groups.categories
          source: metadata.{field_name}    # Use metadata field instead of score
          features:                        # Expected return values
            - cat: "{CATEGORY_CODE}"       # Enum value returned by inference
              label: "{Display Label}"     # Human-readable label
              
              applied: {float}             # Pricing modifier (1.0 = neutral)
              #or
              value: {float}               # Base premium value - can only be one categorical group.

      # -----------------------------------------------------------------------
      # SCORED SIGNAL PATTERN - USING SCORE (DEFAULT)
      # Returns 0-100 score, contributes to three_layer_assessment
      # source: score is implicit when not specified
      # -----------------------------------------------------------------------
      - id: "{signal_id}"
        inference_utility_function: "{function_name}"
        proxy_tier: "{tier}"

        # -----------------------------------------------------------------------
        # EXPECTATION LEVEL (Phase 10)
        # Controls how missing/null signals are penalized based on entity size
        # -----------------------------------------------------------------------
        expectation_level: "{level}"          # UNIVERSAL | ENTERPRISE | CORPORATE | SME | MICRO
                                              # UNIVERSAL  = Expected for ALL entities (missing = always penalize)
                                              # ENTERPRISE = Expected for Large/Complex (Exposure bands 4-5)
                                              # CORPORATE  = Expected for Medium+ (Exposure bands 3-5)
                                              # SME        = Expected for Small+ (Exposure bands 2-5)
                                              # MICRO      = Expected only for Micro (Exposure band 1)
                                              #
                                              # When a signal is missing:
                                              #   - If expected for entity's size band: penalize (10th percentile)
                                              #   - If NOT expected: neutral score (50th percentile)

        three_layer_assessment:
          group_id: "{group_id}"           # Links to groups.three_layer_assessment

          # RISK DIMENSION
          # Contributes to risk tier calculation
          risk:
            # source: score                # DEFAULT - uses 0-100 inference score (omit if using default)
            correlation_direction: "{direction}"  # positive = high score = good | negative = high score = bad
            weight: {float}                # Weight within group (group weights sum to 1.0)

            # -----------------------------------------------------------------
            # BANDED SCORE CONDITIONS (OPTIONAL)
            # Multiple threshold-based conditions evaluated in order
            # Applies to signals and groups ONLY - NOT tier bands
            # -----------------------------------------------------------------
            score_conditions:              # Note: plural - list of conditions
              # LOW SCORE CONDITIONS (excellent performance)
              - threshold: {integer}       # e.g., 20
                comparison: "<="           # Triggers if score <= threshold
                action: "MODIFIER"
                applied: {float}           # e.g., 0.85 = 15% credit
                note: "{explanation}"

              - threshold: {integer}       # e.g., 40
                comparison: "<="
                action: "MODIFIER"
                applied: {float}           # e.g., 0.92 = 8% credit
                note: "{explanation}"

              # HIGH SCORE CONDITIONS (poor performance)
              - threshold: {integer}       # e.g., 75
                comparison: ">="           # Triggers if score >= threshold
                action: "FLAG"
                note: "{explanation}"      # Required for FLAG action

              - threshold: {integer}       # e.g., 90
                comparison: ">="
                action: "REFER"
                override: {tier|null}      # Optional tier override
                note: "{explanation}"

          # LOSS DIMENSION
          # Contributes to loss modifier via frequency and severity
          loss:
            severity:
              # source: score              # DEFAULT
              correlation_direction: "{direction}"
              weight: {float}
              score_conditions:            # OPTIONAL - banded conditions for loss
                - threshold: {integer}
                  comparison: "{op}"       # >=, <=, ==, >, <
                  action: "{action}"       # FLAG | MODIFIER | REFER
                  applied: {float|null}    # For MODIFIER
                  override: {tier|null}    # For REFER
                  note: "{explanation}"

            frequency:
              # source: score              # DEFAULT
              correlation_direction: "{direction}"
              weight: {float}
              score_conditions:            # OPTIONAL - banded conditions for loss
                - threshold: {integer}
                  comparison: "{op}"
                  action: "{action}"
                  applied: {float|null}
                  override: {tier|null}
                  note: "{explanation}"

          # EXPOSURE DIMENSION
          # Contributes to exposure modifier via size and complexity
          exposure:
            size:
              # source: score              # DEFAULT
              correlation_direction: "{direction}"
              weight: {float}
              score_conditions:            # OPTIONAL - banded conditions for exposure
                - threshold: {integer}
                  comparison: "{op}"
                  action: "{action}"
                  applied: {float|null}
                  override: {tier|null}
                  note: "{explanation}"

            complexity:
              # source: score              # DEFAULT
              correlation_direction: "{direction}"
              weight: {float}
              score_conditions:            # OPTIONAL - banded conditions for exposure
                - threshold: {integer}
                  comparison: "{op}"
                  action: "{action}"
                  applied: {float|null}
                  override: {tier|null}
                  note: "{explanation}"

      # -----------------------------------------------------------------------
      # SCORED SIGNAL PATTERN - USING METADATA
      # Uses inference metadata fields instead of score
      # Requires bands (numeric) or categories (text) to map to scores
      # -----------------------------------------------------------------------
      - id: "{signal_id}"
        inference_utility_function: "{function_name}"
        proxy_tier: INFERRED_PROXY
        three_layer_assessment:
          group_id: "{group_id}"

          # Risk uses default score
          risk:
            correlation_direction: positive
            weight: {float}
            score_conditions:              # OPTIONAL - banded conditions
              - threshold: {integer}
                comparison: "{op}"
                action: "{action}"
                applied: {float|null}
                override: {tier|null}
                note: "{explanation}"

          # Exposure uses metadata fields
          exposure:
            # SIZE - using numeric metadata with bands
            size:
              source: metadata.{field_name}    # Use metadata field instead of score
              bands:                            # REQUIRED for numeric metadata
                - min: 0                        # Inclusive minimum
                  max: 100                      # Inclusive maximum
                  score: 20                     # Score contribution (0-100)
                - min: 101
                  max: 500
                  score: 40
                - min: 501
                  max: 1000
                  score: 60
                - min: 1001
                  max: null                     # null = no upper limit
                  score: 80
              correlation_direction: positive
              weight: {float}
              score_conditions:              # OPTIONAL - can still have conditions
                - threshold: {integer}
                  comparison: "{op}"
                  action: "{action}"
                  applied: {float|null}
                  note: "{explanation}"

            # COMPLEXITY - using text metadata with categories
            complexity:
              source: metadata.{field_name}    # Use metadata field
              categories:                       # REQUIRED for text metadata
                - match: "{VALUE_1}"            # Exact string match
                  score: 30
                - match: "{VALUE_2}"
                  score: 50
                - match: "{VALUE_3}"
                  score: 70
                - match: null                   # null = default/catch-all
                  score: 50
              correlation_direction: positive
              weight: {float}
              score_conditions:              # OPTIONAL
                - threshold: {integer}
                  comparison: "{op}"
                  action: "{action}"
                  applied: {float|null}
                  note: "{explanation}"

          # Loss can also use metadata
          loss:
            frequency:
              source: metadata.{field_name}
              bands:
                - min: 0
                  max: 0
                  score: 95                     # No incidents = high score
                - min: 1
                  max: 2
                  score: 60
                - min: 3
                  max: null
                  score: 25                     # Many incidents = low score
              correlation_direction: positive
              weight: {float}
              score_conditions:              # OPTIONAL
                - threshold: {integer}
                  comparison: "{op}"
                  action: "{action}"
                  applied: {float|null}
                  note: "{explanation}"
            severity:
              # Uses default score
              correlation_direction: negative
              weight: {float}
              score_conditions:              # OPTIONAL
                - threshold: {integer}
                  comparison: "{op}"
                  action: "{action}"
                  applied: {float|null}
                  note: "{explanation}"

    # =========================================================================
    # GROUPS
    # Defines categorical modifiers and three-layer assessment groupings
    # =========================================================================
    groups:

      # -----------------------------------------------------------------------
      # CATEGORICAL GROUPS
      # Apply pricing modifiers based on discrete classifications
      # Referenced by signal_registry.categories.group_id
      # These are MODIFIERS, not score contributors
      # -----------------------------------------------------------------------
      categories:
        - id: "{category_group_id}"        # Unique group identifier
          label: "{Display Label}"         # Human-readable name
          description: "{purpose}"         # Group purpose
          impact: "{impact_type}"          # MODIFIER | PREMIUM_BASE
          default_cat: "{DEFAULT_CODE}"    # Fallback category code

      # -----------------------------------------------------------------------
      # THREE-LAYER ASSESSMENT GROUPS
      # Aggregate signals into scoring dimensions
      # Referenced by signal_registry.three_layer_assessment.group_id
      # -----------------------------------------------------------------------
      three_layer_assessment:
        - id: "{group_id}"                 # Unique group identifier
          label: "{Display Label}"
          description: "{purpose}"

          # RISK - weights across all groups must sum to 1.0
          risk:
            weight: {float}
            # -----------------------------------------------------------------
            # BANDED SCORE CONDITIONS (OPTIONAL) - GROUP LEVEL
            # Evaluated after signal-level conditions are processed
            # -----------------------------------------------------------------
            score_conditions:
              - threshold: {integer}       # Group composite threshold
                comparison: "{op}"         # >=, <=, ==, >, <
                action: "{action}"         # FLAG | MODIFIER | REFER
                applied: {float|null}      # For MODIFIER
                override: {tier|null}      # For REFER
                note: "{explanation}"

          # LOSS - weights across all groups must sum to 1.0
          loss:
            weight: {float}
            score_conditions:              # OPTIONAL - banded conditions
              - threshold: {integer}
                comparison: "{op}"
                action: "{action}"
                applied: {float|null}
                override: {tier|null}
                note: "{explanation}"

          # EXPOSURE - weights across all groups must sum to 1.0
          exposure:
            weight: {float}
            score_conditions:              # OPTIONAL - banded conditions
              - threshold: {integer}
                comparison: "{op}"
                action: "{action}"
                applied: {float|null}
                override: {tier|null}
                note: "{explanation}"

    # =========================================================================
    # RISK TIER BANDS
    # Maps composite risk score (0-1000) to pricing tiers
    # NOTE: score_conditions do NOT apply here - only at signal/group level
    # =========================================================================
    risk_tier_bands:
      bands:
        - id: {integer}                    # Tier number (1 = best, typically 5 = worst)
          label: "{TIER_LABEL}"            # e.g., PREFERRED, STANDARD, DECLINE
          description: "{tier_meaning}"
          interpretation:
            bands:
              min: {integer}               # Minimum score (inclusive)
              max: {integer}               # Maximum score (inclusive)
            action: "{action}"             # APPROVE | REFER | DECLINE
            application:
              # ---------------------------------------------------------------
              # PREMIUM CALCULATION METHOD
              # Choose ONE of the following methods:
              # ---------------------------------------------------------------

              # METHOD 1: PREMIUM_BASE - Fixed base premium per tier
              method: "PREMIUM_BASE"
              value: {integer}             # Base premium for tier (e.g., 15000)

              # METHOD 2: MULTIPLIER - Rate applied to basis value
              # method: "MULTIPLIER"
              # applied: {float}           # Rate multiplier (e.g., 0.0035 = 0.35%)
              # basis: "{field}"           # Field from minimum_viable_input (e.g., "tiv", "revenue", "limit")
              # VALIDATION: basis must be listed in metadata.minimum_viable_input

    # =========================================================================
    # LOSS TIER BANDS
    # Maps composite loss score (0-1000) to pricing modifiers
    # Calculation: (frequency_score × frequency_weight) + (severity_score × severity_weight)
    # Result maps to band, constrained by floor/cap
    # NOTE: score_conditions do NOT apply here - only at signal/group level
    # =========================================================================
    loss_tier_bands:
      bands:
        - id: {integer}
          label: "{LOSS_LABEL}"            # e.g., VERY_LOW, MODERATE, HIGH
          description: "{loss_meaning}"
          interpretation:
            bands:
              min: {integer}               # Score range minimum
              max: {integer}               # Score range maximum
            application:
              frequency_modifier: {float}  # Frequency component modifier
              severity_modifier: {float}   # Severity component modifier
              # Combined modifier = frequency_modifier × severity_modifier
              # Constrained by floor and cap below

      # Global constraints for loss modifiers
      constraints:
        floor: {float}                     # Minimum combined modifier (e.g., 0.75)
        cap: {float}                       # Maximum combined modifier (e.g., 1.50)

    # =========================================================================
    # EXPOSURE TIER BANDS
    # Maps exposure scores to size and complexity modifiers
    # NOTE: score_conditions do NOT apply here - only at signal/group level
    # =========================================================================
    exposure:
      size:
        weight: {float}                    # e.g., 0.60
        bands:
          - id: {integer}
            label: "{SIZE_LABEL}"          # e.g., MICRO, SMALL, LARGE
            description: "{size_meaning}"
            interpretation:
              bands:
                min: {integer}             # Score range minimum
                max: {integer}             # Score range maximum
              application:
                # ---------------------------------------------------------------
                # SIZE CALCULATION METHOD
                # Choose ONE of the following methods:
                # ---------------------------------------------------------------

                # METHOD 1: MODIFIER - Fixed multiplicative factor
                method: "MODIFIER"
                applied: {float}           # Size modifier (e.g., 0.90)

                # METHOD 2: MULTIPLIER - Rate applied to basis value
                # method: "MULTIPLIER"
                # applied: {float}         # Rate (e.g., 0.002)
                # basis: "{field}"         # Field from minimum_viable_input

              implied_thresholds:          # OPTIONAL - TIV reference for interpretation
                min: {integer|null}
                max: {integer|null}

      complexity:
        weight: {float}                    # e.g., 0.40
        bands:
          - id: {integer}
            label: "{COMPLEXITY_LABEL}"    # e.g., SIMPLE, MODERATE, COMPLEX
            description: "{complexity_meaning}"
            interpretation:
              bands:
                min: {integer}
                max: {integer}
              application:
                method: "MODIFIER"         # Complexity typically uses MODIFIER
                applied: {float}           # Complexity modifier (e.g., 1.10)

    # =========================================================================
    # LIMIT & DEDUCTIBLE CONFIGURATION (Phase V5)
    # Two modes supported: BUNDLED (menu pricing) and DECOUPLED (tower pricing)
    # =========================================================================
    limit_configuration:
      # -----------------------------------------------------------------------
      # OPTION A: BUNDLED (Menu Pricing)
      # Fixed packages with coupled limit/deductible - appropriate for SME risks
      # Simpler selection process, pre-defined combinations
      # -----------------------------------------------------------------------
      # type: "BUNDLED"
      # packages:                            # Pre-defined limit/deductible combinations
      #   - id: 1                            # Unique package identifier
      #     label: "STARTER"                 # Human-readable package name
      #     limit: 250000                    # Fixed limit for this package
      #     deductible: 10000                # Fixed deductible for this package
      #   - id: 2
      #     label: "STANDARD"
      #     limit: 500000
      #     deductible: 25000
      #   - id: 3
      #     label: "PREMIUM"
      #     limit: 1000000
      #     deductible: 50000

      # -----------------------------------------------------------------------
      # OPTION B: DECOUPLED (Tower Pricing)
      # Independent limit/deductible selection - appropriate for corporate risks
      # Maximum flexibility, ILF/deductible factor scaling applies
      # -----------------------------------------------------------------------
      type: "DECOUPLED"                    # Limits and deductibles are independent
      valid_limits:                        # Allowed limit options (in default_currency)
        - {integer}                        # e.g., 1000000, 2000000, 5000000
      valid_deductibles:                   # Allowed deductible options (in default_currency)
        - {integer}                        # e.g., 10000, 25000, 50000, 100000

    # =========================================================================
    # PRICING PARAMETERS
    # Product-type-specific ILF curves, deductible credits, taxes/fees
    # Each product_type listed in metadata.product_types should have its own
    # pricing parameters to reflect different loss development patterns
    # =========================================================================
    pricing:

      # -----------------------------------------------------------------------
      # ANCHOR POINTS (Phase V5)
      # Essential for normalization. Defines what coverage the "Base Price" buys.
      # -----------------------------------------------------------------------
      base_limit_reference: {integer}      # e.g., 1000000 ($1M)
                                           # The Risk Tier Rate (0.10%) buys THIS limit.
      
      base_deductible_reference: {integer} # e.g., 25000 ($25k)
                                           # The Risk Tier Rate assumes THIS deductible.

      # -----------------------------------------------------------------------
      # CURVES & FACTORS
      # Product-type-specific pricing (REQUIRED for each product_type)
      # -----------------------------------------------------------------------
      by_product_type:
        "{product_type_1}":                # Must match entry in metadata.product_types
          # Increased Limit Factors (ILF)
          ilf_curve:
            base_limit: {integer}          # Should match base_limit_reference
            factors:
              - limit: {integer}
                factor: {float}            # e.g., $1M=1.00, $5M=3.50

          # Deductible Adjustments
          # Can use credits (SME) or factors (Corp)
          deductible_factors:
            - deductible: {integer}
              factor: {float}              # e.g., $50k=1.00 (Anchor), $100k=0.85 (Credit)

        "{product_type_2}":                # Different product type
          # Increased Limit Factors (ILF)
          ilf_curve:
            base_limit: {integer}          # Should match base_limit_reference
            factors:
              - limit: {integer}
                factor: {float}            # e.g., $1M=1.00, $5M=3.50

          # Deductible Adjustments
          # Can use credits (SME) or factors (Corp)
          deductible_factors:
            - deductible: {integer}
              factor: {float}              # e.g., $50k=1.00 (Anchor), $100k=0.85 (Credit)

      # Shared parameters (apply to all product types)
      taxes_fees_rate: {float}             # e.g., 0.05 = 5%

# =============================================================================
# SCORE_CONDITIONS EVALUATION LOGIC
# =============================================================================
#
# score_conditions are evaluated as follows:
#
# 1. CONDITIONS ARE A LIST - Multiple thresholds can be defined
#
# 2. EVALUATION ORDER:
#    - Conditions are evaluated in list order
#    - Multiple conditions can match (not first-match-only)
#
# 3. ACTION BEHAVIOR:
#    - MODIFIER: ALL matching MODIFIER conditions apply multiplicatively
#      Example: If score=15 matches both <=20 (0.85) and <=40 (0.92),
#               both modifiers apply: final = base × 0.85 × 0.92
#
#    - FLAG: ALL matching FLAG conditions are captured and reported
#      Example: If score=85 matches both >=75 and >=80, both flags appear
#
#    - REFER: FIRST matching REFER triggers referral
#      Any associated tier override is applied
#
# 4. REQUIRED FIELDS BY ACTION:
#    - MODIFIER: requires 'applied' (float), 'note' optional
#    - FLAG: requires 'note' (string)
#    - REFER: 'override' optional (tier), 'note' optional
#
# 5. APPLIES TO:
#    - signal_registry signals (risk, loss, exposure dimensions)
#    - groups (three_layer_assessment groups)
#    - Does NOT apply to tier bands (risk_tier_bands, loss_tier_bands, exposure)
#
# =============================================================================


# =============================================================================
# MULTIPLIER METHOD VALIDATION
# =============================================================================
#
# When using method: "MULTIPLIER" in risk_tier_bands or exposure bands:
#
# 1. REQUIRED FIELDS:
#    - applied: float (the rate multiplier)
#    - basis: string (field name from minimum_viable_input)
#
# 2. VALIDATION RULE:
#    The 'basis' field MUST be listed in metadata.minimum_viable_input
#    This ensures the required data is collected during submission
#
# 3. CALCULATION:
#    premium_component = applied × submission[basis]
#    Example: applied=0.0035, basis="tiv", tiv=10000000
#             premium_component = 0.0035 × 10000000 = 35000
#
# 4. COMMON BASIS VALUES:
#    - "tiv" - Total Insured Value
#    - "limit" - Policy Limit
#    - "revenue" - Annual Revenue
#    - "payroll" - Annual Payroll
#    - "hull_value" - Hull Value (marine/aerospace)
#    - "aum" - Assets Under Management (FI)
     - "categorical" - value has been set within signal registry, categories.
#
# =============================================================================


# =============================================================================
# MULTIPLEXER ARCHITECTURE (Phase V4)
# =============================================================================
#
# The DSI Multiplexer enables "Race-Track" execution where multiple
# configurations are evaluated simultaneously using shared signal data.
#
# FLOW:
# 1. DISCOVERY: User submits minimal input (entity, product_type, market)
# 2. CANDIDATE SELECTION: Filter configs by product_type, market, routing_constraints
# 3. SIGNAL BROKER: Union all signal_ids from candidates, deduplicate, execute once
# 4. FAN-OUT: Inject shared signals into each candidate's Logic Engine
# 5. ARBITRATION: Select winner based on validity → confidence → specificity → margin
#
# METADATA FIELDS:
#
# model_specificity (1-5):
#   Used by ConfigArbiter when multiple configs approve with equal confidence.
#   Higher specificity wins (niche product preferred over general).
#   - 1 = General/Base (e.g., "Cyber General")
#   - 2 = Segment-Specific (e.g., "Cyber Tech", "Cyber Healthcare")
#   - 3 = Niche/Bespoke (e.g., "Cyber FinTech Startup")
#   - 4-5 = Highly Specialized / Custom
#
# routing_constraints:
#   Hard filters evaluated BEFORE signal execution to reduce wasted computation.
#   Configs failing constraints are excluded from the race.
#
#   Example - SME Config:
#     routing_constraints:
#       - field: "revenue"
#         operator: "<"
#         value: 50000000
#         required_in_input: false
#
#   Example - Enterprise Config:
#     routing_constraints:
#       - field: "employee_count"
#         operator: ">="
#         value: 1000
#         required_in_input: true
#
# SIGNAL COMPLETENESS:
#   The Multiplexer calculates signal_completeness for each config:
#     completeness = signals_returned_non_null / signals_defined_in_registry
#
#   This prevents "phantom approvals" where a config approves simply
#   because it lacked data to trigger referral flags.
#
#   Arbiter prefers high-confidence (>70% completeness) results over
#   low-confidence results, even if the latter has higher specificity.
#
# =============================================================================
