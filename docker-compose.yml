  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - dsi-network
  #   restart: unless-stopped

  # Redis Cache (optional - for future use)
  # redis:
  #   image: redis:7-alpine
  #   container_name: dsi-redis
  #   ports:
  #     - "6379:6379"
