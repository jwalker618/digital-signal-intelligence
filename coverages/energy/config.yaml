        applied: null
        note: Major incidents disclosed
    - id: fatalities
      question: Any work-related fatalities in past 3 years?
      query_condition:
      - return: true
        action: REFER
        override: 3
        applied: null
        note: Fatalities disclosed
    - id: regulatory_enforcement
      question: Any significant regulatory enforcement actions pending?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Pending regulatory enforcement
    - id: orphan_wells
      question: Any orphaned or idle well obligations outstanding?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Orphaned well obligations

