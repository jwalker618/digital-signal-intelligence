      - {id: safety_performance, label: Safety Performance, description: OSHA metrics, PHMSA compliance, process safety, risk: {weight: 0.15}, loss: {weight: 0.15}, exposure: {weight: 0.07}}
      - {id: environmental_compliance, label: Environmental Compliance, description: EPA violations, spills, emissions, methane, risk: {weight: 0.20}, loss: {weight: 0.20}, exposure: {weight: 0.10}}
