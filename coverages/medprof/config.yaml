      name: "MedProf \u2014 Ltc / Snf / Assisted Living"
      description: "Medical Professional Liability \u2014 hospital + physician-group + nursing-home + telehealth + SME"
      version: 2.2.0
      product_types:
      - hospital_mpl
      - physician_mpl
      - nursing_home_mpl
      - telehealth_mpl
      applicable_markets:
      - us
      - uk
      minimum_viable_input:
      - field: entity_name
        description: Legal name
      - field: employee_count
        description: "Total headcount \u2014 routes between sub-configs"
      - field: facility_type
        description: 'One of: hospital, physician_group, ltc, telehealth, solo'
      - field: limit
        description: Requested limit in USD
      - field: annual_patient_encounters
        description: Exposure basis
      min_premium: 5000
      default_currency: USD
      model_specificity: 2
      routing_constraints:
      - field: facility_type
        operator: ==
        value: ltc
        required_in_input: true
    direct_queries:
    - id: claims_history
      question: Has the insured had any claims in the past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: null
        applied: null
        note: Prior claims - review required
    - id: prior_coverage
      question: Does the insured have prior coverage?
      query_condition:
      - return: false
        action: FLAG
        override: null
        applied: null
        note: No prior coverage
    - id: phi_handler
      question: Do you process Protected Health Information (PHI)?
      query_condition:
      - return: true
        action: MODIFIER
        override: null
        applied: 1.25
        note: PHI handler - HIPAA exposure
