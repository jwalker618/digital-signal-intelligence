  # ===========================================================================
  # FINANCIAL INSTITUTIONS SME
  # Target: AUM <= $500M. Fixed Pricing. Bundled Limits. Simplified signals.
  # ===========================================================================
  fi_sme:
    metadata:
      name: "DSI Financial Institutions SME Model"
      description: "Streamlined FI coverage for community banks, small advisers, and funds"
      version: "2.3.0"
      product_types:
        - "financial_institution_bond"
        - "professional_liability"
        - "directors_officers"
        - "cyber_liability"
        - "employment_practices"
      applicable_markets: ["us"]
      minimum_viable_input:
        required:
          - field: "client_name"
          - field: "product_type"
          - field: "limit"
          - field: "total_assets"
      min_premium: 5000
      default_currency: "USD"

      model_specificity: 2
      routing_constraints:
        - field: "total_assets"
          operator: "<="
          value: 500000000
          required_in_input: true

    direct_queries:
      - id: "regulatory_action_sme"
        question: "Any pending regulatory enforcement actions or MRAs?"
        query_condition:
          - return: true
            action: "REFER"
            override: 4
            note: "Regulatory action disclosed"
      - id: "cyber_incident_sme"
        question: "Any reportable cyber incidents or wire fraud losses in past 24 months?"
        query_condition:
          - return: true
            action: "REFER"
            override: 4
            note: "Recent cyber/fraud incident"

    # Reduced Signal Registry (Focused on core financials, cyber, and regulatory)
    signal_registry:
      - id: "institution_type"
        inference_utility_function: "institution_type_basefunction"
        proxy_tier: "INFERRED_PROXY"
        categories:
          group_id: "institution_type"
          source: "metadata.institution_type"
          features:
            - {cat: "COMMUNITY_BANK", label: "Community Bank", applied: 0.85}
            - {cat: "CREDIT_UNION", label: "Credit Union", applied: 0.80}
            - {cat: "INVESTMENT_ADVISER", label: "Investment Adviser", applied: 1.10}
            - {cat: "FINTECH", label: "Fintech Startup", applied: 1.50}
            - {cat: "OTHER", label: "Other", applied: 1.00}
      
      - id: "examination_rating"
        inference_utility_function: "examination_rating_basefunction"
        proxy_tier: "DIRECT_OBSERVABLE"
        three_layer_assessment:
          group_id: "regulatory_compliance"
          risk: {correlation_direction: "positive", weight: 0.60, score_conditions: [{threshold: 40, comparison: "<=", action: "REFER", override: 4, note: "Weak exam rating"}]}
          loss: {frequency: {correlation_direction: "positive", weight: 0.50}}

      - id: "enforcement_action"
        inference_utility_function: "enforcement_action_basefunction"
        proxy_tier: "DIRECT_OBSERVABLE"
        three_layer_assessment:
          group_id: "regulatory_compliance"
          risk: {correlation_direction: "positive", weight: 0.40, score_conditions: [{threshold: 30, comparison: "<=", action: "REFER", override: 5, note: "Active enforcement"}]}
          loss: {frequency: {correlation_direction: "positive", weight: 0.50}}

      - id: "capital_ratio"
        inference_utility_function: "capital_ratio_basefunction"
        proxy_tier: "DIRECT_OBSERVABLE"
        three_layer_assessment:
          group_id: "financial_condition"
          risk: {correlation_direction: "positive", weight: 0.50, score_conditions: [{threshold: 40, comparison: "<=", action: "REFER", override: 4, note: "Capital adequacy concerns"}]}
          loss: {severity: {correlation_direction: "positive", weight: 0.50}}
          exposure: {size: {correlation_direction: "positive", weight: 0.50}}

      - id: "asset_quality"
        inference_utility_function: "asset_quality_basefunction"
        proxy_tier: "DIRECT_OBSERVABLE"
        three_layer_assessment:
          group_id: "financial_condition"
          risk: {correlation_direction: "positive", weight: 0.50}
          loss: {frequency: {correlation_direction: "positive", weight: 0.50}}
          exposure: {size: {correlation_direction: "positive", weight: 0.50}}

      - id: "tls_score"
        inference_utility_function: "tls_configuration_basefunction"
        proxy_tier: "DIRECT_OBSERVABLE"
        three_layer_assessment:
          group_id: "cyber_security"
          risk: {correlation_direction: "positive", weight: 0.50}
          loss: {frequency: {correlation_direction: "positive", weight: 0.50}}

      - id: "breach_history"
        inference_utility_function: "breach_history_basefunction"
        proxy_tier: "DIRECT_OBSERVABLE"
        three_layer_assessment:
          group_id: "cyber_security"
          risk: {correlation_direction: "positive", weight: 0.50, score_conditions: [{threshold: 35, comparison: "<=", action: "REFER", override: 4, note: "Breach history"}]}
          loss: {severity: {correlation_direction: "positive", weight: 0.50}}

      - id: "litigation"
        inference_utility_function: "litigation_basefunction"
        proxy_tier: "DIRECT_OBSERVABLE"
        three_layer_assessment:
          group_id: "operational_risk"
          risk: {correlation_direction: "positive", weight: 1.00}
          loss: {frequency: {correlation_direction: "positive", weight: 1.00}}

    groups:
      categories:
        - {id: "institution_type", label: "Institution Type", impact: "MODIFIER", default_cat: "OTHER"}
      three_layer_assessment:
        - id: "regulatory_compliance"
