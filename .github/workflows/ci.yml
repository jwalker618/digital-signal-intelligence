name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, claude/* ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Run Black (code formatting)
        run: black .

      - name: Run isort (import sorting)
        run: isort .

      - name: Run Flake8 (linting)
        run: |
          set -o pipefail
          flake8 models/ api/ examples/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503,E501,F541,F841 \
            --format=default \
            > flake8-report.txt || true

      - name: upload flake8 report
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: flake8-report.txt

      - name: Run MyPy (type checking)
        run: |
          set -o pipefail
          mypy models/ api/ \
          --ignore-missing-imports \
          > mypy-report.txt 
        continue-on-error: true

      - name: Upload MyPy report
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy-report.txt

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with pytest
        run: |
          pytest models/cyber/ \
          --cov=models/cyber \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          -v \
          --junitxml=pytest-report-${{ matrix.python-version }}.xml

      - name: check pytest XML exists
        run: ls -l pytest-report-${{ matrix.python-version }}.xml || echo "XML not found"
          
      - name: Upload pytest report
        if: always() # ensures upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: pytest-report-${{ matrix.python-version }}.xml
          if-no-files-found: ignore
          
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
          if-no-files-found: ignore

