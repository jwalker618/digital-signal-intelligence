  # ===========================================================================
  # ENERGY UPSTREAM DEEPWATER
  # ===========================================================================
  energy_upstream_deepwater:
    metadata:
      name: DSI Energy Upstream Deepwater Pricing Model
      description: Deepwater upstream energy operations — subsea, floating, and fixed platform risks
      version: 2.2.0
      product_types:
      - property_damage
      - business_interruption
      - control_of_well
      - operators_extra_expense
      - third_party_liability
      - pollution_liability
      - removal_of_wreck
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mena
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: property_damage, business_interruption, control_of_well, operators_extra_expense, third_party_liability, pollution_liability, removal_of_wreck'
        - field: limit
          description: Requested limit in USD
        - field: tiv
          description: Total Insured Value in USD
      min_premium: 500000
      default_currency: USD
      model_specificity: 2
      routing_constraints:
      - field: tiv
        operator: ">"
        value: 100000000
        required_in_input: true
      - field: operation_segment
        operator: "="
        value: UPSTREAM_DEEPWATER
        required_in_input: true

    direct_queries:
    - id: major_incidents
      question: Any major subsea or platform incidents (blowout, riser failure, structural compromise) in past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Major deepwater incidents disclosed
    - id: fatalities
      question: Any work-related fatalities in past 3 years?
      query_condition:
      - return: true
        action: REFER
        override: 3
        applied: null
        note: Fatalities disclosed
    - id: bop_failure
      question: Any BOP system failures or emergency disconnects in past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: BOP reliability concerns
    - id: hurricane_exposure
      question: Are assets located in active hurricane zones (Gulf of Mexico, West Africa)?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Hurricane zone exposure

