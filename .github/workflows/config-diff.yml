name: Config Diff

# V6 Phase 2 (C7): On every PR that touches coverages/**/config.yaml,
# render a unified diff of the generated logic.md and post it (or update
# the existing comment) on the PR so reviewers can see the pricing
# narrative delta without reading raw YAML.

on:
  pull_request:
    paths:
      - 'coverages/**/config.yaml'
      - 'coverages/doc_generator.py'
      - 'infrastructure/builder/cli.py'

permissions:
  contents: read
  pull-requests: write

jobs:
  config-diff:
    name: Render logic.md diff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Identify changed configs
        id: changed
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          mapfile -t changed < <(git diff --name-only "$base_sha" "$head_sha" -- 'coverages/**/config.yaml')
          printf 'changed=%s\n' "$(printf '%s ' "${changed[@]}")" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${changed[@]}" > changed_configs.txt
          echo "count=${#changed[@]}" >> "$GITHUB_OUTPUT"

      - name: Render diffs
        if: steps.changed.outputs.count != '0'
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          mkdir -p .config-diff-out
          : > .config-diff-out/combined.md
          echo "## V6 Config Diff — rendered \`logic.md\`" >> .config-diff-out/combined.md
          echo "" >> .config-diff-out/combined.md
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            coverage=$(basename "$(dirname "$path")")
            tmp_base=$(mktemp --suffix=.yaml)
            if git cat-file -e "$base_sha:$path" 2>/dev/null; then
              git show "$base_sha:$path" > "$tmp_base"
            else
              : > "$tmp_base"
            fi
            out=".config-diff-out/${coverage}.md"
            python -m infrastructure.builder.cli diff-config \
              --base-file "$tmp_base" \
              --head-file "$path" \
              --coverage "$coverage" \
              --output "$out"
            cat "$out" >> .config-diff-out/combined.md
            echo "" >> .config-diff-out/combined.md
          done < changed_configs.txt

      - name: Upload diff artefact
        if: steps.changed.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: config-diff
          path: .config-diff-out/
          if-no-files-found: ignore

      - name: Post or update PR comment
        if: steps.changed.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.config-diff-out/combined.md', 'utf8');
            const marker = '<!-- dsi:v6-config-diff -->';
            const finalBody = `${marker}\n${body}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body: finalBody,
              });
            }
