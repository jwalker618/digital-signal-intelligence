# =============================================================================
# NEW SIGNAL GROUPS
# =============================================================================

new_signal_groups:

  # -------------------------------------------------------------------------
  # GROUP 1: CARGO QUALITY
  # -------------------------------------------------------------------------
  # Specialist signals for cargo insurance — commodity type, packaging,
  # transit mode, storage, and theft exposure. Cargo risk is fundamentally
  # different from hull risk; loss drivers are goods-specific.
  # -------------------------------------------------------------------------
  - id: cargo_quality
    label: Cargo Quality
    description: "Cargo type, packaging, transit mode, storage conditions, and theft/pilferage exposure"
    group_type: three_layer_assessment

    signals:
      - id: cargo_commodity_class
        name: Cargo Commodity Classification
        description: "Commodity hazard class — from low (finished goods) to high (hazmat, perishable, livestock)"
        group_id: cargo_quality
        signal_type: categorical
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        category_source: metadata.cargo_commodity_class
        categories:
          - {cat: LOW_HAZARD, label: Low Hazard (Finished Goods/Dry Cargo), applied: 0.80}
          - {cat: MODERATE, label: Moderate (Machinery/Electronics/Vehicles), applied: 1.0}
          - {cat: HIGH_VALUE, label: High Value (Pharmaceuticals/Fine Art/Bullion), applied: 1.30}
          - {cat: PERISHABLE, label: Perishable (Reefer Cargo/Livestock), applied: 1.25}
          - {cat: HAZMAT, label: Hazardous Materials (IMO Classes), applied: 1.50}
          - {cat: PROJECT, label: Project Cargo (Oversized/Heavy Lift), applied: 1.35}

      - id: packaging_quality
        name: Packaging & Stowage Quality
        description: "Container condition, packaging standards, stowage compliance with IMDG/CTU codes"
        group_id: cargo_quality
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.10

      - id: transit_mode
        name: Transit Mode Risk
        description: "Primary transit mode — ocean, multimodal, inland waterway; transhipment count increases loss frequency"
        group_id: cargo_quality
        signal_type: categorical
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        category_source: metadata.transit_mode
        categories:
          - {cat: OCEAN_DIRECT, label: Direct Ocean (Port-to-Port), applied: 0.85}
          - {cat: OCEAN_TRANSHIP, label: Ocean with Transhipment, applied: 1.10}
          - {cat: MULTIMODAL, label: Multimodal (Ocean + Land), applied: 1.15}
          - {cat: INLAND, label: Inland Waterway Only, applied: 0.90}
          - {cat: AIR_SEA, label: Air-Sea Combined, applied: 1.05}

      - id: storage_exposure
        name: Storage & Warehousing Exposure
        description: "Duration and quality of intermediate storage; port congestion and dwell time"
        group_id: cargo_quality
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: WEEKLY
        three_layer:
          risk_weight: 0.10
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.10
          exposure_size_weight: 0.10

      - id: theft_pilferage_exposure
        name: Theft & Pilferage Exposure
        description: "Route-specific theft risk; high-value cargo attractiveness; security measures in transit"
        group_id: cargo_quality
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.15
          score_conditions:
            - {min: 0, max: 30, action: FLAG, note: "High theft/pilferage exposure route"}

      - id: temperature_control
        name: Temperature Control Adequacy
        description: "Reefer container condition, cold chain integrity, monitoring systems for perishable/pharma cargo"
        group_id: cargo_quality
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          risk_direction: positive
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.15

  # -------------------------------------------------------------------------
  # GROUP 2: TANKER RISK
  # -------------------------------------------------------------------------
  # Tanker-specific risk factors — pollution, vetting, double hull,
  # cargo compatibility, tank cleaning. Tankers carry unique liability
  # exposure from oil pollution and chemical spills.
  # -------------------------------------------------------------------------
  - id: tanker_risk
    label: Tanker Risk
    description: "Tanker-specific risk — vetting status, pollution exposure, cargo compatibility, hull construction"
    group_type: three_layer_assessment

    signals:
      - id: tanker_vetting_status
        name: Tanker Vetting Status
        description: "SIRE/CDI inspection results; oil major vetting approval status"
        group_id: tanker_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: WEEKLY
        three_layer:
          risk_weight: 0.25
          risk_direction: positive
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.10
          score_conditions:
            - {min: 0, max: 30, action: REFER, override: 4, note: "Failed or expired vetting"}
            - {min: 31, max: 50, action: FLAG, note: "Vetting concerns — observations outstanding"}

      - id: pollution_liability_exposure
        name: Pollution Liability Exposure
        description: "CLC/IOPC exposure; P&I club pollution cover adequacy; spill response capability"
        group_id: tanker_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          loss_severity_weight: 0.30
          exposure_size_weight: 0.20
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "Severe pollution liability exposure"}

      - id: double_hull_compliance
        name: Double Hull Compliance
        description: "MARPOL double-hull status; structural condition of hull; age of coating systems"
        group_id: tanker_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          risk_direction: positive
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.20

      - id: cargo_compatibility
        name: Cargo Compatibility & History
        description: "Grade-specific tank cleaning compliance; cargo contamination claim history"
        group_id: tanker_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.10

      - id: sts_operations
        name: Ship-to-Ship Transfer Operations
        description: "Frequency and quality of STS operations; compliance with OCIMF guidelines"
        group_id: tanker_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.10
          score_conditions:
            - {min: 0, max: 35, action: FLAG, note: "STS operations with compliance concerns"}

  # -------------------------------------------------------------------------
  # GROUP 3: OFFSHORE MARINE
  # -------------------------------------------------------------------------
  # Specialist signals for offshore marine units — FPSOs, jack-ups,
  # semi-submersibles, offshore construction vessels. Different risk
  # profile from trading vessels — stationary or semi-stationary,
  # high-value, complex operations.
  # -------------------------------------------------------------------------
  - id: offshore_marine
    label: Offshore Marine
    description: "Offshore unit risk — FPSO, jack-up, semi-sub, construction vessel, mooring integrity"
    group_type: three_layer_assessment

    signals:
      - id: unit_type
        name: Offshore Unit Type
        description: "Classification of offshore unit — FPSO, jack-up, semi-sub, drill ship, OSV, construction"
        group_id: offshore_marine
        signal_type: categorical
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        category_source: metadata.offshore_unit_type
        categories:
          - {cat: FPSO, label: FPSO/FSO, applied: 1.20}
          - {cat: JACKUP, label: Jack-Up Rig, applied: 1.10}
          - {cat: SEMI_SUB, label: Semi-Submersible, applied: 1.25}
          - {cat: DRILL_SHIP, label: Drill Ship, applied: 1.15}
          - {cat: OSV, label: Offshore Supply Vessel, applied: 0.90}
          - {cat: CONSTRUCTION, label: Construction/Pipe-Lay Vessel, applied: 1.30}
          - {cat: WIND_INSTALLATION, label: Wind Turbine Installation Vessel, applied: 1.15}

      - id: mooring_integrity
        name: Mooring System Integrity
        description: "Mooring system age, inspection compliance, chain/anchor condition for stationary units"
        group_id: offshore_marine
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          risk_direction: positive
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.20

      - id: dp_system_reliability
        name: Dynamic Positioning Reliability
        description: "DP class, redundancy level, incident history, annual DP trials compliance"
        group_id: offshore_marine
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          risk_direction: positive
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.15
          score_conditions:
            - {min: 0, max: 30, action: REFER, override: 4, note: "DP system reliability concerns"}

      - id: metocean_exposure
        name: Metocean Exposure
        description: "Operating location weather severity — wave height, wind speed, current, ice exposure"
        group_id: offshore_marine
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.15
          exposure_size_weight: 0.15

      - id: offshore_class_compliance
        name: Offshore Classification Compliance
        description: "Class society survey status; special survey compliance; conditions of class outstanding"
        group_id: offshore_marine
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_frequency_weight: 0.10
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "Class conditions outstanding"}

  # -------------------------------------------------------------------------
  # GROUP 4: PORT STATE & REGULATORY COMPLIANCE
  # -------------------------------------------------------------------------
  # Expanded regulatory compliance signals beyond the existing
  # flag_state_quality group. Covers port state control, ISM/ISPS
  # audit quality, and sanctions screening depth.
  # -------------------------------------------------------------------------
  - id: port_state_compliance
    label: Port State & Regulatory Compliance
    description: "PSC detention history, ISM/ISPS audit quality, sanctions screening, class survey status"
    group_type: three_layer_assessment

    signals:
      - id: psc_detention_rate
        name: PSC Detention Rate
        description: "Port state control detention frequency relative to fleet size; deficiency categories"
        group_id: port_state_compliance
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: WEEKLY
        three_layer:
          risk_weight: 0.25
          risk_direction: positive
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.10
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "High PSC detention rate"}
            - {min: 26, max: 45, action: FLAG, note: "Elevated PSC deficiencies"}

      - id: ism_audit_quality
        name: ISM Audit Quality
        description: "ISM Code Document of Compliance status; major non-conformities; audit frequency"
        group_id: port_state_compliance
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.25
          risk_direction: positive
          loss_frequency_weight: 0.15

      - id: isps_compliance
        name: ISPS Compliance
        description: "International Ship and Port Facility Security code compliance; security plan quality"
        group_id: port_state_compliance
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_frequency_weight: 0.10

      - id: sanctions_screening_depth
        name: Sanctions Screening Depth
        description: "Thoroughness of sanctions and restricted party screening across charterers, cargo owners, ports"
        group_id: port_state_compliance
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: WEEKLY
        three_layer:
          risk_weight: 0.20
          risk_direction: positive
          loss_severity_weight: 0.15
          score_conditions:
            - {min: 0, max: 30, action: REFER, override: 5, note: "Inadequate sanctions screening"}

      - id: class_survey_currency
        name: Classification Survey Currency
        description: "Currency of class surveys — annual, intermediate, special; overdue survey flags"
        group_id: port_state_compliance
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_frequency_weight: 0.10

# =============================================================================
# CONFIGURATIONS
# =============================================================================

configurations:

  # =========================================================================
  # 1. MARINE CARGO
  # =========================================================================
  # Specialist cargo insurance model. Routes on cargo product type.
  # Different loss drivers from hull — commodity, packaging, theft,
  # temperature control, transit mode. TIV is shipment value.
  # =========================================================================
  - id: marine_cargo
    name: DSI Marine Cargo Specialist Model
    description: "Marine cargo insurance — commodity-specific, transit risk, storage exposure"
    model_specificity: 3
    min_premium: 25000

    product_types:
      - cargo

    routing_constraints:
      - {field: product_type, operator: "==", value: cargo, required_in_input: true}
      - {field: tiv, operator: ">=", value: 5000000, required_in_input: true}

    direct_queries:
      - id: prior_cargo_claims
        question: Any cargo claims exceeding $500K in the past 3 years?
        conditions: [{action: REFER, override: 4, note: "Large prior cargo claims"}]
      - id: hazmat_cargo
        question: Does this shipment include IMO-classified hazardous materials?
        conditions: [{action: REFER, override: 3, note: "Hazardous cargo — specialist review"}]
      - id: open_cover
        question: Is this an open cover (blanket) declaration or a specific voyage policy?
        conditions: [{action: FLAG, note: "Open cover — accumulation monitoring required"}]
      - id: war_zone_transit
        question: Does the transit route pass through any Joint War Committee listed areas?
        conditions: [{action: REFER, override: 4, note: "JWC listed area transit"}]
      - id: refrigerated_cargo
        question: Is the cargo temperature-controlled (reefer)?
        conditions: [{action: FLAG, note: "Reefer cargo — cold chain exposure"}]

    category_groups: [cargo_commodity_class, transit_mode, operator_type]

    group_weights:
      - {group_id: cargo_quality, risk_weight: 0.35, loss_weight: 0.35, exposure_weight: 0.30}
      - {group_id: port_state_compliance, risk_weight: 0.15, loss_weight: 0.15, exposure_weight: 0.10}
      - {group_id: trading_pattern, risk_weight: 0.15, loss_weight: 0.15, exposure_weight: 0.20}
      - {group_id: fleet_age_band, risk_weight: 0.10, loss_weight: 0.10, exposure_weight: 0.10}
      - {group_id: flag_state_quality, risk_weight: 0.10, loss_weight: 0.10, exposure_weight: 0.10}
      - {group_id: corporate_footprint, risk_weight: 0.10, loss_weight: 0.10, exposure_weight: 0.10}
      - {group_id: firm_stability, risk_weight: 0.05, loss_weight: 0.05, exposure_weight: 0.10}

    risk_tier_bands:
      method: MULTIPLIER
      basis: tiv
      preferred_rate: 0.0010
      standard_plus_rate: 0.0018
      standard_rate: 0.0030
      substandard_rate: 0.0050
      decline_rate: 0.0075

    limit_configuration:
      type: DECOUPLED
      valid_limits: [1000000, 2000000, 5000000, 10000000, 25000000, 50000000, 100000000, 250000000]
      valid_deductibles: [10000, 25000, 50000, 100000, 250000, 500000, 1000000]

    pricing:
      base_limit_reference: 5000000
      base_deductible_reference: 50000
      taxes_fees_rate: 0.03
      by_product_type:
        - product_type: cargo
          ilf_curve:
            base_limit: 5000000
            factors:
              - {limit: 1000000, factor: 0.45}
              - {limit: 2000000, factor: 0.70}
              - {limit: 5000000, factor: 1.0}
              - {limit: 10000000, factor: 1.5}
              - {limit: 25000000, factor: 2.5}
              - {limit: 50000000, factor: 3.8}
              - {limit: 100000000, factor: 5.8}
              - {limit: 250000000, factor: 10.0}
          deductible_factors:
            - {deductible: 10000, factor: 1.20}
            - {deductible: 25000, factor: 1.10}
            - {deductible: 50000, factor: 1.0}
            - {deductible: 100000, factor: 0.88}
            - {deductible: 250000, factor: 0.75}
            - {deductible: 500000, factor: 0.65}
            - {deductible: 1000000, factor: 0.55}

  # =========================================================================
  # 2. MARINE TANKER
  # =========================================================================
  # Specialist model for tanker fleets — crude, product, chemical,
  # LNG/LPG. Unique pollution liability, vetting requirements, and
  # regulatory burden. Hull value basis.
  # =========================================================================
  - id: marine_tanker
    name: DSI Marine Tanker Specialist Model
    description: "Tanker fleet hull & liability — crude, product, chemical, gas carriers"
    model_specificity: 4
    min_premium: 100000

    routing_constraints:
