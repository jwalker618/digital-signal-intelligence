# =============================================================================
# NEW SIGNAL GROUPS
# =============================================================================

new_signal_groups:

  # -------------------------------------------------------------------------
  # GROUP 1: GENERAL LIABILITY CLASS RISK
  # -------------------------------------------------------------------------
  # Classification-driven risk factors for general liability. The ISO
  # GL class code is the single strongest predictor of loss frequency.
  # This group captures class-specific hazards and premises exposure.
  # -------------------------------------------------------------------------
  - id: gl_class_risk
    label: General Liability Class Risk
    description: "ISO GL class code, premises hazard, products/completed operations, contractual exposure"
    group_type: three_layer_assessment

    signals:
      - id: gl_class_code
        name: GL Classification Code
        description: "ISO CGL classification — drives base rate; captures industry-specific hazard profile"
        group_id: gl_class_risk
        signal_type: categorical
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        category_source: metadata.gl_class_code
        categories:
          - {cat: LOW, label: Low Hazard (Office/Professional Services), applied: 0.65}
          - {cat: MODERATE, label: Moderate (Retail/Hospitality/Light Mfg), applied: 1.0}
          - {cat: HIGH, label: High Hazard (Construction/Heavy Mfg/Trucking), applied: 1.45}
          - {cat: SEVERE, label: Severe (Demolition/Roofing/Blasting), applied: 2.0}

      - id: premises_condition
        name: Premises Condition & Maintenance
        description: "Physical condition of insured premises; slip-trip-fall exposure; ADA compliance"
        group_id: gl_class_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          risk_direction: positive
          loss_frequency_weight: 0.25
          loss_severity_weight: 0.10

      - id: products_completed_ops
        name: Products & Completed Operations Exposure
        description: "Products liability tail; completed operations exposure for contractors; recall potential"
        group_id: gl_class_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.25
          exposure_complexity_weight: 0.15
          score_conditions:
            - {min: 0, max: 25, action: FLAG, note: "Significant products/completed ops tail exposure"}

      - id: contractual_liability
        name: Contractual Liability Exposure
        description: "Hold-harmless agreements, indemnification clauses; assumption of others' liability"
        group_id: gl_class_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_severity_weight: 0.15
          exposure_complexity_weight: 0.15

      - id: subcontractor_management
        name: Subcontractor Management
        description: "Quality of subcontractor vetting, certificate tracking, additional insured compliance"
        group_id: gl_class_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_frequency_weight: 0.15
          exposure_complexity_weight: 0.10

      - id: litigation_environment
        name: Litigation Environment
        description: "Jurisdictional exposure; nuclear verdict trends; plaintiff bar activity in domicile state"
        group_id: gl_class_risk
        signal_type: three_layer
        proxy_tier: COHORT_INFERENCE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_severity_weight: 0.20
          exposure_size_weight: 0.10
          score_conditions:
            - {min: 0, max: 30, action: FLAG, note: "High nuclear verdict jurisdiction"}

  # -------------------------------------------------------------------------
  # GROUP 2: WORKPLACE SAFETY
  # -------------------------------------------------------------------------
  # Workers compensation risk factors. OSHA compliance, experience
  # modification factor, and injury prevention programmes are the
  # primary drivers of WC loss frequency and severity.
  # -------------------------------------------------------------------------
  - id: workplace_safety
    label: Workplace Safety
    description: "OSHA compliance, experience modification, safety programmes, injury patterns"
    group_type: three_layer_assessment

    signals:
      - id: experience_modification
        name: Experience Modification Factor
        description: "NCCI experience mod — actual vs expected losses; most direct predictor of WC performance"
        group_id: workplace_safety
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.30
          risk_direction: positive
          loss_frequency_weight: 0.25
          loss_severity_weight: 0.15
          score_conditions:
            - {min: 0, max: 30, action: REFER, override: 4, note: "Very poor experience mod (>1.5)"}
            - {min: 31, max: 50, action: FLAG, note: "Above-average experience mod"}

      - id: osha_compliance
        name: OSHA Compliance Record
        description: "OSHA citation history; serious/willful violations; injury/illness rates vs industry average"
        group_id: workplace_safety
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.25
          risk_direction: positive
          loss_frequency_weight: 0.20
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "Serious OSHA violations"}

      - id: safety_programme_quality
        name: Safety Programme Quality
        description: "Formal safety programme maturity; training frequency; near-miss reporting; safety culture"
        group_id: workplace_safety
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          risk_direction: positive
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.10

      - id: return_to_work_programme
        name: Return-to-Work Programme
        description: "Modified duty programme; early intervention; medical case management effectiveness"
        group_id: workplace_safety
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          risk_direction: positive
          loss_severity_weight: 0.20

      - id: occupational_disease_exposure
        name: Occupational Disease Exposure
        description: "Exposure to silica, asbestos, noise, repetitive motion, chemical agents — latent disease risk"
        group_id: workplace_safety
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_severity_weight: 0.20
          exposure_complexity_weight: 0.15
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "Significant occupational disease exposure"}

  # -------------------------------------------------------------------------
  # GROUP 3: AUTO FLEET RISK
  # -------------------------------------------------------------------------
  # Commercial auto fleet risk factors — driver quality, fleet
  # composition, telematics, route hazard, and MVR screening.
  # -------------------------------------------------------------------------
  - id: auto_fleet_risk
    label: Auto Fleet Risk
    description: "Fleet composition, driver quality, telematics, route hazard, accident frequency"
    group_type: three_layer_assessment

    signals:
      - id: fleet_composition
        name: Fleet Composition
        description: "Vehicle types in fleet — light vehicles, medium trucks, heavy trucks, specialized equipment"
        group_id: auto_fleet_risk
        signal_type: categorical
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        category_source: metadata.fleet_composition
        categories:
          - {cat: LIGHT, label: Light Vehicles (Cars/Vans/Pickups), applied: 0.80}
          - {cat: MEDIUM, label: Medium Trucks (Class 3-6), applied: 1.0}
          - {cat: HEAVY, label: Heavy Trucks (Class 7-8/Long Haul), applied: 1.35}
          - {cat: SPECIALIZED, label: Specialized (Tankers/Hazmat/Oversized), applied: 1.60}
          - {cat: MIXED, label: Mixed Fleet, applied: 1.10}

      - id: driver_quality
        name: Driver Quality & MVR Screening
        description: "MVR screening programme; violation rates; CDL compliance; driver training programme"
        group_id: auto_fleet_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.25
          risk_direction: positive
          loss_frequency_weight: 0.30
          loss_severity_weight: 0.10

      - id: telematics_adoption
        name: Telematics & Safety Technology
        description: "Telematics penetration; dashcam deployment; collision avoidance systems; ELD compliance"
        group_id: auto_fleet_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.10

      - id: route_hazard
        name: Route Hazard Profile
        description: "Typical operating radius; highway vs urban; seasonal exposure; state-specific hazards"
        group_id: auto_fleet_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_frequency_weight: 0.10
          loss_severity_weight: 0.10
          exposure_size_weight: 0.10

      - id: accident_frequency
        name: Accident Frequency & Severity
        description: "Historical accident rate per million miles; DOT reportable incidents; severity trend"
        group_id: auto_fleet_risk
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          loss_frequency_weight: 0.25
          loss_severity_weight: 0.20
          score_conditions:
            - {min: 0, max: 30, action: REFER, override: 4, note: "High accident frequency rate"}

      - id: fleet_maintenance
        name: Fleet Maintenance Programme
        description: "Preventive maintenance programme; DOT inspection pass rate; vehicle age distribution"
        group_id: auto_fleet_risk
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_frequency_weight: 0.10

  # -------------------------------------------------------------------------
  # GROUP 4: ENVIRONMENTAL LIABILITY
  # -------------------------------------------------------------------------
  # Environmental exposure signals — pollution conditions, remediation
  # history, regulatory compliance, storage tank quality. Long-tail
  # exposure with severe regulatory-driven costs.
  # -------------------------------------------------------------------------
  - id: environmental_liability
    label: Environmental Liability
    description: "Pollution conditions, remediation history, tank compliance, regulatory exposure"
    group_type: three_layer_assessment

    signals:
      - id: pollution_conditions
        name: Known Pollution Conditions
        description: "Existing contamination on-site; Phase I/II ESA results; remediation status"
        group_id: environmental_liability
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.25
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.25
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "Known unremediated contamination"}

      - id: ust_ast_compliance
        name: Underground/Aboveground Storage Tank Compliance
        description: "UST/AST regulatory compliance; leak detection; spill prevention; tank age and construction"
        group_id: environmental_liability
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          risk_direction: positive
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.15

      - id: regulatory_enforcement_history
        name: Environmental Regulatory Enforcement
        description: "EPA/state agency enforcement actions; consent orders; NOVs; penalty history"
        group_id: environmental_liability
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.15
          score_conditions:
            - {min: 0, max: 30, action: REFER, override: 4, note: "Active environmental enforcement"}

      - id: waste_management_practices
        name: Waste Management Practices
        description: "Hazardous waste generation; disposal practices; RCRA compliance; manifest tracking"
        group_id: environmental_liability
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.10

      - id: third_party_site_exposure
        name: Third-Party Site Exposure
        description: "CERCLA/Superfund potential; off-site disposal location quality; PRP exposure"
        group_id: environmental_liability
        signal_type: three_layer
        proxy_tier: COHORT_INFERENCE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_severity_weight: 0.20
          exposure_complexity_weight: 0.15
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "CERCLA/Superfund PRP exposure"}

  # -------------------------------------------------------------------------
  # GROUP 5: UMBRELLA / EXCESS EXPOSURE
  # -------------------------------------------------------------------------
  # Umbrella and excess liability signals — underlying programme
  # quality, attachment point adequacy, stacking risk, and nuclear
  # verdict exposure in the excess layers.
  # -------------------------------------------------------------------------
  - id: umbrella_exposure
    label: Umbrella & Excess Exposure
    description: "Underlying programme quality, attachment adequacy, stacking, nuclear verdict exposure"
    group_type: three_layer_assessment

    signals:
      - id: underlying_programme_quality
        name: Underlying Programme Quality
        description: "Adequacy of underlying GL/auto/WC/EL limits; gaps in underlying coverage"
        group_id: umbrella_exposure
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.30
          risk_direction: positive
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.15

      - id: attachment_point_adequacy
        name: Attachment Point Adequacy
        description: "Whether underlying limits are sufficient to absorb expected frequency losses"
        group_id: umbrella_exposure
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.25
          risk_direction: positive
          loss_frequency_weight: 0.25
          loss_severity_weight: 0.10

      - id: nuclear_verdict_exposure
        name: Nuclear Verdict Exposure
        description: "Exposure to jurisdiction-specific outsized verdicts; class action potential; mass tort"
        group_id: umbrella_exposure
        signal_type: three_layer
        proxy_tier: COHORT_INFERENCE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          loss_severity_weight: 0.30
          exposure_size_weight: 0.15
          score_conditions:
            - {min: 0, max: 25, action: REFER, override: 4, note: "Severe nuclear verdict exposure"}
            - {min: 26, max: 45, action: FLAG, note: "Elevated verdict jurisdiction"}

      - id: tower_position
        name: Tower Position & Layer Exposure
        description: "Position in excess tower — lead umbrella vs high-excess; buffer layer adequacy"
        group_id: umbrella_exposure
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          loss_severity_weight: 0.15
          exposure_complexity_weight: 0.20

  # -------------------------------------------------------------------------
  # GROUP 6: PREMISES & OPERATIONS
  # -------------------------------------------------------------------------
  # Cross-cutting premises and operations signals applicable to
  # GL, WC, and umbrella. Public access, security, incident response.
  # -------------------------------------------------------------------------
  - id: premises_operations
    label: Premises & Operations
    description: "Public access, security measures, incident response, contractual controls"
    group_type: three_layer_assessment

    signals:
      - id: public_access_volume
        name: Public Access Volume
        description: "Footfall/visitor volume at insured locations; public-facing operations scale"
        group_id: premises_operations
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          loss_frequency_weight: 0.20
          exposure_size_weight: 0.15

      - id: security_measures
        name: Security & Surveillance Measures
        description: "CCTV, access control, security personnel, lighting — reduces assault/negligence claims"
        group_id: premises_operations
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.20
          risk_direction: positive
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.10

      - id: incident_response_capability
        name: Incident Response Capability
        description: "First aid, emergency action plans, incident documentation, claims reporting speed"
        group_id: premises_operations
        signal_type: three_layer
        proxy_tier: INFERRED_PROXY
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.15
          risk_direction: positive
          loss_severity_weight: 0.15

      - id: alcohol_service
        name: Alcohol Service Exposure
        description: "Liquor liability exposure; TIPS/responsible service training; dram shop liability states"
        group_id: premises_operations
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.15
          score_conditions:
            - {min: 0, max: 30, action: FLAG, note: "Significant liquor liability exposure"}

      - id: multi_location_complexity
        name: Multi-Location Complexity
        description: "Number of insured locations; geographic spread; jurisdictional diversity"
        group_id: premises_operations
        signal_type: three_layer
        proxy_tier: DIRECT_OBSERVABLE
        ttl: MONTHLY
        three_layer:
          risk_weight: 0.10
          exposure_size_weight: 0.15
          exposure_complexity_weight: 0.20

# =============================================================================
# CONFIGURATIONS
# =============================================================================

configurations:

  # =========================================================================
  # 1. CASUALTY GENERAL LIABILITY
  # =========================================================================
  # Core commercial general liability model. Revenue-based pricing.
  # Covers premises/operations, products/completed ops, personal/
  # advertising injury. ISO CGL class code is primary rating factor.
  # =========================================================================
  - id: casualty_gl
    name: DSI Commercial General Liability Model
    description: "Commercial general liability — premises, operations, products/completed ops"
    model_specificity: 2
    min_premium: 15000

    product_types:
      - general_liability
      - products_liability

    routing_constraints:
      - {field: product_type, operator: "IN", value: [general_liability, products_liability], required_in_input: true}
      - {field: revenue, operator: ">=", value: 5000000, required_in_input: true}

    direct_queries:
      - id: pending_claims
        question: Any open or pending liability claims in the past 5 years?
        conditions: [{action: FLAG, note: "Open liability claims history"}]
      - id: product_recall
        question: Has the insured conducted a product recall in the past 5 years?
        conditions: [{action: REFER, override: 4, note: "Prior product recall"}]
      - id: class_action
        question: Is the insured a defendant in any class action or mass tort litigation?
        conditions: [{action: REFER, override: 5, note: "Class action/mass tort exposure"}]
      - id: assault_battery
        question: Does the insured operate in industries with assault & battery exposure (bars, nightclubs, security)?
        conditions: [{action: FLAG, note: "Assault & battery exposure class"}]
      - id: prior_losses_large
        question: Any single GL loss exceeding $500K in the past 10 years?
        conditions: [{action: REFER, override: 4, note: "Large prior GL loss"}]

    category_groups: [gl_class_code, fleet_composition]

    group_weights:
      - {group_id: gl_class_risk, risk_weight: 0.30, loss_weight: 0.30, exposure_weight: 0.20}
      - {group_id: premises_operations, risk_weight: 0.25, loss_weight: 0.25, exposure_weight: 0.20}
      - {group_id: corporate_footprint, risk_weight: 0.15, loss_weight: 0.10, exposure_weight: 0.20}
      - {group_id: firm_stability, risk_weight: 0.10, loss_weight: 0.10, exposure_weight: 0.15}
      - {group_id: regulatory_standing, risk_weight: 0.10, loss_weight: 0.10, exposure_weight: 0.10}
      - {group_id: litigation_history, risk_weight: 0.10, loss_weight: 0.15, exposure_weight: 0.15}

    risk_tier_bands:
      method: MULTIPLIER
      basis: revenue
      preferred_rate: 0.0012
      standard_plus_rate: 0.0022
      standard_rate: 0.0040
      substandard_rate: 0.0068
      decline_rate: 0.0110

    limit_configuration:
      type: DECOUPLED
      valid_limits: [1000000, 2000000, 5000000, 10000000, 25000000, 50000000, 100000000]
      valid_deductibles: [5000, 10000, 25000, 50000, 100000, 250000, 500000, 1000000]

    pricing:
      base_limit_reference: 1000000
      base_deductible_reference: 10000
      taxes_fees_rate: 0.05
      by_product_type:
        - product_type: general_liability
          ilf_curve:
            base_limit: 1000000
            factors:
              - {limit: 1000000, factor: 1.0}
              - {limit: 2000000, factor: 1.7}
              - {limit: 5000000, factor: 3.0}
              - {limit: 10000000, factor: 5.0}
              - {limit: 25000000, factor: 9.0}
              - {limit: 50000000, factor: 15.0}
              - {limit: 100000000, factor: 24.0}
          deductible_factors:
            - {deductible: 5000, factor: 1.15}
            - {deductible: 10000, factor: 1.0}
            - {deductible: 25000, factor: 0.88}
            - {deductible: 50000, factor: 0.78}
            - {deductible: 100000, factor: 0.68}
            - {deductible: 250000, factor: 0.58}
            - {deductible: 500000, factor: 0.50}
            - {deductible: 1000000, factor: 0.42}
        - product_type: products_liability
          ilf_curve:
            base_limit: 1000000
            factors:
              - {limit: 1000000, factor: 1.0}
              - {limit: 2000000, factor: 1.75}
              - {limit: 5000000, factor: 3.2}
              - {limit: 10000000, factor: 5.5}
              - {limit: 25000000, factor: 10.0}
              - {limit: 50000000, factor: 16.0}
              - {limit: 100000000, factor: 26.0}
          deductible_factors:
            - {deductible: 5000, factor: 1.15}
            - {deductible: 10000, factor: 1.0}
            - {deductible: 25000, factor: 0.88}
            - {deductible: 50000, factor: 0.78}
            - {deductible: 100000, factor: 0.68}
            - {deductible: 250000, factor: 0.58}
            - {deductible: 500000, factor: 0.50}
            - {deductible: 1000000, factor: 0.42}

