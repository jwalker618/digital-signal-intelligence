          modifier: 1.00
          description: "Combination of trading patterns"
            
      flag_state_quality:
        - cat: "WHITE_LIST"
          label: "Paris MoU White List"
          modifier: 0.95
          description: "High-performing flag states"
          
        - cat: "GREY_LIST"
          label: "Paris MoU Grey List"
          modifier: 1.10
          description: "Average-performing flag states"
          
        - cat: "BLACK_LIST"
          label: "Paris MoU Black List"
          modifier: 1.40
          description: "Poor-performing flag states"

      fleet_age_band:
        - cat: "AGE_0_5"
          label: "0-5 Years"
          modifier: 0.85
          description: ""      
        - cat: "AGE_5_10"
          label: "5-10 Years"
          modifier: 0.95
          description: ""      
        - cat: "AGE_10_15"
          label: "10-15 Years"
          modifier: 1.05
          description: ""      
        - cat: "AGE_15_20"
          label: "15-20 Years"
          modifier: 1.20
          description: ""      
        - cat: "AGE_20_25"
          label: "20-25 Years"
          modifier: 1.40
          description: ""      
        - cat: "AGE_25_PLUS"
          label: "25+ Years"
          modifier: 1.60
          description: ""      

    # -------------------------------------------------------------------------
    # SIGNAL GROUPS
    # Each group is the product of its underlying features
    # Each group contributes to the composite score
    # Weights must add to 1
    # -------------------------------------------------------------------------
    
    signal_groups:
      - id: "network_authority"
        name: "Network Authority"
        description: "Classification society, P&I Club, charterer relationships"
        weight: 0.15
        test_scores: {excellent: 92, average: 70, poor: 40}
        score_condition: false
        
      - id: "operational_telemetry"
        name: "Operational Telemetry"
        description: "AIS behavior patterns, dark activity, route risk"
        weight: 0.20
        test_scores: {excellent: 95, average: 72, poor: 38}
        score_condition: true
        bands:
          - max: 30
            override: 5
            action: "DECLINE"
            note: "Critical AIS/operational concerns"
          - max: 45
            override: 4
            action: "REFER"
            note: "Significant operational concerns"
        inclusive_max: false
        
      - id: "safety_compliance"
        name: "Safety Compliance"
        description: "PSC performance, class status, incident history"
        weight: 0.25
        test_scores: {excellent: 95, average: 75, poor: 35}
        score_condition: true
        bands:
          - max: 30
            override: 5
            action: "DECLINE"
            note: "Critical safety compliance issues"
          - max: 45
            override: 4
            action: "REFER"
            note: "Significant safety concerns"
        inclusive_max: false
        
      - id: "fleet_profile"
        name: "Fleet Profile"
        description: "Fleet age, stability, vessel quality, crew certification"
        weight: 0.10
        test_scores: {excellent: 88, average: 68, poor: 42}
        score_condition: false
        
      - id: "sanctions_compliance"
        name: "Sanctions Compliance"
        description: "Sanctions status, ownership transparency, STS patterns"
        weight: 0.15
        test_scores: {excellent: 100, average: 85, poor: 30}
        score_condition: true
        bands:
          - max: 20
            override: 5
            action: "DECLINE"
            note: "Sanctions exposure - coverage not available"
          - max: 40
            override: 4
            action: "REFER"
            note: "Sanctions concerns require review"
        inclusive_max: false
        
      - id: "environmental"
        name: "Environmental Compliance"
        description: "IMO 2020, ballast water, CII rating, incidents"
        weight: 0.05
        test_scores: {excellent: 92, average: 70, poor: 45}
        score_condition: false
        
      - id: "corporate_footprint"
        name: "Corporate Footprint"
        description: "Transparency, sustainability reporting, safety culture"
        weight: 0.05
        test_scores: {excellent: 88, average: 62, poor: 38}
        score_condition: false
        
      - id: "structured_data"
        name: "Structured Data"
        description: "RightShip vetting, ESG ratings, credit ratings"
        weight: 0.05
        test_scores: {excellent: 90, average: 68, poor: 40}
        score_condition: false

