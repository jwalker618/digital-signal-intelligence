coverage_line: pvt
coverage_key: pvt
phase: v6_b7
description: "V6/B7 — Political Violence & Terrorism"
version: "1.0.0"

default_product_types:
  - pvt_terrorism
  - pvt_sabotage
  - pvt_strikes_riots_civil_commotion

default_markets: [global]
default_currency: USD
default_min_premium: 30000

default_minimum_viable_input:
  - field: entity_name
  - field: primary_country
  - field: sector
  - field: asset_tiv

routing_field: primary_country

configurations:
  - name: pvt_country_risk
    model_specificity: 1
    description: "Default country-driven PVT."
    routing_constraints: []
  - name: pvt_sector_exposed
    model_specificity: 2
    description: "Sectors historically targeted (energy / financial / western)."
    routing_constraints: [{ field: sector, operator: "IN", value: [energy, financial_services, defense] }]
  - name: pvt_high_value_asset
    model_specificity: 2
    description: "Assets above $250M TIV."
    routing_constraints: [{ field: asset_tiv, operator: ">=", value: 250000000 }]
  - name: pvt_sme
    model_specificity: 3
    description: "Sub-scale deployments — streamlined."
    routing_constraints: [{ field: asset_tiv, operator: "<", value: 25000000 }]

signal_registry: []
default_risk_tier_bands: {}
default_loss_tier_bands: {}
default_exposure_bands: {}
default_pricing: {}
default_guardrails: {}
