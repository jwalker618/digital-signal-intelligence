# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# STRUCTURAL PRINCIPLES (per master_config_layout.yaml):
# 1. Signals defined once in signal_registry with group_id reference
# 2. source: score (default) uses 0-100 inference return
# 3. source: metadata.field uses inference metadata with bands/categories
# 4. Categorical groups apply modifiers (applied:), not scores
# 5. score_conditions (plural, banded) apply actions based on score thresholds
#    Actions: FLAG | MODIFIER | REFER
# 6. proxy_tier at signal level (DIRECT_OBSERVABLE | INFERRED_PROXY | COHORT_INFERENCE)
# 7. Normalisation handled by inference functions, not config
#
# AUGMENTED BY:
# - analysis_outputs/{coverage}_v{date}.yaml - empirically-derived parameters
# - schemas/organisational_graph.yaml - graph structure (coverage-agnostic)
#
# =============================================================================
marine:
  marine_general:
    metadata:
      name: DSI Marine Technical Pricing Model
      description: Marine hull and liability coverage based on observable operator behavior, safety records, and fleet patterns
      version: 2.2.0
      product_types:
      - hull_machinery
      - total_loss
      - increased_value
      - loss_of_hire
      - war_risks
      - pi_liability
      - cargo
      applicable_markets:
      - global
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: hull_machinery, total_loss, increased_value, loss_of_hire, war_risks, pi_liability, cargo'
        - field: limit
          description: Requested limit in USD
        - field: hull_value
          description: Total hull value in USD
        - field: tiv
          description: Total Insured Value (combined hull, increased value, loss of hire)
      min_premium: 50000
      default_currency: USD
      model_specificity: 1
      routing_constraints:
      - field: hull_value
        operator: ">"
        value: 50000000
        required_in_input: true

    direct_queries:
    - id: psc_detentions
      question: Any vessels detained by port state control in past 36 months?
      query_condition:
      - return: true
        action: REFER
        override: 3
        applied: null
        note: PSC detentions in past 36 months
    - id: total_losses
      question: Any total losses or major casualties in past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Total losses in past 5 years
    - id: third_party_manager
      question: Is the fleet managed by a third-party technical manager?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Third-party technical management
    - id: sanctioned_trade
      question: Any vessels currently trading to sanctioned regions?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Trading to sanctioned regions - coverage not available
