  # ===========================================================================
  # ENERGY MIDSTREAM
  # ===========================================================================
  energy_midstream:
    metadata:
      name: DSI Energy Midstream Pricing Model
      description: Pipeline, processing, and storage operations
      version: 2.2.0
      product_types:
      - property_damage
      - business_interruption
      - third_party_liability
      - pollution_liability
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mena
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: property_damage, business_interruption, third_party_liability, pollution_liability'
        - field: limit
          description: Requested limit in USD
        - field: tiv
          description: Total Insured Value in USD
      min_premium: 100000
      default_currency: USD
      model_specificity: 2
      routing_constraints:
      - field: operation_segment
        operator: in
        value: [MIDSTREAM_PIPELINE, MIDSTREAM_PROCESSING, MIDSTREAM_STORAGE]
        required_in_input: true

    direct_queries:
    - id: major_incidents
      question: Any major pipeline ruptures, explosions, or significant releases in past 5 years?
      query_condition:
      - {return: true, action: REFER, override: 4, applied: null, note: Pipeline incidents}
    - id: fatalities
      question: Any work-related fatalities in past 3 years?
      query_condition:
      - {return: true, action: REFER, override: 3, applied: null, note: Fatalities disclosed}
    - id: phmsa_enforcement
      question: Any PHMSA enforcement actions or corrective action orders in past 5 years?
      query_condition:
      - {return: true, action: REFER, override: 4, applied: null, note: PHMSA enforcement}
    - id: third_party_strike
      question: Any third-party damage incidents (excavation strikes) in past 3 years?
      query_condition:
      - {return: true, action: FLAG, override: null, applied: null, note: Third-party damage flag}
    - id: regulatory_enforcement
      question: Any significant regulatory enforcement actions pending?
      query_condition:
      - {return: true, action: REFER, override: 4, applied: null, note: Pending enforcement}
    - id: hca_crossing
      question: Does pipeline cross High Consequence Areas (HCAs) per PHMSA definition?
      query_condition:
      - {return: true, action: FLAG, override: null, applied: null, note: HCA exposure flag}

    signal_registry:
    - id: operator_type
      inference_utility_function: operator_type_basefunction
      proxy_tier: INFERRED_PROXY
      categories:
        group_id: operator_type
        source: metadata.operator_type
        features:
        - {cat: MIDSTREAM_MLP, label: Midstream MLP, applied: 0.90}
        - {cat: MIDSTREAM_CORP, label: Midstream Corporation, applied: 0.95}
        - {cat: INTEGRATED, label: Integrated Energy, applied: 0.85}
        - {cat: UTILITY, label: Utility, applied: 0.90}
        - {cat: INDEPENDENT, label: Independent, applied: 1.10}
        - {cat: OTHER, label: Unknown, applied: 1.0}
    - id: operation_segment
      inference_utility_function: operation_segment_basefunction
      proxy_tier: INFERRED_PROXY
      categories:
        group_id: operation_segment
        source: metadata.operation_segment
        features:
        - {cat: MIDSTREAM_PIPELINE, label: Pipeline, applied: 1.0}
        - {cat: MIDSTREAM_PROCESSING, label: Processing, applied: 1.1}
        - {cat: MIDSTREAM_STORAGE, label: Storage, applied: 0.95}
        - {cat: OTHER, label: Other, applied: 1.1}
    - id: geographic_focus
      inference_utility_function: geographic_focus_basefunction
      proxy_tier: INFERRED_PROXY
      categories:
        group_id: geographic_focus
        source: metadata.geographic_focus
        features:
        - {cat: US_ONSHORE, label: US Onshore, applied: 1.0}
        - {cat: US_OFFSHORE, label: US Offshore, applied: 1.2}
        - {cat: NORTH_SEA, label: North Sea, applied: 1.1}
        - {cat: ASIA_PACIFIC, label: Asia Pacific, applied: 1.1}
        - {cat: OTHER, label: Other, applied: 1.1}
    # --- Network Authority ---
    - id: partner_quality
      inference_utility_function: partner_quality_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: network_authority
        risk: {correlation_direction: positive, weight: 0.25}
        loss: {frequency: {correlation_direction: positive, weight: 0.15}, severity: {correlation_direction: positive, weight: 0.1}}
    - id: contractor_quality
      inference_utility_function: contractor_quality_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: network_authority
        risk: {correlation_direction: positive, weight: 0.2}
        loss: {frequency: {correlation_direction: positive, weight: 0.15}}
    - id: insurance_history
      inference_utility_function: insurance_history_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: network_authority
        risk: {correlation_direction: positive, weight: 0.2}
        loss: {frequency: {correlation_direction: positive, weight: 0.1}, severity: {correlation_direction: positive, weight: 0.1}}
    - id: regulator_relationship
      inference_utility_function: regulator_relationship_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: network_authority
        risk: {correlation_direction: positive, weight: 0.15}
        loss: {frequency: {correlation_direction: positive, weight: 0.1}}
    - id: industry_association
      inference_utility_function: industry_association_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      three_layer_assessment:
        group_id: network_authority
        risk: {correlation_direction: positive, weight: 0.1}
    - id: banking_relationship
      inference_utility_function: banking_relationship_basefunction
      proxy_tier: INFERRED_PROXY
