# =============================================================================
# DSI Coverage Expansion Spec — Phase 2: Property
# =============================================================================
#
# Machine-consumable spec for the CoverageExpansionGenerator.
# Companion prose: phase_2_prerequisites.md
#
# Usage:
#   python -m infrastructure.builder.cli expand \
#       --spec development/project/version/5/phase_2_property_spec.yaml \
#       --write
#
# NOTE: No --existing-config flag — this is a NEW coverage line.
#
# =============================================================================

coverage_line: property
coverage_key: commercial_property
phase: phase_2
description: "Phase 2 Commercial Property Coverage — 5 configurations"
version: "2.3.0"

# =============================================================================
# DEFAULTS
# =============================================================================

default_product_types:
  - commercial_property
  - builders_risk
  - business_interruption
  - difference_in_conditions

default_markets: [us, uk, eu, apac, latam, mea]
default_currency: USD
default_min_premium: 25000

default_minimum_viable_input:
  - field: client_name
    description: Client name
  - field: product_type
    description: "One of: commercial_property, builders_risk, business_interruption, difference_in_conditions"
  - field: limit
    description: Requested limit in USD
  - field: tiv
    description: Total insured value in USD (MULTIPLIER basis)

routing_field: property_segment

# =============================================================================
# DEFAULT TIER BANDS
# =============================================================================

default_risk_tier_bands:
  method: MULTIPLIER
  basis: tiv
  bands:
    - {id: 1, label: PREFERRED, min: 800, max: 1000, action: APPROVE, applied: 0.0008}
    - {id: 2, label: STANDARD_PLUS, min: 650, max: 799, action: APPROVE, applied: 0.0015}
    - {id: 3, label: STANDARD, min: 450, max: 649, action: APPROVE, applied: 0.0025}
    - {id: 4, label: SUBSTANDARD, min: 250, max: 449, action: REFER, applied: 0.0040}
    - {id: 5, label: DECLINE, min: 0, max: 249, action: DECLINE, applied: 0.0060}

default_loss_tier_bands:
  floor: 0.50
  cap: 1.8

default_exposure_bands:
  size_weight: 0.7
  complexity_weight: 0.3
  size_thresholds:
    - {label: MICRO, max_value: 5000000, applied: 0.5}
    - {label: SMALL, max_value: 25000000, applied: 0.75}
    - {label: MEDIUM, max_value: 100000000, applied: 1.0}
    - {label: LARGE, max_value: 500000000, applied: 1.5}
    - {label: VERY_LARGE, max_value: 5000000000, applied: 2.5}

default_limit_configuration:
  type: DECOUPLED
  valid_limits: [1000000, 2000000, 5000000, 10000000, 25000000, 50000000, 100000000, 250000000, 500000000]
  valid_deductibles: [10000, 25000, 50000, 100000, 250000, 500000, 1000000, 2500000]

# =============================================================================
# DEFAULT PRICING — ILF Curves and Deductible Factors
# =============================================================================
#
# Property ILFs are FLATTER than liability lines because loss severity
# is bounded by TIV. A 10x limit increase costs ~6x, not ~28x as in PI.
#
# Reference: ISO Commercial Property ILF tables, Lloyd's market benchmarks.
# =============================================================================

default_pricing:
  base_limit_reference: 1000000
  base_deductible_reference: 25000
  taxes_fees_rate: 0.04
  by_product_type:
    - product_type: commercial_property
      curve_type: standard
      ilf_curve:
        base_limit: 1000000
        factors:
          - {limit: 1000000, factor: 1.0}
          - {limit: 2000000, factor: 1.5}
          - {limit: 5000000, factor: 2.2}
          - {limit: 10000000, factor: 3.0}
          - {limit: 25000000, factor: 4.5}
          - {limit: 50000000, factor: 6.0}
          - {limit: 100000000, factor: 8.0}
          - {limit: 250000000, factor: 12.0}
          - {limit: 500000000, factor: 16.0}
      deductible_factors:
        - {deductible: 10000, factor: 1.20}
        - {deductible: 25000, factor: 1.0}
        - {deductible: 50000, factor: 0.90}
        - {deductible: 100000, factor: 0.80}
        - {deductible: 250000, factor: 0.70}
        - {deductible: 500000, factor: 0.62}
        - {deductible: 1000000, factor: 0.55}
        - {deductible: 2500000, factor: 0.48}

    - product_type: builders_risk
      curve_type: standard
      ilf_curve:
        base_limit: 1000000
        factors:
          - {limit: 1000000, factor: 1.0}
          - {limit: 2000000, factor: 1.6}
          - {limit: 5000000, factor: 2.5}
          - {limit: 10000000, factor: 3.5}
          - {limit: 25000000, factor: 5.5}
          - {limit: 50000000, factor: 7.5}
          - {limit: 100000000, factor: 10.5}
          - {limit: 250000000, factor: 15.0}
          - {limit: 500000000, factor: 20.0}
      deductible_factors:
        - {deductible: 10000, factor: 1.25}
        - {deductible: 25000, factor: 1.0}
        - {deductible: 50000, factor: 0.88}
        - {deductible: 100000, factor: 0.78}
        - {deductible: 250000, factor: 0.68}
        - {deductible: 500000, factor: 0.60}
        - {deductible: 1000000, factor: 0.52}
        - {deductible: 2500000, factor: 0.45}

    - product_type: business_interruption
      curve_type: standard
      ilf_curve:
        base_limit: 1000000
        factors:
          - {limit: 1000000, factor: 1.0}
          - {limit: 2000000, factor: 1.55}
          - {limit: 5000000, factor: 2.4}
          - {limit: 10000000, factor: 3.3}
          - {limit: 25000000, factor: 5.0}
          - {limit: 50000000, factor: 7.0}
          - {limit: 100000000, factor: 9.5}
          - {limit: 250000000, factor: 14.0}
          - {limit: 500000000, factor: 19.0}
      deductible_factors:
        - {deductible: 10000, factor: 1.20}
        - {deductible: 25000, factor: 1.0}
        - {deductible: 50000, factor: 0.90}
        - {deductible: 100000, factor: 0.80}
        - {deductible: 250000, factor: 0.70}
        - {deductible: 500000, factor: 0.62}
        - {deductible: 1000000, factor: 0.55}
        - {deductible: 2500000, factor: 0.48}

    - product_type: difference_in_conditions
      curve_type: standard
      ilf_curve:
        base_limit: 1000000
        factors:
          - {limit: 1000000, factor: 1.0}
          - {limit: 2000000, factor: 1.7}
          - {limit: 5000000, factor: 2.8}
          - {limit: 10000000, factor: 4.0}
          - {limit: 25000000, factor: 6.5}
          - {limit: 50000000, factor: 9.0}
          - {limit: 100000000, factor: 12.5}
          - {limit: 250000000, factor: 18.0}
          - {limit: 500000000, factor: 24.0}
      deductible_factors:
        - {deductible: 10000, factor: 1.25}
        - {deductible: 25000, factor: 1.0}
        - {deductible: 50000, factor: 0.88}
        - {deductible: 100000, factor: 0.78}
