# US Tower Program — Excess & Surplus Energy
#
# This entity writes energy through a layered excess-of-loss
# tower structure. Each layer has its own attachment point and
# limit. Common for large industrial risks in the US E&S market.

entity:
  id: tower_us_energy
  name: "US E&S Tower Program"
  market: us
  base_currency: USD

  coverages:
    - coverage: energy
      configs:
        - energy_general
        - energy_upstream_deepwater
        - energy_midstream
        - energy_downstream
      max_single_limit: 1_000_000_000
      constraints:
        - field: tiv
          operator: "<="
          value: 200_000_000_000
          reason: "TIV exceeds tower program capacity"

  distribution:
    type: TOWER
    tower:
      layer_templates:
        - id: 1
          label: "Primary"
          attachment_pct: 0.0
          limit_pct: 0.10
        - id: 2
          label: "1st Excess"
          attachment_pct: 0.10
          limit_pct: 0.20
        - id: 3
          label: "2nd Excess"
          attachment_pct: 0.30
          limit_pct: 0.30
        - id: 4
          label: "3rd Excess"
          attachment_pct: 0.60
          limit_pct: 0.40
      subscription:
        minimum_line: 0.05
        maximum_line: 0.25
        default_signed_line: 0.10
        role: FOLLOW
        lead_loading_factor: 1.0

  commission:
    brokerage_rate: 0.175
    overrider_rate: 0.02
    profit_commission_rate: 0.0

  taxes_and_levies:
    insurance_premium_tax_rate: 0.035
    stamp_duty_rate: 0.0
    regulatory_levy_rate: 0.005

  fronting:
    enabled: false

  pricing_adjustments:
    offered_premium_discretion: 0.10
    minimum_gross_premium: 15000
