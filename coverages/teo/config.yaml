  teo_sme:
    metadata:
      name: "Tech E&O — SME"
      description: Revenue < $25M
      version: 2.2.0
      product_types:
        - tech_eo
        - cyber_tech_combo
        - aiml_liability
      applicable_markets:
        - us
        - uk
        - eu
      minimum_viable_input:
        - field: entity_name
          description: Legal name
        - field: business_model
          description: saas / aiml_vendor / systems_integrator / managed_services
        - field: revenue
          description: Annual revenue in USD
        - field: limit
          description: Requested limit in USD
      min_premium: 5000
      default_currency: USD
      model_specificity: 3
      routing_constraints:
        - field: revenue
          operator: <
          value: 25000000
          required_in_input: true
    direct_queries:
      - id: claims_history
        question: Has the insured had any claims in the past 5 years?
        query_condition:
          - return: true
            action: REFER
            override:
            applied:
            note: Prior claims - review required
      - id: prior_coverage
        question: Does the insured have prior coverage?
        query_condition:
          - return: false
            action: FLAG
            override:
            applied:
            note: No prior coverage
      - id: mfa_enabled
        question: Is multi-factor authentication enabled for all remote access?
        query_condition:
          - return: false
            action: FLAG
            override:
            applied:
            note: MFA not enabled - increased ransomware risk
      - id: data_breach
        question: Has the insured experienced a data breach in the past 3 years?
        query_condition:
          - return: true
            action: REFER
            override: 4
            applied:
            note: Recent data breach - requires manual review
      - id: edr_deployed
        question: Is endpoint detection and response (EDR) deployed on all endpoints?
        query_condition:
          - return: false
            action: FLAG
            override:
            applied:
            note: No EDR - reduced threat detection
