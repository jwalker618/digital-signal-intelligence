  - id: casualty_wc
    name: DSI Workers Compensation Model
    description: "Workers compensation — payroll-based, experience mod driven, state-specific"
    model_specificity: 3
    min_premium: 10000

    product_types:
      - workers_compensation

    routing_constraints:
      - {field: product_type, operator: "==", value: workers_compensation, required_in_input: true}
      - {field: payroll, operator: ">=", value: 1000000, required_in_input: true}

    direct_queries:
      - id: osha_citations
        question: Any OSHA citations (serious or willful) in the past 3 years?
        conditions: [{action: REFER, override: 4, note: "Recent OSHA citations"}]
      - id: fatality_history
        question: Any workplace fatalities in the past 5 years?
        conditions: [{action: REFER, override: 5, note: "Workplace fatality history"}]
      - id: experience_mod_high
        question: Is the current experience modification factor above 1.25?
        conditions: [{action: REFER, override: 3, note: "High experience mod — loss-driven"}]
      - id: multi_state
        question: Are employees located in more than 10 states?
        conditions: [{action: FLAG, note: "Multi-state WC — jurisdictional complexity"}]
