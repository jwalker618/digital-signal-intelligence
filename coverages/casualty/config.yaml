commercial_casualty:
  casualty_gl:
    metadata:
      name: DSI Commercial General Liability Model
      description: "Commercial general liability \u2014 premises, operations, products/completed ops"
      version: 2.3.0
      product_types:
      - general_liability
      - products_liability
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name
        - field: product_type
          description: 'One of: general_liability, workers_compensation, commercial_auto, umbrella_excess, environmental_liability,
            products_liability'
        - field: limit
          description: Requested limit in USD
        - field: revenue
          description: Annual revenue in USD (basis for GL, environmental)
        - field: payroll
          description: Annual payroll in USD (basis for WC)
      min_premium: 15000
      default_currency: USD
      model_specificity: 2
      routing_constraints:
      - field: product_type
        operator: in
        value:
        - general_liability
        - products_liability
        required_in_input: true
      - field: revenue
        operator: '>='
        value: 5000000
        required_in_input: true
    direct_queries:
    - id: pending_claims
      question: Any open or pending liability claims in the past 5 years?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Open liability claims history
    - id: product_recall
      question: Has the insured conducted a product recall in the past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Prior product recall
    - id: class_action
      question: Is the insured a defendant in any class action or mass tort litigation?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Class action/mass tort exposure
    - id: assault_battery
      question: Does the insured operate in industries with assault & battery exposure (bars, nightclubs, security)?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Assault & battery exposure class
    - id: prior_losses_large
      question: Any single GL loss exceeding $500K in the past 10 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Large prior GL loss
    signal_registry:
    - id: gl_class_code
      inference_utility_function: gl_class_code_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      categories:
        group_id: structured_data
        source: metadata.gl_class_code
        features:
        - cat: LOW
          label: Low Hazard (Office/Professional Services)
          applied: 0.65
        - cat: MODERATE
          label: Moderate (Retail/Hospitality/Light Mfg)
          applied: 1.0
        - cat: HIGH
          label: High Hazard (Construction/Heavy Mfg/Trucking)
          applied: 1.45
        - cat: SEVERE
          label: Severe (Demolition/Roofing/Blasting)
          applied: 2.0
    - id: premises_condition
      inference_utility_function: premises_condition_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.2
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.25
          severity:
            correlation_direction: positive
            weight: 0.1
    - id: products_completed_ops
      inference_utility_function: products_completed_ops_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.15
          score_conditions:
          - action: FLAG
            note: Significant products/completed ops tail exposure
            threshold: 25
            comparison: <=
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.15
          severity:
            correlation_direction: positive
            weight: 0.25
        exposure:
          complexity:
            correlation_direction: positive
            weight: 0.15
    - id: contractual_liability
      inference_utility_function: contractual_liability_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.1
        loss:
          severity:
            correlation_direction: positive
            weight: 0.15
        exposure:
          complexity:
            correlation_direction: positive
            weight: 0.15
    - id: subcontractor_management
      inference_utility_function: subcontractor_management_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.15
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.15
        exposure:
          complexity:
            correlation_direction: positive
            weight: 0.1
    - id: litigation_environment
      inference_utility_function: litigation_environment_basefunction
      proxy_tier: COHORT_INFERENCE
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.1
          score_conditions:
          - action: FLAG
            note: High nuclear verdict jurisdiction
            threshold: 30
            comparison: <=
        loss:
          severity:
            correlation_direction: positive
            weight: 0.2
        exposure:
          size:
            correlation_direction: positive
            weight: 0.1
    - id: public_access_volume
      inference_utility_function: public_access_volume_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.15
        loss:
          frequency:
