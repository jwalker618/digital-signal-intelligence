    # -------------------------------------------------------------------------
    # CATEGORICAL GROUPS
    # Categorical groups can either
    # a) impact base premium after generation (impact: "MODIFIER")
    # b) be the basis of premium (impact: "PREMIUM")
    # Note: only one categorical group be the basis of premium
    # -------------------------------------------------------------------------
    categorical_groups:
      - id: "industry_classification"
        label: "Industry Classification"
        description: "Industry classification derived from public records"
        impact: "modifier" 
        default_cat: "OTHER"
      - id: "size_band"
        label: "Size Band"
        description: "Company size classification"
        impact: "modifier"
        default_cat: "OTHER"
      - id: "geography"
        label: "geography"
        description: "Primary operational geography"
        impact: "modifier"
        default_cat: "OTHER"
        
    # -------------------------------------------------------------------------
    # SIGNAL GROUPS
    # Each group is the product of its underlying features
    # Each group contributes to the composite score
    # Weights must add to 1
    # -------------------------------------------------------------------------
    
    signal_groups:
      - id: "network_authority"
        label: "Network Authority"
        description: "Industry relationships, partnerships, and counterparty quality"
        risk:
          weight: 0.15
        loss:
          weight: 0.15
        exposure:
          weight: 0.15
        
      - id: "technical_infrastructure"
        label: "Technical Infrastructure"
        description: "Observable technical security implementation"
        risk:
          weight: 0.35
          score_condition: 
            - {max: 30, action: "DECLINE", override: 5, note: "Critical technical deficiencies"}
            - {max: 45, action: "REFER", override: 4, note: "Significant technical concerns"}
        loss:
          weight: 0.35
        exposure:
          weight: 0.35
        
      - id: "corporate_footprint"
        label: "Corporate Footprint"
        description: "Signals from company's digital presence and security posture"
        risk:
          weight: 0.15
        loss:
          weight: 0.25
        exposure:
          weight: 0.15
        
      - id: "public_record"
        label: "Public Record"
        description: "Breach history, regulatory actions, and public disclosures"
        risk:
          weight: 0.25
          score_condition: 
            - {max: 30, action: "DECLINE", override: 5, note: "Severe breach/regulatory history"}
            - {max: 45, action: "REFER", override: 4, note: "Material breach history"}
        loss:
          weight: 0.2
        exposure:
          weight: 0.25
     
      - id: "structured_data"
        label: "Structured Data"
        description: "Third-party security ratings and scores"
        risk:
          weight: 0.10
        loss:
          weight: 0.2
        exposure:
          weight: 0.10

    # ---------------------------------------------------------------------------
    # RISK TIER BANDINGS
    # Score ranges from 0-1000
    # ---------------------------------------------------------------------------
    risk_tier_bands:
      bands:
        - id: 1
          label: "PREFERRED"
          min: 800
          max: 1000
          description: "Excellent risk - automatic approval, preferred pricing"
          actions:
            auto_approve: true
            auto_decline: false
          premium:
            method: "base"
            value: 8000
            
        - id: 2        
          label: "STANDARD_PLUS"
          min: 650
          max: 799
          description: "Good risk - automatic approval, standard pricing"
          actions:
            auto_approve: true
            auto_decline: false
          premium:
            method: "base"
            value: 12000
            
        - id: 3        
          label: "STANDARD"
          min: 500
          max: 649
          description: "Average risk - may require referral"
          actions:
            auto_approve: false
            auto_decline: false
          premium:
            method: "base"
            value: 18000
          
        - id: 4        
          label: "SUBSTANDARD"
          min: 350
          max: 499
          description: "Elevated risk - requires senior review"
          actions:
            auto_approve: false
            auto_decline: false
          premium:
            method: "base"
            value: 30000
          
        - id: 5        
          label: "DECLINE"
          min: 0
          max: 349
          description: "Unacceptable risk - decline"
          actions:
            auto_approve: false
            auto_decline: true
          premium:
            method: "base"
            value: 50000

    # ---------------------------------------------------------------------------
    # LOSS TIER BANDINGS
    # Score ranges from 0-100
    # Calculation: (frequency_multiplier × frequency_weight) + (severity_multiplier × severity_weight)
    # Result constrained by band floor/cap
    # All components stored at atomic level for auditability    
    # ---------------------------------------------------------------------------
    loss_tier_bands:
      bands:
        - id: 1
          label: "VERY_LOW"
          min: 0
          max: 20
          description: "very low risk of loss"
          modifier:
            frequency_weight: 0.6
            severity_weight: 0.4
            cap: 0.55     #maximum allowed modifier
            floor: 0.75   #minimum allowed modifier
          
        - id: 2
          label: "LOW"
          min_: 20
          max: 40
          description: "low risk of loss"
          modifier:
            frequency_weight: 0.6
            severity_weight: 0.4
            cap: 0.75
            floor: 0.95

        - id: 3
          label: "MODERATE"
          min: 40
          max: 60
          description: "moderate risk of loss"
          modifier:
            frequency_weight: 0.6
            severity_weight: 0.4
            cap: 0.95
            floor: 1.05  
            
        - id: 4 
          label: "ELEVATED"
          min: 60
          max: 80
          description: "elevated risk of loss"
          modifier:
            frequency_weight: 0.6
            severity_weight: 0.4
            cap: 1.05
            floor: 1.3
          
        - id: 5
          label: "HIGH"
          min: 80
          max: 100
          description: "high risk of loss"
          modifier:
            frequency_weight: 0.6
            severity_weight: 0.4
            cap: 1.3
            floor: 1.6

    # ---------------------------------------------------------------------------
    # EXPOSURE TIER BANDINGS
    # Score ranges from 0-100   
    # Exposure returns two bandings - size and complexity. Each is the product of a banding excercise based on score.
    # size = organisational size and TIV proxy
    # complexity = operational and structural complexity
    # Calculation: (exposure_modifier × exposure_weight) + (complexity_modifier × complexity_weight)
    # All components stored at atomic level for auditability
    # ---------------------------------------------------------------------------  
    
    exposure:
      size_weight: 0.60
      complexity_weight: 0.40
      
      size_bands:
        bands:
          - id: 1
            label: "MICRO"
            min: 0
            max: 20
            description: "micro exposure value ($0 - $1M)"
            modifier:
              implied_tiv_thresholds: [0, 1000000]
              applied: 0.50
                      
          - id: 2
            label: "SMALL"
            min: 20
            max: 40
            description: "small exposure value ($1M - $10M)"
            modifier:
              implied_tiv_thresholds: [1000000, 10000000]
              applied: 0.75
            
          - id: 3
            label: "MEDIUM"
            min: 40
            max: 60
            description: "medium exposure value ($10M - $50M)"
            modifier:
              implied_tiv_thresholds: [10000000, 50000000]
              applied: 1.00
            
          - id: 4
            label: "LARGE"
            min: 60
            max: 80
            description: "large exposure value ($50M - $250M)"
            modifier:
              implied_tiv_thresholds: [50000000, 250000000]
              applied: 1.50
            
          - id: 5
            label: "VERY_LARGE"
            min: 80
            max: 100
            description: "very large exposure value ($250M+)"
            modifier:
              implied_tiv_thresholds: [250000000, 1000000000]
              applied: 2.50
   
      complexity_bands:
        bands:
          - id: 1
            label: "SIMPLE COMPLEXITY"
            min: 0
            max: 20
            description: "simple complex exposure"
            modifier:
              applied: 0.85
              
          - id: 2
            label: "MODERATELY COMPLEX"
            min: 20
            max: 40
            description: "moderately complex exposure"
            modifier:
              applied: 0.95 
            
          - id: 3
            label: "COMPLEX"
            min: 40
            max: 60
            description: "complex exposure"
            modifier:
              applied: 1.10
            
          - id: 4
            label: "HIGHLY COMPLEX"
            min: 60
            max: 80
            description: "highly complex exposure"
            modifier:
              applied: 1.30
            
          - id: 5
            label: "EXTREMELY COMPLEX"
            min: 80
            max: 100
            description: "extremely complex exposure"
            modifier:
              applied: 1.60  

    # -------------------------------------------------------------------------
    # LIMIT BANDINGS
    # -------------------------------------------------------------------------
    limit_bandings:
      - id: 1
        limit: 1000000
        deductible: 25000
      - id: 2
        limit: 5000000
        deductible: 50000
      - id: 3
        limit: 10000000
        deductible: 100000
      - id: 4
        limit: 25000000
        deductible: 250000
      - id: 5
        limit: 50000000
        deductible: 500000

    # ---------------------------------------------------------------------------
    # PRICING PARAMETERS
    # ---------------------------------------------------------------------------
    
    pricing:
 
      # Increased Limit Factors (ILF)
      ilf_curve:
        base_limit: 1000000  # $1M base
        factors:
          - {limit: 1000000, factor: 1.00}
          - {limit: 2000000, factor: 1.70}
          - {limit: 5000000, factor: 3.20}
          - {limit: 10000000, factor: 5.00}
          - {limit: 25000000, factor: 9.00}
          - {limit: 50000000, factor: 14.00}
          - {limit: 100000000, factor: 22.00}
      
      # Deductible credits (as percentage of limit)
      deductible_credits:
        - {min_pct: 0.001, max_pct: 0.005, credit: 0.05}   # 0.1-0.5% of limit
        - {min_pct: 0.005, max_pct: 0.010, credit: 0.10}   # 0.5-1% of limit
        - {min_pct: 0.010, max_pct: 0.020, credit: 0.15}   # 1-2% of limit
        - {min_pct: 0.020, max_pct: null, credit: 0.20}    # >2% of limit
        
      taxes_fees_rate: 0.05

    # -------------------------------------------------------------------------
    # EXPOSURE SCORING CONFIGURATION
    # -------------------------------------------------------------------------
    # Groups signals from signal_features into magnitude and complexity scoring.
    # Signals are defined once in signal_features with exposure: subsections.
    # This section defines how those signals are grouped for scoring.

    exposure_scoring:
      # Magnitude groups (TIV proxy) - references signals from exposure_magnitude
      magnitude_groups:
        - name: digital_footprint
          weight: 0.30
          confidence_threshold: 0.6
          description: "Observable digital presence indicators"
          signals: [dns_complexity, subdomain_count, ip_footprint, ssl_certificate_count, cloud_scale, cloud_infrastructure]

        - name: corporate_indicators
          weight: 0.25
          confidence_threshold: 0.7
          description: "Observable corporate size indicators"
          signals: [employee_estimate, location_count, job_posting_volume, funding_signals]

        - name: public_financials
          weight: 0.25
          confidence_threshold: 0.8
          description: "Direct financial observables (when available)"
          signals: [market_cap, revenue_estimate, asset_value]

        - name: industry_context
          weight: 0.20
          confidence_threshold: 0.5
          description: "Industry and sector-based priors"
          signals: [industry_tiv_benchmark, peer_group_tiv]

      # Complexity groups - references signals from exposure_complexity
      complexity_groups:
        - name: geographic_dispersion
          weight: 0.30
          confidence_threshold: 0.6
          description: "Geographic spread of operations"
          signals: [country_count, timezone_spread, geo_ip_diversity, regional_domains]

        - name: structural_complexity
          weight: 0.25
          confidence_threshold: 0.7
          description: "Organizational structure complexity"
          signals: [subsidiary_count, brand_count, acquisition_activity]

        - name: technical_heterogeneity
          weight: 0.25
          confidence_threshold: 0.6
          description: "Technology stack diversity"
          signals: [tech_stack_diversity, multi_cloud_indicator, legacy_technology]

        - name: regulatory_jurisdictions
          weight: 0.20
          confidence_threshold: 0.7
          description: "Regulatory jurisdiction complexity"
          signals: [regulatory_jurisdiction_count, compliance_framework_count]

      # Cohort priors for fallback estimation when signal coverage is low
      cohort_priors:
        - cohort_id: tech_startup
          name: "Technology Startup"
          sector: technology
          size_indicator: startup
          prior_band: small
          prior_score: 30.0
          confidence: 0.4
        - cohort_id: tech_enterprise
          name: "Technology Enterprise"
          sector: technology
          size_indicator: enterprise
          prior_band: large
          prior_score: 70.0
          confidence: 0.5
        - cohort_id: healthcare_mid
          name: "Healthcare Mid-Market"
          sector: healthcare
          size_indicator: midmarket
          prior_band: medium
          prior_score: 50.0
          confidence: 0.45
        - cohort_id: financial_large
          name: "Financial Services Large"
          sector: financial_services
          size_indicator: large
          prior_band: very_large
          prior_score: 85.0
          confidence: 0.55
        - cohort_id: retail_smb
          name: "Retail SMB"
          sector: retail
          size_indicator: smb
          prior_band: small
          prior_score: 25.0
          confidence: 0.4

      # Auto-apply rules for exposure decisions
      auto_apply_rules:
        - condition: "exposure_band == 'very_large' and confidence < 0.5"
          action: refer
          reason: "Very large exposure with low confidence - verify manually"

        - condition: "exposure_band in ['large', 'very_large'] and proxy_tier == 'COHORT_INFERENCE'"
          action: refer
          reason: "Large exposure based on cohort inference - direct data needed"

        - condition: "complexity_category == 'extremely_complex'"
          action: flag
          reason: "Extremely complex structure - consider enhanced underwriting"

        - condition: "exposure_band == 'micro' and confidence >= 0.7"
          action: apply_modifier
          modifier: "micro_exposure_credit"
            credit_rating: 65
