# =============================================================================
# DSI Model Configuration
# 
# This file holds all the relvant configuration types for a single coverage.
# For example,
# coverage:         the actual coverage cohort, eg aerospace
#   configuration:  the specific configuration file under that coverage, eg aerospace_general
# 
# There can be multiple configurations saved under a coverage.
# 
# A configuration is the single source of truth for:
#   - 1) direct (optional) queries
#   - 2) categorical features
#   - 3) signal groups and underlying features
#   - the source and impact of 1- 3
#   - tier definitions
#   - other pricing parameters
#   - test profiles for validation
# 
# When a technical model is generated:
# - the completed selected configuration is persisted. This allows the model to be generated at any moment based on its original specification (although test profiles are removed as these are extraneous).
# - every item with an id is captured in a seperate file with the associated return and persisted after a complete interaction  - this is a model version
# 
# All DSI principles must be adhered to, specifically:
# 1. All signals must be externally observable (no application questions required)
# 2. Direct queries are OPTIONAL - model must work without them
# 3. Categorical features are inferred from observable data
# 4. Tier determines base premium, either directly or through the application of a percentage to a single value (for example, TIV * %); modifiers adjust for categorical features
# 5. All sources must be publicly accessible or through standard data providers
# =============================================================================

cyber:
  cyber_general:
    metadata:
      name: "DSI Cyber Technical Pricing Model"
      description: "Cyber liability model based on externally observable technical signals"
      version: "2.0.0"
      loss_correlation_layer:
        enabled: true
        monitoring:
          refresh_frequency: monthly
          deterioration_threshold: 15
          improvement_threshold: 15
          alert_on_band_change: true
          alert_on_velocity_spike: true
          velocity_spike_threshold: 10.0
      exposure_shadow_layer:
        enabled: true 
        monitoring:
          refresh_frequency: monthly
          band_change_alert: true
          complexity_change_threshold: 15
          cohort_recalibration_frequency: quarterly
      coverage_types:
        - "cyber_liability"
        - "network_security"
        - "privacy_liability"
        - "cyber_extortion"
      applicable_markets: ["us", "uk", "eu", "apac"]
      minimum_viable_input: ["client name (domain optional)","Limit in USD"]
      min_premium: 5000
      default_currency: "USD"

    # -------------------------------------------------------------------------
    # DIRECT OPTIONAL QUERIES
    # -------------------------------------------------------------------------
    direct_queries:      # Yes/No questions that cannot be externally observed, future provision for agents
      - id: "mfa_enabled"
        question: "Is multi-factor authentication enabled for all remote access??"
        bands:
          - return: false
            override: null
            action: "FLAG"
            note: "MFA not enabled - increased ransomware risk" 
      - id: "security_training"
        question: "Do all employees complete annual cyber security training?"
        bands:
          - return: false
            override: null
            action: "FLAG"
            note: "No security training - increased phishing risk"
      - id: "phi_handler"
        question: "Do you process Protected Health Information (PHI)"
        bands:
          - return: true
            override: null
            action: "MODIFIER"
            modifier: 1.25
            note: "PHI handler - HIPAA exposure"
      - id: "pci_scope"
        question: "Do you store payment card data (PCI scope)"
        bands:
          - return: true
            override: null
            action: "MODIFIER"
            modifier: 1.15
            note: "PCI scope - card data exposure"
      - id: "incident_response_plan"
        question: "Do you have a documented incident response plan?"
        bands:
          - return: false 
            override: null
            action: "FLAG" 
            note: "No IR plan - extended breach impact likely"
      - id: "edr_deployed"
        question: "Is endpoint detection and response (EDR) deployed on all endpoints?"
        bands:
          - return: false 
            override: null
            action: "FLAG"
            note: "No EDR - reduced threat detection"
      - id: "immutable_backups"
        question: "Are backups maintained offline or immutable?"
        bands:
          - return: false
            override: null
            action: "FLAG"
            note: "No immutable backups - ransomware recovery risk"
      - id: "recent_incident"
        question: "Have you experienced a material cyber incident in the past 3 years?"
        bands:
          - return: true
            override: 4
            action: "REFER"
            note: "Recent incident - requires manual review"


    # -------------------------------------------------------------------------
    # CATEGORICAL GROUPS
    # categorical groups can either
    # a) impact base premium after generation (impact: modifier)
    # b) be the basis of premium (impact: premium)
    # note: only one group be the basis of premium
    # -------------------------------------------------------------------------

    categorical_groups:
      - id: "industry_classification"
        name: "Industry Classification"
        description: "Industry classification derived from public records"
        impact: "modifier" 
        inference_utility_function: industry_classification_basefunction
      - id: "size_band"
        name: "Size Band"
        description: "Company size classification"
        impact: "modifier"
        inference_utility_function: company_size_basefunction
      - id: "geography"
        name: "geography"
        description: "Primary operational geography"
        impact: "modifier"
        inference_utility_function: operational_base_basefunction
        
    # -------------------------------------------------------------------------
    # CATEGORICAL FEATURES
    # -------------------------------------------------------------------------

    categorical_features:
      industry_classification:
        - cat: "TECHNOLOGY"
          label: "Technology"
          modifier: 1.15
          description: ""         
        - cat: "FINANCIAL_SERVICES" 
          label: "Financial Services" 
          modifier: 1.40
          description: ""     
        - cat: "HEALTHCARE"
          label: "Healthcare"
          modifier: 1.50
          description: ""     
        - cat: "RETAIL"
          label: "Retail"
          modifier: 1.25
          description: ""     
        - cat: "MANUFACTURING"
          label: "Manufacturing"
          modifier: 0.95
          description: ""     
        - cat: "PROFESSIONAL_SERVICES"
          label: "Professional Services"
          modifier: 1.10
          description: ""     
        - cat: "EDUCATION"
          label: "Education"
          modifier: 1.05
          description: ""     
        - cat: "GOVERNMENT"
          label: "Government"
          modifier: 0.90
          description: ""     
        - cat: "ENERGY"
          label: "Energy & Utilities"
          modifier: 1.20
          description: ""     
        - cat: "OTHER"
          label: "Other" 
          modifier: 1.00
          description: ""     
  
      size_band:
        - cat: "MICRO"
          label: "Micro"
          modifier: 0.40
          description: ""     
        - cat: "SMALL"
          label: "Small"
          modifier: 0.60
          description: ""     
        - cat: "MEDIUM"
          label: "Medium"
          modifier: 1.00
          description: ""     
        - cat: "LARGE"
          label: "Large"
          description: ""     
          modifier: 2.00
        - cat: "ENTERPRISE"
          label: "Enterprise"
          modifier: 4.00 
          description: ""     
            
      geography:
        - cat: "US" 
          label: "United States"
          modifier: 1.00
          description: ""     
        - cat: "UK"
          label: "United Kingdom"
          modifier: 1.05
          description: ""     
        - cat: "EU"
          label: "European Union"
          modifier: 1.10 
          description: ""     
        - cat: "APAC"
          label: "Asia Pacific"
          modifier: 1.15
          description: ""     
        - cat: "OTHER" 
          label: "Other"
          modifier: 1.25
          description: ""     

    # -------------------------------------------------------------------------
    # SIGNAL GROUPS
    # Each group is the product of its underlying features
    # Each group contributes to the composite score
    # Weights must add to 1
    # -------------------------------------------------------------------------
    
    signal_groups:
      - id: "network_authority"
        name: "Network Authority"
        description: "Industry relationships, partnerships, and counterparty quality"
        risk:
          weight: 0.15
          test_scores: {excellent: 90, average: 70, poor: 40}
          score_condition: false
        loss:
          weight: 0.15
          confidence_threshold: 0.5
        
      - id: "technical_infrastructure"
        name: "Technical Infrastructure"
        description: "Observable technical security implementation"
        risk:
          weight: 0.35
          test_scores: {excellent: 92, average: 68, poor: 35}
          score_condition: true
          bands:
            - max: 30
              override: 5
              action: "DECLINE"
              note: "Critical technical deficiencies"
            - max: 45
              override: 4
              action: "REFER"
              note: "Significant technical concerns"
          inclusive_max: false
        loss:
          weight: 0.35
          confidence_threshold: 0.7
        
      - id: "corporate_footprint"
        name: "Corporate Footprint"
        description: "Signals from company's digital presence and security posture"
        risk:
          weight: 0.15
          test_scores: {excellent: 88, average: 65, poor: 38}
          score_condition: false
        loss:
          weight: 0.25
          confidence_threshold: 0.6
        
      - id: "public_record"
        name: "Public Record"
        description: "Breach history, regulatory actions, and public disclosures"
        risk:
          weight: 0.25
          test_scores: {excellent: 95, average: 72, poor: 30}
          score_condition: true
          bands:
            - max: 30
              override: 5
              action: "DECLINE"
              note: "Severe breach/regulatory history"
            - max: 45
              override: 4
              action: "REFER"
              note: "Material breach history"
          inclusive_max: false
        loss:
          weight: 0.2
          confidence_threshold: 0.8
     
      - id: "structured_data"
        name: "Structured Data"
        description: "Third-party security ratings and scores"
        risk:
          weight: 0.10
          test_scores: {excellent: 88, average: 68, poor: 42}
          score_condition: false
        loss:
          weight: 0.2
          confidence_threshold: 0.9

    # -------------------------------------------------------------------------
    # SIGNAL FEATURES
    # Each is a underlying feature for the previously defined groups
    # Each group contributes to the group score
    # Weights must add to 1
    # -------------------------------------------------------------------------
  
    signal_features:
      network_authority:
        - id: "customer_quality"
          name: "Customer Quality"
          description: "Customer quality inferred from case studies, logos, testimonials"
          inference_utility_function: customer_quality_basefunction
          risk:
            weight: 0.15
            score_condition: false
          loss:
            weight: 0.15
            correlation_type: severity
            correlation_direction: negative
            normalizer: percentile
          
        - id: "partner_quality"
          name: "Partner Network Quality"
          description: "Technology partners and alliance quality"
          inference_utility_function: partner_quality_basefunction
          risk:
            weight: 0.10
            score_condition: false
          loss:
            weight: 0.20
            correlation_type: both
            correlation_direction: negative
            normalizer: percentile
          
        - id: "security_vendor"
          name: "Security Vendor Relationships"
          description: "Relationships with tier-1 security vendors (CrowdStrike, Palo Alto, etc.)"
          inference_utility_function: security_vendor_basefunction
          risk:
            weight: 0.25
            score_condition: true
            bands:
              - max: 25
                override: null
                action: "FLAG"
                note: "No tier-1 security vendors detected"
            inclusive_max: false
          loss:
            weight: 0.35
            correlation_type: both
            correlation_direction: negative
            normalizer: categorical_map     
          
        - id: "industry_body"
          name: "Industry Body Membership"
          description: "Membership in ISACs, trade associations, security consortiums"
          inference_utility_function: industry_body_basefunction
          risk:
            weight: 0.15
            score_condition: false
          
        - id: "certification_authority"
          name: "Certification Authority"
          description: "Quality of certification auditors (Big 4, recognized bodies)"
          inference_utility_function: certification_authority_basefunction
          risk:
            weight: 0.15
            score_condition: false
          loss:
            weight: 0.30
            correlation_type: frequency
            correlation_direction: negative
            normalizer: categorical_map

        - id: "financial_relationship"
          name: "Financial Relationship Quality"
          description: "Banking and financial relationship indicators"
          inference_utility_function: financial_relationship_basefunction
          risk:
            weight: 0.05
            score_condition: false

        - id: "network_centrality"
          name: "Peer Network Centrality"
          description: "Position in industry relationship graph"
          inference_utility_function: network_centrality_basefunction
          risk:
            weight: 0.10
            score_condition: false

        - id: "second_degree"
          name: "Second-Degree Relationship Quality"
          description: "Quality of partners' partners (supply chain depth)"
          inference_utility_function: second_degree_basefunction
          risk:
            weight: 0.05
            score_condition: false
  
      technical_infrastructure:
        - id: "tls_score"
          name: "TLS/SSL Configuration"
          description: "TLS configuration quality (SSL Labs methodology)"
          inference_utility_function: tls_configuration_basefunction
          risk:
            weight: 0.12
            score_condition: false
          loss:
            weight: 0.25
            correlation_type: frequency
            correlation_direction: negative
            normalizer: linear 
          
        - id: "security_headers"
