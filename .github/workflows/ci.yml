name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, claude/* ]
  pull_request:
    branches: [ main, develop ]

env:
  RUN_VERSION: '3.11'
  PYTHON_VERSIONS: '["3.10","3.11","3.12"]'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/dsi-api

jobs:
  setup:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ steps.set-matrix.outputs.python-versions }}
      run-version: ${{ steps.set-matrix.outputs.run-version }}
    steps:
      - id: set-matrix
        run: |
          echo 'python-versions=["3.10","3.11","3.12"]' >> $GITHUB_OUTPUT
          echo 'run-version=3.11' >> $GITHUB_OUTPUT

  lint:
    name: Code Linting
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.setup.outputs.run-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Run Black (code formatting check)
        run: black --check signal_architecture/ infrastructure/ layers/ coverages/

      - name: Run isort (import sorting check)
        run: isort --check-only signal_architecture/ infrastructure/ layers/ coverages/

      - name: Run Flake8 (linting)
        run: |
          set -o pipefail
          flake8 signal_architecture/ infrastructure/ layers/ coverages/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503,E501,F541,F841 \
            --format=default \
            > flake8-report.txt || true

      - name: Upload flake8 report
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: flake8-report.txt

      - name: Run MyPy (type checking)
        run: |
          set -o pipefail
          mypy signal_architecture/ infrastructure/ layers/ \
          --ignore-missing-imports \
          > mypy-report.txt
        continue-on-error: true

      - name: Upload MyPy report
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy-report.txt

  rust-build:
    name: Build Rust (dsi-core)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/dsi-core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/dsi-core/Cargo.lock') }}

      - name: Build dsi-core
        working-directory: rust/dsi-core
        run: cargo build --release --lib

      - name: Run Rust tests
        working-directory: rust/dsi-core
        run: cargo test --release

      - name: Upload Rust artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib
          path: rust/dsi-core/target/release/libdsi_core.*
          if-no-files-found: ignore

  test:
    name: Run Tests
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.setup.outputs.python-versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with pytest
        if: matrix.python-version == needs.setup.outputs.run-version
        run: |
          pytest tests/ \
          --cov=signal_architecture \
          --cov=infrastructure \
          --cov=layers \
          --cov=coverages \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          -v \
          --junitxml=pytest-report-${{ matrix.python-version }}.xml

      - name: Run integration tests
        if: matrix.python-version == needs.setup.outputs.run-version
        run: |
          pytest tests/integration/ \
          -v \
          --junitxml=integration-report.xml
        continue-on-error: true

      - name: Upload pytest report
        if: always() && matrix.python-version == needs.setup.outputs.run-version
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: pytest-report-${{ matrix.python-version }}.xml
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: matrix.python-version == needs.setup.outputs.run-version
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        if: matrix.python-version == needs.setup.outputs.run-version
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
          if-no-files-found: ignore

  calibrate:
    name: Calibration Harness
    needs: [setup, test]
    runs-on: ubuntu-latest
    if: matrix.python-version == needs.setup.outputs.run-version || true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.setup.outputs.run-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run calibration harness
        run: |
          python -m infrastructure.builder.cli calibrate --json > calibration-report.json
          python -m infrastructure.builder.cli calibrate

      - name: Upload calibration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calibration-report
          path: calibration-report.json
          if-no-files-found: ignore

  docker-build:
    name: Build Docker Image
    needs: [lint, test, calibrate, rust-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop"
          # Uncomment when K8s cluster is configured:
          # kubectl set image deployment/dsi-api dsi-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop -n dsi-staging
          echo "Staging deployment configured"

      - name: Smoke test
        run: |
          echo "Running smoke tests against staging..."
          # Uncomment when staging endpoint is available:
          # curl -sf https://staging.dsi.internal/api/v1/health/live || exit 1
          # curl -sf https://staging.dsi.internal/api/v1/health/ready || exit 1
          echo "Smoke test endpoints configured"

  deploy-production:
    name: Deploy to Production
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          # Uncomment when K8s cluster is configured:
          # kubectl set image deployment/dsi-api dsi-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest -n dsi-production
          echo "Production deployment configured"

      - name: Smoke test
        run: |
          echo "Running smoke tests against production..."
          # Uncomment when production endpoint is available:
          # curl -sf https://api.dsi.internal/api/v1/health/live || exit 1
          # curl -sf https://api.dsi.internal/api/v1/health/ready || exit 1
          echo "Smoke test endpoints configured"

      - name: Notify
        if: always()
        run: |
          echo "Production deployment status: ${{ job.status }}"
          echo "Rollback: kubectl rollout undo deployment/dsi-api -n dsi-production"

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [setup, lint, test, calibrate, rust-build]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "=== Job Results ==="
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Calibrate: ${{ needs.calibrate.result }}"
          echo "Rust: ${{ needs.rust-build.result }}"

      - name: Download pytest reports
        if: needs.test.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: pytest-report-${{ needs.setup.outputs.run-version }}
          path: reports

      - name: Summarise failing tests
        if: ${{ needs.test.result == 'failure' }}
        run: |
          echo "=== Detailed Test Failures ==="
          python - << 'EOF'
          import glob
          import os
          import xml.etree.ElementTree as ET

          reports_dir = "reports"
          xml_files = sorted(glob.glob(os.path.join(reports_dir, "pytest-report-*.xml")))

          if not xml_files:
              print("No JUnit XML files found. Skipping summary.")
              raise SystemExit(0)

          failures_out = []
          for xml_path in xml_files:
              py_ver = os.path.basename(xml_path).replace("pytest-report-", "").replace(".xml", "")
              try:
                  tree = ET.parse(xml_path)
                  root = tree.getroot()
              except Exception as e:
                  failures_out.append(f"\n---\n[{py_ver}] Failed to parse {xml_path}: {e}")
                  continue

              for testcase in root.findall('.//testcase'):
                  for failure in testcase.findall('failure'):
                      name = testcase.attrib.get('name')
                      classname = testcase.attrib.get('classname')
                      message = (failure.attrib.get('message') or '').strip()
                      details = (failure.text or '').strip()
                      formatted = (
                          f"\n---\n"
                          f"[Python {py_ver}] Test: {classname}.{name}\n"
                          f"Message: {message}\n"
                          f"Details:\n{details}\n"
                      )
                      failures_out.append(formatted)

          if failures_out:
              print("\n".join(failures_out))
          else:
              print("No test failures")
          EOF

      - name: Report success
        if: ${{ needs.lint.result == 'success' && needs.test.result == 'success' && needs.calibrate.result == 'success' }}
        run: echo "All checks passed!"

      - name: Report failure
        if: ${{ needs.lint.result == 'failure' || needs.test.result == 'failure' || needs.calibrate.result == 'failure' }}
        run: |
          echo "Some checks failed!"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Calibrate: ${{ needs.calibrate.result }}"
