# Financial Institutions Underwriting Appetite
# Owned by: Underwriting
# Scope: All FI configurations (fi_general, fi_sme)

appetite:
  max_single_limit: 250_000_000     # $250M max any one policy

  constraints:
    - field: total_assets
      operator: "<="
      value: 2_000_000_000_000      # $2T
      reason: "Total assets exceed FI underwriting authority — G-SIB requires syndicate placement"
