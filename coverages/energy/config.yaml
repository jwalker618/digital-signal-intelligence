        bands:
        - {id: 1, label: SIMPLE, interpretation: {bands: {min: 0, max: 20}, application: {method: MODIFIER, applied: 0.85}}}
        - {id: 2, label: MODERATE, interpretation: {bands: {min: 21, max: 40}, application: {method: MODIFIER, applied: 0.95}}}
        - {id: 3, label: COMPLEX, interpretation: {bands: {min: 41, max: 60}, application: {method: MODIFIER, applied: 1.05}}}
        - {id: 4, label: HIGHLY_COMPLEX, interpretation: {bands: {min: 61, max: 80}, application: {method: MODIFIER, applied: 1.2}}}
        - {id: 5, label: EXTREMELY_COMPLEX, interpretation: {bands: {min: 81, max: 100}, application: {method: MODIFIER, applied: 1.4}}}

    limit_configuration:
      type: DECOUPLED
      valid_limits: [1000000, 2500000, 5000000, 10000000, 25000000, 50000000, 100000000, 250000000, 500000000]
      valid_deductibles: [10000, 25000, 50000, 100000, 250000, 500000, 1000000]

    pricing:
      base_limit_reference: 10000000
      base_deductible_reference: 100000
      by_product_type:
        property_damage:
          ilf_curve: {base_limit: 10000000, factors: [{limit: 1000000, factor: 0.3}, {limit: 2500000, factor: 0.5}, {limit: 5000000, factor: 0.75}, {limit: 10000000, factor: 1.0}, {limit: 25000000, factor: 1.0}, {limit: 50000000, factor: 1.0}, {limit: 100000000, factor: 1.0}, {limit: 250000000, factor: 1.0}, {limit: 500000000, factor: 1.0}]}
          deductible_factors: [{deductible: 10000, factor: 1.3}, {deductible: 25000, factor: 1.15}, {deductible: 50000, factor: 1.05}, {deductible: 100000, factor: 1.0}, {deductible: 250000, factor: 0.88}, {deductible: 500000, factor: 0.78}, {deductible: 1000000, factor: 0.68}]
        business_interruption:
