    metadata:
      name: Cyber SME Automated Pricing Model
      description: Cyber liability model for SME segment - automated underwriting
        for small businesses
      version: 2.3.0
      product_types:
      - cyber_liability
      - network_security
      applicable_markets:
      - us
      - uk
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: cyber_liability, network_security'
        - field: limit
          description: Requested limit in USD (max $5M for SME)
        - field: revenue
          description: Annual revenue in USD (required for SME qualification)
      min_premium: 2500
      default_currency: USD
      model_specificity: 2
      routing_constraints:
      - field: revenue
        operator: <=
        value: 50000000
        required_in_input: true
      - field: limit
        operator: <=
        value: 5000000
        required_in_input: true
