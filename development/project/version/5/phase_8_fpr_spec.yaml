  # =========================================================================
  # 3. FPR SURETY
  # =========================================================================
  - id: fpr_surety
    name: DSI Surety & Contract Bond Model
    description: "Surety bonds — performance, payment, bid, maintenance; contractor financial strength focus"
    model_specificity: 3
    min_premium: 10000

    product_types:
      - surety_bond
      - contract_bond

    minimum_viable_input:
      - field: client_name
        description: Client name
      - field: product_type
        description: "One of: surety_bond, contract_bond"
      - field: limit
        description: Requested limit (penal sum) in USD
      - field: bond_amount
        description: Bond penal sum in USD (MULTIPLIER basis)

    routing_constraints:
      - {field: product_type, operator: "IN", value: [surety_bond, contract_bond], required_in_input: true}

    direct_queries:
      - id: prior_bond_claim
        question: Has the principal had a surety bond claim or performance bond call in the past 10 years?
        conditions: [{action: REFER, override: 4, note: "Prior surety claim history"}]
      - id: financial_audit
        question: Are the principal's financial statements audited by a CPA firm?
        conditions: [{action: MODIFIER, applied: 0.90, note: "Audited financial statements credit"}]
      - id: work_in_progress
        question: Does work-in-progress exceed 80% of the principal's single project limit?
        conditions: [{action: FLAG, note: "High WIP-to-capacity ratio"}]
      - id: government_contract
        question: Is this a government/public works contract requiring Miller Act compliance?
        conditions: [{action: FLAG, note: "Government contract — Miller Act bond"}]
      - id: joint_venture
        question: Is this a joint venture project with shared bonding obligations?
        conditions: [{action: FLAG, note: "JV bonding — partner credit exposure"}]

    category_groups: []

    group_weights:
      - {group_id: surety_risk, risk_weight: 0.45, loss_weight: 0.45, exposure_weight: 0.35}
      - {group_id: corporate_footprint, risk_weight: 0.25, loss_weight: 0.20, exposure_weight: 0.30}
      - {group_id: firm_stability, risk_weight: 0.20, loss_weight: 0.20, exposure_weight: 0.20}
      - {group_id: regulatory_standing, risk_weight: 0.10, loss_weight: 0.15, exposure_weight: 0.15}

    risk_tier_bands:
      method: MULTIPLIER
      basis: bond_amount
      preferred_rate: 0.008
      standard_plus_rate: 0.015
      standard_rate: 0.025
      substandard_rate: 0.040
      decline_rate: 0.065

    limit_configuration:
      type: DECOUPLED
      valid_limits: [500000, 1000000, 2000000, 5000000, 10000000, 25000000, 50000000, 100000000]
      valid_deductibles: [10000, 25000, 50000, 100000, 250000, 500000]

    pricing:
      base_limit_reference: 5000000
      base_deductible_reference: 50000
      taxes_fees_rate: 0.04
      by_product_type:
        - product_type: surety_bond
          ilf_curve:
            base_limit: 5000000
            factors:
              - {limit: 500000, factor: 0.25}
              - {limit: 1000000, factor: 0.45}
              - {limit: 2000000, factor: 0.70}
              - {limit: 5000000, factor: 1.0}
              - {limit: 10000000, factor: 1.5}
              - {limit: 25000000, factor: 2.5}
              - {limit: 50000000, factor: 4.0}
              - {limit: 100000000, factor: 6.0}
          deductible_factors:
            - {deductible: 10000, factor: 1.15}
            - {deductible: 25000, factor: 1.05}
            - {deductible: 50000, factor: 1.0}
            - {deductible: 100000, factor: 0.90}
            - {deductible: 250000, factor: 0.80}
            - {deductible: 500000, factor: 0.70}

