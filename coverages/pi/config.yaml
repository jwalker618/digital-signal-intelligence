  # ===========================================================================
  # PI SME (Small Business)
  # Target: Revenue <= $50M. Categorical Pricing. Bundled Limits.
  # ===========================================================================
  pi_sme:
    metadata:
      name: DSI Professional Indemnity SME Model
      description: PI/E&O coverage for small practices
      version: 2.3.0
      product_types:
      - professional_liability
      - errors_omissions
      - malpractice
      applicable_markets: ["us", "uk", "eu", "apac"]
      minimum_viable_input:
        required:
        - field: client_name
        - field: product_type
        - field: limit
        - field: revenue
      min_premium: 1500
      default_currency: USD
      model_specificity: 2
      routing_constraints:
      - field: revenue
        operator: "<="
        value: 50000000
        required_in_input: true

    # ... [direct_queries as above] ...
    
    signal_registry:
    # CATEGORICAL BASELINE PRESERVED: Your exact logic for SME base prices
    - id: profession_type
      inference_utility_function: primaryprofessional_classification_basefunction
      proxy_tier: INFERRED_PROXY
      categories:
        group_id: profession_type
        source: metadata.profession_type
        features:
        - {cat: LAW_FIRM, label: Law Firm, value: 8500}
        - {cat: ACCOUNTING_FIRM, label: Accounting Firm, value: 9000}
        - {cat: ARCHITECTURE, label: Architecture, value: 7500}
        - {cat: ENGINEERING, label: Engineering, value: 8000}
        - {cat: MANAGEMENT_CONSULTING, label: Management Consulting, value: 6000}
        - {cat: IT_CONSULTING, label: IT Consulting, value: 7000}
        - {cat: HR_CONSULTING, label: HR Consulting, value: 5500}
        - {cat: REAL_ESTATE, label: Real Estate, value: 5500}
        - {cat: INSURANCE_BROKER, label: Insurance Broker, value: 6500}
        - {cat: FINANCIAL_PLANNING, label: Financial Planning, value: 7500}
        - {cat: HEALTHCARE_ADMIN, label: Healthcare Administration, value: 6000}
        - {cat: APPRAISAL_VALUATION, label: Appraisal/Valuation, value: 6500}
        - {cat: ENVIRONMENTAL_CONSULTING, label: Environmental Consulting, value: 7000}
        - {cat: OTHER, label: Other Professional, value: 6000}

    # ... [Keep your sub_profession_type, firm_size, and SME-relevant signals] ...
    
    groups:
      categories:
      - {id: profession_type, label: Profession Type, impact: PREMIUM_BASE, default_cat: OTHER}

    # FIXED SCHEMA LOGIC: Legally applies tier modifiers to the categorical value
    risk_tier_bands:
      bands:
      - {id: 1, label: PREFERRED, interpretation: {bands: {min: 800, max: 1000}, action: APPROVE, application: {method: MULTIPLIER, applied: 0.75, basis: categorical}}}
      - {id: 2, label: STANDARD_PLUS, interpretation: {bands: {min: 650, max: 799}, action: APPROVE, application: {method: MULTIPLIER, applied: 1.00, basis: categorical}}}
      - {id: 3, label: STANDARD, interpretation: {bands: {min: 500, max: 649}, action: REFER, application: {method: MULTIPLIER, applied: 1.30, basis: categorical}}}
      - {id: 4, label: SUBSTANDARD, interpretation: {bands: {min: 350, max: 499}, action: REFER, application: {method: MULTIPLIER, applied: 1.75, basis: categorical}}}
      - {id: 5, label: DECLINE, interpretation: {bands: {min: 0, max: 349}, action: DECLINE, application: {method: MULTIPLIER, applied: 2.50, basis: categorical}}}

    exposure:
      size:
        weight: 0.6
        bands:
        - {id: 1, label: MICRO, interpretation: {bands: {min: 0, max: 33}, application: {method: MODIFIER, applied: 0.75}}} # < 1M
        - {id: 2, label: SMALL, interpretation: {bands: {min: 34, max: 66}, application: {method: MODIFIER, applied: 1.00}}} # 1M - 10M
        - {id: 3, label: MEDIUM, interpretation: {bands: {min: 67, max: 100}, application: {method: MODIFIER, applied: 1.25}}} # 10M - 50M

    # FIXED: True Phase 5 Bundled Menu Packages
    limit_configuration:
      type: BUNDLED
      packages:
        - {id: 1, label: STARTER, limit: 250000, deductible: 2500}
        - {id: 2, label: BASIC, limit: 500000, deductible: 5000}
        - {id: 3, label: STANDARD, limit: 1000000, deductible: 10000} # Anchor Match
        - {id: 4, label: ENHANCED, limit: 2000000, deductible: 25000}
        - {id: 5, label: PREMIER, limit: 5000000, deductible: 50000}

    pricing:
      base_limit_reference: 1000000
      base_deductible_reference: 10000
    
      by_product_type:
        professional_liability:
          ilf_curve:
            base_limit: 1000000
            factors:
            - {limit: 250000, factor: 0.50}
            - {limit: 500000, factor: 0.75}
            - {limit: 1000000, factor: 1.00} # Anchor
            - {limit: 2000000, factor: 1.65}
            - {limit: 5000000, factor: 3.00}

          deductible_factors:
          - {deductible: 2500, factor: 1.20}
          - {deductible: 5000, factor: 1.10}
          - {deductible: 10000, factor: 1.00} # Anchor
          - {deductible: 25000, factor: 0.90}
          - {deductible: 50000, factor: 0.80}
        # (Replicate factors for errors_omissions and malpractice)
      taxes_fees_rate: 0.05

    guardrails:
      modifier_floor: 0.10
      modifier_cap: 2.5
      max_premium_to_limit_ratio: 0.35
      max_premium_to_revenue_ratio: 0.01
