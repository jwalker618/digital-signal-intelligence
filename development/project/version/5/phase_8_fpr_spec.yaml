          - {limit: 50000000, factor: 4.5}
          - {limit: 100000000, factor: 7.0}
          - {limit: 250000000, factor: 13.0}
      deductible_factors:
        - {deductible: 25000, factor: 1.15}
        - {deductible: 50000, factor: 1.05}
        - {deductible: 100000, factor: 1.0}
        - {deductible: 250000, factor: 0.88}
        - {deductible: 500000, factor: 0.78}
        - {deductible: 1000000, factor: 0.68}
        - {deductible: 2500000, factor: 0.58}

