# V6 Phase 5 (C2) — ClusterSecretStore for External Secrets Operator.
#
# Points at AWS SSM Parameter Store under /dsi/{env}/*. The production
# overlay binds to /dsi/prod/*; the staging overlay to /dsi/staging/*.
# Switch backends (Vault, GCP SM, Doppler, …) by replacing `provider`.
#
# Requires the IAM role attached via IRSA to have:
#   ssm:GetParameter, ssm:GetParameters, ssm:GetParametersByPath
# on arn:aws:ssm:{region}:{account}:parameter/dsi/{env}/*
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: dsi-aws-ssm
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
  refreshInterval: 60s
