aerospace:
  aerospace_general:
    metadata:
      name: DSI Aerospace Insurance Model
      description: Aviation hull and liability coverage based on observable safety and operational signals
      version: 2.3.0
      product_types:
      - aviation_hull
      - aviation_liability
      - aviation_hull_liability_combined
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mea
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: aviation_hull, aviation_liability, aviation_hull_liability_combined'
        - field: limit
          description: Requested limit in USD
        - field: hull_value
          description: Total hull value in USD
      min_premium: 25000
      default_currency: USD
      model_specificity: 1
      routing_constraints:
      - field: hull_value
        operator: '>'
        value: 50000000
        required_in_input: true
    direct_queries:
    - id: pending_claims
      question: Are there any pending aviation liability claims exceeding $1M?
      query_condition:
      - return: true
        action: REFER
        override: 3
        applied: null
        note: Pending claims >$1M
    - id: regulatory_action
      question: Is there any pending regulatory enforcement action against the operator?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Pending regulatory enforcement
    - id: coverage_declined
      question: Has aviation coverage been declined or non-renewed in the past 3 years?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Prior declination
    - id: fleet_change
      question: Are there planned fleet changes exceeding 20% in the next 12 months?
      query_condition:
      - return: true
        action: REFER
        override: 3
        applied: null
        note: Major fleet change planned
    - id: route_expansion
      question: Is there planned expansion into conflict zones or sanctioned regions?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Conflict zone expansion
    - id: ownership_change
      question: Has there been a change in majority ownership in the past 12 months?
      query_condition:
      - return: true
        action: REFER
        override: 3
        applied: null
        note: Recent ownership change
    - id: wet_lease_operations
      question: Do you operate aircraft under wet lease arrangements?
      query_condition:
      - return: true
        action: MODIFIER
        override: null
        applied: 1.15
        note: Wet lease operations
