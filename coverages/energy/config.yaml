            - {cat: "UPSTREAM_UNCONVENTIONAL", label: "Upstream Unconventional", applied: 0.95}
            - {cat: "UPSTREAM_OFFSHORE", label: "Upstream Offshore (Shelf)", applied: 1.20}
            - {cat: "UPSTREAM_DEEPWATER", label: "Upstream Deepwater", applied: 1.50} 
            - {cat: "MIDSTREAM_PIPELINE", label: "Midstream Pipeline", applied: 0.80}
            - {cat: "MIDSTREAM_PROCESSING", label: "Midstream Processing", applied: 1.00}
            - {cat: "MIDSTREAM_STORAGE",  label: "Midstream Storage", applied: 0.85}
            - {cat: "DOWNSTREAM_REFINING", label: "Downstream Refining", applied: 1.30}
            - {cat: "DOWNSTREAM_PETROCHEMICAL", label: "Downstream Petrochemical",  applied: 1.25}
            - {cat: "POWER_GENERATION", label: "Power Generation", applied: 0.90}
            - {cat: "RENEWABLE", label: "Renewable Energy", applied: 0.70}
