      - {id: 4, label: ELEVATED, interpretation: {bands: {min: 20, max: 39}, application: {frequency_modifier: 1.12, severity_modifier: 1.1}}}
      - {id: 5, label: HIGH, interpretation: {bands: {min: 0, max: 19}, application: {frequency_modifier: 1.25, severity_modifier: 1.25}}}
      constraints: {floor: 0.6, cap: 1.45}

    exposure:
      size:
        weight: 0.6
        bands:
        - {id: 1, label: SMALL, interpretation: {bands: {min: 0, max: 20}, application: {method: MODIFIER, applied: 0.7}, implied_thresholds: {min: 0, max: 500000000}}}
        - {id: 2, label: MEDIUM, interpretation: {bands: {min: 21, max: 40}, application: {method: MODIFIER, applied: 0.9}, implied_thresholds: {min: 500000000, max: 2000000000}}}
        - {id: 3, label: LARGE, interpretation: {bands: {min: 41, max: 60}, application: {method: MODIFIER, applied: 1.1}, implied_thresholds: {min: 2000000000, max: 8000000000}}}
        - {id: 4, label: VERY_LARGE, interpretation: {bands: {min: 61, max: 80}, application: {method: MODIFIER, applied: 1.4}, implied_thresholds: {min: 8000000000, max: 25000000000}}}
        - {id: 5, label: MEGA, interpretation: {bands: {min: 81, max: 100}, application: {method: MODIFIER, applied: 1.9}, implied_thresholds: {min: 25000000000, max: 100000000000}}}
      complexity:
