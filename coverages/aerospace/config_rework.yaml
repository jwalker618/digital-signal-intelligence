          score_conditions:
            - threshold: 30
              comparison: "<="
              override: 5
              action: "REFER"
              note: "On EU Air Safety List"
            - threshold: 70
              comparison: "<="
              override: 4
              action: "REFER"
              note: "EU safety restrictions"

        - id: "state_safety_rating"
          name: "State of Registry Safety Rating"
          description: "ICAO USOAP audit results for state"
          weight: 0.05
          inference_utility_function: state_safety_basefunction

        - id: "certification_transparency"
          name: "Certification Transparency"
          description: "FAA/EASA certification status transparency"
          weight: 0.05
          inference_utility_function: certification_transparency_basefunction

      operational_quality:
        - id: "otp_score"
          name: "On-Time Performance"
          description: "Departure/arrival punctuality vs benchmarks"
          weight: 0.20
          inference_utility_function: otp_score_basefunction

        - id: "dispatch_reliability"
          name: "Dispatch Reliability"
          description: "Completion rate and technical dispatch"
          weight: 0.20
          inference_utility_function: dispatch_reliability_basefunction

        - id: "crew_experience"
          name: "Crew Experience Indicators"
          description: "Average experience from public hiring data"
          weight: 0.15
          inference_utility_function: crew_experience_basefunction

        - id: "training_indicators"
          name: "Training Program Indicators"
          description: "Training investment signals"
          weight: 0.15
          inference_utility_function: training_indicators_basefunction

        - id: "operational_complexity"
          name: "Operational Complexity"
          description: "Fleet diversity and route network complexity"
          weight: 0.15
          inference_utility_function: operational_complexity_basefunction

        - id: "growth_rate"
          name: "Fleet/Capacity Growth Rate"
          description: "Year-over-year growth (rapid growth = higher risk)"
          weight: 0.15
          inference_utility_function: growth_rate_basefunction

      fleet_quality:
        - id: "fleet_age"
          name: "Fleet Average Age"
          description: "Average aircraft age vs benchmarks"
          weight: 0.30
          inference_utility_function: fleet_age_basefunction

        - id: "fleet_homogeneity"
          name: "Fleet Homogeneity"
          description: "Fleet type standardization"
          weight: 0.20
          inference_utility_function: fleet_homogeneity_basefunction

        - id: "aircraft_generation"
          name: "Aircraft Generation"
          description: "Percentage of current-generation aircraft"
          weight: 0.25
          inference_utility_function: aircraft_generation_basefunction

        - id: "order_backlog"
          name: "Fleet Renewal Pipeline"
          description: "Order backlog indicating investment"
          weight: 0.15
          inference_utility_function: order_backlog_basefunction

        - id: "maintenance_indicators"
          name: "Maintenance Quality Indicators"
          description: "Inferred maintenance quality"
          weight: 0.05
          inference_utility_function: maintenance_indicators_basefunction

        - id: "supply_chain_quality"
          name: "Supply Chain Quality"
          description: "Supplier audit and quality assessment"
          weight: 0.05
          inference_utility_function: supply_chain_quality_basefunction

      financial_stability:
        - id: "credit_rating"
          name: "Credit Rating"
          description: "Credit rating from major agencies"
          weight: 0.35
          inference_utility_function: credit_rating_basefunction

        - id: "public_financials"
          name: "Public Financial Health"
          description: "Financial metrics from public filings"
          weight: 0.30
          inference_utility_function: public_financials_basefunction

        - id: "market_position"
          name: "Market Position"
          description: "Market share and competitive position"
          weight: 0.20
          inference_utility_function: market_position_basefunction

        - id: "government_support"
