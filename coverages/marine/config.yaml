          default_cat: "OTHER"

        - id: "flag_state_quality"
          label: "Flag State Quality"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "fleet_age_band"
          label: "Fleet Age Band"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

      # -----------------------------------------------------------------------
      # THREE-LAYER ASSESSMENT GROUPS
      # Aggregate signals into scoring dimensions
      # Weights within each dimension must sum to 1.0
      # -----------------------------------------------------------------------
      three_layer_assessment:
        - id: "network_authority"
          label: "Network Authority"
          description: "Classification society, P&I Club, charterer relationships"
          risk:
            weight: 0.15
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent network authority - modifier applied"}
  
        - id: "operational_telemetry"
          label: "Operational Telemetry"
          description: "AIS behavior patterns, dark activity, route risk"
          risk:
            weight: 0.20
            score_conditions:
              - {threshold: 30, comparison: "<=", action: "REFER", override: 5, note: "Critical AIS/operational concerns"}
              - {threshold: 45, comparison: "<=", action: "REFER", override: 4, note: "Significant operational concerns"}
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.85, note: "Excellent operational telemetry - modifier applied"}
  
        - id: "safety_compliance"
          label: "Safety Compliance"
          description: "PSC performance, class status, incident history"
          risk:
            weight: 0.25
            score_conditions:
              - {threshold: 30, comparison: "<=", action: "REFER", override: 5, note: "Critical safety compliance issues"}
              - {threshold: 45, comparison: "<=", action: "REFER", override: 4, note: "Significant safety concerns"}
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.85, note: "Excellent safety compliance - modifier applied"}
  
        - id: "fleet_profile"
          label: "Fleet Profile"
          description: "Fleet age, stability, vessel quality, crew certification"
          risk:
            weight: 0.10
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent fleet profile - modifier applied"}
  
        - id: "sanctions_compliance"
          label: "Sanctions Compliance"
          description: "Sanctions status, ownership transparency, STS patterns"
          risk:
            weight: 0.15
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "REFER", override: 5, note: "Sanctions exposure - coverage not available"}
              - {threshold: 40, comparison: "<=", action: "REFER", override: 4, note: "Sanctions concerns require review"}
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.85, note: "Excellent sanctions compliance - modifier applied"}
  
        - id: "environmental"
          label: "Environmental Compliance"
          description: "IMO 2020, ballast water, CII rating, incidents"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90,  note: "Excellent environmental compliance - modifier applied"}
  
        - id: "corporate_footprint"
          label: "Corporate Footprint"
          description: "Transparency, sustainability reporting, safety culture"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent corporate footprint - modifier applied"}
  
        - id: "structured_data"
          label: "Structured Data"
          description: "RightShip vetting, ESG ratings, credit ratings"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 20,  comparison: "<=",  action: "MODIFIER", applied: 0.90,  note: "Excellent structured data - modifier applied"}

     # =========================================================================
    # RISK TIER BANDS
    # Maps composite risk score (0-1000) to pricing tiers
    # =========================================================================
    risk_tier_bands:
      bands:
        - id: 1
          label: "PREFERRED"
          description: "Excellent risk - automatic approval, preferred pricing"
          interpretation:
            bands: {min: 800, max: 1000}
            action: "APPROVE"
            application: {method: "MULTIPLIER", applied: 0.0015, basis: "tiv"}

        - id: 2
          label: "STANDARD_PLUS"
          description: "Good risk - automatic approval, standard pricing"
          interpretation:
            bands: {min: 650, max: 799}
            action: "APPROVE"
            application: {method: "MULTIPLIER", applied: 0.0022, basis: "tiv"}

        - id: 3
          label: "STANDARD"
          description: "Average risk - may require referral"
          interpretation:
            bands: {min: 500, max: 649}
            action: "REFER"
            application: {method: "MULTIPLIER", applied: 0.0032, basis: "tiv"}

        - id: 4
          label: "SUBSTANDARD"
          description: "Elevated risk - requires senior review"
          interpretation:
            bands: {min: 350, max: 499}
            action: "REFER"
            application: {method: "MULTIPLIER", applied: 0.0050, basis: "tiv"}

        - id: 5
          label: "DECLINE"
          description: "Unacceptable risk - decline"
          interpretation:
            bands: {min: 0, max: 349}
            action: "DECLINE"
            application: {method: "MULTIPLIER", applied: 0.0080, basis: "tiv"}

    # =========================================================================
    # LOSS TIER BANDS
    # Maps composite loss score (0-100) to pricing modifiers
    # Calculation: (frequency_score × frequency_weight) + (severity_score × severity_weight)
    # Result maps to band, constrained by floor/cap
    # =========================================================================
    loss_tier_bands:
      bands:
        - id: 1
          label: "VERY_LOW"
          description: "Very low risk of loss"
          interpretation:
            bands: {min: 80, max: 100}
            application:
              frequency_modifier: 0.70
              severity_modifier: 0.80

        - id: 2
          label: "LOW"
          description: "Low risk of loss"
          interpretation:
            bands: {min: 60, max: 79}
            application:
              frequency_modifier: 0.85
              severity_modifier: 0.90

        - id: 3
          label: "MODERATE"
          description: "Moderate risk of loss"
          interpretation:
            bands: {min: 40, max: 59}
            application:
              frequency_modifier: 1.00
              severity_modifier: 1.00

        - id: 4
          label: "ELEVATED"
          description: "Elevated risk of loss"
          interpretation:
            bands: {min: 20, max: 39}
            application:
              frequency_modifier: 1.15
              severity_modifier: 1.15

        - id: 5
          label: "HIGH"
          description: "High risk of loss"
          interpretation:
            bands: {min: 0, max: 19}
            application:
              frequency_modifier: 1.35
              severity_modifier: 1.40
      constraints:
        floor: 0.55
        cap: 1.60

    # =========================================================================
    # EXPOSURE TIER BANDS
    # Maps exposure scores to size and complexity modifiers
    # Calculation: (size_modifier × size_weight) + (complexity_modifier × complexity_weight)
    # =========================================================================
    exposure:
      size:
        weight: 0.60
        bands:
          - id: 1
            label: "MICRO"
            description: "Micro exposure value ($0 - $1M)"
            interpretation:
              bands: {min: 0, max: 20}
              application: {method: "MODIFIER", applied: 0.50, implied_thresholds: {min: 0, max: 1000000}}

          - id: 2
            label: "SMALL"
            description: "Small exposure value ($1M - $10M)"
            interpretation:
              bands: {min: 21, max: 40}
              application: {method: "MODIFIER", applied: 0.75, implied_thresholds: {min: 1000000, max: 10000000}}

          - id: 3
            label: "MEDIUM"
            description: "Medium exposure value ($10M - $50M)"
            interpretation:
              bands: {min: 41, max: 60}
              application: {method: "MODIFIER", applied: 1.00, implied_thresholds: {min: 10000000, max: 50000000}}

          - id: 4
            label: "LARGE"
            description: "Large exposure value ($50M - $250M)"
            interpretation:
              bands: {min: 61, max: 80}
              application: {method: "MODIFIER", applied: 1.50, implied_thresholds: {min: 50000000, max: 250000000}}

          - id: 5
            label: "VERY_LARGE"
            description: "Very large exposure value ($250M+)"
            interpretation:
              bands: {min: 81, max: 100}
              application: {method: "MODIFIER", applied: 2.50, implied_thresholds: {min: 250000000, max: 1000000000}}

      complexity:
        weight: 0.40
        bands:
          - id: 1
            label: "SIMPLE"
            description: "Simple operational complexity"
            interpretation:
              bands: {min: 0, max: 20}
              application: {method: "MODIFIER", applied: 0.85}

          - id: 2
            label: "MODERATE"
            description: "Moderate operational complexity"
            interpretation:
              bands: {min: 21, max: 40}
              application: {method: "MODIFIER", applied: 0.95}

          - id: 3
            label: "COMPLEX"
            description: "Complex operations"
            interpretation:
              bands: {min: 41, max: 60}
              application: {method: "MODIFIER", applied: 1.10}

          - id: 4
            label: "HIGHLY_COMPLEX"
            description: "Highly complex operations"
            interpretation:
              bands: {min: 61, max: 80}
              application: {method: "MODIFIER", applied: 1.30}

          - id: 5
            label: "EXTREMELY_COMPLEX"
            description: "Extremely complex operations"
            interpretation:
              bands: {min: 81, max: 100}
              application: {method: "MODIFIER", applied: 1.60}

    # =========================================================================
    # LIMIT BANDINGS
    # Standard limit/deductible combinations
    # =========================================================================
    limit_bandings:
      - id: 1
        limit: 5000000
        deductible: 250000

      - id: 2
        limit: 10000000
        deductible: 500000

      - id: 3
        limit: 25000000
        deductible: 1000000

      - id: 4
        limit: 50000000
        deductible: 2000000

      - id: 5
        limit: 100000000
        deductible: 5000000

    # =========================================================================
    # PRICING PARAMETERS
    # Product-type-specific ILF curves reflecting different loss development
    # =========================================================================
    pricing:

      by_product_type:
        # -----------------------------------------------------------------------
        # HULL & MACHINERY - Physical damage to vessel
        # Moderate curve; hull value based, attritional + catastrophic
        # -----------------------------------------------------------------------
        hull_machinery:
          ilf_curve:
            base_limit: 10000000
            factors:
              - {limit: 10000000, factor: 1.00}
              - {limit: 25000000, factor: 2.10}
              - {limit: 50000000, factor: 3.80}
              - {limit: 100000000, factor: 6.50}
              - {limit: 250000000, factor: 13.00}
              - {limit: 500000000, factor: 22.00}
              - {limit: 1000000000, factor: 38.00}
          deductible_credits:
            - {min_pct: 0.001, max_pct: 0.005, credit: 0.05}
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.10}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.15}
            - {min_pct: 0.020, max_pct: null, credit: 0.20}

        # -----------------------------------------------------------------------
        # TOTAL LOSS - Constructive/actual total loss only
        # Flatter curve; binary outcome, hull value caps loss
        # -----------------------------------------------------------------------
        total_loss:
          ilf_curve:
            base_limit: 10000000
            factors:
              - {limit: 10000000, factor: 1.00}
              - {limit: 25000000, factor: 1.90}
              - {limit: 50000000, factor: 3.30}
              - {limit: 100000000, factor: 5.50}
              - {limit: 250000000, factor: 10.50}
              - {limit: 500000000, factor: 17.50}
              - {limit: 1000000000, factor: 30.00}
          deductible_credits:
            - {min_pct: 0.001, max_pct: 0.005, credit: 0.04}
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.08}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.12}
            - {min_pct: 0.020, max_pct: null, credit: 0.18}

        # -----------------------------------------------------------------------
        # INCREASED VALUE - Additional value above hull
        # Similar to hull curve but typically smaller limits
        # -----------------------------------------------------------------------
        increased_value:
          ilf_curve:
            base_limit: 5000000
            factors:
              - {limit: 5000000, factor: 1.00}
              - {limit: 10000000, factor: 1.80}
              - {limit: 25000000, factor: 3.60}
              - {limit: 50000000, factor: 6.00}
              - {limit: 100000000, factor: 10.50}
              - {limit: 250000000, factor: 21.00}
              - {limit: 500000000, factor: 36.00}
          deductible_credits:
            - {min_pct: 0.001, max_pct: 0.005, credit: 0.05}
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.10}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.15}
            - {min_pct: 0.020, max_pct: null, credit: 0.20}

        # -----------------------------------------------------------------------
        # LOSS OF HIRE - Business interruption for vessels
        # Steeper curve; time-based exposure compounds
        # -----------------------------------------------------------------------
        loss_of_hire:
          ilf_curve:
            base_limit: 5000000
            factors:
              - {limit: 5000000, factor: 1.00}
              - {limit: 10000000, factor: 1.95}
              - {limit: 25000000, factor: 4.20}
              - {limit: 50000000, factor: 7.20}
              - {limit: 100000000, factor: 12.80}
              - {limit: 250000000, factor: 26.00}
              - {limit: 500000000, factor: 45.00}
          deductible_credits:
            - {min_pct: 0.001, max_pct: 0.005, credit: 0.04}
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.08}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.12}
            - {min_pct: 0.020, max_pct: null, credit: 0.18}

        # -----------------------------------------------------------------------
        # WAR RISKS - War, terrorism, piracy
