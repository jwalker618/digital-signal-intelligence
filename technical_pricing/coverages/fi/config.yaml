    # -------------------------------------------------------------------------
    # TIER THRESHOLDS
    # -------------------------------------------------------------------------
    tier_thresholds:
      tiers:
        - id: 1
          label: "PREFERRED"
          min_score: 800
          max_score: 1000
          description: "Excellent institution - auto-approve at preferred pricing"
          auto_approve: true
          auto_decline: false
          base_premium: 1500  # Per $1M combined limit
        - id: 2       
          label: "STANDARD"
          min_score: 650
          max_score: 799
          description: "Good institution - auto-approve at standard pricing"
          auto_approve: true
          auto_decline: false
          base_premium: 2200
        - id: 3       
          label: "ELEVATED"
          min_score: 500
          max_score: 649
          description: "Moderate risk - auto-approve with conditions"
          auto_approve: false
          auto_decline: false
          base_premium: 3200
        - id: 4        
          label: "HIGH_RISK"
          min_score: 350
          max_score: 499
          description: "High risk - manual review required"
          auto_approve: false
          auto_decline: false
          base_premium: 5000
        - id: 5        
          label: "CRITICAL"
          min_score: 0
          max_score: 349
          description: "Critical risk - decline or senior review"
          auto_approve: false
          auto_decline: true
          base_premium: 8000

    # -------------------------------------------------------------------------
    # CONDITION DEFINITIONS
    # -------------------------------------------------------------------------
    direct_conditions:
      - id: regulatory_action_referral
        bands:
          - {return: true, tier_override: 4, action: "REFER", note: "Regulatory enforcement disclosed"}
      
      - id: examination_issues_referral
        bands:
          - {return: true, tier_override: 3, action: "REFER", note: "Outstanding MRAs/MRIAs"}
      
      - id: litigation_pending_referral
        bands:
          - {return: true, tier_override: null, action: "REFER", note: "Material litigation pending"}
      
      - id: cyber_incident_referral
        bands:
          - {return: true, tier_override: null, action: "REFER", note: "Recent cyber incident"}
      
      - id: significant_growth_referral
        bands:
          - {return: true, tier_override: null, action: "FLAG", note: "Rapid growth >20%"}
      
      - id: new_product_referral
        bands:
          - {return: true, tier_override: null, action: "FLAG", note: "New product line risk"}
  
    score_conditions:
      - id: regulatory_compliance_critical
        bands:
          - {max: 30, tier_override: 5, action: "DECLINE", note: "Critical regulatory deficiencies"}
          - {max: 45, tier_override: 4, action: "REFER", note: "Significant regulatory concerns"}
        inclusive_max: false
      
      - id: financial_condition_critical
        bands:
          - {max: 35, tier_override: 5, action: "DECLINE", note: "Critical financial condition"}
          - {max: 50, tier_override: 4, action: "REFER", note: "Material financial concerns"}
        inclusive_max: false
      
      - id: examination_rating_critical
        bands:
          - {max: 25, tier_override: 5, action: "DECLINE", note: "Critically weak examination indicators"}
          - {max: 40, tier_override: 4, action: "REFER", note: "Weak examination indicators"}
        inclusive_max: false
      
      - id: enforcement_action_critical
        bands:
          - {max: 20, tier_override: 5, action: "DECLINE", note: "Active enforcement actions"}
          - {max: 40, tier_override: 4, action: "REFER", note: "Recent enforcement history"}
        inclusive_max: false
      
      - id: bsa_aml_critical
        bands:
          - {max: 25, tier_override: 5, action: "DECLINE", note: "Critical BSA/AML issues"}
          - {max: 45, tier_override: 4, action: "REFER", note: "BSA/AML compliance concerns"}
        inclusive_max: false
      
      - id: capital_ratio_critical
        bands:
          - {max: 30, tier_override: 5, action: "DECLINE", note: "Capital adequacy crisis"}
          - {max: 50, tier_override: 4, action: "REFER", note: "Capital adequacy concerns"}
        inclusive_max: false
      
      - id: asset_quality_critical
        bands:
          - {max: 30, tier_override: 4, action: "REFER", note: "Asset quality concerns"}
        inclusive_max: false
      
      - id: operational_risk_critical
        bands:
          - {max: 35, tier_override: 4, action: "REFER", note: "Elevated operational risk"}
        inclusive_max: false
      
      - id: litigation_critical
        bands:
          - {max: 25, tier_override: 4, action: "REFER", note: "Significant litigation exposure"}
        inclusive_max: false
      
      - id: breach_history_critical
        bands:
          - {max: 35, tier_override: 4, action: "REFER", note: "Data breach history concerns"}
        inclusive_max: false
      
