    # =========================================================================
    # RISK TIER BANDS
    # Maps composite risk score (0-1000) to pricing tiers
    # =========================================================================
    risk_tier_bands:
      bands:
        - id: 1
          label: "PREFERRED"
          description: "Excellent risk - automatic approval, preferred pricing"
          interpretation:
            bands: {min: 800, max: 1000}
            action: "APPROVE"
            application: {method: "MODIFIER", applied: 0.75, basis: "categorical"}

        - id: 2
          label: "STANDARD_PLUS"
          description: "Good risk - automatic approval, standard pricing"
          interpretation:
            bands: {min: 650, max: 799}
            action: "APPROVE"
            application: {method: "MODIFIER", applied: 1.00, basis: "categorical"}

        - id: 3
          label: "STANDARD"
          description: "Average risk - may require referral"
          interpretation:
            bands: {min: 500, max: 649}
            action: "REFER"
            application: {method: "MODIFIER", applied: 1.30, basis: "categorical"}

        - id: 4
          label: "SUBSTANDARD"
          description: "Elevated risk - requires senior review"
          interpretation:
            bands: {min: 350, max: 499}
            action: "REFER"
            application: {method: "MODIFIER", applied: 1.75, basis: "categorical"}

        - id: 5
          label: "DECLINE"
          description: "Unacceptable risk - decline"
          interpretation:
            bands: {min: 0, max: 349}
            action: "DECLINE"
            application: {method: "MODIFIER", applied: 2.50, basis: "categorical"}

    # =========================================================================
    # LOSS TIER BANDS
    # Maps composite loss score (0-100) to pricing modifiers
    # Calculation: (frequency_score × frequency_weight) + (severity_score × severity_weight)
    # Result maps to band, constrained by floor/cap
    # =========================================================================
    loss_tier_bands:
      bands:
        - id: 1
          label: "VERY_LOW"
          description: "Very low risk of loss"
          interpretation:
            bands: {min: 80, max: 100}
            application:
              frequency_modifier: 0.70
              severity_modifier: 0.80

        - id: 2
          label: "LOW"
          description: "Low risk of loss"
          interpretation:
            bands: {min: 60, max: 79}
            application:
              frequency_modifier: 0.85
              severity_modifier: 0.90

        - id: 3
          label: "MODERATE"
          description: "Moderate risk of loss"
          interpretation:
            bands: {min: 40, max: 59}
            application:
              frequency_modifier: 1.00
              severity_modifier: 1.00

        - id: 4
          label: "ELEVATED"
          description: "Elevated risk of loss"
          interpretation:
            bands: {min: 20, max: 39}
            application:
              frequency_modifier: 1.15
              severity_modifier: 1.15

        - id: 5
          label: "HIGH"
          description: "High risk of loss"
          interpretation:
            bands: {min: 0, max: 19}
            application:
              frequency_modifier: 1.35
              severity_modifier: 1.40
      constraints:
        floor: 0.55
        cap: 1.60

    # =========================================================================
    # EXPOSURE TIER BANDS
    # Maps exposure scores to size and complexity modifiers
    # Calculation: (size_modifier × size_weight) + (complexity_modifier × complexity_weight)
    # =========================================================================
    exposure:
      size:
        weight: 0.60
        bands:
          - id: 1
            label: "MICRO"
            description: "Micro exposure value ($0 - $1M)"
            interpretation:
              bands: {min: 0, max: 20}
              application: {method: "MODIFIER", applied: 0.50, implied_thresholds: {min: 0, max: 1000000}}

          - id: 2
            label: "SMALL"
            description: "Small exposure value ($1M - $10M)"
            interpretation:
              bands: {min: 21, max: 40}
              application: {method: "MODIFIER", applied: 0.75, implied_thresholds: {min: 1000000, max: 10000000}}

          - id: 3
            label: "MEDIUM"
            description: "Medium exposure value ($10M - $50M)"
            interpretation:
              bands: {min: 41, max: 60}
              application: {method: "MODIFIER", applied: 1.00, implied_thresholds: {min: 10000000, max: 50000000}}

          - id: 4
            label: "LARGE"
            description: "Large exposure value ($50M - $250M)"
            interpretation:
              bands: {min: 61, max: 80}
              application: {method: "MODIFIER", applied: 1.50, implied_thresholds: {min: 50000000, max: 250000000}}

          - id: 5
            label: "VERY_LARGE"
            description: "Very large exposure value ($250M+)"
            interpretation:
              bands: {min: 81, max: 100}
              application: {method: "MODIFIER", applied: 2.50, implied_thresholds: {min: 250000000, max: 1000000000}}

      complexity:
        weight: 0.40
        bands:
          - id: 1
            label: "SIMPLE"
            description: "Simple operational complexity"
            interpretation:
              bands: {min: 0, max: 20}
              application: {method: "MODIFIER", applied: 0.85}

          - id: 2
            label: "MODERATE"
            description: "Moderate operational complexity"
            interpretation:
              bands: {min: 21, max: 40}
              application: {method: "MODIFIER", applied: 0.95}

          - id: 3
            label: "COMPLEX"
            description: "Complex operations"
            interpretation:
              bands: {min: 41, max: 60}
              application: {method: "MODIFIER", applied: 1.10}

          - id: 4
            label: "HIGHLY_COMPLEX"
            description: "Highly complex operations"
            interpretation:
              bands: {min: 61, max: 80}
              application: {method: "MODIFIER", applied: 1.30}

          - id: 5
            label: "EXTREMELY_COMPLEX"
            description: "Extremely complex operations"
            interpretation:
              bands: {min: 81, max: 100}
              application: {method: "MODIFIER", applied: 1.60}

    # =========================================================================
    # LIMIT BANDINGS
    # Standard limit/deductible combinations
    # =========================================================================
    limit_bandings:
      - id: 1
        limit: 1000000
        deductible: 10000

      - id: 2
        limit: 2500000
        deductible: 25000

      - id: 3
        limit: 5000000
        deductible: 50000

      - id: 4
        limit: 10000000
        deductible: 100000

      - id: 5
        limit: 25000000
        deductible: 250000

    # =========================================================================
    # PRICING PARAMETERS
    # ILF curves, deductible credits, taxes/fees
    # =========================================================================
    pricing:

      ilf_curve:
        base_limit: 1000000
        factors:
          - {limit: 250000, factor: 0.50}
          - {limit: 500000, factor: 0.75}
          - {limit: 1000000, factor: 1.00}
          - {limit: 2000000, factor: 1.60}
          - {limit: 3000000, factor: 2.10}
          - {limit: 5000000, factor: 2.80}
          - {limit: 10000000, factor: 4.20}

      deductible_credits:
        - {min_pct: 0.001, max_pct: 0.005, credit: 0.05}
        - {min_pct: 0.005, max_pct: 0.010, credit: 0.10}
        - {min_pct: 0.010, max_pct: 0.020, credit: 0.15}
        - {min_pct: 0.020, max_pct: null, credit: 0.20}

      taxes_fees_rate: 0.05
