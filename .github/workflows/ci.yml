#      #  run: |
#      #    pytest models/ --cov=models --cov-report=xml --cov-report=html --cov-report=term-missing -v --junitxml=pytest-report.xml
          
#      #- name: Upload pytest report
#      #  if: always() # ensures upload even if tests fail
#      #  uses: actions/upload-artifact@v4
#      #  with:
#      #    name: pytest-report
#      #    path: pytest-report.xml
          
#      - name: Upload coverage to Codecov
#        if: matrix.python-version == '3.11'
#        uses: codecov/codecov-action@v3
#        with:
#          file: ./coverage.xml
#          flags: unittests
#          name: codecov-umbrella
#          fail_ci_if_error: false

#      - name: Upload coverage artifacts
#        if: matrix.python-version == '3.11'
#        uses: actions/upload-artifact@v4
#        with:
#          name: coverage-report
#          path: htmlcov/

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit (security linter)
        run: bandit -r models/ api/ -f json -o bandit-report.json
        continue-on-error: true

      - name: Run Safety (dependency checker)
        run: safety check --json
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: dsi-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker build -t dsi-api:test .
          docker run -d --name dsi-test -p 5000:5000 dsi-api:test
          sleep 10
          curl -f http://localhost:5000/health || exit 1
          docker stop dsi-test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    services:
      api:
        image: python:3.11-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests pytest

      - name: Run integration tests
        run: |
          # Start API in background
          python -m api.server &
          API_PID=$!
          sleep 5

          # Test API endpoints
          curl -f http://localhost:5000/health || exit 1
          curl -f http://localhost:5000/api/v1/cyber/health || exit 1
          curl -f http://localhost:5000/api/v1/energy/health || exit 1
          curl -f http://localhost:5000/api/v1/financial/health || exit 1

          # Kill API
          kill $API_PID

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [lint, test, security, build-docker, integration-tests]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "=== Job Results ==="
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Docker Build: ${{ needs.build-docker.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
  
      - name: Download pytest report
        if: ${{ needs.test.result != 'skipped' }}
        uses: actions/download-artifact@v4
        with:
          name: pytest-report
          path: .
  
      - name: Summarize failing tests
        if: ${{ needs.test.result == 'failure' }}
        run: |
          echo "=== Detailed Test Failures ==="
          python - << 'EOF'
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse('pytest-report.xml')
              root = tree.getroot()
              failures = []
              for testcase in root.findall('.//testcase'):
                  for failure in testcase.findall('failure'):
                      name = testcase.attrib.get('name')
                      classname = testcase.attrib.get('classname')
                      message = failure.attrib.get('message', '').strip()
                      failures.append(f"{classname}.{name}: {message}")
              if failures:
                  print("\n".join(failures))
              else:
                  print("No test failures 🎉")
          except FileNotFoundError:
              print("pytest-report.xml not found. Ensure --junitxml was used in pytest.")
          EOF
  
      - name: Report success
        if: ${{ needs.lint.result == 'success' && needs.test.result == 'success' && needs.build-docker.result == 'success' }}
        run: echo "All checks passed! ✅"
  
      - name: Report failure
        if: ${{ needs.lint.result == 'failure' || needs.test.result == 'failure' || needs.build-docker.result == 'failure' }}
        run: |
          echo "Some checks failed! ❌"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Docker Build: ${{ needs.build-docker.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          exit 1
