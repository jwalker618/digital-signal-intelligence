    # -------------------------------------------------------------------------
    # CONDITION DEFINITIONS
    # -------------------------------------------------------------------------
    direct_conditions:
      - id: pending_claims_true
        bands:
          - {return: true, tier_override: 4, action: "REFER", note: "Pending securities claims"}
      
      - id: regulatory_investigation_true
        bands:
          - {return: true, tier_override: 3, action: "REFER", note: "Regulatory investigation disclosed"}
      
      - id: planned_transaction_true
        bands:
          - {return: true, tier_override: null, action: "FLAG", note: "Planned transaction - tail coverage needed"}
      
      - id: covenant_noncompliance
        bands:
          - {return: false, tier_override: null, action: "FLAG", note: "Covenant non-compliance disclosed"}
      
      - id: executive_dispute_true
        bands:
          - {return: true, tier_override: null, action: "REFER", note: "Executive dispute disclosed"}
  
    score_conditions:
      - id: governance_critical
        bands:
          - {max: 30, tier_override: 5, action: "DECLINE", note: "Critical governance deficiencies"}
          - {max: 45, tier_override: 4, action: "REFER", note: "Significant governance concerns"}
        inclusive_max: false
      
      - id: financial_critical
        bands:
          - {max: 35, tier_override: 5, action: "DECLINE", note: "Critical financial integrity issues"}
          - {max: 50, tier_override: 4, action: "REFER", note: "Material financial concerns"}
        inclusive_max: false
      
      - id: litigation_critical
        bands:
          - {max: 25, tier_override: 5, action: "DECLINE", note: "Severe litigation profile"}
          - {max: 40, tier_override: 4, action: "REFER", note: "Elevated litigation risk"}
        inclusive_max: false
      
      - id: board_independence_critical
        bands:
          - {max: 35, tier_override: 4, action: "REFER", note: "Board independence concerns"}
        inclusive_max: false
      
      - id: audit_opinion_critical
        bands:
          - {max: 30, tier_override: 5, action: "DECLINE", note: "Qualified/adverse audit opinion"}
          - {max: 50, tier_override: 4, action: "REFER", note: "Audit concerns"}
        inclusive_max: false
      
      - id: internal_controls_critical
        bands:
          - {max: 30, tier_override: 4, action: "REFER", note: "Material weakness in internal controls"}
        inclusive_max: false
      
      - id: restatement_critical
        bands:
          - {max: 35, tier_override: 4, action: "REFER", note: "Financial restatement history"}
        inclusive_max: false
      
      - id: securities_litigation_critical
        bands:
          - {max: 30, tier_override: 5, action: "DECLINE", note: "Active securities litigation"}
          - {max: 50, tier_override: 4, action: "REFER", note: "Securities litigation history"}
        inclusive_max: false
      
      - id: sec_enforcement_critical
        bands:
          - {max: 25, tier_override: 5, action: "DECLINE", note: "Active SEC enforcement"}
          - {max: 45, tier_override: 4, action: "REFER", note: "SEC enforcement history"}
        inclusive_max: false
      
      - id: executive_background_critical
        bands:
          - {max: 35, tier_override: 4, action: "REFER", note: "Executive background concerns"}
        inclusive_max: false

