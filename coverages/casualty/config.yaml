  casualty_sme:
    metadata:
      name: DSI Casualty SME Model
      description: "Small-to-medium casualty \u2014 revenue under $5M, simplified GL + products"
      version: 2.3.0
      product_types:
      - general_liability
      - products_liability
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name
        - field: product_type
          description: 'One of: general_liability, workers_compensation, commercial_auto, umbrella_excess, environmental_liability,
            products_liability'
        - field: limit
          description: Requested limit in USD
        - field: revenue
          description: Annual revenue in USD (basis for GL, environmental)
        - field: payroll
          description: Annual payroll in USD (basis for WC)
      min_premium: 5000
      default_currency: USD
      model_specificity: 1
      routing_constraints:
      - field: product_type
        operator: in
        value:
        - general_liability
        - products_liability
        required_in_input: true
      - field: revenue
        operator: <
        value: 5000000
        required_in_input: true
    direct_queries:
    - id: pending_claims
      question: Any open or pending liability claims in the past 3 years?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Recent claims history
    - id: prior_losses
      question: Any liability loss exceeding $100K in the past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Significant prior loss for SME
    signal_registry:
    - id: gl_class_code
      inference_utility_function: gl_class_code_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      categories:
        group_id: structured_data
