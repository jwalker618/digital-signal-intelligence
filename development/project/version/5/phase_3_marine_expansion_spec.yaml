    - product_type: loss_of_hire
      curve_type: standard
      ilf_curve:
        base_limit: 5000000
        factors:
          - {limit: 5000000, factor: 1.0}
          - {limit: 10000000, factor: 1.55}
          - {limit: 25000000, factor: 2.6}
          - {limit: 50000000, factor: 4.0}
          - {limit: 100000000, factor: 6.0}
          - {limit: 250000000, factor: 10.5}
          - {limit: 500000000, factor: 16.0}
      deductible_factors:
        - {deductible: 25000, factor: 1.25}
        - {deductible: 50000, factor: 1.12}
        - {deductible: 100000, factor: 1.0}
        - {deductible: 250000, factor: 0.85}
        - {deductible: 500000, factor: 0.72}
