          applied: 1.4
        - cat: HEALTHCARE
          label: Healthcare
          applied: 1.5
        - cat: RETAIL
          label: Retail
          applied: 1.25
        - cat: MANUFACTURING
          label: Manufacturing
          applied: 0.95
        - cat: PROFESSIONAL_SERVICES
          label: Professional Services
          applied: 1.1
        - cat: EDUCATION
          label: Education
          applied: 1.05
        - cat: GOVERNMENT
