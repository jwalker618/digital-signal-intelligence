medprof:
  medprof_hospital:
    metadata:
      name: "MedProf \u2014 Acute-Care / Teaching Hospitals"
      description: "Medical Professional Liability \u2014 hospital + physician-group + nursing-home + telehealth + SME"
      version: 2.2.0
      product_types:
      - hospital_mpl
      - physician_mpl
      - nursing_home_mpl
      - telehealth_mpl
      applicable_markets:
      - us
      - uk
      minimum_viable_input:
      - field: entity_name
        description: Legal name
      - field: employee_count
        description: "Total headcount \u2014 routes between sub-configs"
      - field: facility_type
        description: 'One of: hospital, physician_group, ltc, telehealth, solo'
      - field: limit
        description: Requested limit in USD
      - field: annual_patient_encounters
        description: Exposure basis
      min_premium: 5000
      default_currency: USD
      model_specificity: 1
      routing_constraints:
      - field: employee_count
        operator: '>='
        value: 500
        required_in_input: true
    direct_queries:
    - id: claims_history
      question: Has the insured had any claims in the past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: null
        applied: null
        note: Prior claims - review required
    - id: prior_coverage
      question: Does the insured have prior coverage?
      query_condition:
      - return: false
        action: FLAG
        override: null
        applied: null
        note: No prior coverage
    - id: phi_handler
      question: Do you process Protected Health Information (PHI)?
      query_condition:
      - return: true
        action: MODIFIER
        override: null
        applied: 1.25
        note: PHI handler - HIPAA exposure
    signal_registry:
    - id: regulatory_filings
      inference_utility_function: regulatory_filings_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      three_layer_assessment:
        group_id: public_record
        risk:
          correlation_direction: positive
          weight: 0.1667
          score_conditions:
          - threshold: 30
            comparison: <=
            action: FLAG
            note: Low regulatory filings score
        loss:
          frequency:
            correlation_direction: negative
            weight: 0.1167
          severity:
            correlation_direction: negative
            weight: 0.05
    - id: enforcement_actions
