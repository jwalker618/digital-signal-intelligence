name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, claude/* ]
  pull_request:
    branches: [ main, develop ]

env:
  RUN_VERSION: '3.11'
  PYTHON_VERSIONS: '["3.10","3.11","3.12"]'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/dsi-api

jobs:
  setup:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ steps.set-matrix.outputs.python-versions }}
      run-version: ${{ steps.set-matrix.outputs.run-version }}
    steps:
      - id: set-matrix
        run: |
          echo 'python-versions=["3.10","3.11","3.12"]' >> $GITHUB_OUTPUT
          echo 'run-version=3.11' >> $GITHUB_OUTPUT

  rust-build:
    name: Build Rust (dsi-core)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/dsi-core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/dsi-core/Cargo.lock') }}

      - name: Build dsi-core
        working-directory: rust/dsi-core
        run: cargo build --release --lib

      - name: Upload Rust artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib
          path: rust/dsi-core/target/release/libdsi_core.*
          if-no-files-found: ignore

  test:
    name: Run Tests
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.setup.outputs.python-versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with pytest
        if: matrix.python-version == needs.setup.outputs.run-version
        run: |
          pytest tests/ \
          -v \
          --cov=signal_architecture \
          --cov=infrastructure \
          --cov=layers \
          --cov=coverages \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --junitxml=pytest-report-${{ matrix.python-version }}.xml

      - name: Run integration tests
        if: matrix.python-version == needs.setup.outputs.run-version
        run: |
          pytest tests/integration/ \
          -v \
          --junitxml=integration-report.xml
        continue-on-error: true

      - name: Upload pytest report
        if: always() && matrix.python-version == needs.setup.outputs.run-version
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: pytest-report-${{ matrix.python-version }}.xml
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: matrix.python-version == needs.setup.outputs.run-version
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        if: matrix.python-version == needs.setup.outputs.run-version
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
          if-no-files-found: ignore

  config-health-gate:
    # V6 Phase 1 (E2): Config Health Gate.
    #
    # Blocks PR merges on structural compliance regressions:
    #   1. assess_config_compliance — structural schema + canonical category
    #      audit; pre-V6 known debt is catalogued in
    #      development/project/version/6/config_compliance_baseline.json.
    #      The gate fails only on findings that are NEW vs the baseline.
    #
    # Runs as a non-blocking signal today:
    #   2. calibrate — the end-to-end pricing calibration harness. The guardrail
    #      hit rate is above the 15% threshold pending V6 A1-A3 maturation work.
    #      Its report is uploaded so reviewers can see drift, but it does not
    #      fail the PR. This step is promoted to blocking once A1-A3 land.
    name: Config Health Gate
    needs: [setup, test]
    runs-on: ubuntu-latest
    if: always() && needs.test.result != 'cancelled'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.setup.outputs.run-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Assess config compliance (blocking)
        run: |
          python development/project/assessments/scripts/assess_config_compliance.py \
            --report compliance-report.json

      - name: Stub-import guard (V6/E10, blocking)
        run: |
          python development/project/assessments/scripts/check_no_stub_imports.py

      - name: Golden-entity regression (blocking)
        run: |
          pytest tests/integration/test_golden_entities.py -v \
            --junitxml=golden-entities-report.xml

      - name: Run calibration harness (advisory; promoted to blocking post-A3)
        continue-on-error: true
        run: |
          python -m infrastructure.builder.cli calibrate --json > calibration-report.json
          python -m infrastructure.builder.cli calibrate

      - name: Upload health-gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: config-health-gate-reports
          path: |
            compliance-report.json
            calibration-report.json
            golden-entities-report.xml
          if-no-files-found: ignore

  docker-build:
    name: Build Docker Image
    needs: [test, config-health-gate, rust-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    # V6 Phase 4 (C1): real kubectl + Argo Rollouts canary to the staging
    # EKS cluster, with migration-preview artefact and smoke-test-driven
    # auto-rollback.
    name: Deploy to Staging
    needs: [docker-build, config-health-gate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.STAGING_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.STAGING_AWS_REGION }}

      - name: Install kubectl and argo-rollouts plugin
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'
      - name: Install Argo Rollouts kubectl plugin
        run: |
          curl -sSL -o kubectl-argo-rollouts \
            https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x kubectl-argo-rollouts
          sudo mv kubectl-argo-rollouts /usr/local/bin/

      - name: Update kubeconfig for staging cluster
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.STAGING_EKS_CLUSTER_NAME }} \
            --region ${{ secrets.STAGING_AWS_REGION }}

      - name: Preview alembic migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          alembic upgrade head --sql > migration-preview.sql
      - uses: actions/upload-artifact@v4
        with:
          name: migration-preview-staging
          path: migration-preview.sql
          if-no-files-found: ignore

      - name: Apply alembic migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: alembic upgrade head

      - name: Apply kustomize overlay
        run: kubectl apply -k deploy/kubernetes/overlays/staging

      - name: Trigger canary with new image
        run: |
          kubectl argo rollouts set image dsi-api \
            dsi-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n dsi-staging
          kubectl argo rollouts wait dsi-api -n dsi-staging --timeout 10m

      - name: Smoke test staging (golden-entity)
        run: |
          curl -sf https://staging.dsi.internal/api/v1/health/ready
          curl -sfX POST https://staging.dsi.internal/api/v1/assess \
            -H "Authorization: Bearer ${{ secrets.STAGING_SMOKE_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary @tests/fixtures/golden_entities/cyber/microsoft.yaml

      - name: Rollback on failure
        if: failure()
        run: kubectl argo rollouts undo dsi-api -n dsi-staging

  deploy-production:
    # V6 Phase 4 (C1): production deploy mirrors staging with a narrower
    # canary (20→50→100 with pauses + analysis) and a GitHub environment
    # manual-approval gate via `environment: production`.
    name: Deploy to Production
    needs: [docker-build, config-health-gate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PRODUCTION_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.PRODUCTION_AWS_REGION }}

      - name: Install kubectl + argo-rollouts plugin
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'
      - name: Install Argo Rollouts kubectl plugin
        run: |
          curl -sSL -o kubectl-argo-rollouts \
            https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x kubectl-argo-rollouts
          sudo mv kubectl-argo-rollouts /usr/local/bin/

      - name: Update kubeconfig for production cluster
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.PRODUCTION_EKS_CLUSTER_NAME }} \
            --region ${{ secrets.PRODUCTION_AWS_REGION }}

      - name: Preview alembic migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: alembic upgrade head --sql > migration-preview.sql
      - uses: actions/upload-artifact@v4
        with:
          name: migration-preview-production
          path: migration-preview.sql
          if-no-files-found: ignore

      - name: Apply alembic migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: alembic upgrade head

      - name: Apply kustomize overlay
        run: kubectl apply -k deploy/kubernetes/overlays/production

      - name: Trigger canary with new image
        run: |
          kubectl argo rollouts set image dsi-api \
            dsi-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n dsi-prod
          kubectl argo rollouts wait dsi-api -n dsi-prod --timeout 20m

      - name: Smoke test production across three coverages
        run: |
          for fx in cyber/microsoft fi/goldman_sachs marine/maersk; do
            curl -sfX POST https://api.dsi.internal/api/v1/assess \
              -H "Authorization: Bearer ${{ secrets.PRODUCTION_SMOKE_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data-binary @tests/fixtures/golden_entities/${fx}.yaml
          done

      - name: Rollback on failure
        if: failure()
        run: kubectl argo rollouts undo dsi-api -n dsi-prod

      - name: Notify
        if: always()
        run: |
          echo "Production deployment status: ${{ job.status }}"
          echo "Manual rollback: kubectl argo rollouts undo dsi-api -n dsi-prod"

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [setup, test, config-health-gate, rust-build]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "=== Job Results ==="
          echo "Test: ${{ needs.test.result }}"
          echo "Config Health Gate: ${{ needs['config-health-gate'].result }}"
          echo "Rust: ${{ needs.rust-build.result }}"

      - name: Download pytest reports
        if: needs.test.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: pytest-report-${{ needs.setup.outputs.run-version }}
          path: reports

      - name: Summarise failing tests
        if: ${{ needs.test.result == 'failure' }}
        run: |
          echo "=== Detailed Test Failures ==="
          python - << 'EOF'
          import glob
          import os
          import xml.etree.ElementTree as ET

          reports_dir = "reports"
          xml_files = sorted(glob.glob(os.path.join(reports_dir, "pytest-report-*.xml")))

          if not xml_files:
              print("No JUnit XML files found. Skipping summary.")
              raise SystemExit(0)

          failures_out = []
          for xml_path in xml_files:
              py_ver = os.path.basename(xml_path).replace("pytest-report-", "").replace(".xml", "")
              try:
                  tree = ET.parse(xml_path)
                  root = tree.getroot()
              except Exception as e:
                  failures_out.append(f"\n---\n[{py_ver}] Failed to parse {xml_path}: {e}")
                  continue

              for testcase in root.findall('.//testcase'):
                  for failure in testcase.findall('failure'):
                      name = testcase.attrib.get('name')
                      classname = testcase.attrib.get('classname')
                      message = (failure.attrib.get('message') or '').strip()
                      details = (failure.text or '').strip()
                      formatted = (
                          f"\n---\n"
                          f"[Python {py_ver}] Test: {classname}.{name}\n"
                          f"Message: {message}\n"
                          f"Details:\n{details}\n"
                      )
                      failures_out.append(formatted)

          if failures_out:
              print("\n".join(failures_out))
          else:
              print("No test failures")
          EOF

      - name: Report success
        if: ${{ needs.test.result == 'success' && needs['config-health-gate'].result == 'success' }}
        run: echo "All checks passed!"

      - name: Report failure
        if: ${{ needs.test.result == 'failure' || needs['config-health-gate'].result == 'failure' }}
        run: |
          echo "Some checks failed!"
          echo "Test: ${{ needs.test.result }}"
          echo "Config Health Gate: ${{ needs['config-health-gate'].result }}"
          exit 1
