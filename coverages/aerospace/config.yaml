# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# STRUCTURAL PRINCIPLES (per master_config_layout.yaml):
# 1. Signals defined once in signal_registry with group_id reference
# 2. source: score (default) uses 0-100 inference return
# 3. source: metadata.field uses inference metadata with bands/categories
# 4. Categorical groups apply modifiers (applied:), not scores
# 5. score_conditions (plural, banded) apply actions based on score thresholds
#    Actions: FLAG | MODIFIER | REFER
# 6. proxy_tier at signal level (DIRECT_OBSERVABLE | INFERRED_PROXY | COHORT_INFERENCE)
# 7. Normalisation handled by inference functions, not config
#
# AUGMENTED BY:
# - analysis_outputs/cyber_v{date}.yaml - empirically-derived parameters
# - schemas/organisational_graph.yaml - graph structure (coverage-agnostic)
#
# =============================================================================

aerospace:
  aerospace_general:
    metadata:
      name: "DSI Aerospace Insurance Model"
      description: "Aviation hull and liability coverage based on observable safety and operational signals"
      version: "2.2.0"
      product_types:
        - "aviation_hull"
        - "aviation_liability"
        - "aviation_hull_liability_combined"
      applicable_markets: ["us", "uk", "eu", "apac", "latam", "mea"]
      minimum_viable_input:
        required:
          - field: "client_name"
            description: "Client name (domain optional for discovery)"
          - field: "product_type"
            description: "One of: aviation_hull, aviation_liability, aviation_hull_liability_combined"
          - field: "limit"
            description: "Requested limit in USD"
          - field: "hull_value"
            description: "Total hull value in USD"
      min_premium: 25000
      default_currency: "USD"
      # MULTIPLEXER SUPPORT (Phase V4)
      model_specificity: 1  # General/Base model - broad applicability
      routing_constraints: []  # No restrictions - accepts all submissions

    # =========================================================================
    # DIRECT QUERIES
    # Binary questions that cannot be externally observed (max 10)
    # Actions: FLAG | MODIFIER | REFER
    # =========================================================================
    direct_queries:
      - id: "pending_claims"
        question: "Are there any pending aviation liability claims exceeding $1M?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Pending claims >$1M"}
          
      - id: "regulatory_action"
        question: "Is there any pending regulatory enforcement action against the operator?"
        query_condition:
          - {return: true, action: "REFER", override: 5, applied: null, note: "Pending regulatory enforcement"}
            
      - id: "coverage_declined"
        question: "Has aviation coverage been declined or non-renewed in the past 3 years?"
        query_condition:
          - {return: true, action: "REFER", override: 5, applied: null, note: "Prior declination"}
      
      - id: "fleet_change"
        question: "Are there planned fleet changes exceeding 20% in the next 12 months?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Major fleet change planned"}
       
      - id: "route_expansion"
        question: "Is there planned expansion into conflict zones or sanctioned regions?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Conflict zone expansion"}
      
      - id: "ownership_change"
        question: "Has there been a change in majority ownership in the past 12 months?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Recent ownership change"}
      
      - id: "wet_lease_operations"
        question: "Do you operate aircraft under wet lease arrangements?"
        query_condition:
          - {return: true, action: "MODIFIER", override: null, applied: 1.15, note: "Wet lease operations"}

    # =========================================================================
    # SIGNAL REGISTRY
    # All signals defined once with group_id reference
    # proxy_tier at signal level; normalisation in inference functions
    # =========================================================================
    signal_registry:

      # -----------------------------------------------------------------------
      # CATEGORICAL SIGNALS
      # Return discrete categories that apply as pricing modifiers
      # -----------------------------------------------------------------------
      - id: operator_type
        inference_utility_function: operatortype_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: operator_type
          source: metadata.operator_type
          features:
            - {cat: "MAJOR_AIRLINE", label: "Major Airline", applied: 0.85}
            - {cat: "REGIONAL_AIRLINE", label: "Regional Airline", applied: 1.00}
            - {cat: "LOW_COST_CARRIER", label: "Low Cost Carrier", applied: 0.95}
            - {cat: "CARGO_AIRLINE", label: "Cargo Airline", applied: 1.10}
            - {cat: "CHARTER_OPERATOR", label: "Charter Operator", applied: 1.25}
            - {cat: "CORPORATE_FLIGHT", label: "Corporate Flight Department", applied: 1.15}
            - {cat: "HELICOPTER_OPERATOR", label: "Helicopter Operator", applied: 1.40}
            - {cat: "FLIGHT_SCHOOL", label: "Flight Training Organization", applied: 1.50}
            - {cat: "PRIVATE_OWNER", label: "Private Owner/Operator", applied: 1.35}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: fleet_category
        inference_utility_function: fleetcategory_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: fleet_category
          source: metadata.fleet_category
          features:
            - {cat: "WIDEBODY", label: "Widebody", applied: 1.15} 
            - {cat: "NARROWBODY", label: "Narrowbody", applied: 1.00}
            - {cat: "REGIONAL_JET", label: "Regional Jet", applied: 1.05}
            - {cat: "TURBOPROP", label: "Turboprop", applied: 0.95}
            - {cat: "BUSINESS_JET", label: "Business Jet", applied: 1.20}
            - {cat: "HELICOPTER", label: "Helicopter", applied: 1.35}
            - {cat: "PISTON", label: "Piston Aircraft", applied: 1.25}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: fleet_size
        inference_utility_function: fleetsize_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: fleet_size
          source: metadata.fleet_size
          features:
            - {cat: "SINGLE", label: "Single Aircraft", applied: 1.30}
            - {cat: "MICRO", label: "Micro Fleet (2-5)", applied: 1.20}
            - {cat: "SMALL", label: "Small Fleet (6-20)", applied: 1.10}
            - {cat: "MEDIUM", label: "Medium Fleet (21-50)", applied: 1.00}
