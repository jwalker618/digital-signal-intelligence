version: '3.8'

services:
  # DSI API Service
  dsi-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dsi-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DEBUG=True
      - PORT=5000
      - LOG_LEVEL=INFO
    volumes:
      # Mount code for development hot-reload
      - ./api:/app/api
      - ./models:/app/models
    networks:
      - dsi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL Database (optional - for future use)
  # postgres:
