          loss:
            frequency:
              correlation_direction: positive
              weight: 0.15

      - id: "maintenance_indicators"
        inference_utility_function: maintenance_indicators_basefunction
        proxy_tier: INFERRED_PROXY
        three_layer_assessment:
          group_id: fleet_quality
          risk:
            correlation_direction: positive
