# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# STRUCTURAL PRINCIPLES (per master_config_layout.yaml):
# 1. Signals defined once in signal_registry with group_id reference
# 2. source: score (default) uses 0-100 inference return
# 3. source: metadata.field uses inference metadata with bands/categories
# 4. Categorical groups apply modifiers (applied:), not scores
# 5. score_conditions (plural, banded) apply actions based on score thresholds
#    Actions: FLAG | MODIFIER | REFER
# 6. proxy_tier at signal level (DIRECT_OBSERVABLE | INFERRED_PROXY | COHORT_INFERENCE)
# 7. Normalisation handled by inference functions, not config
#
# AUGMENTED BY:
# - analysis_outputs/cyber_v{date}.yaml - empirically-derived parameters
# - schemas/organisational_graph.yaml - graph structure (coverage-agnostic)
#
# =============================================================================

directors_officers:
  do_general:
    metadata:
      name: "DSI Directors & Officers Technical Pricing Model"
      description: "D&O liability coverage based on observable governance, financial, and litigation signals"
      version: "2.1.0"
      product_types:
        - "side_a"
        - "side_b"
        - "side_c"
        - "side_a_dic"
        - "employment_practices"
        - "fiduciary"
      applicable_markets: ["us", "uk", "eu", "apac"]
      minimum_viable_input: ["client name (domain optional)","Limit in USD"]
      min_premium: 10000
      default_currency: "USD"

    # =========================================================================
    # DIRECT QUERIES
    # Binary questions that cannot be externally observed (max 10)
    # Actions: FLAG | MODIFIER | REFER
    # =========================================================================
    direct_queries:
      - id: "pending_claims"
        question: "Are there any pending securities class actions or derivative suits?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Pending securities claims"}
        
      - id: "regulatory_investigation"
        question: "Is the company or any director/officer under regulatory investigation?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Regulatory investigation disclosed"}
      
      - id: "planned_transaction"
        question: "Is there a planned M&A, IPO, SPAC merger, or material transaction?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Planned transaction - tail coverage needed"}
       
      - id: "covenant_compliance"
        question: "Is the company in compliance with all debt covenants?"
        query_condition:
          - {return: false, action: "FLAG", override: null, applied: null, note: "Covenant non-compliance disclosed"}
       
      - id: "executive_dispute"
        question: "Are there any disputes with current or former executives?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Executive dispute disclosed"}

    # =========================================================================
    # SIGNAL REGISTRY
    # All signals defined once with group_id reference
    # proxy_tier at signal level; normalisation in inference functions
    # =========================================================================
    signal_registry:

      # -----------------------------------------------------------------------
      # CATEGORICAL SIGNALS
      # Return discrete categories that apply as pricing modifiers
      # -----------------------------------------------------------------------
      - id: company_type
        inference_utility_function: company_type_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: company_type
          features:
            - {cat: "PUBLIC_LARGE_CAP", label: "Public Large Cap",  applied: 2.50}
            - {cat: "PUBLIC_MID_CAP", label: "Public Mid Cap", applied: 1.50}
            - {cat: "PUBLIC_SMALL_CAP", label: "Public Small Cap", applied: 1.00}
            - {cat: "PUBLIC_MICRO_CAP", label: "Public Micro Cap", applied: 1.25}
            - {cat: "PRE_IPO", label: "Pre-IPO", applied: 2.00}
            - {cat: "SPAC", label: "SPAC", applied: 3.50}
            - {cat: "PRIVATE_BACKED", label: "Private VC/PE Backed", applied: 0.60}
            - {cat: "PRIVATE_OTHER", label: "Private Other", applied: 0.50}
            - {cat: "NONPROFIT", label: "Nonprofit", applied: 0.40}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: industry
        inference_utility_function: industry_classification_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: industry
          features:
            - {cat: "CRYPTO_DIGITAL", label: "Crypto/Digital Assets", applied: 2.50}
            - {cat: "CANNABIS", label: "Cannabis", applied: 2.00}
            - {cat: "HEALTHCARE_PHARMA", label: "Healthcare/Pharma", applied: 1.60}
            - {cat: "FINANCIAL_SERVICES", label: "Financial Services", applied: 1.40}
            - {cat: "TECHNOLOGY", label: "Technology", mapplied: 1.25}
            - {cat: "ENERGY", label: "Energy",  applied: 1.15}
            - {cat: "REAL_ESTATE", label: "Real Estate", applied: 1.10}
            - {cat: "RETAIL_CONSUMER", label: "Retail/Consumer", applied: 1.00}
            - {cat: "MANUFACTURING", label: "Manufacturing",  applied: 0.90}
            - {cat: "OTHER", label: "Other", applied: 1.00}

      - id: stock_exchange
        inference_utility_function: stock_exchange_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: stock_exchange
          features:
            - {cat: "NYSE",  label: "NYSE", applied: 1.00}
            - {cat: "NASDAQ", label: "NASDAQ", applied: 1.00}
            - {cat: "NYSE_AMERICAN", label: "NYSE American", applied: 1.10}
            - {cat: "OTC", label: "OTC Markets", applied: 1.30}
            - {cat: "FOREIGN", label: "Foreign Exchange", applied: 1.15}
            - {cat: "NONE", label: "Not Listed", applied: 0.80}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

    # -------------------------------------------------------------------------
    # SIGNAL FEATURES
    # Each is a underlying feature for the previously defined groups
    # Each group contributes to the group score
    # Weights must add to 1
    # -------------------------------------------------------------------------

    signal_features:
      network_authority:
        - id: "auditor_quality"
          name: "External Auditor Quality"
          description: "Quality tier of external auditor (Big 4, national, regional)"
          weight: 0.20
          inference_utility_function: auditor_quality_basefunction

        - id: "legal_counsel"
          name: "Legal Counsel Quality"
          description: "Quality of securities/corporate counsel"
          weight: 0.15
          inference_utility_function: legal_counsel_basefunction

        - id: "banking_relationship"
          name: "Investment Banking Relationships"
          description: "Quality of investment banking relationships"
          weight: 0.15
          inference_utility_function: banking_relationship_basefunction

        - id: "investor_quality"
          name: "Institutional Investor Quality"
          description: "Quality of institutional investor base"
          weight: 0.15
          inference_utility_function: investor_quality_basefunction

        - id: "board_network"
          name: "Board Network Quality"
          description: "Quality of director interlocks and board experience"
          weight: 0.15
          inference_utility_function: board_network_basefunction

        - id: "index_inclusion"
          name: "Index Inclusion"
          description: "Membership in major stock indices"
          weight: 0.05
          inference_utility_function: index_inclusion_basefunction

        - id: "analyst_coverage"
          name: "Analyst Coverage"
          description: "Number and quality of sell-side analyst coverage"
          weight: 0.10
          inference_utility_function: analyst_coverage_basefunction

        - id: "industry_association"
          name: "Industry Association Leadership"
          description: "Leadership roles in industry associations"
          weight: 0.05
          inference_utility_function: industry_association_basefunction

      governance:
        - id: "board_independence"
          name: "Board Independence"
          description: "Percentage of independent directors"
          weight: 0.20
          inference_utility_function: board_independence_basefunction
          score_conditions:
            - threshold: 35
              comparison: "<="
              action: "REFER"
              override: 4
              note: "Board independence concerns"

        - id: "board_diversity"
          name: "Board Diversity"
          description: "Gender, ethnic, and experiential diversity"
          weight: 0.10
          inference_utility_function: board_diversity_basefunction

        - id: "ceo_chair_separation"
          name: "CEO/Chair Separation"
          description: "Separation of CEO and Board Chair roles"
          weight: 0.15
          inference_utility_function: ceo_chair_separation_basefunction

        - id: "committee_structure"
          name: "Committee Structure"
          description: "Quality of audit, compensation, and nominating committees"
          weight: 0.15
          inference_utility_function: committee_structure_basefunction

        - id: "board_refreshment"
          name: "Board Refreshment"
          description: "Average tenure and refreshment practices"
          weight: 0.10
          inference_utility_function: board_refreshment_basefunction

        - id: "related_party"
          name: "Related Party Transactions"
          description: "Quality of related party transaction oversight"
          weight: 0.10
          inference_utility_function: related_party_basefunction

        - id: "compensation_structure"
          name: "Executive Compensation Structure"
          description: "Pay-for-performance alignment"
          weight: 0.10
          inference_utility_function: compensation_structure_basefunction

        - id: "shareholder_rights"
          name: "Shareholder Rights"
          description: "Shareholder-friendly provisions vs takeover defenses"
          weight: 0.10
          inference_utility_function: shareholder_rights_basefunction

      financial:
        - id: "audit_opinion"
          name: "Audit Opinion"
          description: "Type of audit opinion received"
          weight: 0.20
          inference_utility_function: audit_opinion_basefunction
          score_conditions:
            - threshold: 30
              comparison: "<="
              action: "REFER"
              override: 5
              note: "Qualified/adverse audit opinion"
            - threshold: 50
              comparison: "<="
              action: "REFER"
              override: 4
              note: "Audit concerns"

        - id: "internal_controls"
          name: "Internal Controls Assessment"
          description: "SOX 404 internal controls assessment"
          weight: 0.20
          inference_utility_function: internal_controls_basefunction
          score_conditions:
            - threshold: 30
              comparison: "<="
              action: "REFER"
              override: 4
              note: "Material weakness in internal controls"

        - id: "restatement"
          name: "Financial Restatement History"
          description: "History of financial restatements (5-year lookback)"
          weight: 0.20
          inference_utility_function: restatement_basefunction
          score_conditions:
            - threshold: 35
              comparison: "<="
              action: "REFER"
              override: 4
              note: "Financial restatement history"

        - id: "filing_timeliness"
          name: "Filing Timeliness"
          description: "History of timely SEC filings"
          weight: 0.10
          inference_utility_function: filing_timelienness_basefunction

        - id: "revenue_recognition"
          name: "Revenue Recognition Risk"
          description: "Revenue recognition complexity and risk"
          weight: 0.10
          inference_utility_function: revenue_recognition_basefunction

        - id: "debt_covenant"
          name: "Debt Covenant Compliance"
          description: "Proximity to debt covenant thresholds"
          weight: 0.05
          inference_utility_function: debt_covenant_basefunction

        - id: "stock_volatility"
          name: "Stock Price Volatility"
          description: "Historical stock price volatility vs peers"
          weight: 0.10
          inference_utility_function: stock_volatility_basefunction

        - id: "short_interest"
          name: "Short Interest"
          description: "Short interest as percentage of float"
          weight: 0.05
          inference_utility_function: short_interest_basefunction

      litigation:
        - id: "securities_litigation"
          name: "Securities Class Action History"
          description: "History of securities class action lawsuits"
          weight: 0.35
          inference_utility_function: securities_litigation_basefunction
          score_conditions:
            - threshold: 30
              comparison: "<="
              action: "REFER"
              override: 5
              note: "Active securities litigation"
            - threshold: 50
              comparison: "<="
              action: "REFER"
              override: 4
              note: "Securities litigation history"

        - id: "derivative_litigation"
          name: "Derivative Litigation History"
          description: "Shareholder derivative suit history"
          weight: 0.15
          inference_utility_function: derivitaive_litigation_basefunction

        - id: "sec_enforcement"
          name: "SEC Enforcement History"
          description: "SEC enforcement actions and investigations"
          weight: 0.20
          inference_utility_function: sec_enforcement_basefunction
          score_conditions:
            - threshold: 25
              comparison: "<="
              action: "REFER"
              override: 5
              note: "Active SEC enforcement"
            - threshold: 45
              comparison: "<="
              action: "REFER"
              override: 4
              note: "SEC enforcement history"

        - id: "regulatory_action"
          name: "Other Regulatory Actions"
          description: "Non-SEC regulatory enforcement (DOJ, state AG, CFPB)"
          weight: 0.15
          inference_utility_function: regulatory_action_basefunction

        - id: "pending_litigation"
          name: "Material Pending Litigation"
          description: "Disclosed material pending litigation"
          weight: 0.10
          inference_utility_function: pending_litigation_basefunction

        - id: "whistleblower"
          name: "Whistleblower Activity"
          description: "Whistleblower complaints and SEC tips"
          weight: 0.05
          inference_utility_function: whistleblower_basefunction

      executive:
        - id: "executive_stability"
          name: "Executive Team Stability"
          description: "CEO/CFO tenure and turnover patterns"
          weight: 0.25
          inference_utility_function: executive_stability_basefunction

        - id: "cfo_quality"
          name: "CFO Quality Indicators"
          description: "CFO experience and credentials"
          weight: 0.20
          inference_utility_function: cfo_quality_basefunction

        - id: "insider_trading"
          name: "Insider Trading Patterns"
          description: "Form 4 insider trading analysis"
          weight: 0.25
          inference_utility_function: insider_trading_basefunction

        - id: "executive_background"
          name: "Executive Background Check"
          description: "Background issues with executives"
          weight: 0.15
          inference_utility_function: executive_background_basefunction
          score_conditions:
            - threshold: 35
              comparison: "<="
              action: "REFER"
              override: 4
              note: "Executive background concerns"

        - id: "trading_plan"
          name: "10b5-1 Plan Usage"
          description: "Usage of 10b5-1 trading plans"
          weight: 0.15
          inference_utility_function: trading_plan_basefunction

      corporate_footprint:
        - id: "investor_relations"
          name: "Investor Relations Quality"
          description: "Quality of investor communications"
          weight: 0.25
          inference_utility_function: investor_relations_basefunction

        - id: "governance_page"
          name: "Governance Page Quality"
          description: "Dedicated governance/board information"
          weight: 0.20
          inference_utility_function: governance_page_basefunction

        - id: "esg_reporting"
          name: "ESG Reporting"
          description: "Environmental, social, governance reporting"
          weight: 0.15
          inference_utility_function: esg_reporting_basefunction

        - id: "press_release"
          name: "Press Release Quality"
          description: "Quality and consistency of corporate communications"
          weight: 0.15
          inference_utility_function: press_release_basefunction

        - id: "leadership_visibility"
          name: "Leadership Visibility"
          description: "Executive visibility and accessibility"
          weight: 0.15
          inference_utility_function: leadership_visability_basefunction

        - id: "hiring_signals"
          name: "Risk/Compliance Hiring"
          description: "Legal, compliance, and governance hiring"
          weight: 0.10
          inference_utility_function: hiring_signals_basefunction

      structured_data:
        - id: "credit_rating"
          name: "Credit Rating"
          description: "Corporate credit rating"
          weight: 0.30
          inference_utility_function: credit_rating_basefunction

        - id: "esg_rating"
          name: "ESG Rating"
          description: "Third-party ESG rating"
          weight: 0.20
          inference_utility_function: esg_rating_basefunction

        - id: "governance_rating"
          name: "Governance Rating"
          description: "Third-party governance quality rating"
          weight: 0.30
          inference_utility_function: governance_rating_basefunction

        - id: "iss_governance"
          name: "ISS Governance QualityScore"
          description: "ISS Governance QualityScore"
          weight: 0.20
          inference_utility_function: iss_governance_basefunction

    # =========================================================================
    # GROUPS
    # Categorical modifiers and three-layer assessment groupings
    # =========================================================================
    groups:

      # -----------------------------------------------------------------------
      # CATEGORICAL GROUPS
      # Apply pricing modifiers (applied:), not scores
      # -----------------------------------------------------------------------
      categories:
        - id: "company_type"
          label: "Company Type"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "industry"
          label: "Industry"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "stock_exchange"
          label: "Stock Exchange"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

      # -----------------------------------------------------------------------
      # THREE-LAYER ASSESSMENT GROUPS
      # Aggregate signals into scoring dimensions
      # Weights within each dimension must sum to 1.0
      # -----------------------------------------------------------------------
      three_layer_assessment:
        - id: "network_authority"
          label: "Network Authority"
          description: "Quality of professional relationships and institutional credibility"
          risk:
            weight: 0.10
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent network authority - modifier applied"}
  
        - id: "governance"
          label: "Corporate Governance"
          description: "Board composition, structure, and shareholder rights"
          risk:
            weight: 0.25
            score_conditions:
              - {threshold: 30, comparison: "<=", action: "REFER", override: 5, note: "Critical governance deficiencies"}
              - {threshold: 45, comparison: "<=", action: "REFER", override: 4, note: "Significant governance concerns"}
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.85, note: "Excellent governance - modifier applied"}
  
        - id: "financial"
          label: "Financial Integrity"
          description: "Audit quality, internal controls, financial reporting"
          risk:
            weight: 0.20
            score_conditions:
              - {threshold: 35, comparison: "<=", action: "REFER", override: 5, note: "Critical financial integrity issues"}
              - {threshold: 50, comparison: "<=", action: "REFER", override: 4, note: "Material financial concerns"}
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.85, note: "Excellent financial integrity - modifier applied"}
  
        - id: "litigation"
          label: "Litigation Profile"
          description: "Securities litigation, regulatory actions, enforcement history"
          risk:
            weight: 0.25
            score_conditions:
              - {threshold: 25, comparison: "<=", action: "REFER", override: 5, note: "Severe litigation profile"}
              - {threshold: 40, comparison: "<=", action: "REFER", override: 4, note: "Elevated litigation risk"}
              - {threshold: 20,  comparison: "<=", action: "MODIFIER",  applied: 0.85, note: "Excellent litigation profile - modifier applied"}
  
        - id: "executive"
          label: "Executive Profile"
          description: "Executive stability, quality, and conduct"
          risk:
            weight: 0.10
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent executive profile - modifier applied"}
  
        - id: "corporate_footprint"
          label: "Corporate Footprint"
          description: "Investor relations, transparency, ESG commitment"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent corporate footprint - modifier applied"}
  
        - id: "structured_data"
          label: "Structured Data"
          description: "Third-party governance and credit ratings"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 20,  comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent structured data - modifier applied"}
     # =========================================================================
    # RISK TIER BANDS
    # Maps composite risk score (0-1000) to pricing tiers
    # =========================================================================
    risk_tier_bands:
      bands:
        - id: 1
          label: "PREFERRED"
          description: "Excellent risk - automatic approval, preferred pricing"
          interpretation:
            bands: {min: 800, max: 1000}
            action: "APPROVE"
            application: {method: "PREMIUM_BASE", value: 4000}

        - id: 2
          label: "STANDARD_PLUS"
          description: "Good risk - automatic approval, standard pricing"
          interpretation:
            bands: {min: 650, max: 799}
            action: "APPROVE"
            application: {method: "PREMIUM_BASE", value: 6000}

        - id: 3
          label: "STANDARD"
          description: "Average risk - may require referral"
          interpretation:
            bands: {min: 500, max: 649}
            action: "REFER"
            application: {method: "PREMIUM_BASE", value: 9000}

        - id: 4
          label: "SUBSTANDARD"
          description: "Elevated risk - requires senior review"
          interpretation:
            bands: {min: 350, max: 499}
            action: "REFER"
            application: {method: "PREMIUM_BASE", value: 15000}

        - id: 5
          label: "DECLINE"
          description: "Unacceptable risk - decline"
          interpretation:
            bands: {min: 0, max: 349}
            action: "DECLINE"
            application: {method: "PREMIUM_BASE", value: 25000}

    # =========================================================================
    # LOSS TIER BANDS
    # Maps composite loss score (0-100) to pricing modifiers
    # Calculation: (frequency_score × frequency_weight) + (severity_score × severity_weight)
    # Result maps to band, constrained by floor/cap
    # =========================================================================
    loss_tier_bands:
      bands:
        - id: 1
          label: "VERY_LOW"
          description: "Very low risk of loss"
          interpretation:
            bands: {min: 80, max: 100}
            application:
              frequency_modifier: 0.70
              severity_modifier: 0.80

        - id: 2
          label: "LOW"
          description: "Low risk of loss"
          interpretation:
            bands: {min: 60, max: 79}
            application:
              frequency_modifier: 0.85
              severity_modifier: 0.90

        - id: 3
          label: "MODERATE"
          description: "Moderate risk of loss"
          interpretation:
            bands: {min: 40, max: 59}
            application:
              frequency_modifier: 1.00
              severity_modifier: 1.00

        - id: 4
          label: "ELEVATED"
          description: "Elevated risk of loss"
          interpretation:
            bands: {min: 20, max: 39}
            application:
              frequency_modifier: 1.15
              severity_modifier: 1.15

        - id: 5
          label: "HIGH"
          description: "High risk of loss"
          interpretation:
            bands: {min: 0, max: 19}
            application:
              frequency_modifier: 1.35
              severity_modifier: 1.40
      constraints:
        floor: 0.55
        cap: 1.60

    # =========================================================================
    # EXPOSURE TIER BANDS
    # Maps exposure scores to size and complexity modifiers
    # Calculation: (size_modifier × size_weight) + (complexity_modifier × complexity_weight)
    # =========================================================================
    exposure:
      size:
        weight: 0.60
        bands:
          - id: 1
            label: "MICRO"
            description: "Micro exposure value ($0 - $1M)"
            interpretation:
              bands: {min: 0, max: 20}
              application: {method: "MODIFIER", applied: 0.50, implied_thresholds: {min: 0, max: 1000000}}

          - id: 2
            label: "SMALL"
            description: "Small exposure value ($1M - $10M)"
            interpretation:
              bands: {min: 21, max: 40}
              application: {method: "MODIFIER", applied: 0.75, implied_thresholds: {min: 1000000, max: 10000000}}

          - id: 3
            label: "MEDIUM"
            description: "Medium exposure value ($10M - $50M)"
            interpretation:
              bands: {min: 41, max: 60}
              application: {method: "MODIFIER", applied: 1.00, implied_thresholds: {min: 10000000, max: 50000000}}

          - id: 4
            label: "LARGE"
            description: "Large exposure value ($50M - $250M)"
            interpretation:
              bands: {min: 61, max: 80}
              application: {method: "MODIFIER", applied: 1.50, implied_thresholds: {min: 50000000, max: 250000000}}

          - id: 5
            label: "VERY_LARGE"
            description: "Very large exposure value ($250M+)"
            interpretation:
              bands: {min: 81, max: 100}
              application: {method: "MODIFIER", applied: 2.50, implied_thresholds: {min: 250000000, max: 1000000000}}

      complexity:
        weight: 0.40
        bands:
          - id: 1
            label: "SIMPLE"
            description: "Simple operational complexity"
            interpretation:
              bands: {min: 0, max: 20}
              application: {method: "MODIFIER", applied: 0.85}

          - id: 2
            label: "MODERATE"
            description: "Moderate operational complexity"
            interpretation:
              bands: {min: 21, max: 40}
              application: {method: "MODIFIER", applied: 0.95}

          - id: 3
            label: "COMPLEX"
            description: "Complex operations"
            interpretation:
              bands: {min: 41, max: 60}
              application: {method: "MODIFIER", applied: 1.10}

          - id: 4
            label: "HIGHLY_COMPLEX"
            description: "Highly complex operations"
            interpretation:
              bands: {min: 61, max: 80}
              application: {method: "MODIFIER", applied: 1.30}

          - id: 5
            label: "EXTREMELY_COMPLEX"
            description: "Extremely complex operations"
            interpretation:
