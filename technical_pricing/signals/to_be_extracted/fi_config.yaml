    # -------------------------------------------------------------------------
    # CONDITION DEFINITIONS
    # -------------------------------------------------------------------------
    direct_conditions:
      - id: regulatory_action_true
        bands:
          - {return: true, tier_override: 4, action: "REFER", note: "Regulatory enforcement disclosed"}
      
      - id: examination_issues_true
        bands:
          - {return: true, tier_override: 3, action: "REFER", note: "Outstanding MRAs/MRIAs"}
      
      - id: litigation_pending_true
        bands:
          - {return: true, tier_override: null, action: "REFER", note: "Material litigation pending"}
      
      - id: cyber_incident_true
        bands:
          - {return: true, tier_override: null, action: "REFER", note: "Recent cyber incident"}
      
      - id: significant_growth_true
        bands:
          - {return: true, tier_override: null, action: "FLAG", note: "Rapid growth >20%"}
      
      - id: new_product_true
        bands:
          - {return: true, tier_override: null, action: "FLAG", note: "New product line risk"}
  
    score_conditions:
      - id: regulatory_compliance_critical
        bands:
          - {max: 30, tier_override: 5, action: "DECLINE", note: "Critical regulatory deficiencies"}
          - {max: 45, tier_override: 4, action: "REFER", note: "Significant regulatory concerns"}
        inclusive_max: false
      
      - id: financial_condition_critical
        bands:
          - {max: 35, tier_override: 5, action: "DECLINE", note: "Critical financial condition"}
          - {max: 50, tier_override: 4, action: "REFER", note: "Material financial concerns"}
        inclusive_max: false
      
      - id: examination_rating_critical
        bands:
