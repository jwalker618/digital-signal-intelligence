# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# STRUCTURAL PRINCIPLES (per master_config_layout.yaml):
# 1. Signals defined once in signal_registry with group_id reference
# 2. source: score (default) uses 0-100 inference return
# 3. source: metadata.field uses inference metadata with bands/categories
# 4. Categorical groups apply modifiers (applied:), not scores
# 5. score_conditions (plural, banded) apply actions based on score thresholds
#    Actions: FLAG | MODIFIER | REFER
# 6. proxy_tier at signal level (DIRECT_OBSERVABLE | INFERRED_PROXY | COHORT_INFERENCE)
# 7. Normalisation handled by inference functions, not config
#
# AUGMENTED BY:
# - analysis_outputs/cyber_v{date}.yaml - empirically-derived parameters
# - schemas/organisational_graph.yaml - graph structure (coverage-agnostic)
#
# =============================================================================

marine:
  marine_general:
    metadata:
      name: "DSI Marine Technical Pricing Model"
      description: "Marine hull and liability coverage based on observable operator behavior, safety records, and fleet patterns"
      version: "2.2.0"
      product_types:
        - "hull_machinery"
        - "total_loss"
        - "increased_value"
        - "loss_of_hire"
        - "war_risks"
        - "pi_liability"
        - "cargo"
      applicable_markets: ["global"]
      minimum_viable_input:
        required:
          - field: "client_name"
            description: "Client name (domain optional for discovery)"
          - field: "product_type"
            description: "One of: hull_machinery, total_loss, increased_value, loss_of_hire, war_risks, pi_liability, cargo"
          - field: "limit"
            description: "Requested limit in USD"
          - field: "hull_value"
            description: "Total hull value in USD"
      min_premium: 50000
      default_currency: "USD"

    # =========================================================================
    # DIRECT QUERIES
    # Binary questions that cannot be externally observed (max 10)
    # Actions: FLAG | MODIFIER | REFER
    # =========================================================================
    direct_queries:
      
      - id: "psc_detentions"
        question: "Any vessels detained by port state control in past 36 months?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "PSC detentions in past 36 months"}
      
      - id: "total_losses"
        question: "Any total losses or major casualties in past 5 years?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Total losses in past 5 years"}
      
      - id: "third_party_manager"
        question: "Is the fleet managed by a third-party technical manager?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Third-party technical management"}
      
      - id: "sanctioned_trade"
        question: "Any vessels currently trading to sanctioned regions?"
        query_condition:
          - {return: true, action: "REFER", override: 5, applied: null, note: "Trading to sanctioned regions - coverage not available"}

    # =========================================================================
    # SIGNAL REGISTRY
    # All signals defined once with group_id reference
    # proxy_tier at signal level; normalisation in inference functions
    # =========================================================================
    signal_registry:

      # -----------------------------------------------------------------------
      # CATEGORICAL SIGNALS
      # Return discrete categories that apply as pricing modifiers
      # -----------------------------------------------------------------------
      - id: operator_type
        inference_utility_function: operator_classification_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: operator_type
          source: metadata.operator_type
          features:
            - {cat: "MAJOR_LINER", label: "Major Liner Operator", applied: 0.80}
            - {cat: "MAJOR_TANKER", label: "Major Tanker Operator", applied: 0.90}
            - {cat: "MAJOR_BULK", label: "Major Bulk Operator", applied: 0.95}
            - {cat: "REGIONAL_OPERATOR", label: "Regional Fleet Operator", applied: 1.00}
            - {cat: "INDEPENDENT", label: "Independent Operator", applied: 1.25}
            - {cat: "STATE_OWNED", label: "State-Owned Operator", applied: 1.10}
            - {cat: "UNKNOWN", label: "Unknown Operator", applied: 1.50}

      - id: vessel_category
        inference_utility_function: primaryvessel_category_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: vessel_category
          source: metadata.vessel_category
          features:
            - {cat: "CONTAINER", label: "Container", applied: 0.90}
            - {cat: "TANKER", label: "Tanker", applied: 1.10}
            - {cat: "DRY_BULK", label: "Dry Bulk", applied: 1.00}
            - {cat: "LNG_LPG", label: "LNG/LPG Carrier", applied: 0.85}
            - {cat: "OFFSHORE", label: "Offshore", applied: 1.30}
            - {cat: "PASSENGER", label: "Passenger", applied: 1.25}
            - {cat: "GENERAL_CARGO", label: "General Cargo", applied: 1.10}
            - {cat: "MIXED", label: "Mixed Fleet", applied: 1.05}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: trading_pattern
        inference_utility_function: trading_pattern_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: trading_pattern
          source: metadata.trading_pattern
          features:
            - {cat: "LINER_REGULAR", label: "Liner/Regular Service", applied: 0.85}
            - {cat: "SPOT_TRAMP", label: "Spot/Tramp Trading", applied: 1.15}
            - {cat: "INDUSTRIAL", label: "Industrial Shipping", applied: 0.90}
            - {cat: "MIXED", label: "Mixed Trading", applied: 1.00}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: flag_state_quality
        inference_utility_function: flagstate_quality_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: flag_state_quality
          features:
            - {cat: "WHITE_LIST", label: "Paris MoU White List", applied: 0.95}
            - {cat: "GREY_LIST", label: "Paris MoU Grey List", applied: 1.10}
            - {cat: "BLACK_LIST", label: "Paris MoU Black List", applied: 1.40}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: fleet_age_band
