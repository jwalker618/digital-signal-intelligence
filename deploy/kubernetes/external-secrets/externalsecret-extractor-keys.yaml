# V6 Phase 5 (C2) — paid-extractor API keys.
# Each key lives behind a DSI_ENABLE_<SOURCE> env toggle so the framework
# runs without it (free/cached fallback). Adding a key to SSM and toggling
# the env var on flips the extractor live.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dsi-extractor-keys
  namespace: dsi-prod
spec:
  refreshInterval: 60s
  secretStoreRef:
    kind: ClusterSecretStore
    name: dsi-aws-ssm
  target:
    name: dsi-extractor-keys
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - { secretKey: OFAC_ACCESS_KEY,       remoteRef: { key: /dsi/prod/ofac-key } }
    - { secretKey: SHODAN_API_KEY,        remoteRef: { key: /dsi/prod/shodan-key } }
    - { secretKey: SSC_API_KEY,           remoteRef: { key: /dsi/prod/ssc-key } }
    - { secretKey: MSCI_API_KEY,          remoteRef: { key: /dsi/prod/msci-key } }
    - { secretKey: CRUNCHBASE_API_KEY,    remoteRef: { key: /dsi/prod/crunchbase-key } }
    - { secretKey: GITHUB_PAT,            remoteRef: { key: /dsi/prod/github-pat } }
    - { secretKey: URLSCAN_API_KEY,       remoteRef: { key: /dsi/prod/urlscan-key } }
    - { secretKey: HIBP_API_KEY,          remoteRef: { key: /dsi/prod/hibp-key } }
    - { secretKey: BUILTWITH_API_KEY,     remoteRef: { key: /dsi/prod/builtwith-key } }
    - { secretKey: OPENCORPORATES_API_KEY, remoteRef: { key: /dsi/prod/oc-key } }
    - { secretKey: SP_RATINGS_API_KEY,    remoteRef: { key: /dsi/prod/sp-key } }
    - { secretKey: ISS_API_KEY,           remoteRef: { key: /dsi/prod/iss-key } }
    - { secretKey: OPENSKY_API_KEY,       remoteRef: { key: /dsi/prod/opensky-key } }
