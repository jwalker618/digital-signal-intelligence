# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# STRUCTURAL PRINCIPLES (per master_config_layout.yaml):
# 1. Signals defined once in signal_registry with group_id reference
# 2. source: score (default) uses 0-100 inference return
# 3. source: metadata.field uses inference metadata with bands/categories
# 4. Categorical groups apply modifiers (applied:), not scores
# 5. score_conditions (plural, banded) apply actions based on score thresholds
#    Actions: FLAG | MODIFIER | REFER
# 6. proxy_tier at signal level (DIRECT_OBSERVABLE | INFERRED_PROXY | COHORT_INFERENCE)
# 7. Normalisation handled by inference functions, not config
#
# AUGMENTED BY:
# - analysis_outputs/cyber_v{date}.yaml - empirically-derived parameters
# - schemas/organisational_graph.yaml - graph structure (coverage-agnostic)
#
# =============================================================================

energy:
  energy_general:
    metadata:
      name: "DSI Energy Technical Pricing Model"
      description: "Energy property and liability coverage based on observable safety, environmental, and operational signals"
      version: "2.1.0"
      product_types:
        - "property_damage"
        - "business_interruption"
        - "control_of_well"
        - "operators_extra_expense"
        - "third_party_liability"
        - "pollution_liability"
        - "removal_of_wreck"
      applicable_markets: ["us", "uk", "eu", "apac", "latam", "mena"]
      minimum_viable_input: ["client name (domain optional)","Limit in USD","TIV"]
      min_premium: 100000
      default_currency: "USD"

    # =========================================================================
    # DIRECT QUERIES
    # Binary questions that cannot be externally observed (max 10)
    # Actions: FLAG | MODIFIER | REFER
    # =========================================================================
    direct_queries:
      - id: "major_incidents"
        question: "Any major incidents (explosion, blowout, major spill) in past 5 years?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Major incidents disclosed"}
      
      - id: "fatalities"
        question: "Any work-related fatalities in past 3 years?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Fatalities disclosed"}
      
      - id: "regulatory_enforcement"
        question: "Any significant regulatory enforcement actions pending?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Pending regulatory enforcement"}
      
      - id: "decommissioning_obligations"
        question: "Any significant unfunded decommissioning obligations?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Unfunded decommissioning obligations"}
      
      - id: "joint_venture_operator"
        question: "Are you the designated operator for JV assets?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "JV operator status"}

      - id: "third_party_contractor"
        question: "Do you use third-party contractors for drilling/completions?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Third-party contractor usage"}

    # -------------------------------------------------------------------------
    # CATEGORICAL GROUPS
    # categorical groups can either
    # a) impact base premium after generation (impact: modifier)
    # b) be the basis of premium (impact: premium)
    # note: only one group be the basis of premium
    # -------------------------------------------------------------------------

    categorical_groups:
      - id: "operator_type"
        name: "Operator Type"
        description: "Operator classification based on size, integration, and ownership"
        impact: "modifier"
        inference_utility_function: operator_type_basefunction
      - id: "operation_segment"
        name: "Operation Segment"
        description: "Primary operational segment"
        impact: "modifier"
        inference_utility_function: operation_segment_basefunction
      - id: "geographic_focus"
        name: "Geographic Focus"
        description: "Primary geographic focus of operations"
        impact: "modifier"
        inference_utility_function: geographic_focus_basefunction

    # -------------------------------------------------------------------------
    # CATEGORICAL FEATURES
    # -------------------------------------------------------------------------

    categorical_features:
      operator_type:
        - cat: "SUPERMAJOR"
          label: "Supermajor"
          modifier: 0.75
          description: "ExxonMobil, Shell, BP, Chevron, TotalEnergies, etc."

        - cat: "MAJOR_INTEGRATED"
          label: "Major Integrated"
          modifier: 0.85
          description: "Large integrated oil companies"

        - cat: "LARGE_INDEPENDENT"
          label: "Large Independent"
          modifier: 0.95
          description: "Large E&P independents (ConocoPhillips, EOG, etc.)"

        - cat: "MID_INDEPENDENT"
          label: "Mid-Size Independent"
          modifier: 1.00
          description: "Mid-size E&P companies"

        - cat: "SMALL_INDEPENDENT"
          label: "Small Independent"
          modifier: 1.20
          description: "Small E&P operators"

        - cat: "NATIONAL_OIL"
          label: "National Oil Company"
          modifier: 0.90
          description: "State-owned national oil companies"

        - cat: "MIDSTREAM_MAJOR"
          label: "Major Midstream"
          modifier: 0.85
          description: "Major pipeline/processing operators"

        - cat: "DOWNSTREAM_MAJOR"
          label: "Major Downstream"
          modifier: 0.90
          description: "Major refining operators"

        - cat: "PRIVATE_EQUITY"
          label: "Private Equity Backed"
          modifier: 1.15
          description: "PE-backed operators"

        - cat: "UNKNOWN"
          label: "Unknown/New Operator"
          modifier: 1.40
          description: "New or unclassified operator"

      operation_segment:
        - cat: "UPSTREAM_CONVENTIONAL"
          label: "Upstream Conventional"
          modifier: 1.00
          description: "Conventional onshore oil & gas production"

        - cat: "UPSTREAM_UNCONVENTIONAL"
          label: "Upstream Unconventional"
          modifier: 0.95
          description: "Shale, tight oil, CBM operations"

        - cat: "UPSTREAM_OFFSHORE"
          label: "Upstream Offshore (Shelf)"
          modifier: 1.20
          description: "Shallow water offshore operations"

        - cat: "UPSTREAM_DEEPWATER"
          label: "Upstream Deepwater"
          modifier: 1.50
          description: "Deepwater offshore operations (>500m)"

        - cat: "MIDSTREAM_PIPELINE"
          label: "Midstream Pipeline"
          modifier: 0.80
          description: "Oil & gas pipeline operations"

        - cat: "MIDSTREAM_PROCESSING"
          label: "Midstream Processing"
          modifier: 1.00
          description: "Gas processing, NGL fractionation"

        - cat: "MIDSTREAM_STORAGE"
          label: "Midstream Storage"
          modifier: 0.85
          description: "Crude/product storage terminals"

        - cat: "DOWNSTREAM_REFINING"
          label: "Downstream Refining"
          modifier: 1.30
          description: "Petroleum refining operations"

        - cat: "DOWNSTREAM_PETROCHEMICAL"
          label: "Downstream Petrochemical"
          modifier: 1.25
          description: "Petrochemical manufacturing"

        - cat: "POWER_GENERATION"
          label: "Power Generation"
          modifier: 0.90
          description: "Gas-fired power generation"

        - cat: "RENEWABLE"
          label: "Renewable Energy"
          modifier: 0.70
          description: "Wind, solar, other renewables"

        - cat: "MIXED"
          label: "Mixed Operations"
          modifier: 1.05
          description: "Diversified operations across segments"

      geographic_focus:
        - cat: "US_ONSHORE"
          label: "US Onshore"
          modifier: 1.00
          description: ""
        - cat: "US_GULF_SHELF"
          label: "US Gulf Shelf"
          modifier: 1.10
          description: ""
        - cat: "US_GULF_DEEPWATER"
          label: "US Gulf Deepwater"
          modifier: 1.40
          description: ""
        - cat: "NORTH_SEA"
          label: "North Sea"
          modifier: 1.15
          description: ""
        - cat: "WEST_AFRICA"
          label: "West Africa"
          modifier: 1.25
          description: ""
        - cat: "MIDDLE_EAST"
          label: "Middle East"
          modifier: 1.20
          description: ""
        - cat: "ASIA_PACIFIC"
          label: "Asia Pacific"
          modifier: 1.10
          description: ""
        - cat: "LATIN_AMERICA"
          label: "Latin America"
          modifier: 1.20
          description: ""
        - cat: "GLOBAL_DIVERSIFIED"
          label: "Global Diversified"
          modifier: 1.05
          description: ""
        - cat: "OTHER"
          label: "Other"
          modifier: 1.15
          description: ""

    # -------------------------------------------------------------------------
    # SIGNAL GROUPS
    # Each group is the product of its underlying features
    # Each group contributes to the composite score
    # Weights must add to 1
    # -------------------------------------------------------------------------

    signal_groups:
      - id: "network_authority"
        name: "Network Authority"
        description: "Quality of partnerships, contractors, and industry relationships"
        weight: 0.10
        test_scores: {excellent: 88, average: 68, poor: 40}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent network authority - modifier applied"

      - id: "safety_performance"
        name: "Safety Performance"
        description: "OSHA metrics, incidents, process safety events"
        weight: 0.30
        test_scores: {excellent: 92, average: 72, poor: 35}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.85
            note: "Excellent safety performance band"
          - threshold: 30
            comparison: "<="
            action: "REFER"
            override: 5
            note: "Critical safety performance"
          - threshold: 45
            comparison: "<="
            action: "REFER"
            override: 4
            note: "Significant safety concerns"

      - id: "environmental_compliance"
        name: "Environmental Compliance"
        description: "EPA violations, spills, emissions, flaring"
        weight: 0.20
        test_scores: {excellent: 90, average: 70, poor: 38}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.85
            note: "Excellent environmental compliance band"
          - threshold: 30
            comparison: "<="
            action: "REFER"
            override: 5
            note: "Critical environmental violations"
          - threshold: 45
            comparison: "<="
            action: "REFER"
            override: 4
            note: "Significant environmental concerns"

      - id: "operational_telemetry"
        name: "Operational Telemetry"
        description: "Production patterns, facility activity, maintenance signals"
        weight: 0.10
        test_scores: {excellent: 85, average: 68, poor: 45}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent operational telemetry - modifier applied"

      - id: "financial_stability"
        name: "Financial Stability"
        description: "Credit rating, leverage, ARO coverage, capex trends"
        weight: 0.10
        test_scores: {excellent: 88, average: 70, poor: 40}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.85
            note: "Excellent financial stability band"
          - threshold: 35
            comparison: "<="
            action: "REFER"
            override: 4
            note: "Financial stability concerns"

      - id: "asset_portfolio"
        name: "Asset Portfolio"
        description: "Asset age, concentration, complexity, permit status"
        weight: 0.10
        test_scores: {excellent: 82, average: 65, poor: 42}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent asset portfolio - modifier applied"

      - id: "corporate_footprint"
        name: "Corporate Footprint"
        description: "Safety culture communication, ESG reporting, HSE leadership"
        weight: 0.05
        test_scores: {excellent: 85, average: 62, poor: 38}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent corporate footprint - modifier applied"

      - id: "structured_data"
        name: "Structured Data"
        description: "Third-party ESG ratings and industry benchmarks"
        weight: 0.05
        test_scores: {excellent: 85, average: 65, poor: 40}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent structured data - modifier applied"

    # -------------------------------------------------------------------------
    # SIGNAL FEATURES
    # Each is a underlying feature for the previously defined groups
    # Each group contributes to the group score
    # Weights must add to 1
    # -------------------------------------------------------------------------

