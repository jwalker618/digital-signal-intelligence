# V6 Phase 5 (C2) — core API secrets (JWT, DB, Redis).
# The ExternalSecret synthesizes a Kubernetes Secret `dsi-api-secrets`
# that the Rollout consumes via envFrom.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dsi-api-core
  namespace: dsi-prod
spec:
  refreshInterval: 60s
  secretStoreRef:
    kind: ClusterSecretStore
    name: dsi-aws-ssm
  target:
    name: dsi-api-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: JWT_SECRET_KEY
      remoteRef: { key: /dsi/prod/jwt-key }
    - secretKey: DATABASE_URL
      remoteRef: { key: /dsi/prod/db-url }
    - secretKey: REDIS_URL
      remoteRef: { key: /dsi/prod/redis-url }
