    risk_tier_bands:
      bands:
      - {id: 1, label: PREFERRED, description: Excellent unconventional risk, interpretation: {bands: {min: 800, max: 1000}, action: APPROVE, application: {method: MULTIPLIER, applied: 0.0010, basis: tiv}}}
      - {id: 2, label: STANDARD_PLUS, description: Good unconventional risk, interpretation: {bands: {min: 650, max: 799}, action: APPROVE, application: {method: MULTIPLIER, applied: 0.0016, basis: tiv}}}
      - {id: 3, label: STANDARD, description: Average unconventional risk, interpretation: {bands: {min: 500, max: 649}, action: REFER, application: {method: MULTIPLIER, applied: 0.0022, basis: tiv}}}
      - {id: 4, label: SUBSTANDARD, description: Elevated unconventional risk, interpretation: {bands: {min: 350, max: 499}, action: REFER, application: {method: MULTIPLIER, applied: 0.0035, basis: tiv}}}
      - {id: 5, label: DECLINE, description: Unacceptable unconventional risk, interpretation: {bands: {min: 0, max: 349}, action: DECLINE, application: {method: MULTIPLIER, applied: 0.0055, basis: tiv}}}

    loss_tier_bands:
      bands:
      - {id: 1, label: VERY_LOW, interpretation: {bands: {min: 80, max: 100}, application: {frequency_modifier: 0.75, severity_modifier: 0.8}}}
      - {id: 2, label: LOW, interpretation: {bands: {min: 60, max: 79}, application: {frequency_modifier: 0.88, severity_modifier: 0.9}}}
      - {id: 3, label: MODERATE, interpretation: {bands: {min: 40, max: 59}, application: {frequency_modifier: 1.0, severity_modifier: 1.0}}}
      - {id: 4, label: ELEVATED, interpretation: {bands: {min: 20, max: 39}, application: {frequency_modifier: 1.15, severity_modifier: 1.15}}}
      - {id: 5, label: HIGH, interpretation: {bands: {min: 0, max: 19}, application: {frequency_modifier: 1.35, severity_modifier: 1.35}}}
      constraints: {floor: 0.6, cap: 1.55}

    exposure:
      size:
        weight: 0.6
        bands:
        - {id: 1, label: SMALL, interpretation: {bands: {min: 0, max: 20}, application: {method: MODIFIER, applied: 0.75}, implied_thresholds: {min: 0, max: 500000000}}}
        - {id: 2, label: MEDIUM, interpretation: {bands: {min: 21, max: 40}, application: {method: MODIFIER, applied: 1.0}, implied_thresholds: {min: 500000000, max: 2000000000}}}
        - {id: 3, label: LARGE, interpretation: {bands: {min: 41, max: 60}, application: {method: MODIFIER, applied: 1.3}, implied_thresholds: {min: 2000000000, max: 5000000000}}}
        - {id: 4, label: VERY_LARGE, interpretation: {bands: {min: 61, max: 80}, application: {method: MODIFIER, applied: 1.7}, implied_thresholds: {min: 5000000000, max: 15000000000}}}
        - {id: 5, label: MEGA, interpretation: {bands: {min: 81, max: 100}, application: {method: MODIFIER, applied: 2.3}, implied_thresholds: {min: 15000000000, max: 50000000000}}}
      complexity:
        weight: 0.4
        bands:
        - {id: 1, label: SIMPLE, interpretation: {bands: {min: 0, max: 20}, application: {method: MODIFIER, applied: 0.85}}}
        - {id: 2, label: MODERATE, interpretation: {bands: {min: 21, max: 40}, application: {method: MODIFIER, applied: 0.95}}}
        - {id: 3, label: COMPLEX, interpretation: {bands: {min: 41, max: 60}, application: {method: MODIFIER, applied: 1.1}}}
        - {id: 4, label: HIGHLY_COMPLEX, interpretation: {bands: {min: 61, max: 80}, application: {method: MODIFIER, applied: 1.3}}}
        - {id: 5, label: EXTREMELY_COMPLEX, interpretation: {bands: {min: 81, max: 100}, application: {method: MODIFIER, applied: 1.55}}}

    limit_configuration:
      type: DECOUPLED
      valid_limits: [1000000, 2500000, 5000000, 10000000, 25000000, 50000000, 100000000, 250000000, 500000000]
      valid_deductibles: [25000, 50000, 100000, 250000, 500000, 1000000]

    pricing:
      base_limit_reference: 10000000
      base_deductible_reference: 100000
      by_product_type:
        property_damage:
          ilf_curve: {base_limit: 10000000, factors: [{limit: 1000000, factor: 0.3}, {limit: 2500000, factor: 0.5}, {limit: 5000000, factor: 0.75}, {limit: 10000000, factor: 1.0}, {limit: 25000000, factor: 1.0}, {limit: 50000000, factor: 1.0}, {limit: 100000000, factor: 1.0}, {limit: 250000000, factor: 1.0}, {limit: 500000000, factor: 1.0}]}
          deductible_factors: [{deductible: 25000, factor: 1.2}, {deductible: 50000, factor: 1.1}, {deductible: 100000, factor: 1.0}, {deductible: 250000, factor: 0.88}, {deductible: 500000, factor: 0.78}, {deductible: 1000000, factor: 0.68}]
        business_interruption:
          ilf_curve: {base_limit: 10000000, factors: [{limit: 1000000, factor: 0.3}, {limit: 2500000, factor: 0.5}, {limit: 5000000, factor: 0.75}, {limit: 10000000, factor: 1.0}, {limit: 25000000, factor: 1.0}, {limit: 50000000, factor: 1.0}, {limit: 100000000, factor: 1.0}, {limit: 250000000, factor: 1.0}, {limit: 500000000, factor: 1.0}]}
          deductible_factors: [{deductible: 25000, factor: 1.2}, {deductible: 50000, factor: 1.1}, {deductible: 100000, factor: 1.0}, {deductible: 250000, factor: 0.88}, {deductible: 500000, factor: 0.78}, {deductible: 1000000, factor: 0.68}]
        control_of_well:
          ilf_curve: {base_limit: 10000000, factors: [{limit: 1000000, factor: 0.25}, {limit: 2500000, factor: 0.45}, {limit: 5000000, factor: 0.7}, {limit: 10000000, factor: 1.0}, {limit: 25000000, factor: 2.0}, {limit: 50000000, factor: 3.6}, {limit: 100000000, factor: 6.5}, {limit: 250000000, factor: 14.0}, {limit: 500000000, factor: 25.0}]}
          deductible_factors: [{deductible: 25000, factor: 1.2}, {deductible: 50000, factor: 1.1}, {deductible: 100000, factor: 1.0}, {deductible: 250000, factor: 0.88}, {deductible: 500000, factor: 0.78}, {deductible: 1000000, factor: 0.68}]
        operators_extra_expense:
          ilf_curve: {base_limit: 10000000, factors: [{limit: 1000000, factor: 0.25}, {limit: 2500000, factor: 0.45}, {limit: 5000000, factor: 0.7}, {limit: 10000000, factor: 1.0}, {limit: 25000000, factor: 1.8}, {limit: 50000000, factor: 3.0}, {limit: 100000000, factor: 5.5}, {limit: 250000000, factor: 11.5}, {limit: 500000000, factor: 20.0}]}
          deductible_factors: [{deductible: 25000, factor: 1.2}, {deductible: 50000, factor: 1.1}, {deductible: 100000, factor: 1.0}, {deductible: 250000, factor: 0.88}, {deductible: 500000, factor: 0.78}, {deductible: 1000000, factor: 0.68}]
        third_party_liability:
