  # ===========================================================================
  # ENERGY UPSTREAM ONSHORE
  # ===========================================================================
  energy_upstream_onshore:
    metadata:
      name: DSI Energy Upstream Onshore Pricing Model
      description: Conventional onshore E&P — Permian, Oklahoma, Louisiana conventional operations
      version: 2.2.0
      product_types:
      - property_damage
      - business_interruption
      - control_of_well
      - operators_extra_expense
      - third_party_liability
      - pollution_liability
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mena
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: property_damage, business_interruption, control_of_well, operators_extra_expense, third_party_liability, pollution_liability'
        - field: limit
          description: Requested limit in USD
        - field: tiv
          description: Total Insured Value in USD
      min_premium: 75000
      default_currency: USD
      model_specificity: 2
      routing_constraints:
      - field: operation_segment
        operator: "="
        value: UPSTREAM_CONVENTIONAL
        required_in_input: true

    direct_queries:
    - id: major_incidents
      question: Any major incidents in past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Major incidents disclosed
    - id: fatalities
      question: Any work-related fatalities in past 3 years?
      query_condition:
      - return: true
        action: REFER
        override: 3
        applied: null
        note: Fatalities disclosed
    - id: h2s_presence
      question: Are any operated wells in H2S-classified zones?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: H2S exposure flag
    - id: regulatory_enforcement
      question: Any significant regulatory enforcement actions pending?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Pending enforcement
    - id: orphan_wells
      question: Any orphaned or idle well obligations on the operator's record?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Environmental liability
    - id: state_violations
      question: Any state oil & gas commission violations (RRC, OCC, etc.) in past 3 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: State regulatory violations

    signal_registry:
    # --- Categorical signals ---
    - id: operator_type
      inference_utility_function: operator_type_basefunction
      proxy_tier: INFERRED_PROXY
      categories:
        group_id: operator_type
        source: metadata.operator_type
        features:
        - {cat: SUPERMAJOR, label: Supermajor, applied: 0.75}
        - {cat: MAJOR_INTEGRATED, label: Major Integrated, applied: 0.85}
        - {cat: LARGE_INDEPENDENT, label: Large Independent, applied: 0.95}
        - {cat: MID_INDEPENDENT, label: Mid-Size Independent, applied: 1.10}
        - {cat: SMALL_INDEPENDENT, label: Small Independent, applied: 1.25}
        - {cat: NATIONAL_OIL, label: National Oil Company, applied: 0.90}
        - {cat: OTHER, label: Unknown, applied: 1.0}
    - id: operation_segment
      inference_utility_function: operation_segment_basefunction
      proxy_tier: INFERRED_PROXY
      categories:
        group_id: operation_segment
        source: metadata.operation_segment
        features:
        - {cat: UPSTREAM_CONVENTIONAL, label: Conventional Upstream, applied: 1.0}
        - {cat: OTHER, label: Other, applied: 1.1}
    - id: geographic_focus
      inference_utility_function: geographic_focus_basefunction
      proxy_tier: INFERRED_PROXY
      categories:
        group_id: geographic_focus
        source: metadata.geographic_focus
