name: Nightly Calibration

# V6 Phase 24 (E3): runs the confidence-calibration harness across every
# golden fixture, uploads the JSON report, and fails when any coverage's
# Expected Calibration Error (ECE) exceeds 0.10.

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC
  workflow_dispatch: {}

jobs:
  calibrate:
    name: Build reliability curves + ECE per coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run calibration harness
        run: |
          python - <<'PY'
          from infrastructure.validation.confidence_calibration import (
              calibrate_from_golden_corpus,
          )
          from pathlib import Path
          report = calibrate_from_golden_corpus()
          report.write_json(Path("calibration-report.json"))
          miscal = [c for c, ece in report.ece_by_coverage.items() if ece > 0.10]
          if miscal:
              print(f"::error::Coverages with ECE > 0.10: {miscal}")
              print(f"ECE per coverage: {report.ece_by_coverage}")
              raise SystemExit(1)
          print(f"All coverages within ECE band. Brier: {report.brier_by_coverage}")
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: calibration-report
          path: calibration-report.json
          if-no-files-found: ignore
