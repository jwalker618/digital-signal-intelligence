apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ClusterSecretStore is cluster-scoped, so it is applied once per cluster
# via the production overlay. Staging inherits the same ClusterSecretStore
# (one per cluster) but references /dsi/staging/* via its own
# ExternalSecrets (see staging overlay).
resources:
  - cluster-secret-store.yaml
  - externalsecret-api-core.yaml
  - externalsecret-extractor-keys.yaml
