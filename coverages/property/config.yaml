commercial_property:
  property_general:
    metadata:
      name: DSI Commercial Property General Model
      description: "General commercial property \u2014 offices, retail, light industrial, multi-tenant"
      version: 2.3.0
      product_types:
      - commercial_property
      - builders_risk
      - business_interruption
      - difference_in_conditions
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mea
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name
        - field: product_type
          description: 'One of: commercial_property, builders_risk, business_interruption, difference_in_conditions'
        - field: limit
          description: Requested limit in USD
        - field: tiv
          description: Total insured value in USD (MULTIPLIER basis)
      min_premium: 25000
      default_currency: USD
      model_specificity: 2
      routing_constraints:
      - field: tiv
        operator: '>='
        value: 5000000
        required_in_input: true
      - field: tiv
        operator: <
        value: 500000000
        required_in_input: false
    direct_queries:
    - id: pending_claims
      question: Any open or pending property claims in the past 5 years?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Open property claims history
    - id: prior_losses_large
      question: Any single property loss exceeding $1M in the past 10 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Large prior loss history
    - id: vacancy_significant
      question: Is more than 30% of the insured property currently vacant?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Significant vacancy exposure
    - id: renovation_active
      question: Any active renovation or construction at the insured location?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: "Active renovation \u2014 hot works exposure"
    - id: hazardous_materials
      question: Are hazardous materials stored, used, or processed on premises?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Hazardous materials on site
    signal_registry:
    - id: construction_class
      inference_utility_function: construction_class_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      expectation_level: UNIVERSAL
      categories:
        group_id: technical_infrastructure
        source: metadata.construction_class
        features:
        - cat: FR
          label: Fire Resistive
          applied: 0.7
        - cat: MFR
          label: Modified Fire Resistive
          applied: 0.8
        - cat: MNC
          label: Masonry Non-Combustible
          applied: 0.9
        - cat: NC
          label: Non-Combustible
          applied: 0.95
        - cat: JM
          label: Joisted Masonry
          applied: 1.1
        - cat: F
          label: Frame
          applied: 1.4
    - id: building_age_condition
      inference_utility_function: building_age_condition_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      expectation_level: UNIVERSAL
      three_layer_assessment:
        group_id: technical_infrastructure
        risk:
          correlation_direction: positive
          weight: 0.25
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.2
          severity:
            correlation_direction: positive
            weight: 0.1
        exposure:
          size:
            correlation_direction: positive
            weight: 0.05
