      - {id: 4, label: ELEVATED, interpretation: {bands: {min: 20, max: 39}, application: {frequency_modifier: 1.15, severity_modifier: 1.2}}}
      - {id: 5, label: HIGH, interpretation: {bands: {min: 0, max: 19}, application: {frequency_modifier: 1.35, severity_modifier: 1.4}}}
      constraints: {floor: 0.5, cap: 1.6}

    exposure:
      size:
        weight: 0.6
        bands:
        - {id: 1, label: SMALL, interpretation: {bands: {min: 0, max: 20}, application: {method: MODIFIER, applied: 0.75}, implied_thresholds: {min: 0, max: 1000000000}}}
        - {id: 2, label: MEDIUM, interpretation: {bands: {min: 21, max: 40}, application: {method: MODIFIER, applied: 1.0}, implied_thresholds: {min: 1000000000, max: 5000000000}}}
        - {id: 3, label: LARGE, interpretation: {bands: {min: 41, max: 60}, application: {method: MODIFIER, applied: 1.3}, implied_thresholds: {min: 5000000000, max: 15000000000}}}
        - {id: 4, label: VERY_LARGE, interpretation: {bands: {min: 61, max: 80}, application: {method: MODIFIER, applied: 1.8}, implied_thresholds: {min: 15000000000, max: 40000000000}}}
        - {id: 5, label: MEGA, interpretation: {bands: {min: 81, max: 100}, application: {method: MODIFIER, applied: 2.5}, implied_thresholds: {min: 40000000000, max: 100000000000}}}
      complexity:
        weight: 0.4
        bands:
        - {id: 1, label: SIMPLE, interpretation: {bands: {min: 0, max: 20}, application: {method: MODIFIER, applied: 0.85}}}
        - {id: 2, label: MODERATE, interpretation: {bands: {min: 21, max: 40}, application: {method: MODIFIER, applied: 0.95}}}
        - {id: 3, label: COMPLEX, interpretation: {bands: {min: 41, max: 60}, application: {method: MODIFIER, applied: 1.1}}}
        - {id: 4, label: HIGHLY_COMPLEX, interpretation: {bands: {min: 61, max: 80}, application: {method: MODIFIER, applied: 1.3}}}
        - {id: 5, label: EXTREMELY_COMPLEX, interpretation: {bands: {min: 81, max: 100}, application: {method: MODIFIER, applied: 1.6}}}

    limit_configuration:
      type: DECOUPLED
      valid_limits: [1000000, 2500000, 5000000, 10000000, 25000000, 50000000, 100000000, 250000000, 500000000, 1000000000]
      valid_deductibles: [25000, 50000, 100000, 250000, 500000, 1000000, 2500000]

    pricing:
      base_limit_reference: 10000000
      base_deductible_reference: 100000
      by_product_type:
        property_damage:
          ilf_curve: {base_limit: 10000000, factors: [{limit: 1000000, factor: 0.3}, {limit: 2500000, factor: 0.5}, {limit: 5000000, factor: 0.75}, {limit: 10000000, factor: 1.0}, {limit: 25000000, factor: 1.0}, {limit: 50000000, factor: 1.0}, {limit: 100000000, factor: 1.0}, {limit: 250000000, factor: 1.0}, {limit: 500000000, factor: 1.0}, {limit: 1000000000, factor: 1.0}]}
          deductible_factors: [{deductible: 25000, factor: 1.25}, {deductible: 50000, factor: 1.1}, {deductible: 100000, factor: 1.0}, {deductible: 250000, factor: 0.9}, {deductible: 500000, factor: 0.82}, {deductible: 1000000, factor: 0.72}, {deductible: 2500000, factor: 0.62}]
        business_interruption:
