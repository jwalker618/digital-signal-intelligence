      inference_utility_function: osha_trir_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      three_layer_assessment:
        group_id: safety_performance
        risk: {correlation_direction: positive, weight: 0.2, score_conditions: [{threshold: 30, comparison: <=, action: REFER, override: 4, note: TRIR significantly above benchmark}]}
        loss: {frequency: {correlation_direction: positive, weight: 0.2}, severity: {correlation_direction: positive, weight: 0.1}}
    - id: phmsa_compliance
      inference_utility_function: phmsa_compliance_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      three_layer_assessment:
        group_id: safety_performance
        risk: {correlation_direction: positive, weight: 0.3, score_conditions: [{threshold: 25, comparison: <=, action: REFER, override: 5, note: PHMSA enforcement actions}, {threshold: 45, comparison: <=, action: REFER, override: 4, note: PHMSA compliance concerns}]}
        loss: {frequency: {correlation_direction: positive, weight: 0.2}, severity: {correlation_direction: positive, weight: 0.2}}
    - id: process_safety
      inference_utility_function: process_safety_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: safety_performance
        risk: {correlation_direction: positive, weight: 0.15}
        loss: {frequency: {correlation_direction: positive, weight: 0.15}, severity: {correlation_direction: positive, weight: 0.15}}
    - id: fatality
      inference_utility_function: fatality_history_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      three_layer_assessment:
        group_id: safety_performance
        risk: {correlation_direction: positive, weight: 0.15, score_conditions: [{threshold: 30, comparison: <=, action: REFER, override: 4, note: Fatality history}]}
        loss: {severity: {correlation_direction: positive, weight: 0.25}}
    - id: major_incident
      inference_utility_function: major_incident_basefunction
      proxy_tier: DIRECT_OBSERVABLE
