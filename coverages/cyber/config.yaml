        action: REFER
        override: 4
        applied: null
        note: MFA not enabled - increased ransomware risk
    - id: backup_frequency
      question: Are critical systems backed up at least weekly with offline copies?
      query_condition:
      - return: false
        action: MODIFIER
        override: null
        applied: 1.15
        note: Inadequate backup practices
