  property_cat_exposed:
    metadata:
      name: DSI Commercial Property CAT-Exposed Model
      description: "CAT-exposed commercial property \u2014 coastal wind, earthquake, wildfire zones"
      version: 2.3.0
      product_types:
      - commercial_property
      - builders_risk
      - business_interruption
      - difference_in_conditions
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mea
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name
        - field: product_type
          description: 'One of: commercial_property, builders_risk, business_interruption, difference_in_conditions'
        - field: limit
          description: Requested limit in USD
        - field: tiv
          description: Total insured value in USD (MULTIPLIER basis)
      min_premium: 50000
      default_currency: USD
      model_specificity: 3
      routing_constraints:
      - field: tiv
        operator: '>='
        value: 5000000
        required_in_input: true
      - field: cat_zone
        operator: in
        value:
        - HIGH_WIND
        - HIGH_EQ
        - HIGH_WILDFIRE
        - HIGH_FLOOD
        required_in_input: true
    direct_queries:
    - id: prior_cat_loss
      question: Has this property sustained a catastrophe loss in the past 10 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Prior CAT loss at this location
    - id: cat_mitigation
      question: Have CAT-specific mitigation measures been implemented (hurricane straps, seismic retrofit, defensible space)?
      query_condition:
      - return: true
        action: MODIFIER
        override: null
        applied: 0.85
        note: CAT mitigation credit
    - id: coastal_proximity
      question: Is the property within 2500 feet of the coastline?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Immediate coastal exposure
    - id: flood_elevation
      question: Is the property elevated above the base flood elevation?
      query_condition:
      - return: true
        action: MODIFIER
        override: null
        applied: 0.9
        note: Elevated above BFE credit
    - id: secondary_perils
      question: Is the location exposed to multiple concurrent CAT perils (e.g., wind + flood + storm surge)?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Multi-peril CAT exposure
