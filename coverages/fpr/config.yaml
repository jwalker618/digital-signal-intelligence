      - political_violence
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mea
      - africa
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name
        - field: product_type
          description: 'One of: trade_credit, political_risk, political_violence, surety_bond, contract_bond, kidnap_ransom'
        - field: limit
          description: Requested limit in USD
        - field: contract_value
          description: Contract or turnover value in USD (basis for trade credit)
      min_premium: 25000
      default_currency: USD
      model_specificity: 3
      routing_constraints:
      - field: product_type
        operator: in
        value:
        - political_risk
        - political_violence
        required_in_input: true
    direct_queries:
    - id: active_conflict
      question: Is the insured asset/investment located in a country with active armed conflict?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Active armed conflict zone
    - id: prior_expropriation
      question: Has the host government expropriated assets in the same sector in the past 10 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Sector-specific expropriation history
    - id: bilateral_treaty
      question: Is the investment protected by a bilateral investment treaty (BIT)?
      query_condition:
      - return: true
        action: MODIFIER
        override: null
        applied: 0.88
        note: BIT protection credit
    - id: local_partner
      question: Is there a local joint venture partner with government connections?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: "Local partner \u2014 may mitigate or amplify risk"
    - id: resource_extraction
      question: Is this a natural resource extraction investment (oil, gas, mining)?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: "Resource extraction \u2014 elevated nationalisation risk"
