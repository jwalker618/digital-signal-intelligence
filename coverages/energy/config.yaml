  # ===========================================================================
  # energy_offshore_wind
  # Offshore wind farms — maritime construction + technology risk
  # ===========================================================================
  energy_offshore_wind:
    metadata:
      name: DSI Energy Offshore Wind Pricing Model
      description: Offshore wind farms — maritime construction + technology risk
      version: 2.2.0
      product_types:
      - property_damage
      - business_interruption
      - third_party_liability
      - delay_in_start_up
      - removal_of_wreck
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mena
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: property_damage, business_interruption, third_party_liability, delay_in_start_up, removal_of_wreck'
        - field: limit
          description: Requested limit in USD (minimum $25,000,000)
        - field: tiv
          description: Total Insured Value (project value including construction cost) in USD
        - field: technology_type
          description: OFFSHORE_WIND (required for routing)
        optional:
        - field: operation_segment
          description: RENEWABLE (enables routing)
        - field: construction_phase
          description: 'PRE_CONSTRUCTION, CONSTRUCTION, COMMISSIONING, EARLY_OPERATION, MATURE_OPERATION'
        - field: capacity_mw
          description: Total nameplate capacity in MW
        - field: foundation_type
          description: 'MONOPILE, JACKET, GRAVITY_BASE, FLOATING_SPAR, FLOATING_SEMI, FLOATING_TLP'
        - field: epc_contractor
          description: EPC contractor name
        - field: turbine_oem
          description: Turbine manufacturer (Vestas, Siemens Gamesa, GE, etc.)
        - field: water_depth
          description: Maximum water depth in metres for array area
      min_premium: 200000
      default_currency: USD
      model_specificity: 4
      routing_constraints:
      - field: operation_segment
        operator: "="
        value: RENEWABLE
        required_in_input: true
      - field: technology_type
        operator: "="
        value: OFFSHORE_WIND
        required_in_input: true

    direct_queries:
    - id: construction_incidents
      question: Any construction-phase incidents causing >30 day delay?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Construction risk
    - id: vessel_incident
      question: Any installation vessel incidents (jack-up failure, crane incident) in past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Maritime construction risk
    - id: cable_failure
      question: Any export cable failures or damage events?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Cable route risk
    - id: technology_first_of_kind
      question: Is this a first-of-kind technology deployment (floating wind, new turbine platform)?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Technology risk
    - id: ppa_unsigned
      question: Is the CFD/PPA/OREC unsigned or under negotiation?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Revenue uncertainty
    - id: serial_defect
      question: Any known serial defect advisories on deployed turbines?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Fleet-wide risk

    signal_registry:
    # --- Categorical signals ---
    - id: operator_type
      inference_utility_function: operator_type_basefunction
      proxy_tier: INFERRED_PROXY
      categories:
        group_id: operator_type
        source: metadata.operator_type
        features:
        - cat: UTILITY_DEVELOPER
          label: Utility Developer
          applied: 0.85
        - cat: SPECIALIST_DEVELOPER
          label: Specialist Developer
          applied: 0.90
        - cat: OIL_GAS_TRANSITION
          label: Oil & Gas Transition
          applied: 1.10
        - cat: FINANCIAL_SPONSOR
          label: Financial Sponsor
          applied: 1.20
        - cat: FIRST_TIME_DEVELOPER
          label: First-Time Developer
          applied: 1.50
        - cat: OTHER
          label: UNKNOWN
          applied: 1.0
    - id: foundation_type
      inference_utility_function: foundation_type_basefunction
      proxy_tier: DIRECT_OBSERVABLE
