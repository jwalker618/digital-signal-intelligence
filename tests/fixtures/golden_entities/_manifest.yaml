# V6 Golden-Entity Manifest
#
# Lists the public entities used as snapshot fixtures for each coverage.
# Adding an entry here and running:
#
#     python tests/fixtures/golden_entities/_generator.py --all
#
# will snapshot the current pipeline output into the matching fixture file
# under tests/fixtures/golden_entities/{coverage}/{entity_id}.yaml.
#
# Target per V6 E5: 10 entities × 10 existing coverages = 100 fixtures.
# This file currently lists 2 entities per coverage as a proof-of-concept
# scaffold; the remaining 8/coverage land under the A1-A8 maturation phases
# alongside the sub-config and signal work for each line.
#
# Premium tolerance is expressed in basis points (10_000 = 100%). Score
# tolerance is absolute composite-score points. Keep tolerances tight
# enough to catch regressions; widen only if the signal is genuinely noisy.

