  # ===========================================================================
  # energy_onshore_renewable
  # Onshore wind and utility-scale solar
  # ===========================================================================
  energy_onshore_renewable:
    metadata:
      name: DSI Energy Onshore Renewable Pricing Model
      description: Onshore wind and utility-scale solar
      version: 2.2.0
      product_types:
      - property_damage
      - business_interruption
      - third_party_liability
      - delay_in_start_up
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mena
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: property_damage, business_interruption, third_party_liability, delay_in_start_up'
        - field: limit
          description: Requested limit in USD
        - field: tiv
          description: Total Insured Value (project value) in USD
        - field: technology_type
          description: 'One of: ONSHORE_WIND, UTILITY_SOLAR, DISTRIBUTED_SOLAR'
        optional:
        - field: operation_segment
          description: RENEWABLE (enables routing)
        - field: construction_phase
          description: 'PRE_CONSTRUCTION, CONSTRUCTION, COMMISSIONING, EARLY_OPERATION, MATURE_OPERATION'
        - field: capacity_mw
          description: Total nameplate capacity in MW
        - field: epc_contractor
          description: EPC contractor name
        - field: panel_or_turbine_oem
          description: Primary equipment manufacturer
      min_premium: 50000
      default_currency: USD
      model_specificity: 2
      routing_constraints:
      - field: operation_segment
        operator: "="
        value: RENEWABLE
        required_in_input: true
      - field: technology_type
        operator: IN
        value: [ONSHORE_WIND, UTILITY_SOLAR, DISTRIBUTED_SOLAR]
        required_in_input: true

    direct_queries:
    - id: construction_incidents
      question: Any construction-phase incidents causing >30 day delay?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Construction risk
    - id: hail_claims
      question: Any hail damage claims in past 3 years?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: NatCat exposure
    - id: serial_defect
      question: Any known serial defect advisories on deployed equipment (blades, inverters, panels)?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Fleet-wide risk
    - id: grid_connection_delay
      question: Has grid interconnection been delayed >6 months?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Grid risk
    - id: ppa_unsigned
      question: Is the PPA unsigned or under negotiation?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Revenue uncertainty
    - id: warranty_dispute
      question: Any active warranty disputes with OEM?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Warranty risk

