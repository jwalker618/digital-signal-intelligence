# =============================================================================
# DSI Model Configuration
# 
# This file holds all the relvant configuration types for a single coverage.
# For example,
# coverage:         the actual coverage cohort, eg aerospace
#   configuration:  the specific configuration file under that coverage, eg aerospace_general
# 
# There can be multiple configurations saved under a coverage.
# 
# A configuration is the single source of truth for:
#   - 1) direct (optional) queries
#   - 2) categorical features
#   - 3) signal groups and underlying features
#   - the source and impact of 1- 3
#   - tier definitions
#   - other pricing parameters
#   - test profiles for validation
# 
# When a technical model is generated:
# - the completed selected configuration is persisted. This allows the model to be generated at any moment based on its original specification (although test profiles are removed as these are extraneous).
# - every item with an id is captured in a seperate file with the associated return and persisted after a complete interaction  - this is a model version
# 
# All DSI principles must be adhered to, specifically:
# 1. All signals must be externally observable (no application questions required)
# 2. Direct queries are OPTIONAL - model must work without them
# 3. Categorical features are inferred from observable data
# 4. Tier determines base premium, either directly or through the application of a percentage to a single value (for example, TIV * %); modifiers adjust for categorical features
# 5. All sources must be publicly accessible or through standard data providers
# =============================================================================

directors_officers:
  do_general:
    metadata:
      name: "DSI Directors & Officers Technical Pricing Model"
      description: "D&O liability coverage based on observable governance, financial, and litigation signals"
      version: "2.0.0"
      coverage_types:
        - "side_a"
        - "side_b"
        - "side_c"
        - "side_a_dic"
        - "employment_practices"
        - "fiduciary"
      applicable_markets: ["us", "uk", "eu", "apac"]
      minimum_viable_input: ["client name (domain optional)","Limit in USD"]
      min_premium: 10000
      default_currency: "USD"

    # -------------------------------------------------------------------------
    # DIRECT OPTIONAL QUERIES
    # -------------------------------------------------------------------------
    direct_queries:
      - id: "pending_claims"
        question: "Are there any pending securities class actions or derivative suits?"
        bands:
          - return: true
            override: 4
            action: "REFER"
            note: "Pending securities claims"
      - id: "regulatory_investigation"
        question: "Is the company or any director/officer under regulatory investigation?"
        bands:
          - return: true
            override: 3
            action: "REFER" 
            note: "Regulatory investigation disclosed"
      - id: "planned_transaction"
        question: "Is there a planned M&A, IPO, SPAC merger, or material transaction?"
        bands:
          - return: true
            override: null
            action: "FLAG"
            note: "Planned transaction - tail coverage needed"
      - id: "covenant_compliance"
        question: "Is the company in compliance with all debt covenants?"
        bands:
          - return: false 
            override: null
            action: "FLAG"
            note: "Covenant non-compliance disclosed"
      - id: "executive_dispute"
        question: "Are there any disputes with current or former executives?"
        bands:
          - return: true
            override: null
            action: "REFER"
            note: "Executive dispute disclosed"


    # -------------------------------------------------------------------------
    # CATEGORICAL GROUPS
    # -------------------------------------------------------------------------
  categorical_groups:
      - id: "company_type"
        name: "Company Type"
        description: "Company classification based on public/private status and market cap"
        inference_utility_function: company_type_basefunction    
      - id: "industry"
        name: "Industry"
        description: "Industry classification from SIC/NAICS codes"
        inference_utility_function: industry_classification_basefunction
      - id: "stock_exchange"
        name: "Stock Exchange"
        description: "Primary stock exchange listing"
        inference_utility_function: stock_exchange_basefunction

    # -------------------------------------------------------------------------
    # CATEGORICAL FEATURES
    # -------------------------------------------------------------------------

    categorical_features:
      company_type:
        - cat: "PUBLIC_LARGE_CAP"
          label: "Public Large Cap"
          modifier: 2.50
          description: "Market cap >$10B, SEC reporting"
        - cat: "PUBLIC_MID_CAP"
