# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# This file defines the complete configuration for a coverage type.
# It is the single source of truth for:
#   - Model structure and parameters
#   - Signal definitions and weights
#   - Pricing factors and thresholds
#   - Test profiles for actuarial validation
#
# Premium calculation follows DSI Foundational Principle 9: Signal -> Score -> Tier -> Price
#
# DSI PRINCIPLES APPLIED:
#   1. All signals must be externally observable (no application questions required)
#   2. Direct queries are OPTIONAL - model must work without them
#   3. Categorical features are inferred from observable data
#   4. Tier determines base premium; modifiers adjust for exposure characteristics
#   5. All sources must be publicly accessible or through standard data providers
#
# Version: 2.0.0
# Last Updated: 2025-12
# =============================================================================

professional_indemnity:
  pi_general:
    metadata:
      name: "DSI Professional Indemnity Technical Pricing Model"
      description: "PI/E&O coverage based on observable regulatory, practice quality, and stability signals"
      version: "2.0.0"
      coverage_types:
        - "professional_liability"
        - "errors_omissions"
        - "malpractice"
      applicable_professions:
        - "law_firm"
        - "accounting_firm"
        - "architecture"
        - "engineering"
        - "management_consulting"
        - "it_consulting"
        - "real_estate"
        - "insurance_broker"
        - "financial_planning"
        - "healthcare_admin"
        - "appraisal_valuation"
        - "environmental_consulting"
      applicable_markets: ["us", "uk", "eu", "apac"]
      min_premium: 2500
      default_currency: "USD"

    direct_optional_queries:
      - id: "pending_claims"
        question: "Any pending or threatened malpractice claims?"
        direct_condition: pending_claims_referral
        
      - id: "disciplinary_pending"
        question: "Any pending disciplinary proceedings against any professional?"
        direct_condition: disciplinary_pending_referral
        
      - id: "coverage_declined"
        question: "Has any PI coverage been declined or non-renewed in past 3 years?"
        direct_condition: coverage_declined_referral
        
      - id: "practice_area_change"
        question: "Any significant change in practice areas in past 2 years?"
        direct_condition: practice_area_change_referral
        
      - id: "merger_activity"
        question: "Any merger, acquisition, or spin-off in past 2 years?"
        direct_condition: merger_activity_referral
        
      - id: "major_client_loss"
        question: "Loss of client representing >25% of revenue in past year?"
        direct_condition: major_client_loss_referral

