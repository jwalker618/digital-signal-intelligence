# =============================================================================
# DSI Coverage Expansion Spec — Phase 7: Cyber
# =============================================================================
#
# Machine-consumable spec for the CoverageExpansionGenerator.
# Companion prose: phase_7.md
#
# Usage:
#   python -m infrastructure.builder.cli expand \
#       --spec development/project/version/4/phase_7_spec.yaml \
#       --existing-config coverages/cyber/config.yaml \
#       --write
#
# =============================================================================

coverage_line: cyber
coverage_key: cyber
phase: phase_7
description: "Phase 7 Cyber Coverage Expansion — 9 new industry-specific configurations"
version: "2.3.0"

default_product_types:
  - cyber_liability
  - network_security

default_markets: [us, uk, eu, apac]
default_currency: USD
default_min_premium: 25000

default_minimum_viable_input:
  - field: client_name
    description: Client name
  - field: product_type
    description: "One of: cyber_liability, network_security, privacy_liability"
  - field: limit
    description: Requested limit in USD
  - field: revenue
    description: Annual revenue in USD (MULTIPLIER basis)

routing_field: industry_sector

# =============================================================================
# DEFAULT TIER BANDS
# =============================================================================

default_loss_tier_bands:
  floor: 0.55
  cap: 1.6

default_exposure_bands:
  size_weight: 0.6
  complexity_weight: 0.4
  size_thresholds:
    - {label: MICRO, max_value: 1000000, applied: 0.5}
    - {label: SMALL, max_value: 10000000, applied: 0.75}
    - {label: MEDIUM, max_value: 50000000, applied: 1.0}
    - {label: LARGE, max_value: 250000000, applied: 1.5}
    - {label: VERY_LARGE, max_value: 1000000000, applied: 2.5}

default_limit_configuration:
  type: DECOUPLED
  valid_limits: [5000000, 10000000, 25000000, 50000000, 100000000, 250000000, 500000000, 1000000000]
  valid_deductibles: [10000, 25000, 50000, 100000, 250000, 500000, 1000000]

default_pricing:
  base_limit_reference: 10000000
  base_deductible_reference: 50000
  by_product_type:
    - product_type: cyber_liability
      curve_type: standard
      ilf_curve:
        anchor_limit: 10000000
        curve: bounded_exponential
        params: {max_ilf: 5.0, k: 0.02}
      deductible_factors:
        - {deductible: 10000, factor: 1.30}
        - {deductible: 25000, factor: 1.15}
        - {deductible: 50000, factor: 1.0}
        - {deductible: 100000, factor: 0.90}
        - {deductible: 250000, factor: 0.80}
        - {deductible: 500000, factor: 0.70}
        - {deductible: 1000000, factor: 0.60}
    - product_type: network_security
      curve_type: standard
      ilf_curve:
        anchor_limit: 10000000
        curve: bounded_exponential
        params: {max_ilf: 5.0, k: 0.02}
      deductible_factors:
        - {deductible: 10000, factor: 1.30}
        - {deductible: 25000, factor: 1.15}
        - {deductible: 50000, factor: 1.0}
        - {deductible: 100000, factor: 0.90}
        - {deductible: 250000, factor: 0.80}
        - {deductible: 500000, factor: 0.70}
        - {deductible: 1000000, factor: 0.60}

# =============================================================================
# NEW SIGNAL GROUPS
# =============================================================================

new_signal_groups:

  # --- HEALTH DATA SECURITY (cyber_healthcare) ---
  - id: health_data_security
    label: Health Data Security
    description: "Healthcare-specific data security signals: PHI, medical devices, EHR, HIPAA"
    group_type: three_layer_assessment
    signals:
      - id: connected_medical_device_security
        name: Connected Medical Device Security
        group_id: health_data_security
        description: Connected medical device inventory and security posture
        proxy_tier: INFERRED_PROXY
        three_layer:
          risk_weight: 0.20
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.20
          exposure_size_weight: 0.15
          exposure_complexity_weight: 0.15
      - id: ehr_system_resilience
        name: EHR System Resilience
        group_id: health_data_security
        description: EHR platform hosting, backup, downtime procedures
        proxy_tier: INFERRED_PROXY
        three_layer:
          risk_weight: 0.15
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.15
          exposure_size_weight: 0.15
          exposure_complexity_weight: 0.10
      - id: hipaa_compliance_depth
        name: HIPAA Compliance Depth
        group_id: health_data_security
        description: OCR audit history, corrective action plans, NIST CSF alignment
        proxy_tier: DIRECT_OBSERVABLE
        three_layer:
          risk_weight: 0.20
          loss_frequency_weight: 0.15
          loss_severity_weight: 0.25
          exposure_size_weight: 0.10
          exposure_complexity_weight: 0.10
          score_conditions:
            - {threshold: 30, comparison: "<=", action: REFER, override: 4, note: "HIPAA compliance critically deficient"}
      - id: clinical_system_segmentation
        name: Clinical Network Segmentation
        group_id: health_data_security
        description: Isolation between clinical device, admin IT, and guest networks
        proxy_tier: INFERRED_PROXY
        three_layer:
          risk_weight: 0.25
          loss_frequency_weight: 0.10
          loss_severity_weight: 0.10
          exposure_size_weight: 0.20
          exposure_complexity_weight: 0.15
      - id: phi_data_volume
        name: PHI Data Volume
        group_id: health_data_security
        description: Estimated volume of PHI records under management
        proxy_tier: INFERRED_PROXY
        three_layer:
          risk_weight: 0.05
          loss_severity_weight: 0.15
          exposure_size_weight: 0.30
          exposure_complexity_weight: 0.15
      - id: hhs_breach_portal_history
        name: HHS Breach Portal History
        group_id: health_data_security
        description: Historical entries on HHS Breach Portal
        proxy_tier: DIRECT_OBSERVABLE
        three_layer:
          risk_weight: 0.15
          loss_frequency_weight: 0.20
          loss_severity_weight: 0.15
          exposure_size_weight: 0.10
          score_conditions:
            - {threshold: 25, comparison: "<=", action: FLAG, note: "Multiple HHS breach portal entries"}

