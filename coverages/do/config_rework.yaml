# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# STRUCTURAL PRINCIPLES (per master_config_layout.yaml):
# 1. Signals defined once in signal_registry with group_id reference
# 2. source: score (default) uses 0-100 inference return
# 3. source: metadata.field uses inference metadata with bands/categories
# 4. Categorical groups apply modifiers (applied:), not scores
# 5. score_conditions (plural, banded) apply actions based on score thresholds
#    Actions: FLAG | MODIFIER | REFER
# 6. proxy_tier at signal level (DIRECT_OBSERVABLE | INFERRED_PROXY | COHORT_INFERENCE)
# 7. Normalisation handled by inference functions, not config
#
# AUGMENTED BY:
# - analysis_outputs/cyber_v{date}.yaml - empirically-derived parameters
# - schemas/organisational_graph.yaml - graph structure (coverage-agnostic)
#
# =============================================================================

directors_officers:
  do_general:
    metadata:
      name: "DSI Directors & Officers Technical Pricing Model"
      description: "D&O liability coverage based on observable governance, financial, and litigation signals"
      version: "2.1.0"
      product_types:
        - "side_a"
        - "side_b"
        - "side_c"
        - "side_a_dic"
        - "employment_practices"
        - "fiduciary"
      applicable_markets: ["us", "uk", "eu", "apac"]
      minimum_viable_input: ["client name (domain optional)","Limit in USD"]
      min_premium: 10000
      default_currency: "USD"

    # =========================================================================
    # DIRECT QUERIES
    # Binary questions that cannot be externally observed (max 10)
    # Actions: FLAG | MODIFIER | REFER
    # =========================================================================
    direct_queries:
      - id: "pending_claims"
        question: "Are there any pending securities class actions or derivative suits?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Pending securities claims"}
        
      - id: "regulatory_investigation"
        question: "Is the company or any director/officer under regulatory investigation?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Regulatory investigation disclosed"}
      
      - id: "planned_transaction"
        question: "Is there a planned M&A, IPO, SPAC merger, or material transaction?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Planned transaction - tail coverage needed"}
       
      - id: "covenant_compliance"
        question: "Is the company in compliance with all debt covenants?"
        query_condition:
          - {return: false, action: "FLAG", override: null, applied: null, note: "Covenant non-compliance disclosed"}
       
      - id: "executive_dispute"
        question: "Are there any disputes with current or former executives?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Executive dispute disclosed"}
 
    # -------------------------------------------------------------------------
    # CATEGORICAL GROUPS
    # categorical groups can either
    # a) impact base premium after generation (impact: modifier)
    # b) be the basis of premium (impact: premium)
    # note: only one group be the basis of premium
    # -------------------------------------------------------------------------

    categorical_groups:
      - id: "company_type"
        name: "Company Type"
        description: "Company classification based on public/private status and market cap"
        impact: "modifier"
        inference_utility_function: company_type_basefunction
      - id: "industry"
        name: "Industry"
        description: "Industry classification from SIC/NAICS codes"
        impact: "modifier"
        inference_utility_function: industry_classification_basefunction
      - id: "stock_exchange"
        name: "Stock Exchange"
        description: "Primary stock exchange listing"
        impact: "modifier"
        inference_utility_function: stock_exchange_basefunction

    # -------------------------------------------------------------------------
    # CATEGORICAL FEATURES
    # -------------------------------------------------------------------------

    categorical_features:
      company_type:
        - cat: "PUBLIC_LARGE_CAP"
          label: "Public Large Cap"
          modifier: 2.50
          description: "Market cap >$10B, SEC reporting"
        - cat: "PUBLIC_MID_CAP"
          label: "Public Mid Cap"
          modifier: 1.50
          description: "Market cap $2B-$10B"
        - cat: "PUBLIC_SMALL_CAP"
          label: "Public Small Cap"
          modifier: 1.00
          description: "Market cap $300M-$2B"
        - cat: "PUBLIC_MICRO_CAP"
          label: "Public Micro Cap"
          modifier: 1.25
          description: "Market cap <$300M (elevated litigation risk)"
        - cat: "PRE_IPO"
          label: "Pre-IPO"
          modifier: 2.00
          description: "Filed S-1 or planning IPO within 12 months"
        - cat: "SPAC"
          label: "SPAC"
          modifier: 3.50
          description: "Special Purpose Acquisition Company"
        - cat: "PRIVATE_BACKED"
          label: "Private VC/PE Backed"
          modifier: 0.60
          description: "Private company with institutional backing"
        - cat: "PRIVATE_OTHER"
          label: "Private Other"
          modifier: 0.50
          description: "Private company without institutional backing"
        - cat: "NONPROFIT"
          label: "Nonprofit"
          modifier: 0.40
          description: "501(c)(3) or equivalent nonprofit"

      industry:
        - cat: "CRYPTO_DIGITAL"
          label: "Crypto/Digital Assets"
          modifier: 2.50
          description: "Cryptocurrency, blockchain, digital assets"

        - cat: "CANNABIS"
          label: "Cannabis"
          modifier: 2.00
          description: "Cannabis cultivation, processing, retail"

        - cat: "HEALTHCARE_PHARMA"
          label: "Healthcare/Pharma"
          modifier: 1.60

        - cat: "FINANCIAL_SERVICES"
          label: "Financial Services"
          modifier: 1.40
          description: "Banks, insurance, investment management, fintech"

        - cat: "TECHNOLOGY"
          label: "Technology"
          modifier: 1.25
          description: "Software, hardware, internet, semiconductors"

        - cat: "ENERGY"
          label: "Energy"
          modifier: 1.15
          description: "Oil & gas, utilities, renewable energy"

        - cat: "REAL_ESTATE"
          label: "Real Estate"
          modifier: 1.10
          description: "REITs, real estate development, property management"

        - cat: "RETAIL_CONSUMER"
          label: "Retail/Consumer"
          modifier: 1.00
          description: "Retail, consumer products, restaurants"

        - cat: "MANUFACTURING"
          label: "Manufacturing"
          modifier: 0.90
          description: "Industrial manufacturing, aerospace, automotive"

        - cat: "OTHER"
          label: "Other"
          modifier: 1.00
          description: "Other industries"

      stock_exchange:
        - cat: "NYSE"
          label: "NYSE"
          modifier: 1.00
          description: ""
        - cat: "NASDAQ"
          label: "NASDAQ"
          modifier: 1.00
          description: ""
        - cat: "NYSE_AMERICAN"
          label: "NYSE American"
          modifier: 1.10
          description: ""
        - cat: "OTC"
          label: "OTC Markets"
          modifier: 1.30
          description: ""
        - cat: "FOREIGN"
          label: "Foreign Exchange"
          modifier: 1.15
        - cat: "NONE"
          label: "Not Listed"
          modifier: 0.80
          description: ""

    # -------------------------------------------------------------------------
    # SIGNAL GROUPS
    # Each group is the product of its underlying features
    # Each group contributes to the composite score
    # Weights must add to 1
    # -------------------------------------------------------------------------

    signal_groups:
      - id: "network_authority"
        name: "Network Authority"
        description: "Quality of professional relationships and institutional credibility"
        weight: 0.10
        test_scores: {excellent: 90, average: 68, poor: 38}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent network authority - modifier applied"

      - id: "governance"
        name: "Corporate Governance"
        description: "Board composition, structure, and shareholder rights"
        weight: 0.25
        test_scores: {excellent: 92, average: 70, poor: 35}
        score_conditions:
          - threshold: 30
            comparison: "<="
            action: "REFER"
            override: 5
            note: "Critical governance deficiencies"
          - threshold: 45
            comparison: "<="
            action: "REFER"
            override: 4
            note: "Significant governance concerns"
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.85
            note: "Excellent governance - modifier applied"

      - id: "financial"
        name: "Financial Integrity"
        description: "Audit quality, internal controls, financial reporting"
        weight: 0.20
        test_scores: {excellent: 95, average: 72, poor: 38}
        score_conditions:
          - threshold: 35
            comparison: "<="
            action: "REFER"
            override: 5
            note: "Critical financial integrity issues"
          - threshold: 50
            comparison: "<="
            action: "REFER"
            override: 4
            note: "Material financial concerns"
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.85
            note: "Excellent financial integrity - modifier applied"

      - id: "litigation"
        name: "Litigation Profile"
        description: "Securities litigation, regulatory actions, enforcement history"
        weight: 0.25
        test_scores: {excellent: 98, average: 75, poor: 30}
        score_conditions:
          - threshold: 25
            comparison: "<="
            action: "REFER"
            override: 5
            note: "Severe litigation profile"
          - threshold: 40
            comparison: "<="
            action: "REFER"
            override: 4
            note: "Elevated litigation risk"
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.85
            note: "Excellent litigation profile - modifier applied"

      - id: "executive"
        name: "Executive Profile"
        description: "Executive stability, quality, and conduct"
        weight: 0.10
        test_scores: {excellent: 88, average: 68, poor: 40}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent executive profile - modifier applied"

      - id: "corporate_footprint"
        name: "Corporate Footprint"
        description: "Investor relations, transparency, ESG commitment"
        weight: 0.05
        test_scores: {excellent: 85, average: 62, poor: 35}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent corporate footprint - modifier applied"

      - id: "structured_data"
        name: "Structured Data"
        description: "Third-party governance and credit ratings"
        weight: 0.05
        test_scores: {excellent: 88, average: 65, poor: 40}
        score_conditions:
          - threshold: 20
            comparison: "<="
            action: "MODIFIER"
            applied: 0.90
            note: "Excellent structured data - modifier applied"

