        - cat: "MID_INDEPENDENT"
          label: "Mid-Size Independent"
          modifier: 1.00
          description: "Mid-size E&P companies"
          
        - cat: "SMALL_INDEPENDENT"
          label: "Small Independent"
          modifier: 1.20
          description: "Small E&P operators"
          
        - cat: "NATIONAL_OIL"
          label: "National Oil Company"
          modifier: 0.90
