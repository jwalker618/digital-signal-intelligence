# =============================================================================
# DSI Coverage Expansion Spec — Phase 3: Marine Expansion
# =============================================================================
#
# Machine-consumable spec for the CoverageExpansionGenerator.
# EXPANSION of existing marine coverage (marine_general + marine_sme).
#
# Usage:
#   python -m infrastructure.builder.cli expand \
#       --spec development/project/version/5/phase_3_marine_expansion_spec.yaml \
#       --existing-config coverages/marine/config.yaml \
#       --write
#
# Existing configs retained: marine_general (specificity 1), marine_sme (specificity 2)
# Existing groups retained: operator_type, vessel_category, fleet_age_band,
#                           flag_state_quality, trading_pattern
# Existing signals: 50 (general) + 15 (sme) = 65
#
# =============================================================================

coverage_line: marine
coverage_key: marine
phase: phase_3
description: "Phase 3 Marine Coverage Expansion — 5 new specialist configurations"
version: "2.3.0"

# =============================================================================
# DEFAULTS
# =============================================================================

default_product_types:
  - hull_machinery
  - total_loss
  - increased_value
  - loss_of_hire
  - war_risks
  - pi_liability
  - cargo

default_markets: [global]
default_currency: USD
default_min_premium: 50000

default_minimum_viable_input:
  - field: client_name
    description: Client name
  - field: product_type
    description: "One of: hull_machinery, total_loss, increased_value, loss_of_hire, war_risks, pi_liability, cargo"
  - field: limit
    description: Requested limit in USD
  - field: hull_value
    description: Total hull value in USD
  - field: tiv
    description: Total insured value (hull + increased value + loss of hire)

routing_field: operation_segment

# =============================================================================
# DEFAULT TIER BANDS
# =============================================================================

default_risk_tier_bands:
  method: MULTIPLIER
  basis: tiv
  preferred_min: 800
  standard_plus_min: 650
  standard_min: 450
  substandard_min: 250
  preferred_rate: 0.0015
  standard_plus_rate: 0.0022
  standard_rate: 0.0035
  substandard_rate: 0.0055
  decline_rate: 0.0080

default_loss_tier_bands:
  floor: 0.50
  cap: 1.8

default_exposure_bands:
  size_weight: 0.7
  complexity_weight: 0.3
  size_thresholds:
    - {label: MICRO, max_value: 10000000, applied: 0.5}
    - {label: SMALL, max_value: 50000000, applied: 0.75}
    - {label: MEDIUM, max_value: 250000000, applied: 1.0}
    - {label: LARGE, max_value: 1000000000, applied: 1.5}
    - {label: VERY_LARGE, max_value: 5000000000, applied: 2.5}

default_limit_configuration:
  type: DECOUPLED
  valid_limits: [5000000, 10000000, 25000000, 50000000, 100000000, 250000000, 500000000]
  valid_deductibles: [25000, 50000, 100000, 250000, 500000, 1000000, 2500000]

# =============================================================================
# DEFAULT PRICING — ILF Curves and Deductible Factors
# =============================================================================
#
# Marine ILFs are moderate — between property (flat) and liability (steep).
# Hull losses are bounded by vessel value; liability and cargo can exceed.
# =============================================================================

default_pricing:
  base_limit_reference: 5000000
  base_deductible_reference: 100000
  taxes_fees_rate: 0.03
  by_product_type:
    - product_type: hull_machinery
      curve_type: standard
      ilf_curve:
        base_limit: 5000000
        factors:
          - {limit: 5000000, factor: 1.0}
          - {limit: 10000000, factor: 1.6}
          - {limit: 25000000, factor: 2.8}
          - {limit: 50000000, factor: 4.2}
          - {limit: 100000000, factor: 6.5}
          - {limit: 250000000, factor: 11.0}
          - {limit: 500000000, factor: 17.0}
      deductible_factors:
        - {deductible: 25000, factor: 1.25}
        - {deductible: 50000, factor: 1.12}
        - {deductible: 100000, factor: 1.0}
        - {deductible: 250000, factor: 0.85}
        - {deductible: 500000, factor: 0.72}
        - {deductible: 1000000, factor: 0.62}
        - {deductible: 2500000, factor: 0.52}

    - product_type: cargo
      curve_type: standard
      ilf_curve:
        base_limit: 5000000
        factors:
          - {limit: 5000000, factor: 1.0}
          - {limit: 10000000, factor: 1.5}
          - {limit: 25000000, factor: 2.5}
          - {limit: 50000000, factor: 3.8}
          - {limit: 100000000, factor: 5.8}
          - {limit: 250000000, factor: 10.0}
          - {limit: 500000000, factor: 15.0}
      deductible_factors:
        - {deductible: 25000, factor: 1.20}
        - {deductible: 50000, factor: 1.10}
        - {deductible: 100000, factor: 1.0}
        - {deductible: 250000, factor: 0.85}
        - {deductible: 500000, factor: 0.72}
        - {deductible: 1000000, factor: 0.62}
        - {deductible: 2500000, factor: 0.52}

    - product_type: pi_liability
      curve_type: standard
      ilf_curve:
        base_limit: 5000000
        factors:
          - {limit: 5000000, factor: 1.0}
          - {limit: 10000000, factor: 1.7}
          - {limit: 25000000, factor: 3.2}
          - {limit: 50000000, factor: 5.0}
          - {limit: 100000000, factor: 8.0}
          - {limit: 250000000, factor: 14.0}
          - {limit: 500000000, factor: 22.0}
      deductible_factors:
        - {deductible: 25000, factor: 1.25}
        - {deductible: 50000, factor: 1.12}
        - {deductible: 100000, factor: 1.0}
        - {deductible: 250000, factor: 0.85}
        - {deductible: 500000, factor: 0.72}
        - {deductible: 1000000, factor: 0.62}
        - {deductible: 2500000, factor: 0.52}

    - product_type: war_risks
      curve_type: standard
      ilf_curve:
        base_limit: 5000000
        factors:
          - {limit: 5000000, factor: 1.0}
          - {limit: 10000000, factor: 1.8}
          - {limit: 25000000, factor: 3.5}
          - {limit: 50000000, factor: 5.5}
          - {limit: 100000000, factor: 9.0}
          - {limit: 250000000, factor: 16.0}
          - {limit: 500000000, factor: 25.0}
      deductible_factors:
        - {deductible: 25000, factor: 1.25}
        - {deductible: 50000, factor: 1.12}
        - {deductible: 100000, factor: 1.0}
        - {deductible: 250000, factor: 0.85}
