              - {limit: 5000000, factor: 2.5}
              - {limit: 10000000, factor: 4.0}
          deductible_factors:
            - {deductible: 5000, factor: 1.10}
            - {deductible: 10000, factor: 1.0}
            - {deductible: 25000, factor: 0.90}
            - {deductible: 50000, factor: 0.80}
            - {deductible: 100000, factor: 0.70}
            - {deductible: 250000, factor: 0.60}
            - {deductible: 500000, factor: 0.52}

