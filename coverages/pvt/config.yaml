pvt:
  pvt_country_risk:
    metadata:
      name: "PVT \u2014 Country Risk"
      description: Default country-driven PVT
      version: 2.2.0
      product_types:
      - pvt_terrorism
      - pvt_sabotage
      - pvt_strikes_riots_civil_commotion
      applicable_markets:
      - global
      minimum_viable_input:
      - field: entity_name
        description: Legal name
      - field: primary_country
        description: ISO country of primary operations
      - field: sector
        description: energy / financial_services / defense / other
      - field: asset_tiv
        description: Asset TIV at risk
      - field: limit
        description: Requested limit in USD
      min_premium: 5000
      default_currency: USD
      model_specificity: 1
      routing_constraints: []
    direct_queries:
    - id: claims_history
      question: Has the insured had any claims in the past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: null
        applied: null
        note: Prior claims - review required
    - id: prior_coverage
      question: Does the insured have prior coverage?
      query_condition:
      - return: false
        action: FLAG
        override: null
        applied: null
        note: No prior coverage
    signal_registry:
    - id: website_quality
      inference_utility_function: website_quality_basefunction
      proxy_tier: INFERRED_PROXY
      expectation_level: UNIVERSAL
      three_layer_assessment:
        group_id: corporate_footprint
        risk:
          correlation_direction: positive
          weight: 0.1429
        loss:
          frequency:
            correlation_direction: negative
            weight: 0.1
          severity:
            correlation_direction: negative
            weight: 0.0429
        exposure:
          size:
            correlation_direction: positive
            weight: 0.0714
