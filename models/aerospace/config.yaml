    # ---------------------------------------------------------------------------
    # RED FLAG DEFINITIONS
    # ---------------------------------------------------------------------------
    # Conditions that trigger automatic referral or decline
    
    red_flags:
      auto_decline:
        - condition: "eu_safety_list_score < 30"
          message: "Operator on EU Air Safety List"
          
        - condition: "fatality_history_score < 30 AND accident_history_score < 30"
          message: "Severe accident/fatality history"
          
        - condition: "certificate_status_score < 40"
          message: "Operating certificate at risk"
          
        - condition: "direct_query.coverage_declined == true"
          message: "Prior coverage declined"
      
      auto_referral:
        - condition: "accident_history_score < 50"
          message: "Significant accident history"
          
        - condition: "enforcement_actions_score < 50"
          message: "Recent regulatory enforcement"
          
        - condition: "iosa_status_score < 40"
          message: "IOSA registration concerns"
          
        - condition: "conflict_zone_score < 50"
          message: "Conflict zone exposure"
          
        - condition: "direct_query.pending_claims == true"
          message: "Pending aviation claims"
          
        - condition: "direct_query.regulatory_action == true"
          message: "Pending regulatory action"
  
    # ---------------------------------------------------------------------------
    # GREEN FLAG DEFINITIONS
    # ---------------------------------------------------------------------------
    # Positive indicators that support approval
    
    green_flags:
      - condition: "alliance_membership_score >= 80"
        message: "Major airline alliance member"
        
      - condition: "accident_history_score >= 95 AND fatality_history_score >= 95"
        message: "Exceptional safety record"
        
      - condition: "iosa_status_score >= 90"
        message: "Current IOSA registration"
        
      - condition: "fleet_age_score >= 85"
        message: "Young, modern fleet"
        
      - condition: "sms_maturity_score >= 85"
        message: "Mature Safety Management System"
        
      - condition: "enforcement_actions_score >= 95"
        message: "Clean regulatory record"
