        inference_utility_function: industry_engagement_basefunction
        proxy_tier: DIRECT_OBSERVABLE
        three_layer_assessment:
          group_id: corporate_governance
          risk:
            correlation_direction: positive
            weight: 0.15

    # =========================================================================
    # GROUPS
    # Categorical modifiers and three-layer assessment groupings
    # =========================================================================
    groups:

      # -----------------------------------------------------------------------
      # CATEGORICAL GROUPS
      # Apply pricing modifiers (applied:), not scores
      # -----------------------------------------------------------------------
      categories:
        - id: "operator_type"
          label: "Operator Type"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "fleet_category"
          label: "Fleet category"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "fleet_size"
          label: "Fleet Size"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "regulatory_framework"
          label: "Regulatory Framework"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "iosa_status"
          label: "IOSA Status"
          description: ""
          impact: "MODIFIER"
          default_cat: "NOT_APPLICABLE"
          
      # -----------------------------------------------------------------------
      # THREE-LAYER ASSESSMENT GROUPS
      # Aggregate signals into scoring dimensions
      # Weights within each dimension must sum to 1.0
      # -----------------------------------------------------------------------
      three_layer_assessment:
        - id: "network_authority"
          label: "Network Authority"
          description: "Industry relationships and counterparty quality"
          risk:
            weight: 0.10
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90,  note: "Excellent network authority - modifier applied"}
  
        - id: "safety_record"
          label: "Safety Record"
          description: "Historical safety performance from public databases"
          risk:
            weight: 0.30
            score_conditions:
              - {threshold: 30, comparison: "<=", action: "REFER", override: 5,  note: "Unacceptable safety record"}
              - {threshold: 45, comparison: "<=", action: "REFER", override: 4,  note: "Significant safety concerns"}
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.85, note: "Excellent safety record - modifier applied"}
  
        - id: "regulatory_compliance"
          label: "Regulatory Compliance"
          description: "Certificate status, enforcement actions, audit results"
          risk:
            weight: 0.20
            score_conditions:
              - {threshold: 35, comparison: "<=", action: "REFER", override: 5, note: "Severe regulatory deficiencies"}
              - {threshold: 50, comparison: "<=", action: "REFER", override: 4, note: "Material regulatory concerns"}
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.85, note: "Excellent regulatory compliance - modifier applied"}
  
        - id: "operational_quality"
          label: "Operational Quality"
          description: "Observable operational metrics"
          risk:
            weight: 0.15
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent operational quality - modifier applied"}
  
        - id: "fleet_quality"
          label: "Fleet Quality"
          description: "Aircraft age, composition, maintenance indicators"
          risk:
            weight: 0.10
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent fleet quality - modifier applied"}
  
        - id: "financial_stability"
          label: "Financial Stability"
          description: "Public financial indicators"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent financial stability - modifier applied"}
  
        - id: "route_risk"
          label: "Route Risk"
          description: "Geographic and operational risk exposure"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 30, comparison: "<=", action: "REFER", override: 4, note: "Elevated route risk"}
              - {threshold: 20, comparison: "<=", action: "MODIFIER",  applied: 0.85, note: "Excellent route risk - modifier applied"}
  
        - id: "corporate_governance"
          label: "Corporate Governance"
          description: "Management quality and safety culture indicators"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 20, comparison: "<=", action: "MODIFIER", applied: 0.90, note: "Excellent corporate governance - modifier applied"}
         
    # =========================================================================
    # RISK TIER BANDS
    # Maps composite risk score (0-1000) to pricing tiers
    # =========================================================================
    risk_tier_bands:
      bands:
        - id: 1
          label: "PREFERRED"
          description: "Excellent risk - automatic approval, preferred pricing"
          interpretation:
            bands: {min: 800, max: 1000}
            action: "APPROVE"
            application: {method: "PREMIUM_BASE", value: 1200}

        - id: 2
          label: "STANDARD_PLUS"
          description: "Good risk - automatic approval, standard pricing"
          interpretation:
            bands: {min: 650, max: 799}
            action: "APPROVE"
            application: {method: "PREMIUM_BASE", value: 1800}

        - id: 3
          label: "STANDARD"
          description: "Average risk - may require referral"
          interpretation:
            bands: {min: 500, max: 649}
            action: "REFER"
            application: {method: "PREMIUM_BASE", value: 2800}

        - id: 4
          label: "SUBSTANDARD"
          description: "Elevated risk - requires senior review"
          interpretation:
            bands: {min: 350, max: 499}
            action: "REFER"
            application: {method: "PREMIUM_BASE", value: 4500}

        - id: 5
          label: "DECLINE"
          description: "Unacceptable risk - decline"
          interpretation:
            bands: {min: 0, max: 349}
            action: "DECLINE"
            application: {method: "PREMIUM_BASE", value: 8000}

    # =========================================================================
    # LOSS TIER BANDS
    # Maps composite loss score (0-100) to pricing modifiers
    # Calculation: (frequency_score × frequency_weight) + (severity_score × severity_weight)
    # Result maps to band, constrained by floor/cap
    # =========================================================================
    loss_tier_bands:
      bands:
        - id: 1
          label: "VERY_LOW"
          description: "Very low risk of loss"
          interpretation:
            bands: {min: 80, max: 100}
            application:
              frequency_modifier: 0.70
              severity_modifier: 0.80

        - id: 2
          label: "LOW"
          description: "Low risk of loss"
          interpretation:
            bands: {min: 60, max: 79}
            application:
              frequency_modifier: 0.85
              severity_modifier: 0.90

        - id: 3
          label: "MODERATE"
          description: "Moderate risk of loss"
          interpretation:
            bands: {min: 40, max: 59}
            application:
              frequency_modifier: 1.00
              severity_modifier: 1.00

        - id: 4
          label: "ELEVATED"
          description: "Elevated risk of loss"
          interpretation:
            bands: {min: 20, max: 39}
            application:
              frequency_modifier: 1.15
              severity_modifier: 1.15

        - id: 5
          label: "HIGH"
          description: "High risk of loss"
          interpretation:
            bands: {min: 0, max: 19}
            application:
              frequency_modifier: 1.35
              severity_modifier: 1.40
      constraints:
        floor: 0.55
        cap: 1.60

    # =========================================================================
    # EXPOSURE TIER BANDS
    # Maps exposure scores to size and complexity modifiers
    # Calculation: (size_modifier × size_weight) + (complexity_modifier × complexity_weight)
    # =========================================================================
    exposure:
      size:
        weight: 0.60
        bands:
          - id: 1
            label: "MICRO"
            description: "Micro exposure value ($0 - $1M)"
            interpretation:
              bands: {min: 0, max: 20}
              application: {method: "MODIFIER", applied: 0.50, implied_thresholds: {min: 0, max: 1000000}}

          - id: 2
            label: "SMALL"
            description: "Small exposure value ($1M - $10M)"
            interpretation:
              bands: {min: 21, max: 40}
              application: {method: "MODIFIER", applied: 0.75, implied_thresholds: {min: 1000000, max: 10000000}}

          - id: 3
            label: "MEDIUM"
            description: "Medium exposure value ($10M - $50M)"
            interpretation:
              bands: {min: 41, max: 60}
              application: {method: "MODIFIER", applied: 1.00, implied_thresholds: {min: 10000000, max: 50000000}}

          - id: 4
            label: "LARGE"
            description: "Large exposure value ($50M - $250M)"
            interpretation:
              bands: {min: 61, max: 80}
              application: {method: "MODIFIER", applied: 1.50, implied_thresholds: {min: 50000000, max: 250000000}}

          - id: 5
            label: "VERY_LARGE"
            description: "Very large exposure value ($250M+)"
            interpretation:
              bands: {min: 81, max: 100}
              application: {method: "MODIFIER", applied: 2.50, implied_thresholds: {min: 250000000, max: 1000000000}}

      complexity:
        weight: 0.40
        bands:
          - id: 1
            label: "SIMPLE"
            description: "Simple operational complexity"
            interpretation:
              bands: {min: 0, max: 20}
              application: {method: "MODIFIER", applied: 0.85}

          - id: 2
            label: "MODERATE"
            description: "Moderate operational complexity"
            interpretation:
              bands: {min: 21, max: 40}
              application: {method: "MODIFIER", applied: 0.95}

          - id: 3
            label: "COMPLEX"
            description: "Complex operations"
            interpretation:
              bands: {min: 41, max: 60}
              application: {method: "MODIFIER", applied: 1.10}

          - id: 4
            label: "HIGHLY_COMPLEX"
            description: "Highly complex operations"
            interpretation:
              bands: {min: 61, max: 80}
              application: {method: "MODIFIER", applied: 1.30}

          - id: 5
            label: "EXTREMELY_COMPLEX"
            description: "Extremely complex operations"
            interpretation:
              bands: {min: 81, max: 100}
              application: {method: "MODIFIER", applied: 1.60}

    # =========================================================================
    # LIMIT BANDINGS
    # Standard limit/deductible combinations
    # =========================================================================
    limit_bandings:
      - id: 1
        limit: 10000000
        deductible: 500000

      - id: 2
        limit: 25000000
        deductible: 1000000

      - id: 3
        limit: 50000000
        deductible: 2000000

      - id: 4
        limit: 100000000
        deductible: 5000000

      - id: 5
        limit: 250000000
        deductible: 10000000

    # =========================================================================
    # PRICING PARAMETERS
    # Product-type-specific ILF curves reflecting different loss development
    # =========================================================================
    pricing:

      by_product_type:
        # -----------------------------------------------------------------------
        # AVIATION HULL - Physical damage to aircraft
        # Moderate curve; hull value based, mix of attritional and total loss
        # -----------------------------------------------------------------------
        aviation_hull:
          ilf_curve:
            base_limit: 10000000
            factors:
              - {limit: 10000000, factor: 1.00}
              - {limit: 25000000, factor: 2.00}
              - {limit: 50000000, factor: 3.50}
              - {limit: 100000000, factor: 6.00}
              - {limit: 250000000, factor: 12.00}
              - {limit: 500000000, factor: 20.00}
              - {limit: 1000000000, factor: 35.00}
          deductible_credits:
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.05}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.10}
            - {min_pct: 0.020, max_pct: 0.050, credit: 0.15}
            - {min_pct: 0.050, max_pct: null, credit: 0.20}

        # -----------------------------------------------------------------------
        # AVIATION LIABILITY - Third party, passenger, cargo
        # Steeper curve; catastrophic potential, regulatory exposure
        # -----------------------------------------------------------------------
        aviation_liability:
          ilf_curve:
            base_limit: 10000000
            factors:
              - {limit: 10000000, factor: 1.00}
              - {limit: 25000000, factor: 2.30}
              - {limit: 50000000, factor: 4.20}
              - {limit: 100000000, factor: 7.50}
              - {limit: 250000000, factor: 15.50}
              - {limit: 500000000, factor: 27.00}
              - {limit: 1000000000, factor: 48.00}
          deductible_credits:
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.04}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.08}
            - {min_pct: 0.020, max_pct: 0.050, credit: 0.12}
            - {min_pct: 0.050, max_pct: null, credit: 0.18}

        # -----------------------------------------------------------------------
        # HULL & LIABILITY COMBINED - Full aviation coverage
        # Weighted average of hull and liability curves
        # -----------------------------------------------------------------------
        aviation_hull_liability_combined:
          ilf_curve:
            base_limit: 10000000
            factors:
              - {limit: 10000000, factor: 1.00}
              - {limit: 25000000, factor: 2.15}
              - {limit: 50000000, factor: 3.85}
              - {limit: 100000000, factor: 6.75}
              - {limit: 250000000, factor: 13.75}
              - {limit: 500000000, factor: 23.50}
              - {limit: 1000000000, factor: 41.50}
          deductible_credits:
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.05}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.09}
            - {min_pct: 0.020, max_pct: 0.050, credit: 0.14}
            - {min_pct: 0.050, max_pct: null, credit: 0.19}

      # Shared across all product types
      taxes_fees_rate: 0.05

  # ===========================================================================
  # AEROSPACE SME - Small/Medium Enterprise Segment
  # ===========================================================================
  # Target: Smaller operators with hull value under $50M
  # Routing: hull_value <= $50M, limit <= $10M
  # Specificity: 2 (more specific than general)
  # ===========================================================================
  aerospace_sme:
    metadata:
      name: "DSI Aerospace SME Model"
      description: "Aviation coverage for small/medium operators with hull value under $50M"
      version: "2.2.0"
      product_types:
        - "aviation_hull"
        - "aviation_liability"
        - "aviation_hull_liability_combined"
      applicable_markets: ["us", "uk", "eu", "apac", "latam", "mea"]
      minimum_viable_input:
        required:
          - field: "client_name"
            description: "Client name (domain optional for discovery)"
          - field: "product_type"
            description: "One of: aviation_hull, aviation_liability, aviation_hull_liability_combined"
          - field: "limit"
            description: "Requested limit in USD"
          - field: "hull_value"
            description: "Total hull value in USD"
      min_premium: 15000
      default_currency: "USD"
      # MULTIPLEXER SUPPORT (Phase V4)
      model_specificity: 2  # Segment-Specific - SME operators
      routing_constraints:
        - field: "hull_value"
          operator: "<="
          value: 50000000
          required_in_input: true
        - field: "limit"
          operator: "<="
          value: 10000000
          required_in_input: true

    direct_queries:
      - id: "pending_claims"
        question: "Are there any pending aviation liability claims exceeding $500K?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Pending claims >$500K"}

      - id: "regulatory_action"
        question: "Is there any pending regulatory enforcement action against the operator?"
        query_condition:
          - {return: true, action: "REFER", override: 5, applied: null, note: "Pending regulatory enforcement"}

      - id: "coverage_declined"
        question: "Has aviation coverage been declined or non-renewed in the past 3 years?"
        query_condition:
          - {return: true, action: "REFER", override: 5, applied: null, note: "Prior declination"}

      - id: "fleet_change"
        question: "Are there planned fleet changes exceeding 30% in the next 12 months?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Major fleet change planned"}

      - id: "route_expansion"
        question: "Is there planned expansion into conflict zones or sanctioned regions?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Conflict zone expansion"}

      - id: "ownership_change"
        question: "Has there been a change in majority ownership in the past 12 months?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Recent ownership change"}

    signal_registry:
      - id: operator_type
        inference_utility_function: operatortype_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: operator_type
          source: metadata.operator_type
          features:
            - {cat: "CHARTER_OPERATOR", label: "Charter Operator", applied: 1.15}
            - {cat: "CORPORATE_FLIGHT", label: "Corporate Flight Department", applied: 1.05}
            - {cat: "HELICOPTER_OPERATOR", label: "Helicopter Operator", applied: 1.30}
            - {cat: "FLIGHT_SCHOOL", label: "Flight Training Organization", applied: 1.40}
            - {cat: "PRIVATE_OWNER", label: "Private Owner/Operator", applied: 1.25}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: fleet_category
        inference_utility_function: fleetcategory_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: fleet_category
          source: metadata.fleet_category
          features:
            - {cat: "TURBOPROP", label: "Turboprop", applied: 0.95}
            - {cat: "BUSINESS_JET", label: "Business Jet", applied: 1.10}
            - {cat: "HELICOPTER", label: "Helicopter", applied: 1.25}
            - {cat: "PISTON", label: "Piston Aircraft", applied: 1.15}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: fleet_size
        inference_utility_function: fleetsize_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: fleet_size
          source: metadata.fleet_size
          features:
            - {cat: "SINGLE", label: "Single Aircraft", applied: 1.20}
            - {cat: "MICRO", label: "Micro Fleet (2-5)", applied: 1.10}
            - {cat: "SMALL", label: "Small Fleet (6-20)", applied: 1.00}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: regulatory_framework
        inference_utility_function: regulatoryframework_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: regulatory_framework
          source: metadata.regulatory_framework
          features:
            - {cat: "FAA", label: "FAA (United States)", applied: 1.00}
            - {cat: "EASA", label: "EASA (European Union)", applied: 1.00}
            - {cat: "CAA_UK", label: "CAA (United Kingdom)", applied: 1.00}
            - {cat: "TCCA", label: "TCCA (Canada)", applied: 1.00}
            - {cat: "CASA", label: "CASA (Australia)", applied: 1.05}
            - {cat: "OTHER_ICAO", label: "Other ICAO Compliant", applied: 1.15}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: "accident_history"
        inference_utility_function: accident_history_basefunction
        proxy_tier: DIRECT_OBSERVABLE
        three_layer_assessment:
          group_id: safety_record
          risk:
            correlation_direction: positive
            weight: 0.35
            score_conditions:
              - {threshold: 25, comparison: "<=", action: "REFER", override: 5, note: "Severe accident history"}
              - {threshold: 40, comparison: "<=", action: "REFER", override: 4, note: "Material accident history"}
          loss:
            frequency:
              correlation_direction: positive
              weight: 0.35
            severity:
              correlation_direction: positive
              weight: 0.40

      - id: "incident_history"
        inference_utility_function: incident_history_basefunction
        proxy_tier: DIRECT_OBSERVABLE
        three_layer_assessment:
          group_id: safety_record
          risk:
            correlation_direction: positive
            weight: 0.25
          loss:
            frequency:
              correlation_direction: positive
              weight: 0.30

      - id: "fatality_history"
        inference_utility_function: fatality_history_basefunction
        proxy_tier: DIRECT_OBSERVABLE
        three_layer_assessment:
          group_id: safety_record
          risk:
            correlation_direction: positive
            weight: 0.25
            score_conditions:
              - {threshold: 30, comparison: "<=", action: "REFER", override: 5, note: "Recent fatal accidents"}
          loss:
            severity:
              correlation_direction: positive
              weight: 0.45

      - id: "investigation_findings"
        inference_utility_function: investigation_finding_basefunction
        proxy_tier: DIRECT_OBSERVABLE
        three_layer_assessment:
          group_id: safety_record
          risk:
            correlation_direction: positive
            weight: 0.15
          loss:
            frequency:
              correlation_direction: positive
              weight: 0.15

      - id: "certificate_status"
        inference_utility_function: certificate_status_basefunction
        proxy_tier: DIRECT_OBSERVABLE
        three_layer_assessment:
          group_id: regulatory_compliance
          risk:
            correlation_direction: positive
            weight: 0.35
            score_conditions:
              - {threshold: 30, comparison: "<=", action: "REFER", override: 5, note: "Certificate at risk"}
              - {threshold: 50, comparison: "<=", action: "REFER", override: 4, note: "Certificate concerns"}
          loss:
            frequency:
              correlation_direction: positive
              weight: 0.25

      - id: "enforcement_actions"
        inference_utility_function: enforcement_action_basefunction
        proxy_tier: DIRECT_OBSERVABLE
        three_layer_assessment:
          group_id: regulatory_compliance
          risk:
            correlation_direction: positive
            weight: 0.30
            score_conditions:
              - {threshold: 25, comparison: "<=", action: "REFER", override: 5, note: "Severe enforcement history"}
              - {threshold: 45, comparison: "<=", action: "REFER", override: 4, note: "Material enforcement actions"}
          loss:
            frequency:
              correlation_direction: positive
              weight: 0.30

      - id: "ramp_inspection"
        inference_utility_function: ramp_inspection_basefunction
        proxy_tier: DIRECT_OBSERVABLE
        three_layer_assessment:
          group_id: regulatory_compliance
          risk:
