    groups:
      categories:
      - id: industry_classification
        label: Industry Classification
        description: Industry classification derived from public records
        impact: MODIFIER
        default_cat: OTHER
      - id: size_band
        label: Size Band
        description: Company size classification
        impact: MODIFIER
        default_cat: OTHER
      - id: geography
        label: Geography
        description: Primary operational geography
        impact: MODIFIER
        default_cat: OTHER
      three_layer_assessment:
      - id: network_authority
        label: Network Authority
        description: Industry relationships, partnerships, and counterparty quality
        risk:
          weight: 0.15
        loss:
          weight: 0.15
          score_conditions:
          - threshold: 80
            comparison: '>='
            action: MODIFIER
            applied: 0.9
            note: Strong network authority - loss credit
        exposure:
          weight: 0.15
      - id: technical_infrastructure
        label: Technical Infrastructure
        description: Observable technical security implementation
        risk:
          weight: 0.35
          score_conditions:
          - threshold: 30
            comparison: <=
            action: REFER
            override: 5
            note: Critical technical deficiencies
          - threshold: 45
            comparison: <=
            action: REFER
            override: 4
            note: Significant technical concerns
        loss:
          weight: 0.35
          score_conditions:
          - threshold: 30
            comparison: <=
            action: MODIFIER
            applied: 1.2
            note: Poor technical infrastructure - loss loading
        exposure:
          weight: 0.35
      - id: corporate_footprint
        label: Corporate Footprint
        description: Signals from company's digital presence and security posture
        risk:
          weight: 0.15
          score_conditions:
          - threshold: 20
            comparison: <=
            action: MODIFIER
            applied: 0.9
            note: Excellent corporate footprint - modifier applied
        loss:
          weight: 0.25
        exposure:
          weight: 0.25
      - id: public_record
        label: Public Record
        description: Breach history, regulatory actions, and public disclosures
        risk:
          weight: 0.25
          score_conditions:
          - threshold: 30
            comparison: <=
            action: REFER
            override: 5
            note: Severe breach/regulatory history
          - threshold: 45
            comparison: <=
            action: REFER
            override: 4
            note: Material breach history
        loss:
          weight: 0.15
          score_conditions:
          - threshold: 35
            comparison: <=
            action: MODIFIER
            applied: 1.25
            note: Severe breach history - loss loading
        exposure:
          weight: 0.15
      - id: structured_data
        label: Structured Data
        description: Third-party security ratings and scores
        risk:
          weight: 0.1
          score_conditions:
          - threshold: 20
            comparison: <=
            action: MODIFIER
            applied: 0.9
            note: Excellent structured data scores - modifier applied
        loss:
          weight: 0.1
        exposure:
          weight: 0.1
