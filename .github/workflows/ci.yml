  summary:
    name: Build Summary
    runs-on: ubuntu-latest
#    needs: [lint, test, security, build-docker, integration-tests]
    needs: [lint, test]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "=== Job Results ==="
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
#          echo "Security: ${{ needs.security.result }}"
#          echo "Docker Build: ${{ needs.build-docker.result }}"
#          echo "Integration Tests: ${{ needs.integration-tests.result }}"
  
      - name: Download pytest reports
        if: ${{ needs.test.result != 'skipped' }}
        uses: actions/download-artifact@v4
        with:
          name: pytest-report-*
          merge-multiple: true
          path: reports
  
      # Summarise failing tests across all matrix runs
      - name: Summarise failing tests
        if: ${{ needs.test.result == 'failure' }}
        run: |
          echo "=== Detailed Test Failures ==="
          python - << 'EOF'
          import glob
          import os
          import xml.etree.ElementTree as ET

          reports_dir = "reports"
          xml_files = sorted(glob.glob(os.path.join(reports_dir, "pytest-report-*.xml")))

          if not xml_files:
              print("No JUnit XML files found. Skipping summary.")
              raise SystemExit(0)

          failures_out = []
          for xml_path in xml_files:
              py_ver = os.path.basename(xml_path).replace("pytest-report-", "").replace(".xml", "")
              try:
                  tree = ET.parse(xml_path)
                  root = tree.getroot()
              except Exception as e:
                  failures_out.append(f"\n---\n[{py_ver}] Failed to parse {xml_path}: {e}")
                  continue

              for testcase in root.findall('.//testcase'):
                  for failure in testcase.findall('failure'):
                      name = testcase.attrib.get('name')
                      classname = testcase.attrib.get('classname')
                      message = (failure.attrib.get('message') or '').strip()
                      details = (failure.text or '').strip()
                      formatted = (
                          f"\n---\n"
                          f"[Python {py_ver}] Test: {classname}.{name}\n"
                          f"Message: {message}\n"
                          f"Details:\n{details}\n"
                      )
                      failures_out.append(formatted)

          if failures_out:
              print("\n".join(failures_out))
          else:
              print("No test failures 🎉")
          EOF

      - name: Report success
#        if: ${{ needs.lint.result == 'success' && needs.test.result == 'success' && needs.build-docker.result == 'success' }}
        if: ${{ needs.lint.result == 'success' && needs.test.result == 'success'}}
        run: echo "All checks passed! ✅"
  
      - name: Report failure
#        if: ${{ needs.lint.result == 'failure' || needs.test.result == 'failure' || needs.build-docker.result == 'failure' }}
        if: ${{ needs.lint.result == 'failure' || needs.test.result == 'failure'  }}
        run: |
          echo "Some checks failed! ❌"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
#          echo "Security: ${{ needs.security.result }}"
#          echo "Docker Build: ${{ needs.build-docker.result }}"
#          echo "Integration Tests: ${{ needs.integration-tests.result }}"
