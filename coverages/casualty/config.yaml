  casualty_environmental:
    metadata:
      name: DSI Environmental Liability Model
      description: "Environmental liability \u2014 pollution, remediation, regulatory defence, third-party claims"
      version: 2.3.0
      product_types:
      - environmental_liability
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name
        - field: product_type
          description: 'One of: general_liability, workers_compensation, commercial_auto, umbrella_excess, environmental_liability,
            products_liability'
        - field: limit
          description: Requested limit in USD
        - field: revenue
          description: Annual revenue in USD (basis for GL, environmental)
        - field: payroll
          description: Annual payroll in USD (basis for WC)
      min_premium: 20000
      default_currency: USD
      model_specificity: 3
      routing_constraints:
      - field: product_type
        operator: ==
        value: environmental_liability
        required_in_input: true
      - field: revenue
        operator: '>='
        value: 5000000
        required_in_input: true
    direct_queries:
    - id: known_contamination
      question: Are there any known pollution conditions at the insured site(s)?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: "Known contamination \u2014 pre-existing conditions"
    - id: superfund_prp
      question: Is the insured a named PRP at any CERCLA/Superfund site?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: CERCLA PRP status
    - id: ust_presence
