          weight: 0.20
          inference_utility_function: dispatch_reliability_basefunction
          critical: false
          score_condition: null
          
        - id: "crew_experience"
          name: "Crew Experience Indicators"
          description: "Average experience from public hiring data"
          weight: 0.15
          inference_utility_function: crew_experience_basefunction
          critical: false
          score_condition: null
          
        - id: "training_indicators"
          name: "Training Program Indicators"
          description: "Training investment signals"
          weight: 0.15
          inference_utility_function: training_indicators_basefunction
          critical: false
