# =============================================================================
# DSI Model Configuration - Financial Institutions Insurance
# =============================================================================
#
# This file defines the complete configuration for the financial institutions coverage type.
# It is the single source of truth for:
#   - Model structure and parameters
#   - Signal definitions and weights
#   - Pricing factors and thresholds
#   - Test profiles for actuarial validation
#
# Premium calculation follows DSI Foundational Principle 9: Signal -> Score -> Tier -> Price
#
# DSI PRINCIPLES APPLIED:
#   1. All signals must be externally observable (regulatory filings, public databases)
#   2. Direct queries are OPTIONAL - model works without them
#   3. Categorical features are inferred from charter/regulatory data
#   4. Tier determines base premium; modifiers adjust for exposure characteristics
#   5. FI is exceptionally suited to DSI due to comprehensive regulatory disclosure
#
# KEY DATA SOURCES:
#   - FFIEC (Federal Financial Institutions Examination Council)
#   - Call Reports (FDIC, OCC, Fed)
#   - SEC EDGAR (10-K, 10-Q, Proxy Statements)
#   - CFPB Consumer Complaint Database
#   - NCUA Credit Union Data
#   - State regulatory databases
#
# Version: 2.0.0
# Last Updated: 2025-12
# =============================================================================

financial_institutions:
  fi_general:
    metadata:
      name: "DSI Financial Institutions Insurance Model"
      description: "FI bond, professional liability, D&O, cyber coverage based on observable regulatory and financial signals"
      version: "2.0.0"
      coverage_types:
        - "financial_institution_bond"
        - "professional_liability"
        - "directors_officers"
        - "cyber_liability"
        - "employment_practices"
        - "fiduciary_liability"
      applicable_markets: ["us"]
      min_premium: 25000
      default_currency: "USD"

    # -------------------------------------------------------------------------
    # DIRECT OPTIONAL QUERIES
    # -------------------------------------------------------------------------
    direct_optional_queries:
      - id: "regulatory_action"
        question: "Any pending or recent (3 years) regulatory enforcement actions?"
        direct_condition: regulatory_action_true
        
      - id: "examination_issues"
        question: "Any MRAs/MRIAs outstanding from most recent examination?"
        direct_condition: examination_issues_true
        
      - id: "litigation_pending"
        question: "Any material litigation pending (class action, regulatory)?"
        direct_condition: litigation_pending_true
        
      - id: "cyber_incident"
        question: "Any reportable cyber incidents in past 24 months?"
        direct_condition: cyber_incident_true
        
      - id: "significant_growth"
        question: "Asset growth >20% in past 12 months?"
        direct_condition: significant_growth_true
        
      - id: "new_product_line"
        question: "Any significant new product lines launched in past 12 months?"
        direct_condition: new_product_true

    # -------------------------------------------------------------------------
    # CATEGORICAL FEATURES
    # -------------------------------------------------------------------------
    categorical_features:
      institution_type:
        description: "Type of financial institution from charter/registration"
        inference_method:
          primary: "charter_type_lookup"
          fallback: "regulatory_filing_analysis"
          sources:
            - {type: "api", provider: "ffiec", endpoint: "institutions/profile"}
            - {type: "api", provider: "fdic", endpoint: "institutions/search"}
            - {type: "api", provider: "ncua", endpoint: "credit_unions/search"}
            - {type: "api", provider: "sec", endpoint: "cik/search"}
            - {type: "api", provider: "finra", endpoint: "brokercheck/firm"}
          confidence_threshold: 0.95
          default_on_failure: "OTHER"
        values:
          - id: "MONEY_CENTER_BANK"
            label: "Money Center Bank"
            modifier: 1.50
            description: "G-SIB or major national bank (>$250B assets)"
            inference_criteria: {asset_min: 250000000000, gsib_list: true}
            
          - id: "REGIONAL_BANK"
            label: "Regional Bank"
            modifier: 1.20
            description: "Regional bank ($10B-$250B assets)"
            inference_criteria: {asset_range: [10000000000, 250000000000]}
            
          - id: "COMMUNITY_BANK"
            label: "Community Bank"
            modifier: 1.00
            description: "Community bank (<$10B assets)"
            inference_criteria: {asset_max: 10000000000, bank_charter: true}
            
          - id: "CREDIT_UNION"
            label: "Credit Union"
            modifier: 0.85
            description: "Federally or state-chartered credit union"
            inference_criteria: {ncua_charter: true}
            
          - id: "SAVINGS_INSTITUTION"
            label: "Savings Institution"
            modifier: 0.90
            description: "Thrift or savings bank"
            inference_criteria: {ots_charter: true}
            
          - id: "BROKER_DEALER"
            label: "Broker-Dealer"
            modifier: 1.40
            description: "SEC/FINRA registered broker-dealer"
            inference_criteria: {finra_registered: true, broker_dealer: true}
            
          - id: "INVESTMENT_ADVISER"
            label: "Investment Adviser"
            modifier: 1.25
            description: "SEC or state registered investment adviser"
            inference_criteria: {adv_filed: true}
            
          - id: "INSURANCE_COMPANY"
            label: "Insurance Company"
            modifier: 1.10
            description: "State-licensed insurance company"
            inference_criteria: {naic_registered: true}
            
          - id: "ASSET_MANAGER"
            label: "Asset Manager"
            modifier: 1.30
            description: "Investment company or fund manager"
            inference_criteria: {investment_company_act: true}
            
          - id: "FINTECH"
            label: "Fintech"
            modifier: 1.50
            description: "Technology-focused financial services"
            inference_criteria: {fintech_classification: true}
            
          - id: "MORTGAGE_COMPANY"
            label: "Mortgage Company"
            modifier: 1.35
            description: "Mortgage lender or servicer"
            inference_criteria: {nmls_registered: true, mortgage_primary: true}
            
          - id: "PAYMENT_PROCESSOR"
            label: "Payment Processor"
            modifier: 1.40
            description: "Payment processing or money transmission"
            inference_criteria: {money_transmitter_license: true}
            
          - id: "OTHER"
            label: "Other Financial Institution"
            modifier: 1.20
            description: "Other regulated financial entity"
            inference_criteria: {}

      regulatory_framework:
        description: "Primary regulatory authority"
        inference_method:
          primary: "charter_regulator_lookup"
          sources:
            - {type: "api", provider: "ffiec", endpoint: "institutions/regulator"}
            - {type: "api", provider: "fdic", endpoint: "institutions/regulator"}
            - {type: "registry", provider: "occ", endpoint: "institutions/list"}
          confidence_threshold: 0.99
          default_on_failure: "STATE"
        values:
          - {id: "OCC", label: "OCC (National Banks)", modifier: 1.00, description: "Office of the Comptroller of the Currency"}
          - {id: "FDIC", label: "FDIC (State Non-Member)", modifier: 1.00, description: "State banks not Fed members"}
          - {id: "FED", label: "Federal Reserve", modifier: 1.00, description: "State member banks, BHCs, FHCs"}
          - {id: "NCUA", label: "NCUA (Credit Unions)", modifier: 0.95, description: "National Credit Union Administration"}
          - {id: "SEC", label: "SEC", modifier: 1.10, description: "Securities and Exchange Commission"}
          - {id: "FINRA", label: "FINRA", modifier: 1.10, description: "Financial Industry Regulatory Authority"}
          - {id: "STATE", label: "State Regulated", modifier: 1.15, description: "State banking/insurance department"}
          - {id: "MULTI", label: "Multiple Regulators", modifier: 1.05, description: "Subject to multiple regulatory bodies"}

      asset_size_band:
        description: "Total asset size classification"
        inference_method:
          primary: "call_report_assets"
          fallback: "sec_filing_assets"
          sources:
            - {type: "api", provider: "ffiec", endpoint: "call_reports/summary"}
            - {type: "api", provider: "fdic", endpoint: "financials/summary"}
            - {type: "filing", provider: "sec_edgar", document_types: ["10-K", "10-Q"]}
            - {type: "api", provider: "ncua", endpoint: "call_reports/summary"}
          confidence_threshold: 0.99
          default_on_failure: "SMALL"
        values:
          - id: "MEGA"
            label: "Mega (>$250B)"
            modifier: 2.50
            asset_range: [250000000000, 999999999999999]
            
          - id: "LARGE"
            label: "Large ($50B-$250B)"
            modifier: 1.80
            asset_range: [50000000000, 250000000000]
            
          - id: "MID"
            label: "Mid-Size ($10B-$50B)"
            modifier: 1.30
            asset_range: [10000000000, 50000000000]
            
          - id: "SMALL"
            label: "Small ($1B-$10B)"
            modifier: 1.00
            asset_range: [1000000000, 10000000000]
            
          - id: "COMMUNITY"
            label: "Community (<$1B)"
            modifier: 0.80
            asset_range: [0, 1000000000]

      publicly_traded:
        description: "Whether institution is publicly traded"
        inference_method:
          primary: "sec_filing_check"
          sources:
            - {type: "api", provider: "sec_edgar", endpoint: "cik/lookup"}
            - {type: "api", provider: "nasdaq", endpoint: "screener"}
          confidence_threshold: 0.99
          default_on_failure: "PRIVATE"
        values:
          - {id: "PUBLIC", label: "Publicly Traded", modifier: 1.10, description: "SEC reporting company"}
          - {id: "PRIVATE", label: "Private", modifier: 1.00, description: "Non-SEC reporting"}

    # -------------------------------------------------------------------------
    # SIGNAL GROUPS
    # -------------------------------------------------------------------------
    signal_groups:
      - id: "network_authority"
        name: "Network Authority"
        description: "Quality of institutional relationships and counterparties"
        weight: 0.10
        test_scores: {excellent: 88, average: 68, poor: 38}
        critical: false
        score_condition: null
        
      - id: "regulatory_compliance"
        name: "Regulatory Compliance"
        description: "Examination results, enforcement actions, compliance ratings"
        weight: 0.25
        test_scores: {excellent: 95, average: 72, poor: 35}
        critical: true
        score_condition: regulatory_compliance_critical
        
      - id: "financial_condition"
        name: "Financial Condition"
        description: "Capital, asset quality, liquidity, earnings (CAMELS proxies)"
        weight: 0.20
        test_scores: {excellent: 92, average: 70, poor: 38}
        critical: true
        score_condition: financial_condition_critical
        
      - id: "governance"
        name: "Corporate Governance"
        description: "Board composition, executive stability, committee quality"
        weight: 0.15
        test_scores: {excellent: 88, average: 65, poor: 35}
        critical: false
        score_condition: null
        
      - id: "operational_risk"
        name: "Operational Risk"
        description: "Complaints, litigation, breach history, incidents"
        weight: 0.10
        test_scores: {excellent: 90, average: 68, poor: 32}
        critical: false
        score_condition: operational_risk_critical
        
      - id: "cyber_security"
        name: "Cyber Security"
        description: "Observable technical security posture"
        weight: 0.10
        test_scores: {excellent: 88, average: 65, poor: 35}
        critical: false
        score_condition: cyber_security_critical
        
      - id: "corporate_footprint"
        name: "Corporate Footprint"
        description: "Transparency, disclosure, investor relations"
        weight: 0.05
        test_scores: {excellent: 85, average: 62, poor: 35}
        critical: false
        score_condition: null
        
      - id: "structured_data"
        name: "Structured Data"
        description: "Third-party ratings and benchmarks"
        weight: 0.05
        test_scores: {excellent: 85, average: 65, poor: 40}
        critical: false
        score_condition: null

    # -------------------------------------------------------------------------
    # SIGNAL FEATURES
    # -------------------------------------------------------------------------
    signal_features:
      network_authority:
        - id: "correspondent_quality"
          name: "Correspondent Banking Quality"
          description: "Quality of correspondent banking relationships"
          weight: 0.20
          ttl: "semi_static"
          ttl_seconds: 2592000
          sources:
            - {type: "api", provider: "ffiec", endpoint: "correspondent/relationships"}
            - {type: "filing", provider: "call_report", schedule: "RC-E"}
          score_range: [0, 100]
          scoring_logic: {tier_1_correspondents: 100, major_regional: 85, community_network: 70, limited: 50}
          critical: false
          score_condition: null
          
        - id: "fhlb_membership"
          name: "FHLB Membership"
          description: "Federal Home Loan Bank membership and standing"
          weight: 0.10
          ttl: "semi_static"
          ttl_seconds: 2592000
          sources:
            - {type: "api", provider: "fhlbanks", endpoint: "members/search"}
          score_range: [0, 100]
          scoring_logic: {active_member_good_standing: 100, member_limited_access: 70, non_member_eligible: 50, non_member: 30}
          critical: false
          score_condition: null
          
        - id: "clearing_relationship"
          name: "Clearing Relationships"
          description: "Quality of clearing and settlement relationships"
          weight: 0.15
          ttl: "semi_static"
          ttl_seconds: 2592000
          sources:
            - {type: "api", provider: "dtcc", endpoint: "participants"}
            - {type: "api", provider: "fed", endpoint: "fedwire/participants"}
          score_range: [0, 100]
          scoring_logic: {direct_fed_access: 100, major_clearing: 85, indirect_access: 60}
          critical: false
          score_condition: null
          
        - id: "auditor_quality"
          name: "External Auditor Quality"
          description: "Quality tier of external auditor"
          weight: 0.20
          ttl: "static"
          ttl_seconds: 7776000
          sources:
            - {type: "filing", provider: "sec_edgar", document_types: ["10-K"]}
            - {type: "api", provider: "pcaob", endpoint: "firms/search"}
          score_range: [0, 100]
          scoring_logic: {big_4: 100, national_firm: 85, large_regional: 70, small_regional: 55, local: 40}
          critical: false
          score_condition: null
          
        - id: "legal_counsel"
          name: "Legal Counsel Quality"
          description: "Quality of primary legal counsel"
          weight: 0.10
          ttl: "static"
          ttl_seconds: 7776000
          sources:
            - {type: "filing", provider: "sec_edgar", document_types: ["10-K", "DEF 14A"]}
          score_range: [0, 100]
          scoring_logic: {amlaw_50: 100, amlaw_100: 85, regional_major: 70, local: 50}
          critical: false
          score_condition: null
          
        - id: "industry_association"
          name: "Industry Association Membership"
          description: "Active membership in industry associations"
          weight: 0.10
          ttl: "static"
          ttl_seconds: 7776000
          sources:
            - {type: "api", provider: "aba", endpoint: "members"}
            - {type: "api", provider: "icba", endpoint: "members"}
            - {type: "api", provider: "cuna", endpoint: "members"}
            - {type: "api", provider: "sifma", endpoint: "members"}
          score_range: [0, 100]
          scoring_logic: {multiple_active: 100, single_major: 80, regional_only: 60, none: 35}
          critical: false
          score_condition: null
          
        - id: "credit_rating"
          name: "Credit Rating"
          description: "Credit rating from major agencies"
          weight: 0.15
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "sp_global", endpoint: "ratings/banks"}
            - {type: "api", provider: "moodys", endpoint: "ratings/banks"}
            - {type: "api", provider: "fitch", endpoint: "ratings/banks"}
          score_range: [0, 100]
          scoring_logic: {aa_or_above: 100, a_range: 85, bbb_range: 70, bb_range: 50, below_bb: 30, not_rated: 55}
          critical: false
          score_condition: null

      regulatory_compliance:
        - id: "examination_rating"
          name: "Examination Rating Proxy"
          description: "Inferred examination quality from observable indicators"
          weight: 0.20
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "correlation", analyzer: "camels_proxy", inputs: ["capital", "asset_quality", "earnings", "liquidity"]}
            - {type: "api", provider: "fdic", endpoint: "problem_bank_list"}
          score_range: [0, 100]
          scoring_logic:
            strong_all_metrics: 100
            satisfactory_all: 85
            mixed_results: 65
            weak_single_area: 45
            weak_multiple: 25
            problem_list: 10
          critical: true
          score_condition: examination_rating_critical
          
        - id: "enforcement_action"
          name: "Enforcement Actions"
          description: "Formal enforcement actions (C&D, CMPs, consent orders)"
          weight: 0.25
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "occ", endpoint: "enforcement/actions"}
            - {type: "api", provider: "fdic", endpoint: "enforcement/actions"}
            - {type: "api", provider: "fed", endpoint: "enforcement/actions"}
            - {type: "api", provider: "cfpb", endpoint: "enforcement/actions"}
            - {type: "api", provider: "sec", endpoint: "litigation/releases"}
          score_range: [0, 100]
          scoring_logic:
            no_actions_10yr: 100
            no_actions_5yr: 90
            minor_resolved: 70
            significant_resolved: 50
            active_cmp: 30
            active_cd: 15
            multiple_active: 0
          critical: true
          score_condition: enforcement_action_critical
          
        - id: "informal_action"
          name: "Informal Actions"
          description: "MOUs, board resolutions, informal agreements"
          weight: 0.10
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "fdic", endpoint: "enforcement/informal"}
            - {type: "filing", provider: "sec_edgar", document_types: ["8-K"]}
          score_range: [0, 100]
          scoring_logic: {no_actions: 100, historic_resolved: 80, recent_resolved: 60, active_mou: 40}
          critical: false
          score_condition: null
          
        - id: "cra_rating"
          name: "CRA Rating"
          description: "Community Reinvestment Act examination rating"
          weight: 0.10
          ttl: "semi_static"
          ttl_seconds: 2592000
          sources:
            - {type: "api", provider: "ffiec", endpoint: "cra/ratings"}
          score_range: [0, 100]
          scoring_logic: {outstanding: 100, satisfactory: 80, needs_improvement: 40, substantial_noncompliance: 10}
          critical: false
          score_condition: null
          
        - id: "bsa_aml"
          name: "BSA/AML Compliance"
          description: "Bank Secrecy Act / Anti-Money Laundering compliance"
          weight: 0.15
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "fincen", endpoint: "enforcement/actions"}
            - {type: "api", provider: "occ", endpoint: "enforcement/bsa"}
            - {type: "api", provider: "ofac", endpoint: "sanctions/search"}
          score_range: [0, 100]
          scoring_logic:
            no_issues: 100
            minor_findings_resolved: 80
            significant_findings: 55
            enforcement_resolved: 35
            active_enforcement: 10
          critical: true
          score_condition: bsa_aml_critical
          
        - id: "fair_lending"
          name: "Fair Lending Compliance"
          description: "Fair lending and ECOA compliance history"
          weight: 0.10
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "cfpb", endpoint: "enforcement/fair_lending"}
            - {type: "api", provider: "doj", endpoint: "cases/fair_lending"}
            - {type: "api", provider: "ffiec", endpoint: "hmda/analysis"}
          score_range: [0, 100]
          scoring_logic: {no_issues: 100, minor_resolved: 75, significant_resolved: 50, active_investigation: 25}
          critical: false
          score_condition: null
          
        - id: "consumer_compliance"
          name: "Consumer Compliance"
          description: "UDAP/UDAAP and consumer protection compliance"
          weight: 0.10
          ttl: "dynamic"
          ttl_seconds: 86400
          sources:
            - {type: "api", provider: "cfpb", endpoint: "enforcement/udaap"}
            - {type: "api", provider: "ftc", endpoint: "cases/consumer"}
          score_range: [0, 100]
          scoring_logic: {no_issues: 100, minor_resolved: 75, cfpb_action_resolved: 45, active_action: 20}
          critical: false
          score_condition: null

      financial_condition:
        - id: "capital_ratio"
          name: "Capital Adequacy"
          description: "CET1, Tier 1, Total capital ratios vs requirements"
          weight: 0.20
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "ffiec", endpoint: "call_reports/capital"}
            - {type: "api", provider: "fdic", endpoint: "financials/capital"}
            - {type: "api", provider: "ncua", endpoint: "call_reports/capital"}
          score_range: [0, 100]
          scoring_logic:
            well_capitalized_buffer: 100
            well_capitalized: 85
            adequately_capitalized: 60
            undercapitalized: 25
            significantly_under: 10
            critically_under: 0
          critical: true
          score_condition: capital_ratio_critical
          
        - id: "asset_quality"
          name: "Asset Quality"
          description: "NPL ratio, charge-off rates, classified assets"
          weight: 0.20
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "ffiec", endpoint: "call_reports/asset_quality"}
            - {type: "api", provider: "fdic", endpoint: "financials/asset_quality"}
          score_range: [0, 100]
          scoring_logic:
            npl_under_1pct: 100
            npl_1_2pct: 80
            npl_2_3pct: 60
            npl_3_5pct: 40
            npl_over_5pct: 20
          critical: true
          score_condition: asset_quality_critical
          
        - id: "liquidity"
          name: "Liquidity Position"
          description: "Liquidity coverage, funding stability"
          weight: 0.15
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "ffiec", endpoint: "call_reports/liquidity"}
            - {type: "filing", provider: "sec_edgar", document_types: ["10-K", "10-Q"]}
          score_range: [0, 100]
          scoring_logic: {strong_lcr: 100, adequate_lcr: 80, satisfactory: 65, tight: 45, stressed: 25}
          critical: false
          score_condition: null
          
        - id: "earnings"
          name: "Earnings Quality"
          description: "ROA, ROE, net interest margin stability"
          weight: 0.15
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "ffiec", endpoint: "call_reports/income"}
            - {type: "api", provider: "fdic", endpoint: "financials/income"}
          score_range: [0, 100]
          scoring_logic:
            consistent_profitable: 100
            profitable_volatile: 80
            breakeven: 55
            loss_making_one_year: 40
            chronic_losses: 20
          critical: false
          score_condition: null
          
        - id: "concentration"
          name: "Loan Concentration"
          description: "Portfolio concentration risk (CRE, single borrower)"
          weight: 0.10
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "ffiec", endpoint: "call_reports/loans"}
            - {type: "api", provider: "fdic", endpoint: "financials/concentration"}
          score_range: [0, 100]
          scoring_logic:
            well_diversified: 100
            moderate_concentration: 75
            elevated_cre: 55
            high_concentration: 35
            extreme_concentration: 15
          critical: false
          score_condition: null
          
        - id: "interest_rate_risk"
          name: "Interest Rate Risk"
          description: "Sensitivity to interest rate changes"
          weight: 0.10
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "ffiec", endpoint: "call_reports/irr"}
            - {type: "filing", provider: "sec_edgar", document_types: ["10-K"]}
          score_range: [0, 100]
          scoring_logic: {low_sensitivity: 100, moderate: 75, elevated: 50, high: 30}
          critical: false
          score_condition: null
          
        - id: "growth_rate"
          name: "Growth Rate"
          description: "Asset and loan growth rate (rapid growth = risk)"
          weight: 0.10
          ttl: "semi_static"
          ttl_seconds: 604800
          sources:
            - {type: "api", provider: "ffiec", endpoint: "call_reports/trends"}
            - {type: "api", provider: "fdic", endpoint: "financials/trends"}
          score_range: [0, 100]
          scoring_logic:
            stable_0_10pct: 100
            moderate_10_15pct: 85
            elevated_15_20pct: 65
            rapid_20_30pct: 45
            hypergrowth_over_30pct: 25
            contraction: 60
          critical: false
          score_condition: null

      governance:
        - id: "board_independence"
          name: "Board Independence"
          description: "Independent director ratio and quality"
          weight: 0.20
          ttl: "semi_static"
          ttl_seconds: 2592000
          sources:
