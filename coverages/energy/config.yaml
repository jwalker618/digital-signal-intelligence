# =============================================================================
# DSI Model Configuration
# =============================================================================
#
# STRUCTURAL PRINCIPLES (per master_config_layout.yaml):
# 1. Signals defined once in signal_registry with group_id reference
# 2. source: score (default) uses 0-100 inference return
# 3. source: metadata.field uses inference metadata with bands/categories
# 4. Categorical groups apply modifiers (applied:), not scores
# 5. score_conditions (plural, banded) apply actions based on score thresholds
#    Actions: FLAG | MODIFIER | REFER
# 6. proxy_tier at signal level (DIRECT_OBSERVABLE | INFERRED_PROXY | COHORT_INFERENCE)
# 7. Normalisation handled by inference functions, not config
#
# AUGMENTED BY:
# - analysis_outputs/cyber_v{date}.yaml - empirically-derived parameters
# - schemas/organisational_graph.yaml - graph structure (coverage-agnostic)
#
# =============================================================================

energy:
  energy_general:
    metadata:
      name: "DSI Energy Technical Pricing Model"
      description: "Energy property and liability coverage based on observable safety, environmental, and operational signals"
      version: "2.2.0"
      product_types:
        - "property_damage"
        - "business_interruption"
        - "control_of_well"
        - "operators_extra_expense"
        - "third_party_liability"
        - "pollution_liability"
        - "removal_of_wreck"
      applicable_markets: ["us", "uk", "eu", "apac", "latam", "mena"]
      minimum_viable_input:
        required:
          - field: "client_name"
            description: "Client name (domain optional for discovery)"
          - field: "product_type"
            description: "One of: property_damage, business_interruption, control_of_well, operators_extra_expense, third_party_liability, pollution_liability, removal_of_wreck"
          - field: "limit"
            description: "Requested limit in USD"
          - field: "tiv"
            description: "Total Insured Value in USD"
      min_premium: 100000
      default_currency: "USD"
      # MULTIPLEXER SUPPORT (Phase V4)
      model_specificity: 1  # General/Base model - broad applicability
      routing_constraints: []  # No restrictions - accepts all submissions

    # =========================================================================
    # DIRECT QUERIES
    # Binary questions that cannot be externally observed (max 10)
    # Actions: FLAG | MODIFIER | REFER
    # =========================================================================
    direct_queries:
      - id: "major_incidents"
        question: "Any major incidents (explosion, blowout, major spill) in past 5 years?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Major incidents disclosed"}
      
      - id: "fatalities"
        question: "Any work-related fatalities in past 3 years?"
        query_condition:
          - {return: true, action: "REFER", override: 3, applied: null, note: "Fatalities disclosed"}
      
      - id: "regulatory_enforcement"
        question: "Any significant regulatory enforcement actions pending?"
        query_condition:
          - {return: true, action: "REFER", override: 4, applied: null, note: "Pending regulatory enforcement"}
      
      - id: "decommissioning_obligations"
        question: "Any significant unfunded decommissioning obligations?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Unfunded decommissioning obligations"}
      
      - id: "joint_venture_operator"
        question: "Are you the designated operator for JV assets?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "JV operator status"}

      - id: "third_party_contractor"
        question: "Do you use third-party contractors for drilling/completions?"
        query_condition:
          - {return: true, action: "FLAG", override: null, applied: null, note: "Third-party contractor usage"}

    # =========================================================================
    # SIGNAL REGISTRY
    # All signals defined once with group_id reference
    # proxy_tier at signal level; normalisation in inference functions
    # =========================================================================
    signal_registry:

      # -----------------------------------------------------------------------
      # CATEGORICAL SIGNALS
      # Return discrete categories that apply as pricing modifiers
      # -----------------------------------------------------------------------
      - id: operator_type
        inference_utility_function: operator_type_basefunction
        proxy_tier: INFERRED_PROXY
        categories:
          group_id: operator_type
          source: metadata.operator_type
          features:
            - {cat: "SUPERMAJOR", label: "Supermajor", applied: 0.75}
            - {cat: "MAJOR_INTEGRATED", label: "Major Integrated", applied: 0.85}
            - {cat: "LARGE_INDEPENDENT", label: "Large Independent", applied: 0.95}
            - {cat: "MID_INDEPENDENT", label: "Mid-Size Independent", applied: 1.00}
            - {cat: "SMALL_INDEPENDENT", label: "Small Independent", applied: 1.20}
            - {cat: "NATIONAL_OIL", label: "National Oil Company", applied: 0.90}
            - {cat: "MIDSTREAM_MAJOR", label: "Major Midstream", applied: 0.85}
            - {cat: "DOWNSTREAM_MAJOR", label: "Major Downstream", applied: 0.90}
            - {cat: "PRIVATE_EQUITY", label: "Private Equity Backed", applied: 1.15}
            - {cat: "UNKNOWN", label: "Unknown/New Operator", applied: 1.40}
            - {cat: "OTHER", label: "UNKNOWN", applied: 1.00}

      - id: operation_segment
