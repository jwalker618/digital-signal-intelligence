<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSI Coverage Comparison</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }

        .coverage-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .coverage-tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .coverage-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .coverage-tab.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(123, 44, 191, 0.2));
            border-color: #00d4ff;
            color: #fff;
        }

        .coverage-icon {
            font-size: 1.2rem;
            margin-right: 8px;
        }

        .coverage-detail {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        .coverage-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .coverage-title {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #00d4ff;
        }

        .coverage-desc {
            color: #888;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .info-section {
            margin-bottom: 20px;
        }

        .info-label {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 1rem;
            color: #fff;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 5px 12px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 15px;
            font-size: 0.8rem;
            color: #00d4ff;
        }

        .signal-groups-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title::before {
            content: '';
            display: block;
            width: 4px;
            height: 20px;
            background: #00d4ff;
            border-radius: 2px;
        }

        .signal-group {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .signal-group:last-child {
            margin-bottom: 0;
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .group-name {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .group-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .group-weight {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
        }

        .group-signals {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .signal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .signal-name {
            color: #aaa;
        }

        .signal-weight {
            color: #666;
            font-size: 0.8rem;
        }

        .weight-bar-container {
            height: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin: 20px 0;
            display: flex;
            overflow: hidden;
        }

        .weight-segment {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: rgba(255,255,255,0.8);
            transition: all 0.3s;
        }

        .weight-segment:hover {
            filter: brightness(1.2);
        }

        .comparison-table {
            width: 100%;
            margin-top: 40px;
            border-collapse: collapse;
        }

        .comparison-table th,
        .comparison-table td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .comparison-table th {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-weight: 600;
        }

        .comparison-table td:first-child {
            text-align: left;
            color: #888;
        }

        .check {
            color: #27ae60;
            font-size: 1.2rem;
        }

        .cross {
            color: #e74c3c;
            font-size: 1.2rem;
        }

        @media (max-width: 900px) {
            .coverage-detail {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

                <div id="signalGroups">

        let selectedCoverage = 'cyber';

        function renderTabs() {
            const container = document.getElementById('coverageTabs');
            container.innerHTML = Object.values(coverages).map(cov => `
                <div class="coverage-tab ${cov.id === selectedCoverage ? 'active' : ''}"
                     onclick="selectCoverage('${cov.id}')">
                    <span class="coverage-icon">${cov.icon}</span>
                    ${cov.name}
                </div>
            `).join('');
        }

        function renderCoverageInfo(coverage) {
            const container = document.getElementById('coverageInfo');
            container.innerHTML = `
                <div class="coverage-title">${coverage.icon} ${coverage.name}</div>
                <div class="coverage-desc">${coverage.description}</div>

                <div class="info-section">
                    <div class="info-label">Markets</div>
                    <div class="tag-list">
                        ${coverage.markets.map(m => `<span class="tag">${m}</span>`).join('')}
                    </div>
                </div>

                <div class="info-section">
                    <div class="info-label">Coverage Types</div>
                    <div class="tag-list">
                        ${coverage.coverageTypes.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                </div>

                <div class="info-section">
                    <div class="info-label">Minimum Premium</div>
                    <div class="info-value">${coverage.minPremium}</div>
                </div>

                <div class="info-section">
                    <div class="info-label">Signal Groups</div>
                    <div class="info-value">${coverage.groups.length} groups</div>
                </div>
            `;
        }

        function renderWeightBar(coverage) {
            const container = document.getElementById('weightBar');
            container.innerHTML = coverage.groups.map(group => `
                <div class="weight-segment"
                     style="width: ${group.weight * 100}%; background: ${group.color};"
                     title="${group.name}: ${(group.weight * 100).toFixed(0)}%">
                    ${(group.weight * 100).toFixed(0)}%
                </div>
            `).join('');
        }

        function renderSignalGroups(coverage) {
            const container = document.getElementById('signalGroups');
            container.innerHTML = coverage.groups.map(group => `
                <div class="signal-group">
                    <div class="group-header">
                        <div class="group-name">
                            <span class="group-color" style="background: ${group.color}"></span>
                            ${group.name}
                        </div>
                        <span class="group-weight">${(group.weight * 100).toFixed(0)}%</span>
                    </div>
                    <div class="group-signals">
                        ${group.signals.map(sig => `
                            <div class="signal-item">
                                <span class="signal-name">${sig}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderComparisonTable() {
            const container = document.getElementById('comparisonTable');
            const allCoverages = Object.values(coverages);

            // Get all unique group names
            const groupNames = [...new Set(allCoverages.flatMap(c => c.groups.map(g => g.name)))];

            let html = `
                <thead>
                    <tr>
                        <th>Signal Group</th>
                        ${allCoverages.map(c => `<th>${c.icon} ${c.name}</th>`).join('')}
                    </tr>
                </thead>
                <tbody>
            `;

            groupNames.forEach(groupName => {
                html += `<tr><td>${groupName}</td>`;
                allCoverages.forEach(cov => {
                    const group = cov.groups.find(g => g.name === groupName);
                    if (group) {
                        html += `<td style="color: ${group.color}">${(group.weight * 100).toFixed(0)}%</td>`;
                    } else {
                        html += `<td>-</td>`;
                    }
                });
                html += `</tr>`;
            });

            html += `</tbody>`;
            container.innerHTML = html;
        }

        function selectCoverage(covId) {
            selectedCoverage = covId;
            const coverage = coverages[covId];

            renderTabs();
            renderCoverageInfo(coverage);
            renderWeightBar(coverage);
            renderSignalGroups(coverage);
        }

        // Initialize
        renderTabs();
        selectCoverage('cyber');
        renderComparisonTable();

</body>
</html>
