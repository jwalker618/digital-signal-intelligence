version: '3.8'

# DSI Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # ==========================================================================
  # DSI API
  # ==========================================================================
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: dsi-api:${DSI_VERSION:-latest}
    container_name: dsi-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DSI_ENV=production
      - DSI_DEBUG=false
      - DSI_HOST=0.0.0.0
      - DSI_PORT=8000
      - DSI_WORKERS=4
      - DATABASE_URL=postgresql+asyncpg://dsi_user:${DB_PASSWORD}@postgres:5432/dsi_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - dsi-network

  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: dsi-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=dsi_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=dsi_db
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsi_user -d dsi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - dsi-network

  # ==========================================================================
  # Redis Cache
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: dsi-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - dsi-network

  # ==========================================================================
  # Nginx Reverse Proxy (Optional - for TLS termination)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: dsi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - dsi-network
    profiles:
      - with-nginx

# ==========================================================================
# Networks
# ==========================================================================
networks:
  dsi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
