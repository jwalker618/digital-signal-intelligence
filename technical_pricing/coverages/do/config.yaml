# =============================================================================
# DSI Model Configuration - Directors & Officers Insurance
# =============================================================================
#
# This file defines the complete configuration for the D&O coverage type.
# It is the single source of truth for:
#   - Model structure and parameters
#   - Signal definitions and weights
#   - Pricing factors and thresholds
#   - Test profiles for actuarial validation
#
# Premium calculation follows DSI Foundational Principle 9: Signal -> Score -> Tier -> Price
#
# DSI PRINCIPLES APPLIED:
#   1. All signals must be externally observable (SEC filings, court records, market data)
#   2. Direct queries are OPTIONAL - model works without them
#   3. Categorical features are inferred from public filings and market data
#   4. Tier determines base premium; modifiers adjust for exposure characteristics
#   5. D&O is uniquely suited to DSI due to extensive corporate governance disclosure
#
# KEY DATA SOURCES:
#   - SEC EDGAR (10-K, 10-Q, 8-K, DEF 14A proxy statements)
#   - PACER (federal court litigation)
#   - Stanford Securities Class Action Clearinghouse (SCAC)
#   - ISS, Glass Lewis governance ratings
#   - Credit rating agencies
#   - Stock exchanges and market data providers
#
# Version: 2.0.0
# Last Updated: 2025-12
# =============================================================================

directors_officers:
  do_general:
    metadata:
      name: "DSI Directors & Officers Insurance Model"
      description: "D&O liability coverage based on observable governance, financial, and litigation signals"
      version: "2.0.0"
      coverage_types:
        - "side_a"
        - "side_b"
        - "side_c"
        - "side_a_dic"
        - "employment_practices"
        - "fiduciary"
      applicable_markets: ["us", "uk", "eu", "apac"]
      min_premium: 10000
      default_currency: "USD"

    # -------------------------------------------------------------------------
    # DIRECT OPTIONAL QUERIES
    # -------------------------------------------------------------------------
    direct_optional_queries:
      - id: "pending_claims"
        question: "Are there any pending securities class actions or derivative suits?"
        direct_condition: pending_claims_true
        
      - id: "regulatory_investigation"
        question: "Is the company or any director/officer under regulatory investigation?"
        direct_condition: regulatory_investigation_true
        
      - id: "planned_transaction"
        question: "Is there a planned M&A, IPO, SPAC merger, or material transaction?"
        direct_condition: planned_transaction_true
        
      - id: "covenant_compliance"
        question: "Is the company in compliance with all debt covenants?"
        direct_condition: covenant_noncompliance
        
      - id: "executive_dispute"
        question: "Are there any disputes with current or former executives?"
        direct_condition: executive_dispute_true

    # -------------------------------------------------------------------------
    # CATEGORICAL FEATURES
    # -------------------------------------------------------------------------
    categorical_features:
      company_type:
        description: "Company classification based on public/private status and market cap"
        inference_method:
          primary: "sec_filing_analysis"
          fallback: "market_data_lookup"
          sources:
            - {type: "api", provider: "sec_edgar", endpoint: "cik/lookup"}
            - {type: "api", provider: "nasdaq", endpoint: "screener/market_cap"}
            - {type: "api", provider: "nyse", endpoint: "listings/search"}
            - {type: "api", provider: "pitchbook", endpoint: "companies/funding"}
            - {type: "api", provider: "crunchbase", endpoint: "organizations/funding"}
          confidence_threshold: 0.95
          default_on_failure: "PRIVATE_OTHER"
        values:
          - id: "PUBLIC_LARGE_CAP"
            label: "Public Large Cap"
            modifier: 2.50
            description: "Market cap >$10B, SEC reporting"
            inference_criteria: {sec_reporting: true, market_cap_min: 10000000000}
            
          - id: "PUBLIC_MID_CAP"
            label: "Public Mid Cap"
            modifier: 1.50
            description: "Market cap $2B-$10B"
            inference_criteria: {sec_reporting: true, market_cap_range: [2000000000, 10000000000]}
            
          - id: "PUBLIC_SMALL_CAP"
            label: "Public Small Cap"
            modifier: 1.00
            description: "Market cap $300M-$2B"
            inference_criteria: {sec_reporting: true, market_cap_range: [300000000, 2000000000]}
            
          - id: "PUBLIC_MICRO_CAP"
            label: "Public Micro Cap"
            modifier: 1.25
            description: "Market cap <$300M (elevated litigation risk)"
            inference_criteria: {sec_reporting: true, market_cap_max: 300000000}
            
          - id: "PRE_IPO"
            label: "Pre-IPO"
            modifier: 2.00
            description: "Filed S-1 or planning IPO within 12 months"
            inference_criteria: {s1_filed: true}
            
          - id: "SPAC"
            label: "SPAC"
            modifier: 3.50
            description: "Special Purpose Acquisition Company"
            inference_criteria: {spac_structure: true}
            
          - id: "PRIVATE_BACKED"
            label: "Private VC/PE Backed"
            modifier: 0.60
            description: "Private company with institutional backing"
            inference_criteria: {sec_reporting: false, institutional_backing: true}
            
          - id: "PRIVATE_OTHER"
            label: "Private Other"
            modifier: 0.50
            description: "Private company without institutional backing"
            inference_criteria: {sec_reporting: false, institutional_backing: false}
            
          - id: "NONPROFIT"
            label: "Nonprofit"
            modifier: 0.40
            description: "501(c)(3) or equivalent nonprofit"
            inference_criteria: {nonprofit_status: true}

      industry:
        description: "Industry classification from SIC/NAICS codes"
        inference_method:
          primary: "sec_sic_lookup"
          fallback: "website_nlp"
          sources:
            - {type: "api", provider: "sec_edgar", endpoint: "cik/sic"}
            - {type: "api", provider: "dnb", endpoint: "company/naics"}
            - {type: "scrape", target: "company_website", analyzer: "industry_classifier"}
          confidence_threshold: 0.85
          default_on_failure: "OTHER"
        values:
          - id: "CRYPTO_DIGITAL"
            label: "Crypto/Digital Assets"
            modifier: 2.50
            description: "Cryptocurrency, blockchain, digital assets"
            sic_codes: []
            keywords: ["crypto", "blockchain", "digital asset", "defi", "web3"]
            
          - id: "CANNABIS"
            label: "Cannabis"
            modifier: 2.00
            description: "Cannabis cultivation, processing, retail"
            sic_codes: []
            keywords: ["cannabis", "marijuana", "dispensary"]
            
          - id: "HEALTHCARE_PHARMA"
            label: "Healthcare/Pharma"
            modifier: 1.60
            description: "Pharmaceuticals, biotech, medical devices, healthcare services"
            sic_codes: [2833, 2834, 2835, 2836, 3841, 3842, 8000, 8011, 8062]
            
          - id: "FINANCIAL_SERVICES"
            label: "Financial Services"
            modifier: 1.40
            description: "Banks, insurance, investment management, fintech"
            sic_codes: [6000, 6020, 6021, 6022, 6029, 6035, 6099, 6141, 6159, 6162, 6163, 6200, 6211, 6282, 6311, 6321, 6324, 6331, 6351, 6361, 6399, 6411]
            
          - id: "TECHNOLOGY"
            label: "Technology"
            modifier: 1.25
            description: "Software, hardware, internet, semiconductors"
            sic_codes: [3571, 3572, 3575, 3576, 3577, 3578, 3661, 3663, 3674, 7370, 7371, 7372, 7373, 7374, 7375, 7379]
            
          - id: "ENERGY"
            label: "Energy"
            modifier: 1.15
            description: "Oil & gas, utilities, renewable energy"
            sic_codes: [1311, 1381, 1382, 1389, 2911, 4911, 4922, 4923, 4924, 4931, 4932, 4939, 4941]
            
          - id: "REAL_ESTATE"
            label: "Real Estate"
            modifier: 1.10
            description: "REITs, real estate development, property management"
            sic_codes: [6500, 6510, 6512, 6519, 6531, 6552, 6798]
            
          - id: "RETAIL_CONSUMER"
            label: "Retail/Consumer"
            modifier: 1.00
            description: "Retail, consumer products, restaurants"
            sic_codes: [5200, 5300, 5400, 5411, 5412, 5600, 5700, 5812, 5900]
            
          - id: "MANUFACTURING"
            label: "Manufacturing"
            modifier: 0.90
            description: "Industrial manufacturing, aerospace, automotive"
            sic_codes: [2000, 2011, 2013, 2015, 2020, 2024, 2026, 2030, 2033, 2040, 2050, 2060, 2070, 2080, 2090, 2100, 2200, 2300, 2400, 2500, 2600, 2700, 2800, 2900, 3000, 3100, 3200, 3300, 3400, 3500, 3600, 3700]
            
          - id: "OTHER"
            label: "Other"
            modifier: 1.00
            description: "Other industries"
            sic_codes: []

      stock_exchange:
        description: "Primary stock exchange listing"
        inference_method:
          primary: "exchange_listing_lookup"
          sources:
            - {type: "api", provider: "nasdaq", endpoint: "listings"}
            - {type: "api", provider: "nyse", endpoint: "listings"}
            - {type: "api", provider: "sec_edgar", endpoint: "filings/exchange"}
          confidence_threshold: 0.99
          default_on_failure: "NONE"
        values:
          - {id: "NYSE", label: "NYSE", modifier: 1.00}
          - {id: "NASDAQ", label: "NASDAQ", modifier: 1.00}
          - {id: "NYSE_AMERICAN", label: "NYSE American", modifier: 1.10}
          - {id: "OTC", label: "OTC Markets", modifier: 1.30}
          - {id: "FOREIGN", label: "Foreign Exchange", modifier: 1.15}
          - {id: "NONE", label: "Not Listed", modifier: 0.80}

    # -------------------------------------------------------------------------
    # SIGNAL GROUPS
    # -------------------------------------------------------------------------
    signal_groups:
      - id: "network_authority"
        name: "Network Authority"
        description: "Quality of professional relationships and institutional credibility"
        weight: 0.10
        test_scores: {excellent: 90, average: 68, poor: 38}
        critical: false
        score_condition: null
        
      - id: "governance"
        name: "Corporate Governance"
        description: "Board composition, structure, and shareholder rights"
        weight: 0.25
        test_scores: {excellent: 92, average: 70, poor: 35}
        critical: true
        score_condition: governance_critical
        
      - id: "financial"
        name: "Financial Integrity"
        description: "Audit quality, internal controls, financial reporting"
        weight: 0.20
        test_scores: {excellent: 95, average: 72, poor: 38}
        critical: true
        score_condition: financial_critical
        
      - id: "litigation"
        name: "Litigation Profile"
        description: "Securities litigation, regulatory actions, enforcement history"
        weight: 0.25
        test_scores: {excellent: 98, average: 75, poor: 30}
        critical: true
        score_condition: litigation_critical
        
      - id: "executive"
        name: "Executive Profile"
        description: "Executive stability, quality, and conduct"
        weight: 0.10
        test_scores: {excellent: 88, average: 68, poor: 40}
        critical: false
        score_condition: null
        
      - id: "corporate_footprint"
        name: "Corporate Footprint"
        description: "Investor relations, transparency, ESG commitment"
        weight: 0.05
        test_scores: {excellent: 85, average: 62, poor: 35}
        critical: false
        score_condition: null
        
      - id: "structured_data"
        name: "Structured Data"
        description: "Third-party governance and credit ratings"
        weight: 0.05
        test_scores: {excellent: 88, average: 65, poor: 40}
        critical: false
        score_condition: null

    # -------------------------------------------------------------------------
