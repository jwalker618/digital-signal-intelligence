          base_premium: 4000  # Per $1M limit
        - id: 2      
          label: "STANDARD"
          min_score: 650
          max_score: 799
          description: "Good governance - auto-approve at standard pricing"
          auto_approve: true
          auto_decline: false
          premium_generation_method: "base"
          base_premium: 6000
        - id: 3        
