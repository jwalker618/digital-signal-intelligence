  # ENERGY SME (SMALL ENERGY OPERATORS)
  # ===========================================================================
  energy_sme:
    metadata:
      name: DSI Energy SME Pricing Model
      description: Small energy operators — automated underwriting, BUNDLED pricing
      version: 2.2.0
      product_types:
      - combined_property_liability
      - pollution_liability
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mena
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: combined_property_liability, pollution_liability'
        - field: limit
          description: Requested limit in USD
        - field: tiv
          description: Total Insured Value in USD
      min_premium: 25000
      default_currency: USD
      model_specificity: 2
      routing_constraints:
      - field: tiv
        operator: "<="
        value: 100000000
        required_in_input: true
      - field: employee_count
        operator: "<="
        value: 500
        required_in_input: true

    direct_queries:
    - id: major_incidents
      question: Any major incidents (explosion, blowout, major spill) in past 5 years?
