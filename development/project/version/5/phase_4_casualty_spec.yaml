# =============================================================================
# DSI Coverage Expansion Spec — Phase 4: Casualty
# =============================================================================
#
# Machine-consumable spec for the CoverageExpansionGenerator.
# NEW coverage line — no existing config.
#
# Usage:
#   python -m infrastructure.builder.cli expand \
#       --spec development/project/version/5/phase_4_casualty_spec.yaml \
#       --write
#
# NOTE: Casualty is the most complex new coverage because sub-lines use
# DIFFERENT basis fields for premium calculation:
#   - General Liability    → revenue
#   - Workers Compensation → payroll
#   - Commercial Auto      → fleet_value
#   - Umbrella/Excess      → underlying_premium
#   - Environmental        → revenue
#
# Each config declares its own basis in risk_tier_bands. Routing constraints
# ensure mutual exclusivity so the multiplexer never misroutes.
#
# =============================================================================

coverage_line: casualty
coverage_key: commercial_casualty
phase: phase_4
description: "Phase 4 Commercial Casualty Coverage — 6 configurations"
version: "2.3.0"

# =============================================================================
# DEFAULTS
# =============================================================================

default_product_types:
  - general_liability
  - workers_compensation
  - commercial_auto
  - umbrella_excess
  - environmental_liability
  - products_liability

default_markets: [us, uk, eu, apac]
default_currency: USD
default_min_premium: 15000

default_minimum_viable_input:
  - field: client_name
    description: Client name
  - field: product_type
    description: "One of: general_liability, workers_compensation, commercial_auto, umbrella_excess, environmental_liability, products_liability"
  - field: limit
    description: Requested limit in USD
  - field: revenue
    description: Annual revenue in USD (basis for GL, environmental)
  - field: payroll
    description: Annual payroll in USD (basis for WC)

routing_field: casualty_segment

# =============================================================================
# DEFAULT TIER BANDS
# =============================================================================

default_risk_tier_bands:
  method: MULTIPLIER
  basis: revenue
  bands:
    - {id: 1, label: PREFERRED, min: 800, max: 1000, action: APPROVE, applied: 0.0015}
    - {id: 2, label: STANDARD_PLUS, min: 650, max: 799, action: APPROVE, applied: 0.0025}
    - {id: 3, label: STANDARD, min: 450, max: 649, action: APPROVE, applied: 0.0045}
    - {id: 4, label: SUBSTANDARD, min: 250, max: 449, action: REFER, applied: 0.0075}
    - {id: 5, label: DECLINE, min: 0, max: 249, action: DECLINE, applied: 0.0120}

default_loss_tier_bands:
  floor: 0.50
  cap: 1.8

default_exposure_bands:
  size_weight: 0.6
  complexity_weight: 0.4
  size_thresholds:
    - {label: MICRO, max_value: 2000000, applied: 0.5}
    - {label: SMALL, max_value: 25000000, applied: 0.75}
    - {label: MEDIUM, max_value: 250000000, applied: 1.0}
    - {label: LARGE, max_value: 1000000000, applied: 1.5}
    - {label: VERY_LARGE, max_value: 10000000000, applied: 2.5}

default_limit_configuration:
  type: DECOUPLED
  valid_limits: [1000000, 2000000, 5000000, 10000000, 25000000, 50000000, 100000000]
  valid_deductibles: [5000, 10000, 25000, 50000, 100000, 250000, 500000, 1000000]

# =============================================================================
# DEFAULT PRICING — ILF Curves and Deductible Factors
# =============================================================================
#
# Casualty ILFs are steeper than property but less steep than financial
# lines. Liability losses have longer tails and more uncertainty.
# =============================================================================

