            basis: revenue
      - id: 3
        label: STANDARD
        description: Average risk - may require referral
        interpretation:
          bands:
            min: 500
            max: 649
          action: REFER
          application:
            method: MULTIPLIER
            applied: 0.004
            basis: revenue
      - id: 4
        label: SUBSTANDARD
        description: Elevated risk - requires senior review
        interpretation:
          bands:
            min: 350
            max: 499
          action: REFER
          application:
            method: MULTIPLIER
            applied: 0.0068
            basis: revenue
      - id: 5
        label: DECLINE
        description: Unacceptable risk - decline
        interpretation:
          bands:
            min: 0
            max: 349
          action: DECLINE
          application:
            method: MULTIPLIER
            applied: 0.011
            basis: revenue
    loss_tier_bands:
      bands:
      - id: 1
        label: VERY_LOW
        description: Very low risk of loss
