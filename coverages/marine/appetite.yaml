# Marine Underwriting Appetite
# Owned by: Underwriting
# Scope: All marine configurations (marine_general)

appetite:
  max_single_limit: 1_000_000_000   # $1B max any one policy

  constraints:
    - field: hull_value
      operator: "<="
      value: 50_000_000_000         # $50B hull value
      reason: "Hull value exceeds marine underwriting authority"
