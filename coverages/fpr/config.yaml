financial_political_risk:
  fpr_trade_credit:
    metadata:
      name: DSI Trade Credit Insurance Model
      description: "Trade credit \u2014 buyer default, insolvency, protracted default, political risk on receivables"
      version: 2.3.0
      product_types:
      - trade_credit
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mea
      - africa
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name
        - field: product_type
          description: trade_credit
        - field: limit
          description: Requested limit in USD
        - field: turnover
          description: Annual insured turnover in USD (MULTIPLIER basis)
      min_premium: 25000
      default_currency: USD
      model_specificity: 3
      routing_constraints:
      - field: product_type
        operator: ==
        value: trade_credit
        required_in_input: true
      - field: turnover
        operator: '>='
        value: 5000000
        required_in_input: true
    direct_queries:
    - id: prior_bad_debts
      question: Have bad debt write-offs exceeded 2% of turnover in any of the past 3 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Elevated bad debt history
    - id: single_buyer_exposure
      question: Does any single buyer represent more than 20% of insured turnover?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Single buyer concentration >20%
    - id: emerging_market_exposure
      question: Is more than 40% of insured turnover to buyers in emerging/frontier markets?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: High emerging market buyer exposure
    - id: extended_terms
      question: Are payment terms exceeding 180 days offered to any buyers?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Extended payment terms exposure
    - id: whole_turnover
      question: Is this a whole-turnover policy (all buyers covered) or named-buyer only?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Policy structure classification
    signal_registry:
    - id: buyer_creditworthiness
      inference_utility_function: buyer_creditworthiness_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.3
          score_conditions:
          - action: REFER
            override: 4
            note: Buyer credit deterioration
            threshold: 25
            comparison: <=
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.25
          severity:
            correlation_direction: positive
            weight: 0.2
    - id: payment_terms_exposure
      inference_utility_function: payment_terms_exposure_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.15
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.15
          severity:
            correlation_direction: positive
            weight: 0.15
        exposure:
          size:
            correlation_direction: positive
            weight: 0.15
    - id: buyer_concentration
      inference_utility_function: buyer_concentration_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.15
          score_conditions:
          - action: FLAG
            note: High buyer concentration
            threshold: 30
            comparison: <=
        loss:
          severity:
            correlation_direction: positive
            weight: 0.2
        exposure:
          size:
            correlation_direction: positive
            weight: 0.2
    - id: country_risk_exposure
      inference_utility_function: country_risk_exposure_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.2
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.15
          severity:
            correlation_direction: positive
            weight: 0.2
        exposure:
          complexity:
            correlation_direction: positive
            weight: 0.15
    - id: trade_dispute_frequency
      inference_utility_function: trade_dispute_frequency_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.1
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.2
          severity:
            correlation_direction: positive
            weight: 0.1
    - id: sector_cyclicality
      inference_utility_function: sector_cyclicality_basefunction
      proxy_tier: COHORT_INFERENCE
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.1
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.1
        exposure:
          complexity:
            correlation_direction: positive
            weight: 0.1
    - id: sovereign_risk_rating
      inference_utility_function: sovereign_risk_rating_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      categories:
        group_id: public_record
        source: metadata.sovereign_risk_rating
        features:
        - cat: LOW
          label: Low Risk (OECD Core)
          applied: 0.6
        - cat: MODERATE
          label: Moderate (Emerging Market Stable)
          applied: 1.0
        - cat: HIGH
          label: High (Frontier/Volatile)
          applied: 1.5
        - cat: SEVERE
          label: Severe (Conflict/Failed State)
          applied: 2.2
    - id: expropriation_risk
      inference_utility_function: expropriation_risk_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: public_record
        risk:
          correlation_direction: positive
          weight: 0.25
          score_conditions:
          - action: REFER
            override: 4
            note: High expropriation risk jurisdiction
            threshold: 25
            comparison: <=
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.15
          severity:
            correlation_direction: positive
            weight: 0.3
    - id: currency_inconvertibility
      inference_utility_function: currency_inconvertibility_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: public_record
        risk:
          correlation_direction: positive
          weight: 0.2
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.2
          severity:
            correlation_direction: positive
            weight: 0.15
    - id: contract_frustration
      inference_utility_function: contract_frustration_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: public_record
        risk:
          correlation_direction: positive
          weight: 0.15
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.15
          severity:
            correlation_direction: positive
            weight: 0.15
        exposure:
          complexity:
            correlation_direction: positive
            weight: 0.1
    - id: political_violence_exposure
      inference_utility_function: political_violence_exposure_basefunction
      proxy_tier: INFERRED_PROXY
      three_layer_assessment:
        group_id: public_record
        risk:
          correlation_direction: positive
          weight: 0.15
          score_conditions:
          - action: REFER
            override: 4
            note: Active political violence zone
            threshold: 25
            comparison: <=
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.15
          severity:
            correlation_direction: positive
            weight: 0.2
    groups:
      three_layer_assessment:
      - id: structured_data
        label: Trade Credit Risk
        description: Buyer creditworthiness, payment behaviour, country risk, concentration, trade terms
        risk:
          weight: 0.4
        loss:
          weight: 0.4
        exposure:
          weight: 0.35
      - id: public_record
        label: Political Risk
        description: Sovereign risk, expropriation, currency inconvertibility, contract frustration, political violence
        risk:
          weight: 0.25
        loss:
          weight: 0.25
        exposure:
          weight: 0.3
      - id: corporate_footprint
        label: Corporate Footprint
        description: ''
        risk:
          weight: 0.2
        loss:
          weight: 0.15
        exposure:
          weight: 0.2
      - id: behavioural
        label: Firm Stability
        description: ''
        risk:
          weight: 0.15
        loss:
          weight: 0.2
        exposure:
          weight: 0.15
    risk_tier_bands:
      bands:
      - id: 1
        label: PREFERRED
        description: Excellent risk - automatic approval, preferred pricing
        interpretation:
          bands:
            min: 800
            max: 1000
          action: APPROVE
          application:
            method: MULTIPLIER
            applied: 0.002
            basis: turnover
      - id: 2
        label: STANDARD_PLUS
        description: Good risk - automatic approval, standard pricing
        interpretation:
          bands:
            min: 650
            max: 799
          action: APPROVE
          application:
            method: MULTIPLIER
            applied: 0.004
            basis: turnover
      - id: 3
        label: STANDARD
        description: Average risk - may require referral
        interpretation:
          bands:
            min: 500
            max: 649
          action: REFER
          application:
            method: MULTIPLIER
            applied: 0.007
            basis: turnover
      - id: 4
        label: SUBSTANDARD
        description: Elevated risk - requires senior review
        interpretation:
          bands:
            min: 350
            max: 499
          action: REFER
          application:
            method: MULTIPLIER
            applied: 0.012
            basis: turnover
      - id: 5
        label: DECLINE
        description: Unacceptable risk - decline
        interpretation:
          bands:
            min: 0
            max: 349
          action: DECLINE
          application:
            method: MULTIPLIER
            applied: 0.02
            basis: turnover
    loss_tier_bands:
      bands:
      - id: 1
        label: VERY_LOW
        description: Very low risk of loss
        interpretation:
          bands:
            min: 80
            max: 100
          application:
            frequency_modifier: 0.7
            severity_modifier: 0.8
      - id: 2
        label: LOW
        description: Low risk of loss
        interpretation:
          bands:
            min: 60
            max: 79
          application:
            frequency_modifier: 0.85
            severity_modifier: 0.9
      - id: 3
        label: MODERATE
        description: Moderate risk of loss
        interpretation:
          bands:
            min: 40
            max: 59
          application:
            frequency_modifier: 1.0
            severity_modifier: 1.0
      - id: 4
        label: ELEVATED
        description: Elevated risk of loss
        interpretation:
          bands:
            min: 20
            max: 39
          application:
            frequency_modifier: 1.15
            severity_modifier: 1.15
      - id: 5
        label: HIGH
        description: High risk of loss
        interpretation:
          bands:
            min: 0
            max: 19
          application:
            frequency_modifier: 1.35
            severity_modifier: 1.4
      constraints:
        floor: 0.45
        cap: 2.0
    exposure:
      size:
        weight: 0.6
        bands:
        - id: 1
          label: MICRO
          description: Micro exposure value
          interpretation:
            bands:
              min: 0
              max: 20
            application:
              method: MODIFIER
              applied: 0.5
              implied_thresholds:
                min: 0
                max: 5000000
        - id: 2
          label: SMALL
          description: Small exposure value
          interpretation:
            bands:
              min: 21
              max: 40
            application:
              method: MODIFIER
              applied: 0.75
              implied_thresholds:
                min: 5000000
                max: 25000000
        - id: 3
          label: MEDIUM
          description: Medium exposure value
          interpretation:
            bands:
              min: 41
              max: 60
            application:
              method: MODIFIER
              applied: 1.0
              implied_thresholds:
                min: 25000000
                max: 100000000
        - id: 4
          label: LARGE
          description: Large exposure value
          interpretation:
            bands:
              min: 61
              max: 80
            application:
              method: MODIFIER
              applied: 1.5
              implied_thresholds:
                min: 100000000
                max: 500000000
        - id: 5
          label: VERY_LARGE
          description: Very Large exposure value
          interpretation:
            bands:
              min: 81
              max: 100
            application:
              method: MODIFIER
              applied: 2.5
              implied_thresholds:
                min: 500000000
                max: 5000000000
      complexity:
        weight: 0.4
        bands:
        - id: 1
          label: SIMPLE
          description: Simple operational complexity
          interpretation:
            bands:
              min: 0
              max: 20
            application:
              method: MODIFIER
              applied: 0.85
        - id: 2
          label: MODERATE
          description: Moderate operational complexity
          interpretation:
            bands:
              min: 21
              max: 40
            application:
              method: MODIFIER
              applied: 0.95
        - id: 3
          label: COMPLEX
          description: Complex operational complexity
          interpretation:
            bands:
              min: 41
              max: 60
            application:
              method: MODIFIER
              applied: 1.1
        - id: 4
          label: HIGHLY_COMPLEX
          description: Highly complex operational complexity
          interpretation:
            bands:
              min: 61
              max: 80
            application:
              method: MODIFIER
              applied: 1.3
        - id: 5
          label: EXTREMELY_COMPLEX
          description: Extremely complex operational complexity
          interpretation:
            bands:
              min: 81
              max: 100
            application:
              method: MODIFIER
              applied: 1.6
    limit_configuration:
      type: DECOUPLED
      valid_limits:
      - 1000000
      - 2000000
      - 5000000
      - 10000000
      - 25000000
      - 50000000
      - 100000000
      - 250000000
      valid_deductibles:
      - 25000
      - 50000
      - 100000
      - 250000
      - 500000
      - 1000000
      - 2500000
    pricing:
      base_limit_reference: 5000000
      base_deductible_reference: 100000
      by_product_type:
        trade_credit:
          ilf_curve:
            anchor_limit: 5000000
            curve: bounded_exponential
            params:
              max_ilf: 5.0
              k: 0.02
          deductible_factors:
          - deductible: 25000
            factor: 1.15
          - deductible: 50000
            factor: 1.05
          - deductible: 100000
            factor: 1.0
          - deductible: 250000
            factor: 0.88
          - deductible: 500000
            factor: 0.78
          - deductible: 1000000
            factor: 0.68
          - deductible: 2500000
            factor: 0.58
    guardrails:
      modifier_floor: 0.1
      modifier_cap: 2.5
      max_premium_to_limit_ratio: 0.6
      max_premium_to_revenue_ratio: 0.03
      max_ilf_factor: 10.0
  fpr_political_risk:
