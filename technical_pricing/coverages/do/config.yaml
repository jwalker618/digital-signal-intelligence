        deductible: 1000000
      - id: 5
        limit: 100000000
        deductible: 2000000

    # -------------------------------------------------------------------------
    # PRICING PARAMETERS
    # -------------------------------------------------------------------------
    pricing:
      limit_ilf:
        base_limit: 1000000
        factors:
          - {limit: 1000000, factor: 1.00}
          - {limit: 2000000, factor: 1.65}
          - {limit: 5000000, factor: 2.80}
          - {limit: 10000000, factor: 4.20}
          - {limit: 25000000, factor: 7.50}
          - {limit: 50000000, factor: 11.00}
          - {limit: 100000000, factor: 16.00}
      
      retention_guidelines:
        tier_1_pct: 0.01
        tier_2_pct: 0.015
        tier_3_pct: 0.02
        tier_4_pct: 0.03
        tier_5_pct: 0.05
        minimum: 100000
        maximum: 2500000
      
      experience_modifiers:
        clean_5yr: 0.90
        clean_3yr: 0.95
        minor_losses: 1.00
        moderate_losses: 1.20
        major_losses: 1.50
        
      taxes_fees_rate: 0.05

