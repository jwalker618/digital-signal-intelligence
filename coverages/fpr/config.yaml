  fpr_sme:
    metadata:
      name: DSI Financial & Political Risk SME Model
      description: "Simplified FPR for smaller exposures \u2014 trade credit + political risk combined"
      version: 2.3.0
      product_types:
      - trade_credit
      - political_risk
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mea
      - africa
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name
        - field: product_type
          description: 'One of: trade_credit, political_risk, political_violence, surety_bond, contract_bond, kidnap_ransom'
        - field: limit
          description: Requested limit in USD
        - field: contract_value
          description: Contract or turnover value in USD (basis for trade credit)
      min_premium: 5000
      default_currency: USD
      model_specificity: 1
      routing_constraints:
      - field: product_type
        operator: in
        value:
        - trade_credit
        - political_risk
        required_in_input: true
      - field: limit
        operator: <
        value: 5000000
        required_in_input: false
    direct_queries:
    - id: prior_losses
      question: Any trade credit or political risk losses in the past 3 years?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: Recent loss history
    - id: high_risk_country
      question: Is more than 50% of exposure to HIGH or SEVERE risk countries?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Majority high-risk country exposure
    signal_registry:
    - id: buyer_creditworthiness
      inference_utility_function: buyer_creditworthiness_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.3
          score_conditions:
          - action: REFER
            override: 4
            note: Buyer credit deterioration
            threshold: 25
            comparison: <=
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.25
          severity:
            correlation_direction: positive
            weight: 0.2
    - id: payment_terms_exposure
      inference_utility_function: payment_terms_exposure_basefunction
      proxy_tier: DIRECT_OBSERVABLE
      three_layer_assessment:
        group_id: structured_data
        risk:
          correlation_direction: positive
          weight: 0.15
        loss:
          frequency:
            correlation_direction: positive
            weight: 0.15
          severity:
            correlation_direction: positive
            weight: 0.15
        exposure:
          size:
            correlation_direction: positive
            weight: 0.15
    - id: buyer_concentration
