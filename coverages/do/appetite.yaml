# Directors & Officers Underwriting Appetite
# Owned by: Underwriting
# Scope: All D&O configurations (do_general)

appetite:
  max_single_limit: 250_000_000     # $250M max any one policy

  constraints:
    - field: revenue
      operator: "<="
      value: 500_000_000_000        # $500B
      reason: "Revenue exceeds D&O underwriting authority"
