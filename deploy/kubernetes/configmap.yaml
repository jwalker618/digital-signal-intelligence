apiVersion: v1
kind: ConfigMap
metadata:
  name: dsi-api-config
  namespace: dsi-prod
  labels:
    app.kubernetes.io/name: dsi-api
    app.kubernetes.io/component: config
data:
  # Application settings
  DSI_ENV: "production"
  DSI_DEBUG: "false"
  DSI_HOST: "0.0.0.0"
  DSI_PORT: "8000"
  DSI_WORKERS: "4"

  # Feature flags
  FEATURE_USE_STUBS: "true"
  FEATURE_DISCOVERY: "true"
  FEATURE_MULTI_COVERAGE: "true"
  FEATURE_TRADITIONAL_MODIFIERS: "true"

  # Metrics
  METRICS_ENABLED: "true"
  METRICS_PATH: "/api/v1/metrics"

  # Database pool settings
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "10"
  DB_POOL_TIMEOUT: "30"

  # Cache settings
  CACHE_DEFAULT_TTL: "3600"
  CACHE_SIGNAL_TTL: "86400"

  # Rate limiting
  RATE_LIMIT_PER_MINUTE: "60"
  RATE_LIMIT_BURST: "10"

  # V6/D1 — Universal Web Footprint kill-switches. Flip to "true" to shed
  # a specific extractor at runtime without a redeploy. Production default
  # is every extractor live; staging may disable paid sources.
  DSI_DISABLE_GITHUB_ORG: "false"
  DSI_DISABLE_WAYBACK: "false"
  DSI_DISABLE_URLSCAN: "false"
  DSI_DISABLE_COMMONCRAWL: "false"
  DSI_DISABLE_TRANCO: "false"
  DSI_DISABLE_SAFEBROWSING: "false"
  DSI_DISABLE_PHISHTANK: "false"
  DSI_DISABLE_OPENPHISH: "false"
  DSI_DISABLE_CF_RADAR: "false"
  DSI_DISABLE_GOOGLE_TRANSPARENCY: "false"
  DSI_DISABLE_HIBP: "false"
  DSI_DISABLE_INTELX: "false"
  DSI_DISABLE_TRUSTPILOT: "false"
  DSI_DISABLE_BBB: "false"
  DSI_DISABLE_GLASSDOOR: "false"
  DSI_DISABLE_GOOGLE_REVIEWS: "false"

  # V6/D3 — Litigation + regulatory extractor kill-switches.
  DSI_DISABLE_COURTLISTENER: "false"
  DSI_DISABLE_PACER_RSS: "false"
  DSI_DISABLE_SCAC: "false"
  DSI_DISABLE_SEC_LITRELEASES: "false"
  DSI_DISABLE_FINRA: "false"
  DSI_DISABLE_IAPD: "false"
  DSI_DISABLE_GDPR_TRACKER: "false"
  DSI_DISABLE_CMS_HOSPITAL: "false"
  DSI_DISABLE_JOINT_COMMISSION: "false"
  DSI_DISABLE_NPDB: "false"
  DSI_DISABLE_PCAOB: "false"
  DSI_DISABLE_OSHA: "false"
  DSI_DISABLE_FMCSA: "false"
  DSI_DISABLE_NHTSA: "false"
  DSI_DISABLE_CPSC: "false"
  DSI_DISABLE_FDA: "false"
  DSI_DISABLE_EU_SAFETYGATE: "false"
  DSI_DISABLE_FSIS: "false"

  # V6/D2 — Technical / infrastructure extractor kill-switches.
  DSI_DISABLE_SHODAN: "false"
  DSI_DISABLE_CENSYS: "false"
  DSI_DISABLE_BGP: "false"
  DSI_DISABLE_PEERINGDB: "false"
  DSI_DISABLE_WAPPALYZER: "false"
  DSI_DISABLE_BUILTWITH: "false"
  DSI_DISABLE_HTTPARCHIVE: "false"

  # V6/D4 — IP / innovation extractor kill-switches.
  DSI_DISABLE_USPTO: "false"
  DSI_DISABLE_EPO: "false"
  DSI_DISABLE_OPENALEX: "false"
  DSI_DISABLE_CROSSREF: "false"
  DSI_DISABLE_SEMANTIC_SCHOLAR: "false"

  # V6/D5 — Climate / environment extractor kill-switches.
  DSI_DISABLE_FEMA_FLOOD: "false"
  DSI_DISABLE_NOAA_CDO: "false"
  DSI_DISABLE_USFS_FIRE: "false"
  DSI_DISABLE_USGS_SEISMIC: "false"
  DSI_DISABLE_COPERNICUS: "false"
  DSI_DISABLE_ERA5: "false"
  DSI_DISABLE_CDP: "false"
  DSI_DISABLE_ENERGYSTAR: "false"
  DSI_DISABLE_TRI: "false"
  DSI_DISABLE_SUPERFUND: "false"
  DSI_DISABLE_NRC: "false"

  # V6/D6 — Sector telemetry extractor kill-switches.
  DSI_DISABLE_OPENSKY: "false"
  DSI_DISABLE_ICAO: "false"
  DSI_DISABLE_ASIAS: "false"
  DSI_DISABLE_AIS_HUB: "false"
  DSI_DISABLE_MARINE_CADASTRE: "false"
  DSI_DISABLE_EMSA: "false"
  DSI_DISABLE_PARIS_MOU: "false"
  DSI_DISABLE_TOKYO_MOU: "false"
  DSI_DISABLE_PHMSA: "false"
  DSI_DISABLE_BSEE: "false"
  DSI_DISABLE_NERC: "false"

  # V6/D7 — Hiring / behavioural-derivative extractor kill-switches.
  DSI_DISABLE_GREENHOUSE: "false"
  DSI_DISABLE_LEVER: "false"
  DSI_DISABLE_ASHBY: "false"
  DSI_DISABLE_GOOGLE_JOBS: "false"

  # V6/C3 — OpenTelemetry. Enable on production to emit spans.
  DSI_OTEL_ENABLED: "false"
