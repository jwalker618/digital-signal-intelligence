# =============================================================================
# DSI Model Configuration
# 
# This file holds all the relvant configuration types for a single coverage.
# For example,
# coverage:         the actual coverage cohort, eg aerospace
#   configuration:  the specific configuration file under that coverage, eg aerospace_general
# 
# There can be multiple configurations saved under a coverage.
# 
# A configuration is the single source of truth for:
#   - 1) direct (optional) queries
#   - 2) categorical features
#   - 3) signal groups and underlying features
#   - the source and impact of 1- 3
#   - tier definitions
#   - other pricing parameters
#   - test profiles for validation
# 
# When a technical model is generated:
# - the completed selected configuration is persisted. This allows the model to be generated at any moment based on its original specification (although test profiles are removed as these are extraneous).
# - every item with an id is captured in a seperate file with the associated return and persisted after a complete interaction  - this is a model version
# 
# All DSI principles must be adhered to, specifically:
# 1. All signals must be externally observable (no application questions required)
# 2. Direct queries are OPTIONAL - model must work without them
# 3. Categorical features are inferred from observable data
# 4. Tier determines base premium, either directly or through the application of a percentage to a single value (for example, TIV * %); modifiers adjust for categorical features
# 5. All sources must be publicly accessible or through standard data providers
# =============================================================================

energy:
  energy_general:
    metadata:
      name: "DSI Energy Technical Pricing Model"
      description: "Energy property and liability coverage based on observable safety, environmental, and operational signals"
      version: "2.0.0"
      coverage_types:
        - "property_damage"
        - "business_interruption"
        - "control_of_well"
        - "operators_extra_expense"
        - "third_party_liability"
        - "pollution_liability"
        - "removal_of_wreck"
      applicable_segments:
        - "upstream_conventional"
        - "upstream_unconventional"
        - "upstream_offshore"
        - "upstream_deepwater"
        - "midstream_pipeline"
        - "midstream_processing"
        - "midstream_storage"
        - "downstream_refining"
        - "downstream_petrochemical"
        - "power_generation"
        - "renewable"
      applicable_markets: ["us", "uk", "eu", "apac", "latam", "mena"]
      minimum_viable_input: ["client name (domain optional)","Limit in USD","TIV"]
      min_premium: 100000
      default_currency: "USD"

    # -------------------------------------------------------------------------
    # DIRECT OPTIONAL QUERIES
    # -------------------------------------------------------------------------
    direct_queries:
      - id: "major_incidents"
        question: "Any major incidents (explosion, blowout, major spill) in past 5 years?"
        bands:
          - return: true
            override: 4
            action: "REFER"
            note: "Major incidents disclosed"
      - id: "fatalities"
        question: "Any work-related fatalities in past 3 years?"
        bands:
          - return: true
            override: 3
            action: "REFER"
            note: "Fatalities disclosed"
      - id: "regulatory_enforcement"
        question: "Any significant regulatory enforcement actions pending?"
        bands:
          - return: true
            override: null 
            action: "REFER"
            note: "Pending regulatory enforcement"
      - id: "decommissioning_obligations"
        question: "Any significant unfunded decommissioning obligations?"
        bands:
          - return: true
            override: null
            action: "FLAG" 
            note: "Unfunded decommissioning obligations"
      - id: "joint_venture_operator"
        question: "Are you the designated operator for JV assets?"
        bands:
          - return: true
            override: null
            action: "INFO"
            note: "JV operator status"
      - id: "third_party_contractor"
        question: "Do you use third-party contractors for drilling/completions?"
        bands:
          - return: true
            override: null
            action: "INFO"
            note: "Third-party contractor usage"

    
    # -------------------------------------------------------------------------
    # CATEGORICAL GROUPS
    # -------------------------------------------------------------------------
    categorical_groups:
      - id: "operator_type"
        name: "Operator Type"
        description: "Operator classification based on size, integration, and ownership"
        inference_utility_function: operator_type_basefunction
      - id: "operation_segment"
        name: "Operation Segment"
        description: "Primary operational segment"
        inference_utility_function: operation_segment_basefunction
      - id: "geographic_focus"
        name: "Geographic Focus"
        description: "Primary geographic focus of operations"
        inference_utility_function: geographic_focus_basefunction

