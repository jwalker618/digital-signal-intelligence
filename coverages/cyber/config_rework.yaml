          inference_utility_function: security_headers_basefunction
          risk:
            weight: 0.10
            score_condition: false
          loss:
            weight: 0.3
            correlation_type: both
            correlation_direction: negative
            normalizer: linear
            thresholds: [20, 40, 60, 80]
            lag_months: 6
          
        - id: "email_auth"
          name: "Email Authentication"
          description: "Email security (SPF, DMARC, DKIM configuration)"
          inference_utility_function: email_authentication_basefunction
          risk:
            weight: 0.12
            score_condition: false
          
        - id: "dnssec"
          name: "DNSSEC Implementation"
          description: "DNS Security Extensions implementation"
          inference_utility_function: dnssec_basefunction
          risk:
            weight: 0.05
            score_condition: false
          
        - id: "exposure"
