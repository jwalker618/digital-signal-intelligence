              weight: 0.10

      - id: "peer_benchmark"
        inference_utility_function: peer_benchmark_basefunction
        proxy_tier: COHORT_INFERENCE
        three_layer_assessment:
          group_id: structured_data
          risk:
            correlation_direction: positive
            weight: 0.30
          loss:
            frequency:
              correlation_direction: positive
              weight: 0.15
            severity:
              correlation_direction: positive
              weight: 0.15
        
    # =========================================================================
    # GROUPS
    # Categorical modifiers and three-layer assessment groupings
    # =========================================================================
    groups:

      # -----------------------------------------------------------------------
      # CATEGORICAL GROUPS
      # Apply pricing modifiers (applied:), not scores
      # -----------------------------------------------------------------------
      categories:
        - id: "institution_type"
          label: "Institution Type"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "regulatory_framework"
          label: "Regulatory Framework"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "asset_size_band"
          label: "Asset Size Band"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

        - id: "publicly_traded"
          label: "Publically Traded"
          description: ""
          impact: "MODIFIER"
          default_cat: "OTHER"

      # -----------------------------------------------------------------------
      # THREE-LAYER ASSESSMENT GROUPS
      # Aggregate signals into scoring dimensions
      # Weights within each dimension must sum to 1.0
      # -----------------------------------------------------------------------
      three_layer_assessment:
        - id: "network_authority"
          label: "Network Authority"
          description: "Quality of institutional relationships and counterparties"
          risk:
            weight: 0.10
            score_conditions:
              - {threshold: 85, comparison: ">=", action: "MODIFIER", applied: 0.95,  note: "Strong network authority credit"}
              - {threshold: 40, comparison: "<=", action: "MODIFIER", applied: 1.10,  note: "Weak network authority loading"}
          
        - id: "regulatory_compliance"
          label: "Regulatory Compliance"
          description: "Examination results, enforcement actions, compliance ratings"
          risk:
            weight: 0.25
            score_conditions:
              - {threshold: 30, comparison: "<=", action: "REFER", override: 5, note: "Critical regulatory deficiencies"}
              - {threshold: 45, comparison: "<=", action: "REFER", override: 4, note: "Significant regulatory concerns"}
  
        - id: "financial_condition"
          label: "Financial Condition"
          description: "Capital, asset quality, liquidity, earnings (CAMELS proxies)"
          risk:
            weight: 0.20
            score_conditions:
              - {threshold: 35, comparison: "<=", action: "REFER", override: 5, note: "Critical financial condition"}
              - {threshold: 50, comparison: "<=", action: "REFER", override: 4, note: "Material financial concerns"}
  
        - id: "governance"
          label: "Corporate Governance"
          description: "Board composition, executive stability, committee quality"
          risk:
            weight: 0.15
            score_conditions:
              - {threshold: 85, comparison: ">=", action: "MODIFIER", applied: 0.90, note: "Strong governance credit"}
              - {threshold: 40, comparison: "<=", action: "MODIFIER", applied: 1.15, note: "Weak governance loading"}
          
        - id: "operational_risk"
          label: "Operational Risk"
          description: "Complaints, litigation, breach history, incidents"
          risk:
            weight: 0.10
            score_conditions:
              - {threshold: 35, comparison: "<=", action: "REFER", override: 4, note: "Elevated operational risk"}
  
        - id: "cyber_security"
          label: "Cyber Security"
          description: "Observable technical security posture"
          risk:
            weight: 0.10
            score_conditions:
              - {threshold: 35, comparison: "<=", action: "REFER", override: 4, note: "Cyber security deficiencies"}
  
        - id: "corporate_footprint"
          label: "Corporate Footprint"
          description: "Transparency, disclosure, investor relations"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 80, comparison: ">=", action: "MODIFIER", applied: 0.95, note: "Strong transparency credit"}
              - {threshold: 35, comparison: "<=", action: "MODIFIER", applied: 1.10, note: "Poor transparency loading"}
          
        - id: "structured_data"
          label: "Structured Data"
          description: "Third-party ratings and benchmarks"
          risk:
            weight: 0.05
            score_conditions:
              - {threshold: 82, comparison: ">=", action: "MODIFIER", applied: 0.95, note: "Strong third-party ratings credit"}
              - {threshold: 38, comparison: "<=", action: "MODIFIER", applied: 1.10, note: "Weak third-party ratings loading"}

    # =========================================================================
    # RISK TIER BANDS
    # Maps composite risk score (0-1000) to pricing tiers
    # =========================================================================
    risk_tier_bands:
      bands:
        - id: 1
          label: "PREFERRED"
          description: "Excellent risk - automatic approval, preferred pricing"
          interpretation:
            bands: {min: 800, max: 1000}
            action: "APPROVE"
            application: {method: "PREMIUM_BASE", value: 1500}

        - id: 2
          label: "STANDARD_PLUS"
          description: "Good risk - automatic approval, standard pricing"
          interpretation:
            bands: {min: 650, max: 799}
            action: "APPROVE"
            application: {method: "PREMIUM_BASE", value: 2200}

        - id: 3
          label: "STANDARD"
          description: "Average risk - may require referral"
          interpretation:
            bands: {min: 500, max: 649}
            action: "REFER"
            application: {method: "PREMIUM_BASE", value: 3200}

        - id: 4
          label: "SUBSTANDARD"
          description: "Elevated risk - requires senior review"
          interpretation:
            bands: {min: 350, max: 499}
            action: "REFER"
            application: {method: "PREMIUM_BASE", value: 5000}

        - id: 5
          label: "DECLINE"
          description: "Unacceptable risk - decline"
          interpretation:
            bands: {min: 0, max: 349}
            action: "DECLINE"
            application: {method: "PREMIUM_BASE", value: 8000}

    # =========================================================================
    # LOSS TIER BANDS
    # Maps composite loss score (0-100) to pricing modifiers
    # Calculation: (frequency_score × frequency_weight) + (severity_score × severity_weight)
    # Result maps to band, constrained by floor/cap
    # =========================================================================
    loss_tier_bands:
      bands:
        - id: 1
          label: "VERY_LOW"
          description: "Very low risk of loss"
          interpretation:
            bands: {min: 80, max: 100}
            application:
              frequency_modifier: 0.70
              severity_modifier: 0.80

        - id: 2
          label: "LOW"
          description: "Low risk of loss"
          interpretation:
            bands: {min: 60, max: 79}
            application:
              frequency_modifier: 0.85
              severity_modifier: 0.90

        - id: 3
          label: "MODERATE"
          description: "Moderate risk of loss"
          interpretation:
            bands: {min: 40, max: 59}
            application:
              frequency_modifier: 1.00
              severity_modifier: 1.00

        - id: 4
          label: "ELEVATED"
          description: "Elevated risk of loss"
          interpretation:
            bands: {min: 20, max: 39}
            application:
              frequency_modifier: 1.15
              severity_modifier: 1.15

        - id: 5
          label: "HIGH"
          description: "High risk of loss"
          interpretation:
            bands: {min: 0, max: 19}
            application:
              frequency_modifier: 1.35
              severity_modifier: 1.40
      constraints:
        floor: 0.55
        cap: 1.60

    # =========================================================================
    # EXPOSURE TIER BANDS
    # Maps exposure scores to size and complexity modifiers
    # Calculation: (size_modifier × size_weight) + (complexity_modifier × complexity_weight)
    # =========================================================================
    exposure:
      size:
        weight: 0.60
        bands:
          - id: 1
            label: "MICRO"
            description: "Micro exposure value ($0 - $1M)"
            interpretation:
              bands: {min: 0, max: 20}
              application: {method: "MODIFIER", applied: 0.50, implied_thresholds: {min: 0, max: 1000000}}

          - id: 2
            label: "SMALL"
            description: "Small exposure value ($1M - $10M)"
            interpretation:
              bands: {min: 21, max: 40}
              application: {method: "MODIFIER", applied: 0.75, implied_thresholds: {min: 1000000, max: 10000000}}

          - id: 3
            label: "MEDIUM"
            description: "Medium exposure value ($10M - $50M)"
            interpretation:
              bands: {min: 41, max: 60}
              application: {method: "MODIFIER", applied: 1.00, implied_thresholds: {min: 10000000, max: 50000000}}

          - id: 4
            label: "LARGE"
            description: "Large exposure value ($50M - $250M)"
            interpretation:
              bands: {min: 61, max: 80}
              application: {method: "MODIFIER", applied: 1.50, implied_thresholds: {min: 50000000, max: 250000000}}

          - id: 5
            label: "VERY_LARGE"
            description: "Very large exposure value ($250M+)"
            interpretation:
              bands: {min: 81, max: 100}
              application: {method: "MODIFIER", applied: 2.50, implied_thresholds: {min: 250000000, max: 1000000000}}

      complexity:
        weight: 0.40
        bands:
          - id: 1
            label: "SIMPLE"
            description: "Simple operational complexity"
            interpretation:
              bands: {min: 0, max: 20}
              application: {method: "MODIFIER", applied: 0.85}

          - id: 2
            label: "MODERATE"
            description: "Moderate operational complexity"
            interpretation:
              bands: {min: 21, max: 40}
              application: {method: "MODIFIER", applied: 0.95}

          - id: 3
            label: "COMPLEX"
            description: "Complex operations"
            interpretation:
              bands: {min: 41, max: 60}
              application: {method: "MODIFIER", applied: 1.10}

          - id: 4
            label: "HIGHLY_COMPLEX"
            description: "Highly complex operations"
            interpretation:
              bands: {min: 61, max: 80}
              application: {method: "MODIFIER", applied: 1.30}

          - id: 5
            label: "EXTREMELY_COMPLEX"
            description: "Extremely complex operations"
            interpretation:
              bands: {min: 81, max: 100}
              application: {method: "MODIFIER", applied: 1.60}

    # =========================================================================
    # LIMIT BANDINGS
    # Standard limit/deductible combinations
    # =========================================================================
    limit_bandings:
      - id: 1
        limit: 5000000
        deductible: 100000

      - id: 2
        limit: 10000000
        deductible: 250000

      - id: 3
        limit: 25000000
        deductible: 500000

      - id: 4
        limit: 50000000
        deductible: 1000000

      - id: 5
        limit: 100000000
        deductible: 2000000

    # =========================================================================
    # PRICING PARAMETERS
    # Product-type-specific ILF curves reflecting different loss development
    # =========================================================================
    pricing:

      by_product_type:
        # -----------------------------------------------------------------------
        # FINANCIAL INSTITUTION BOND - Fidelity, crime, computer fraud
        # Moderate curve; losses tend to be mid-severity
        # -----------------------------------------------------------------------
        financial_institution_bond:
          ilf_curve:
            base_limit: 1000000
            factors:
              - {limit: 1000000, factor: 1.00}
              - {limit: 2000000, factor: 1.65}
              - {limit: 5000000, factor: 2.90}
              - {limit: 10000000, factor: 4.30}
              - {limit: 25000000, factor: 7.50}
              - {limit: 50000000, factor: 11.50}
              - {limit: 100000000, factor: 17.00}
          deductible_credits:
            - {min_pct: 0.001, max_pct: 0.005, credit: 0.05}
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.10}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.15}
            - {min_pct: 0.020, max_pct: null, credit: 0.20}

        # -----------------------------------------------------------------------
        # PROFESSIONAL LIABILITY - E&O for financial services
        # Steeper curve; regulatory and litigation exposure
        # -----------------------------------------------------------------------
        professional_liability:
          ilf_curve:
            base_limit: 1000000
            factors:
              - {limit: 1000000, factor: 1.00}
              - {limit: 2000000, factor: 1.75}
              - {limit: 5000000, factor: 3.30}
              - {limit: 10000000, factor: 5.20}
              - {limit: 25000000, factor: 9.50}
              - {limit: 50000000, factor: 15.00}
              - {limit: 100000000, factor: 23.00}
          deductible_credits:
            - {min_pct: 0.001, max_pct: 0.005, credit: 0.05}
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.10}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.15}
            - {min_pct: 0.020, max_pct: null, credit: 0.20}

        # -----------------------------------------------------------------------
        # DIRECTORS & OFFICERS - Securities litigation, regulatory defence
        # Steepest curve; catastrophic class action potential
        # -----------------------------------------------------------------------
        directors_officers:
          ilf_curve:
            base_limit: 1000000
            factors:
              - {limit: 1000000, factor: 1.00}
              - {limit: 2000000, factor: 1.85}
              - {limit: 5000000, factor: 3.60}
              - {limit: 10000000, factor: 5.80}
              - {limit: 25000000, factor: 11.00}
              - {limit: 50000000, factor: 18.00}
              - {limit: 100000000, factor: 28.00}
          deductible_credits:
            - {min_pct: 0.001, max_pct: 0.005, credit: 0.04}
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.08}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.12}
            - {min_pct: 0.020, max_pct: null, credit: 0.18}

        # -----------------------------------------------------------------------
        # CYBER LIABILITY - Data breach, network security
        # Steep curve; ransomware and breach costs scale rapidly
        # -----------------------------------------------------------------------
        cyber_liability:
          ilf_curve:
            base_limit: 1000000
            factors:
              - {limit: 1000000, factor: 1.00}
              - {limit: 2000000, factor: 1.75}
              - {limit: 5000000, factor: 3.40}
              - {limit: 10000000, factor: 5.50}
              - {limit: 25000000, factor: 10.00}
              - {limit: 50000000, factor: 16.00}
              - {limit: 100000000, factor: 25.00}
          deductible_credits:
            - {min_pct: 0.001, max_pct: 0.005, credit: 0.05}
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.10}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.15}
            - {min_pct: 0.020, max_pct: null, credit: 0.20}

        # -----------------------------------------------------------------------
        # EMPLOYMENT PRACTICES - Discrimination, wrongful termination
        # Moderate curve; frequency-driven, settlement-heavy
        # -----------------------------------------------------------------------
        employment_practices:
          ilf_curve:
            base_limit: 1000000
            factors:
              - {limit: 1000000, factor: 1.00}
              - {limit: 2000000, factor: 1.60}
              - {limit: 5000000, factor: 2.80}
              - {limit: 10000000, factor: 4.20}
              - {limit: 25000000, factor: 7.00}
              - {limit: 50000000, factor: 10.50}
              - {limit: 100000000, factor: 15.50}
          deductible_credits:
            - {min_pct: 0.001, max_pct: 0.005, credit: 0.05}
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.10}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.15}
            - {min_pct: 0.020, max_pct: null, credit: 0.20}

        # -----------------------------------------------------------------------
        # FIDUCIARY LIABILITY - ERISA, pension plan management
        # Moderate curve; class action potential but more predictable
        # -----------------------------------------------------------------------
        fiduciary_liability:
          ilf_curve:
            base_limit: 1000000
            factors:
              - {limit: 1000000, factor: 1.00}
              - {limit: 2000000, factor: 1.70}
              - {limit: 5000000, factor: 3.10}
              - {limit: 10000000, factor: 4.80}
              - {limit: 25000000, factor: 8.50}
              - {limit: 50000000, factor: 13.00}
              - {limit: 100000000, factor: 20.00}
          deductible_credits:
            - {min_pct: 0.001, max_pct: 0.005, credit: 0.05}
            - {min_pct: 0.005, max_pct: 0.010, credit: 0.10}
            - {min_pct: 0.010, max_pct: 0.020, credit: 0.15}
            - {min_pct: 0.020, max_pct: null, credit: 0.20}

      # Shared across all product types
      taxes_fees_rate: 0.05
