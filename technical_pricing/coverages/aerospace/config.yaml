          weight: 0.15
          inference_utility_function: growth_rate_basefunction
          critical: false
          score_condition: null
  
      fleet_quality:
        - id: "fleet_age"
          name: "Fleet Average Age"
          description: "Average aircraft age vs benchmarks"
