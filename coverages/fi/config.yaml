    - id: regulatory_clarity
      question: Is the company registered with the SEC, CFTC, or equivalent regulator?
      query_condition:
      - return: true
        action: MODIFIER
        override: null
        applied: 0.85
        note: Registered entity credit
    - id: hack_history
      question: Has the platform suffered a security breach or hack resulting in customer asset loss?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Prior hack/asset loss
    - id: proof_of_reserves
      question: Does the company publish audited proof of reserves?
      query_condition:
      - return: true
        action: MODIFIER
        override: null
        applied: 0.9
        note: Proof of reserves credit
    - id: defi_protocol
      question: Does the company operate or rely on DeFi smart contracts?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: "DeFi protocol risk \u2014 smart contract vulnerability"
