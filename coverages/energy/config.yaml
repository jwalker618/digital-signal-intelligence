  # ===========================================================================
  # ENERGY STORAGE (BESS & GREEN HYDROGEN)
  # ===========================================================================
  energy_storage:
    metadata:
      name: DSI Energy Storage Pricing Model
      description: Battery energy storage systems (BESS) and green hydrogen — emerging technology risk with catastrophic severity potential
      version: 2.2.0
      product_types:
      - property_damage
      - business_interruption
      - third_party_liability
      - delay_in_start_up
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      - latam
      - mena
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name (domain optional for discovery)
        - field: product_type
          description: 'One of: property_damage, business_interruption, third_party_liability, delay_in_start_up'
        - field: limit
          description: Requested limit in USD
        - field: tiv
          description: Total Insured Value in USD
        - field: technology_type
          description: 'One of: BATTERY_STORAGE, HYDROGEN'
      min_premium: 75000
      default_currency: USD
      model_specificity: 3
      routing_constraints:
      - field: operation_segment
        operator: "="
        value: RENEWABLE
        required_in_input: true
      - field: technology_type
        operator: IN
        value: [BATTERY_STORAGE, HYDROGEN]
        required_in_input: true

    direct_queries:
    - id: thermal_event
      question: Any thermal runaway, fire, or explosion events involving battery or hydrogen systems in past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Thermal event history — catastrophic severity concern
    - id: technology_first_of_kind
      question: Is this a first-of-kind technology deployment (unproven chemistry, novel electrolyser, or prototype system)?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: First-of-kind technology risk
    - id: nfpa_non_compliance
      question: Are any BESS installations non-compliant with NFPA 855 or UL 9540A?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Safety standard non-compliance
    - id: hydrogen_incident
      question: Any hydrogen leak, embrittlement failure, or high-pressure storage incident in past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Hydrogen incident history
    - id: warranty_dispute
      question: Any active warranty disputes with battery or electrolyser OEMs?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: OEM warranty dispute
    - id: serial_defect
      question: Any known serial defect advisories affecting installed battery modules or electrolysers?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Serial defect exposure

