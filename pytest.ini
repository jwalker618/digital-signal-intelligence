[pytest]
# Pytest configuration file

# Minimum version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths =
    models/cyber/tests
    models/energy/tests
    models/financial_institutions/tests
    models/portfolio/tests
    models/signal_collection/tests
    models/website_discovery/tests

# Python path
pythonpath = models

# Output options (coverage settings managed by CI workflow)
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    api: marks tests as API tests
    smoke: marks tests as smoke tests for quick validation

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests.log
log_file_level = DEBUG

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::RuntimeWarning

# Timeout (in seconds)
timeout = 300

# Parallel execution (requires pytest-xdist)
# Uncomment to run tests in parallel:
# addopts = -n auto
