      modifier_cap: 2.5
      max_premium_to_limit_ratio: 0.35
      max_premium_to_revenue_ratio: 0.01
      max_ilf_factor: 10.0
  casualty_wc:
    metadata:
      name: DSI Workers Compensation Model
      description: "Workers compensation \u2014 payroll-based, experience mod driven, state-specific"
      version: 2.3.0
      product_types:
      - workers_compensation
      applicable_markets:
      - us
      - uk
      - eu
      - apac
      minimum_viable_input:
        required:
        - field: client_name
          description: Client name
        - field: product_type
          description: 'One of: general_liability, workers_compensation, commercial_auto, umbrella_excess, environmental_liability,
            products_liability'
        - field: limit
          description: Requested limit in USD
        - field: revenue
          description: Annual revenue in USD (basis for GL, environmental)
        - field: payroll
          description: Annual payroll in USD (basis for WC)
      min_premium: 10000
      default_currency: USD
      model_specificity: 3
      routing_constraints:
      - field: product_type
        operator: ==
        value: workers_compensation
        required_in_input: true
      - field: payroll
        operator: '>='
        value: 1000000
        required_in_input: true
    direct_queries:
    - id: osha_citations
      question: Any OSHA citations (serious or willful) in the past 3 years?
      query_condition:
      - return: true
        action: REFER
        override: 4
        applied: null
        note: Recent OSHA citations
    - id: fatality_history
      question: Any workplace fatalities in the past 5 years?
      query_condition:
      - return: true
        action: REFER
        override: 5
        applied: null
        note: Workplace fatality history
    - id: experience_mod_high
      question: Is the current experience modification factor above 1.25?
      query_condition:
      - return: true
        action: REFER
        override: 3
        applied: null
        note: "High experience mod \u2014 loss-driven"
    - id: multi_state
      question: Are employees located in more than 10 states?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: "Multi-state WC \u2014 jurisdictional complexity"
    - id: seasonal_workforce
      question: Does the workforce include >30% seasonal or temporary workers?
      query_condition:
      - return: true
        action: FLAG
        override: null
        applied: null
        note: High seasonal/temp worker ratio
